<script src="shared-logic.js"></script>
<script>
    // Уникальный словарь Холла
    const hallDict = {
        en: { hall_slogan: "STYLE IS A JOKE", nav_bar: "BAR", nav_atelier: "ATELIER" },
        ru: { hall_slogan: "СТИЛЬ ЭТО ШУТКА", nav_bar: "БАР", nav_atelier: "АТЕЛЬЕ" }
    };

    window.onload = () => {
        // 1. Рисуем атрибуты (Назад, Лого, Язык) - на 1-й странице это НЕ вызываем!
        injectPermanentAttributes();

        // 2. Переводим контент
        applyTranslations(hallDict);

        // 3. Заполняем карточку юзера (только в Холле)
        document.getElementById('u-nick').innerText = localStorage.getItem('gy_nick') || 'GUEST';
        document.getElementById('u-id').innerText = localStorage.getItem('gy_user_id') || '000-GY';
    };
</script>
