<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Hall</title>
    <link rel="stylesheet" href="shared-core.css">
    <style>
        body { 
            margin: 0; padding: 0; color: gold; 
            /* Подкладываем картинку фоном */
            background: #000 url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Arial Black', sans-serif;
        }
        /* Затемнение, чтобы текст читался на фоне */
        .overlay {
            width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 40px;
        }
        .user-passport {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid gold;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            min-width: 260px;
        }
        .avatar-frame {
            width: 100px; height: 100px;
            border: 2px solid gold;
            border-radius: 50%;
            margin: 0 auto 15px;
            background-size: cover;
            background-position: center;
        }
        .nav-grid { display: flex; gap: 30px; }
        .nav-card {
            width: 180px; height: 180px;
            border: 3px solid gold;
            background: rgba(0,0,0,0.4);
            color: gold;
            text-decoration: none;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 15px;
            transition: 0.3s;
        }
        .nav-card:hover { background: gold; color: black; transform: translateY(-10px); }
        .nav-card span { font-size: 3rem; margin-bottom: 10px; }
        .nav-label { font-size: 1.3rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="user-passport">
            <div id="u-avatar" class="avatar-frame"></div>
            <div id="u-nick" style="font-size: 1.8rem; letter-spacing: 1px;">...</div>
            <div id="u-id" style="font-family: monospace; font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">...</div>
        </div>

        <nav class="nav-grid">
            <a href="bar.html" class="nav-card">
                <span>🍷</span>
                <div class="nav-label" data-t="nav_bar">BAR</div>
            </a>
            <a href="atelier.html" class="nav-card">
                <span>✂️</span>
                <div class="nav-label" data-t="nav_atelier">ATELIER</div>
            </a>
        </nav>

        <div data-t="hall_slogan" style="font-size: 1rem; opacity: 0.8; letter-spacing: 2px;">...</div>
    </div>

    <script src="shared-logic.js"></script>
    <script>
        const hallDict = {
            en: { hall_slogan: "STYLE IS THE ONLY JOKE", nav_bar: "BAR", nav_atelier: "ATELIER" },
            ru: { hall_slogan: "СТИЛЬ — ЭТО ЕДИНСТВЕННАЯ ШУТКА", nav_bar: "БАР", nav_atelier: "АТЕЛЬЕ" }
        };

        window.onload = () => {
            injectPermanentAttributes(); 
            applyTranslations(hallDict);
            
            document.getElementById('u-nick').innerText = localStorage.getItem('gy_nick') || 'GUEST';
            document.getElementById('u-id').innerText = `ID: ${localStorage.getItem('gy_user_id') || '000-GY'}`;
            const av = localStorage.getItem('gy_avatar');
            if(av) document.getElementById('u-avatar').style.backgroundImage = `url(${av})`;
        };
    </script>
</body>
</html>
