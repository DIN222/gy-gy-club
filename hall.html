<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>GY-GY CLUB | HALL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="fixed-header">
        <div class="logo-text">GY-GY</div>
        <button class="btn-gy" onclick="Agent.gate('welcome.html')">← BACK</button>
    </header>

    <main class="portal-zone" style="background-image: url('hall_bg.jpg');">
        <div class="overlay">
            <div id="user-profile" style="font-size: 24px; margin-bottom: 20px;"></div>
            <h2>YOU ARE IN THE HALL</h2>
            <button class="btn-gy" onclick="UI.toggle('proceed-menu')">PROCEED ↓</button>
            <div id="proceed-menu" class="lang-panel" style="position:static; margin-top:10px;">
                <button class="lang-btn" onclick="Agent.gate('bar.html')">TO THE BAR 🥃</button>
            </div>
        </div>
    </main>

    <script src="shared-logic.js"></script>
    <script>
        const u = Agent.getTrace();
        if (u) {
            document.getElementById('user-profile').innerHTML = `${u.flag} ${u.avatar} #${u.numCode}`;
        }
    </script>
</body>
</html>
