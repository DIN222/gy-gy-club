<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Hall</title>
    <link rel="stylesheet" href="shared-core.css">
    <style>
        body { 
            margin: 0; padding: 0; color: gold; font-family: 'Arial Black', sans-serif;
            background: #000 url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070') no-repeat center center fixed; 
            background-size: cover;
        }
        .overlay {
            width: 100%; height: 100vh; background: rgba(0, 0, 0, 0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 50px;
        }
        .user-passport {
            background: rgba(0, 0, 0, 0.8); border: 3px solid gold; padding: 30px; border-radius: 25px;
            text-align: center; min-width: 280px; box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        .avatar-frame {
            width: 120px; height: 120px; border: 2px solid gold; border-radius: 50%;
            margin: 0 auto 15px; background-size: cover; background-position: center; background-color: #111;
        }
        .nav-grid { display: flex; gap: 40px; }
        .nav-card {
            width: 200px; height: 200px; border: 3px solid gold; background: rgba(0,0,0,0.5);
            color: gold; text-decoration: none; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 20px; transition: 0.3s;
        }
        .nav-card:hover { background: gold; color: black; transform: scale(1.05); }
        .nav-card span { font-size: 3.5rem; margin-bottom: 10px; }
        .nav-label { font-size: 1.5rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="user-passport">
            <div id="u-avatar" class="avatar-frame"></div>
            <div id="u-nick" style="font-size: 2rem; text-transform: uppercase;">...</div>
            <div id="u-id" style="font-family: monospace; opacity: 0.6; margin-top: 10px;">ID: ...</div>
        </div>

        <nav class="nav-grid">
            <a href="bar.html" class="nav-card">
                <span>🥃</span>
                <div class="nav-label" data-t="nav_bar">BAR</div>
            </a>
            <a href="atelier.html" class="nav-card">
                <span>🎭</span>
                <div class="nav-label" data-t="nav_atelier">ATELIER</div>
            </a>
        </nav>

        <div data-t="hall_slogan" style="letter-spacing: 3px; font-size: 1.1rem; text-transform: uppercase;">...</div>
    </div>

    <script src="shared-logic.js"></script>
    <script>
        const hallDict = {
            en: { hall_slogan: "STYLE IS THE ONLY JOKE", nav_bar: "BAR", nav_atelier: "ATELIER" },
            ru: { hall_slogan: "СТИЛЬ — ЭТО ЕДИНСТВЕННАЯ ШУТКА", nav_bar: "БАР", nav_atelier: "АТЕЛЬЕ" }
        };

        window.onload = () => {
            injectPermanentAttributes(); // Сама нарисует «« и Лого
            applyTranslations(hallDict);
            
            document.getElementById('u-nick').innerText = localStorage.getItem('gy_nick') || 'GUEST';
            document.getElementById('u-id').innerText = `ID: ${localStorage.getItem('gy_user_id') || '000-GY'}`;
            const av = localStorage.getItem('gy_avatar');
            if(av) document.getElementById('u-avatar').style.backgroundImage = `url(${av})`;
        };
    </script>
</body>
</html>
