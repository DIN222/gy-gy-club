<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club - Tables Zone</title>
    <style>
        /* Базовые сбросы и стили Клуба */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Постоянные атрибуты: Стрелки навигации */
        .ui-nav-arrows {
            position: fixed;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
            z-index: 1000005;
        }
        .arrow-item {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gold, #ffb703);
            color: var(--gold, #ffb703);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            font-weight: bold;
            user-select: none;
        }

        /* Постоянный атрибут: Логотип GY-GY сверху справа */
        .ui-header-right {
            position: fixed;
            top: 15px;
            right: 15px;
            color: var(--gold, #ffb703);
            font-size: 24px;
            font-weight: bold;
            z-index: 1000005;
            user-select: none;
        }

        /* Интерактивные зоны ламп/столов */
        .lamp-zone {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            /* Чтобы зоны было видно при отладке, можно раскомментировать строку ниже: */
            /* border: 1px dashed rgba(255,255,255,0.3); */
        }
    </style>
</head>
<body>

    <div class="notranslate ui-nav-arrows" id="nav-tables">
        <div class="arrow-item" onclick="window.location.href='bar.html'">&lt;</div>
        <div class="arrow-item" onclick="window.location.href='index.html'">&lt;&lt;</div>
    </div>
    
    <div class="ui-header-right notranslate">GY-GY</div>

    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 100vh; max-width: 177.78vh; max-height: 56.25vw; display: block;">
        
        <img src="lounge.jpg" style="width: 100%; height: 100%; object-fit: fill; display: block; pointer-events: none;">

        <div class="mic-zone" style="position: absolute; bottom: 58%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; cursor: pointer; z-index: 5;" onclick="alert('Testing mic... One, two... Is Charlie in the room?')"></div>
        
        <div class="lamp-zone" style="position: absolute; bottom: 52%; left: 28%; transform: translate(-50%, -50%);" onclick="alert('Table 1 selected')"></div>
        <div class="lamp-zone" style="position: absolute; bottom: 52%; left: 72%; transform: translate(-50%, -50%);" onclick="alert('Table 2 selected')"></div>
        
        <div class="lamp-zone" style="position: absolute; bottom: 36%; left: 20%; transform: translate(-50%, -50%);" onclick="alert('Table 3 selected')"></div>
        <div class="lamp-zone" style="position: absolute; bottom: 36%; left: 80%; transform: translate(-50%, -50%);" onclick="alert('Table 4 selected')"></div>
        
        <div class="lamp-zone" style="position: absolute; bottom: 20%; left: 32%; transform: translate(-50%, -50%);" onclick="alert('Table 5 selected')"></div>
        <div class="lamp-zone" style="position: absolute; bottom: 20%; left: 68%; transform: translate(-50%, -50%);" onclick="alert('Table 6 selected')"></div>
        
    </div>

</body>
</html>
