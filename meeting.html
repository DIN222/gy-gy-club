<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club — Комната Переговоров v4.5.43</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --dark-gray: #141414;
            --light-gray: #222222;
            --text: #f0f0f0;
            --glow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 100px; /* Отступ под фиксированную верхнюю панель */
            overflow-x: hidden;
        }

        /* ==========================================================
           СТАТИЧНАЯ ВЕРХНЯЯ ПАНЕЛЬ (ЖЕЛЕЗНЫЙ КАНОН GY-GY)
           ========================================================== */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid var(--gold);
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Три четкие зоны: лево, центр, право */
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        /* ЛЕВАЯ ЧАСТЬ: Двойная и Одинарная стрелки навигации */
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: var(--glow);
        }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ: Аватар пользователя */
        .header-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-avatar-zone {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: var(--glow);
        }

        .header-avatar-zone img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            object-fit: cover;
        }

        .header-avatar-zone span {
            color: var(--gold);
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* ПРАВАЯ ЧАСТЬ: Логотип GY-GY */
        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .gy-logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: var(--glow);
            text-decoration: none;
            letter-spacing: 4px;
        }

        /* ==========================================================
           ИНТЕРФЕЙС ПЕРЕГОВОРНОЙ (ЛИНГВО-СМЫСЛОВОЙ ЧАТ)
           ========================================================== */
        .meeting-room {
            width: 95%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        /* Левая колонка: Участники */
        .sidebar {
            background: var(--dark-gray);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sidebar h3 {
            color: var(--gold);
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .participant-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .participant-card {
            background: var(--light-gray);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .participant-card img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--gold);
        }

        .invite-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            border-top: 1.5px dashed #333;
            padding-top: 15px;
        }

        /* Правая колонка: Чат */
        .chat-area {
            background: var(--dark-gray);
            border: 2px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .communication-modes {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            background: var(--light-gray);
            border: 1px solid var(--gold);
            color: var(--text);
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
        }

        .mode-btn.active {
            background: var(--gold);
            color: var(--dark);
            font-weight: bold;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0d0d0d;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .message.system {
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid var(--gold);
            align-self: center;
            max-width: 90%;
            font-size: 0.85rem;
            color: #ccc;
        }

        .message.user {
            background: var(--light-gray);
            border: 1px solid #333;
            align-self: flex-start;
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--gold);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .chat-input-panel {
            padding: 15px;
            border-top: 1px solid rgba(212,175,55,0.3);
            display: flex;
            gap: 10px;
        }

        .input-field {
            background: #080808;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--gold);
        }

        .btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn:hover {
            background: #fff;
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        
        <div class="header-left">
            <a href="index.html" class="nav-btn" title="В Холл">≪</a>
            <a href="office.html" class="nav-btn" title="Назад в Офис">←</a>
        </div>

        <div class="header-center">
            <div class="header-avatar-zone" id="header-avatar-zone">
                <img id="header-avatar-img" src="" alt="Avatar" style="display: none;">
                <span id="header-avatar-nick">@GUEST</span>
            </div>
        </div>

        <div class="header-right">
            <a href="index.html" class="gy-logo">GY-GY</a>
        </div>
        
    </header>

    <main class="meeting-room">
        
        <section class="sidebar">
            <h3>👥 Участники</h3>
            <div class="participant-list" id="participant-list">
                </div>

            <div class="invite-box">
                <h3>🔑 Добавить по ID</h3>
                <p style="font-size: 0.75rem; color: #888; margin-bottom: 5px;">Пригласить резидента:</p>
                <input type="text" id="invite-id" class="input-field" placeholder="GY-654321">
                <button class="btn" style="padding: 8px; margin-top: 5px;" onclick="inviteByPassport()">Пригласить</button>
            </div>
        </section>

        <section class="chat-area">
            <div class="chat-header">
                <span style="font-weight: bold; color: var(--gold);">📡 ЛИНГВО-СЕМАНТИЧЕСКИЙ КАНАЛ</span>
                
                <div class="communication-modes">
                    <button class="mode-btn active" onclick="switchMode(this, 'text')">Текст</button>
                    <button class="mode-btn" onclick="switchMode(this, 'code')">Код</button>
                    <button class="mode-btn" onclick="switchMode(this, 'joke')">Мем-Режим</button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message system">
                    Система: Инициализировано безопасное лингво-смысловое пространство. Ожидание сигналов.
                </div>
            </div>

            <div class="chat-input-panel">
                <input type="text" id="message-input" class="input-field" style="flex-grow: 1;" placeholder="Введите смысловой пакет..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">Отправить</button>
            </div>
        </section>

    </main>

    <script>
        let currentMode = 'text';

        window.addEventListener('load', () => {
