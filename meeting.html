
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club — Комната переговоров 001 </title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --dark-gray: #141414;
            --light-gray: #222222;
            --text: #f0f0f0;
            --glow: 0 0 10px rgba(212, 175, 55, 0.4);
        }
        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .fixed-header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .gy-logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: var(--glow);
            text-decoration: none;
            letter-spacing: 3px;
        }
        /* Обязательная кнопка возврата на уровень назад (в Офис) */
        .back-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: var(--glow);
        }
        /* Языковая панель */
        .lang-btn {
            background: var(--light-gray);
            border: 1.5px solid var(--gold);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
        }
        .meeting-container {
            background: var(--dark-gray);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .whiteboard {
            background: #111;
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            min-height: 100px;
            text-align: left;
        }
        .agenda-item {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: var(--glow);
        }
        .btn:hover {
            background: #fff;
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <a href="index.html" class="gy-logo">GY-GY</a>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="office.html" class="back-btn">← В ОФИС</a>
            <button class="lang-btn" onclick="alert('RU/UA/EN')">🌐 Язык</button>
        </div>
    </header>

    <div class="meeting-container">
        <h2 style="color: var(--gold);">🤝 КОМНАТА ПЕРЕГОВОРОВ</h2>
        <p style="font-size: 0.9rem; color: #888; margin-top: 5px;">Тихо! Идет обсуждение глобальных мемов Клуба.</p>

        <div class="whiteboard">
            <h4 style="color: var(--gold); margin-bottom: 10px;">📋 Повестка дня:</h4>
            <div class="agenda-item">1. Внедрить 100% юмора во все модули.</div>
            <div class="agenda-item">2. Утвердить v4.5.43 лучшим билдом года.</div>
            <div class="agenda-item">3. Обсудить поставку кофе в Серверную.</div>
        </div>

        <button class="btn" onclick="startBrainstorm()">⚡ Начать Брейншторм</button>
    </div>

    <script>
        function startBrainstorm() {
            alert("Идея сгенерирована: Автоматически добавлять смайлик 🚀 к каждой строчке кода!");
        }
    </script>
</body>
</html>
