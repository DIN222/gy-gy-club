<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.40 - MEETING ROOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bg: rgba(212, 175, 55, 0.1);
            --gold-border: rgba(212, 175, 55, 0.3);
            --tg-blue: #0088cc;
            --tg-blue-bg: rgba(0, 136, 204, 0.15);
        }

        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
        }

        .chat-page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        /* 1. ВЕРХНЯЯ ПАНЕЛЬ С ЛЕНТОЙ СОБЕСЕДНИКОВ */
        .header-bar {
            height: 65px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold-border);
            background: #050505;
            z-index: 100;
            gap: 10px;
        }

        .ui-nav-arrows {
            display: flex; 
            gap: 15px; 
            font-size: 24px; 
            font-weight: 900 !important; 
            cursor: pointer; 
            color: var(--gold); 
            line-height: 1; 
            user-select: none;
            flex-shrink: 0;
        }
        
        .back-arrow { 
            transition: opacity 0.2s, transform 0.2s; 
            text-decoration: none; 
            color: var(--gold); 
            display: inline-block;
            border: none !important;
            outline: none !important;
            background: transparent !important;
        }
        
        .back-arrow:hover { 
            opacity: 0.8; 
            transform: scale(1.1);
        }

        /* ЛЕНТА АВАТАРОВ СОТРУДНИКОВ В ШАПКЕ */
        .header-participants {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 5px 0;
        }
        .header-participants::-webkit-scrollbar { display: none; }

        .participant-item {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .participant-item:hover { transform: scale(1.05); }

        .participant-item.active .member-avatar {
            box-shadow: 0 0 10px var(--gold) !important;
            border: 1px solid var(--gold) !important;
        }

        .member-avatar {
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            object-fit: cover; 
            background: transparent; 
            display: block;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .member-flag {
            position: absolute;
            bottom: -2px;
            right: -4px;
            font-size: 14px;
            line-height: 1;
        }

        .add-member-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px dashed var(--gold);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .add-member-btn:hover {
            background: var(--gold-bg);
            border-style: solid;
        }

        .ui-header-right { 
            font-size: 20px; 
            letter-spacing: 3px; 
            font-weight: bold; 
            user-select: none;
            flex-shrink: 0;
        }

        /* 2. ЛИНГВО-СМЫСЛОВАЯ ОБЛАСТЬ ЧАТА */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle at center, #08080c 0%, #000 100%);
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-incoming {
            align-self: flex-start;
            background: var(--gold-bg);
            border: 1px solid var(--gold-border);
            color: var(--gold);
        }

        .msg-outgoing {
            align-self: flex-end;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold);
            color: #fff;
        }

        .msg-author {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
            display: flex;
            gap: 5px;
        }

        .msg-tg-badge {
            display: inline-block;
            font-size: 10px;
            color: var(--tg-blue);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .msg-time {
            font-size: 9px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }

        /* 3. НИЖНЯЯ ПАНЕЛЬ ВВОДА С РАСШИРЕННЫМИ КНОПКАМИ */
        .chat-input-bar {
            padding: 12px 15px;
            background: #050505;
            border-top: 1px solid var(--gold-border);
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #0a0a0f;
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            padding: 12px 15px;
            color: var(--gold);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            outline: none;
        }

        .chat-input:focus { border-color: var(--gold); }

        /* Кнопка отправки со стрелкой + словом "Отправить" */
        .send-btn {
            background: var(--gold-bg);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0 14px;
            height: 42px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .send-btn:hover { background: var(--gold); color: #000; }

        /* Специальная кнопка отправки в Telegram */
        .send-tg-btn {
            background: var(--tg-blue-bg);
            border: 1px solid var(--tg-blue);
            color: var(--tg-blue);
            padding: 0 12px;
            height: 42px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .send-tg-btn:hover { 
            background: var(--tg-blue); 
            color: #fff; 
        }

        .tg-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* 4. МОДАЛЬНОЕ ОКНО СОТРУДНИКОВ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-card {
            width: 90%;
            max-width: 400px;
            background: #0a0a0d;
            border: 1px solid var(--gold);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 80vh;
        }

        .modal-title {
            font-size: 16px;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--gold-border);
            padding-bottom: 8px;
        }

        .staff-list {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
        }

        .staff-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
        }
        .staff-item:hover { border-color: var(--gold-border); }

        .staff-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="chat-page">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ С АВАТАРАМИ СОТРУДНИКОВ -->
        <div class="header-bar">
            <div class="notranslate ui-nav-arrows">
                <a href="office.html" class="back-arrow" title="В Офис">&lt;</a>
                <a href="index.html" class="back-arrow" title="Ко входу">&lt;&lt;</a>
            </div>

            <!-- ЛЕНТА АВАТАРОВ -->
            <div id="header-participants" class="header-participants">
                <!-- Мой аватар -->
                <div class="participant-item active" id="my-header-avatar-item">
                    <img id="header-avatar" class="member-avatar" src="" alt="Me">
                    <span id="header-lang-flag" class="member-flag"></span>
                </div>
            </div>

            <div class="add-member-btn" onclick="openStaffModal()" title="Добавить собеседника">+</div>

            <div class="ui-header-right notranslate">GY-GY</div>
        </div>

        <!-- ОКНО СООБЩЕНИЙ -->
        <div id="chat-messages" class="chat-messages"></div>

        <!-- НИЖНЯЯ ПАНЕЛЬ ВВОДА С ОБНОВЛЕННЫМИ КНОПКАМИ -->
        <div class="chat-input-bar">
            <div class="input-row">
                <input type="text" id="chat-input" class="chat-input" placeholder="Сообщение..." autocomplete="off" onkeypress="handleKeyPress(event)">
                
                <!-- Кнопка 1: Стрелка + Отправить -->
                <button class="send-btn" onclick="sendMessage(false)" title="Отправить в веб-чат">
                    <span>➔</span>
                    <span>Отправить</span>
                </button>

                <!-- Кнопка 2: Значок Telegram + Имя -->
                <button class="send-tg-btn" onclick="sendMessage(true)" title="Отправить через Telegram">
                    <svg class="tg-icon" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.25.38-.51 1.07-.78 4.2-1.82 7-3.03 8.4-3.61 4-.16 4.83.53 4.78 2.47z"/>
                    </svg>
                    <span>Telegram</span>
                </button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО СОТРУДНИКОВ -->
    <div id="staff-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-title">СОТРУДНИКИ</div>
            <div id="staff-list" class="staff-list"></div>
            <button class="modal-close-btn" onclick="closeStaffModal()">ГОТОВО</button>
        </div>
    </div>

    <script>
        const allStaff = [
            { id: 1, name: "Александр В.", role: "CEO", lang: "ru", flag: "🇷🇺", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Alex" },
            { id: 2, name: "Elena Rostova", role: "Manager", lang: "en", flag: "🇬🇧", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Elena" },
            { id: 3, name: "Li Wei", role: "Dev", lang: "zh", flag: "🇨🇳", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Li" },
            { id: 4, name: "Carlos M.", role: "Analyst", lang: "es", flag: "🇪🇸", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Carlos" }
        ];

        let selectedStaffIds = new Set();
        let activeTargetMember = null;

        document.addEventListener("DOMContentLoaded", function() {
            const savedAvatar = localStorage.getItem('gygy_avatar') || localStorage.getItem('gy_user_img') || localStorage.getItem('user_avatar');
            const avatarEl = document.getElementById('header-avatar');
            
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
            }

            const langFlags = { 'ru': '🇷🇺', 'en': '🇬🇧', 'zh': '🇨🇳', 'es': '🇪🇸', 'de': '🇩🇪' };
            const savedLang = localStorage.getItem('gygy_lang') || localStorage.getItem('gy_lang') || 'ru';
            document.getElementById('header-lang-flag').textContent = langFlags[savedLang.toLowerCase()] || '🌐';

            renderStaffList();
        });

        function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
        function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }

        function renderStaffList() {
            const container = document.getElementById('staff-list');
            container.innerHTML = '';

            allStaff.forEach(staff => {
                const item = document.createElement('div');
                item.className = 'staff-item';
                const isChecked = selectedStaffIds.has(staff.id) ? 'checked' : '';
                
                item.innerHTML = `
                    <div class="staff-info">
                        <img src="${staff.avatar}" class="member-avatar" style="width:32px;height:32px;">
                        <div>
                            <div>${staff.name} ${staff.flag}</div>
                            <div style="font-size:10px;opacity:0.6">${staff.role}</div>
                        </div>
                    </div>
                    <input type="checkbox" ${isChecked} onchange="toggleStaff(${staff.id})">
                `;
                container.appendChild(item);
            });
        }

        function toggleStaff(id) {
            if (selectedStaffIds.has(id)) {
                selectedStaffIds.delete(id);
            } else {
                selectedStaffIds.add(id);
            }
            updateHeaderParticipants();
        }

        function updateHeaderParticipants() {
            const container = document.getElementById('header-participants');
            const myItem = document.getElementById('my-header-avatar-item');
            container.innerHTML = '';
            container.appendChild(myItem);

            selectedStaffIds.forEach(id => {
                const staff = allStaff.find(s => s.id === id);
                if (!staff) return;

                const item = document.createElement('div');
                item.className = `participant-item ${activeTargetMember === staff.id ? 'active' : ''}`;
                item.onclick = () => selectActiveMember(staff.id);
                item.innerHTML = `
                    <img src="${staff.avatar}" class="member-avatar" alt="${staff.name}">
                    <span class="member-flag">${staff.flag}</span>
                `;
                container.appendChild(item);
            });
        }

        function selectActiveMember(id) {
            activeTargetMember = activeTargetMember === id ? null : id;
            updateHeaderParticipants();
        }

        // Отправка сообщений (isTelegram = true/false)
        function sendMessage(isTelegram = false) {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const chatMessages = document.getElementById('chat-messages');
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg msg-outgoing';
            
            let tgBadgeHTML = isTelegram ? '<div class="msg-tg-badge">► Telegram</div>' : '';
            msgDiv.innerHTML = `${tgBadgeHTML}${escapeHtml(text)}<div class="msg-time">${timeStr}</div>`;

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            input.value = '';

            // Эмуляция ответа выбранного сотрудника
            if (activeTargetMember) {
                const staff = allStaff.find(s => s.id === activeTargetMember);
                setTimeout(() => {
                    const replyDiv = document.createElement('div');
                    replyDiv.className = 'msg msg-incoming';
                    let replyBadge = isTelegram ? '<div class="msg-tg-badge">◄ Telegram Bot</div>' : '';
                    replyDiv.innerHTML = `
                        ${replyBadge}
                        <div class="msg-author">${staff.flag} ${staff.name}</div>
                        Принято.
                        <div class="msg-time">${timeStr}</div>
                    `;
                    chatMessages.appendChild(replyDiv);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 800);
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(false); }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    </script>
</body>
</html>
