<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.38 - MEETING ROOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bg: rgba(212, 175, 55, 0.1);
            --gold-border: rgba(212, 175, 55, 0.3);
            --tg-color: #0088cc;
        }

        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ЧАТА ПЕРЕГОВОРНОЙ */
        .chat-page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #050508;
            position: relative;
        }

        /* 1. ВЕРХНЯЯ ПАНЕЛЬ */
        .header-bar {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold-border);
            background: #000;
            z-index: 100;
        }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ СЛЕВА (БЕЗ РАМОК) */
        .ui-nav-arrows {
            display: flex; 
            gap: 20px; 
            font-size: 26px; 
            font-weight: 900 !important; 
            cursor: pointer; 
            color: var(--gold); 
            line-height: 1; 
            letter-spacing: -2px; 
            user-select: none;
        }
        
        .back-arrow { 
            transition: opacity 0.2s, transform 0.2s; 
            text-decoration: none; 
            color: var(--gold); 
            display: inline-block;
            border: none !important;
            outline: none !important;
            background: transparent !important;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        .back-arrow:hover { 
            opacity: 0.8; 
            transform: scale(1.1);
        }

        /* ЦЕНТР: ЧИСТЫЙ АВАТАР С ФЛАГОМ */
        .ui-header-center {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            user-select: none;
        }

        /* Чистый аватар без золотых рамок */
        .user-avatar {
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            object-fit: cover; 
            background: transparent; 
            display: block;
        }

        /* Флаг страны/языка рядом с аватаром */
        .lang-flag {
            font-size: 22px;
            line-height: 1;
            display: inline-block;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
        }

        /* СПРАВА: ЛОГОТИП GY-GY */
        .ui-header-right { 
            font-size: 22px; 
            letter-spacing: 4px; 
            font-weight: bold; 
            user-select: none;
        }

        /* 2. ЛИНГВО-СМЫСЛОВАЯ ОБЛАСТЬ ЧАТА */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at center, #0a0a12 0%, #020204 100%);
        }

        /* Сообщения */
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        .msg-system {
            align-self: center;
            background: transparent;
            border: 1px dashed var(--gold-border);
            color: rgba(212, 175, 55, 0.7);
            font-size: 13px;
            text-align: center;
            max-width: 90%;
        }

        .msg-incoming {
            align-self: flex-start;
            background: var(--gold-bg);
            border: 1px solid var(--gold-border);
            color: var(--gold);
        }

        .msg-outgoing {
            align-self: flex-end;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold);
            color: #fff;
        }

        .msg-tg-badge {
            display: inline-block;
            font-size: 10px;
            color: var(--tg-color);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 5px;
            text-align: right;
        }

        /* 3. НИЖНЯЯ ПАНЕЛЬ ВВОДА И ТELEGRAM ТРАНСЛЯЦИИ */
        .chat-input-bar {
            padding: 12px 15px;
            background: #000;
            border-top: 1px solid var(--gold-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .channel-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }

        .toggle-tg-mode {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-tg-mode input {
            accent-color: var(--gold);
            cursor: pointer;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #0c0c12;
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            padding: 12px 15px;
            color: var(--gold);
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--gold);
        }

        .send-btn {
            background: var(--gold-bg);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0 20px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--gold);
            color: #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="chat-page">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="header-bar">
            <!-- НАВИГАЦИЯ СЛЕВА (БЕЗ РАМОК) -->
            <div class="notranslate ui-nav-arrows">
                <a href="office.html" class="back-arrow" title="В Офис">&lt;</a>
                <a href="index.html" class="back-arrow" title="Ко входу в клуб">&lt;&lt;</a>
            </div>

            <!-- ЧИСТЫЙ АВАТАР И ФЛАГ -->
            <div class="ui-header-center notranslate">
                <img id="header-avatar" class="user-avatar" src="" alt="Avatar" style="display:none;">
                <span id="header-lang-flag" class="lang-flag"></span>
            </div>

            <!-- ЛОГОТИП GY-GY -->
            <div class="ui-header-right notranslate">GY-GY</div>
        </div>

        <!-- ОКНО ОБЩЕНИЯ И ЛИНГВО-СМЫСЛОВОГО ОБМЕНА -->
        <div id="chat-messages" class="chat-messages">
            <div class="msg msg-system">
                [ ЛИНГВО-СМЫСЛОВАЯ ПЕРЕГОВОРНАЯ КОМНАТА v4.5.38 ИНИЦИАЛИЗИРОВАНА ]<br>
                Канал связи: Веб-ЧАТ / Telegram Bridge
            </div>
            
            <div class="msg msg-incoming">
                Добро пожаловать в Переговорную. Здесь вы можете вести прямой лингвистический обмен или транслировать смыслы в Telegram-канал.
                <div class="msg-time">12:00</div>
            </div>
        </div>

        <!-- ПАНЕЛЬ ВВОДА СООБЩЕНИЙ -->
        <div class="chat-input-bar">
            <div class="channel-selector">
                <label class="toggle-tg-mode">
                    <input type="checkbox" id="tg-sync-checkbox">
                    <span>Дублировать в Telegram (TG Bot)</span>
                </label>
                <span style="opacity:0.6;">Канал: #MeetingRoom</span>
            </div>

            <div class="input-row">
                <input type="text" id="chat-input" class="chat-input" placeholder="Введите текстовое или смысловое сообщение..." autocomplete="off" onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Подгрузка чистого аватара
            const savedAvatar = localStorage.getItem('gygy_avatar') || 
                                localStorage.getItem('gy_user_img') || 
                                localStorage.getItem('user_avatar');
                                
            const avatarEl = document.getElementById('header-avatar');
            
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
                avatarEl.style.display = 'block';
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
                avatarEl.style.display = 'block';
            }

            // 2. Отображение флага выбранной страны / языка рядом с аватаром
            const langFlags = {
                'ru': '🇷🇺',
                'en': '🇬🇧',
                'zh': '🇨🇳',
                'es': '🇪🇸',
                'de': '🇩🇪',
                'fr': '🇫🇷',
                'it': '🇮🇹'
            };
            
            const savedLang = localStorage.getItem('gygy_lang') || 
                              localStorage.getItem('gy_lang') || 
                              localStorage.getItem('user_lang') || 'ru';
                              
            const flagEl = document.getElementById('header-lang-flag');
            if (flagEl) {
                flagEl.textContent = langFlags[savedLang.toLowerCase()] || '🌐';
            }
        });

        // Функция отправки сообщений
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const chatMessages = document.getElementById('chat-messages');
            const isTgSync = document.getElementById('tg-sync-checkbox').checked;
            
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg msg-outgoing';
            
            let tgBadgeHTML = isTgSync ? '<div class="msg-tg-badge">► Отправлено в Telegram</div>' : '';
            msgDiv.innerHTML = `${tgBadgeHTML}${escapeHtml(text)}<div class="msg-time">${timeStr}</div>`;

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            input.value = '';

            // Ответ системы
            if (isTgSync) {
                setTimeout(() => {
                    const replyDiv = document.createElement('div');
                    replyDiv.className = 'msg msg-incoming';
                    replyDiv.innerHTML = `<div class="msg-tg-badge">◄ Telegram Bridge</div>Смысловое сообщение подтверждено и транслировано.<div class="msg-time">${timeStr}</div>`;
                    chatMessages.appendChild(replyDiv);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 1000);
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
