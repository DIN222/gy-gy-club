<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.33 - MEETING ROOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
        }
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* Фоновое изображение Переговорной */
        .meeting-page {
            position: fixed;
            inset: 0;
            background: url('meeting_bg.jpg') center/95% no-repeat #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В ВЕРХНЕМ ЛЕВОМ УГЛУ (БЕЗ РАМОК И ПОДЛОЖЕК) */
        .ui-nav-arrows {
            position: fixed; 
            top: 18px; 
            left: 20px; 
            z-index: 9999999; 
            display: flex; 
            gap: 25px; 
            font-size: 26px; 
            font-weight: 900 !important; 
            cursor: pointer; 
            color: var(--gold); 
            line-height: 1; 
            letter-spacing: -2px; 
            user-select: none;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
        }
        
        .back-arrow { 
            transition: opacity 0.2s, transform 0.2s; 
            text-decoration: none; 
            color: var(--gold); 
            display: inline-block;
            border: none !important;
            outline: none !important;
            background: transparent !important;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        .back-arrow:hover { 
            opacity: 0.8; 
            transform: scale(1.1);
        }

        /* ЦЕНТРАЛЬНЫЙ БЛОК: ЧИСТЫЙ АВАТАР И ФЛАГ ЯЗЫКА */
        .ui-header-center {
            position: fixed; 
            top: 12px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000000;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            user-select: none;
            pointer-events: none;
        }

        /* Чистый аватар без золотой рамки, обводок и теней */
        .user-avatar {
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            object-fit: cover; 
            background: transparent; 
            display: block;
        }

        /* Флаг выбранного языка */
        .lang-flag {
            font-size: 20px;
            line-height: 1;
            display: inline-block;
        }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; 
            top: 18px; 
            right: 25px; 
            z-index: 1000000; 
            font-size: 24px; 
            letter-spacing: 5px; 
            font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
            pointer-events: none;
        }

        /* ИНТЕРАКТИВНЫЕ ЗОНЫ (НЕВИДИМЫЕ КЛИКАБЕЛЬНЫЕ ОБЛАСТИ БЕЗ СТРЕЛОК) */
        .meeting-zone {
            position: absolute;
            cursor: pointer;
            z-index: 100;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }

        /* Координаты кликабельных зон комнаты */
        .zone-table { top: 40vh; left: 40vw; width: 20vw; height: 20vh; }
        .zone-screen { top: 15vh; left: 25vw; width: 15vw; height: 20vh; }
        .zone-board { top: 18vh; left: 65vw; width: 15vw; height: 20vh; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="meeting-page">
        <!-- ЧИСТЫЕ НАВИГАЦИОННЫЕ СТРЕЛКИ ВЕРХУ (БЕЗ РАМОК И ПОДЛОЖЕК) -->
        <div class="notranslate ui-nav-arrows">
            <!-- Одинарная стрелка — шаг назад в Офис -->
            <a href="office.html" class="back-arrow" title="В Офис">&lt;</a>
            <!-- Двойная стрелка — переход к Входу -->
            <a href="index.html" class="back-arrow" title="Ко входу в клуб">&lt;&lt;</a>
        </div>

        <!-- ЦЕНТРАЛЬНЫЙ БЛОК: ЧИСТЫЙ АВАТАР И ФЛАГ -->
        <div class="ui-header-center notranslate">
            <img id="header-avatar" class="user-avatar" src="" alt="Avatar" style="display:none;">
            <span id="header-lang-flag" class="lang-flag"></span>
        </div>

        <!-- ЛОГОТИП GY-GY -->
        <div class="ui-header-right notranslate">GY-GY</div>

        <!-- КЛИКАБЕЛЬНЫЕ ЗОНЫ ПЕРЕГОВОРНОЙ (БЕЗ НЕОНОВЫХ СТРЕЛОК) -->
        <div id="zone-table" class="meeting-zone zone-table" onclick="goToModule('table')" title="Переговорный стол"></div>
        <div id="zone-screen" class="meeting-zone zone-screen" onclick="goToModule('screen')" title="Презентация"></div>
        <div id="zone-board" class="meeting-zone zone-board" onclick="goToModule('board')" title="Идейная доска"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Подгрузка чистого аватара без рамок
            const savedAvatar = localStorage.getItem('gygy_avatar') || 
                                localStorage.getItem('gy_user_img') || 
                                localStorage.getItem('user_avatar');
                                
            const avatarEl = document.getElementById('header-avatar');
            
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
                avatarEl.style.display = 'block';
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
                avatarEl.style.display = 'block';
            }

            // 2. Отображение выбранного на первой странице флага
            const langFlags = {
                'ru': '🇷🇺',
                'en': '🇬🇧',
                'zh': '🇨🇳',
                'es': '🇪🇸',
                'de': '🇩🇪'
            };
            
            const savedLang = localStorage.getItem('gygy_lang') || 
                              localStorage.getItem('gy_lang') || 
                              localStorage.getItem('user_lang') || 'ru';
                              
            const flagEl = document.getElementById('header-lang-flag');
            if (flagEl) {
                flagEl.textContent = langFlags[savedLang.toLowerCase()] || '🌐';
            }
        });

        // Функция перехода по модулям
        function goToModule(type) {
            if (type === 'table') {
                alert('Модуль ПЕРЕГОВОРНЫЙ СТОЛ в разработке');
            } else if (type === 'screen') {
                alert('Модуль ПРЕЗЕНТАЦИИ в разработке');
            } else if (type === 'board') {
                alert('Модуль ИДЕЙНАЯ ДОСКА в разработке');
            }
        }
    </script>
</body>
</html>
