<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.60 | PRECISION (.)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; outline: none !important; }
        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }

        /* ВЕРХНЯЯ ЛИНИЯ: ЯЗЫК И ЛОГО (.) */
        .lang-container { 
            position: fixed; top: 18px; left: 25px; z-index: 1000001; 
            display: flex !important; flex-direction: column !important; 
            width: 160px !important; /* УМЕНЬШЕНО (.) */
        }
        .lang-current {
            border: 1px solid var(--gold); padding: 0 10px; height: 35px; box-sizing: border-box;
            display: flex; align-items: center; gap: 8px; cursor: pointer; background: #000; 
            font-size: 13px; font-family: 'Share Tech Mono', monospace;
        }
        .lang-dropdown { 
            display: none; flex-direction: column !important; background: #000; 
            border: 1px solid var(--gold); border-top: none; width: 158px !important; 
        }
        .lang-container:hover .lang-dropdown { display: flex !important; }
        .lang-btn { 
            background: none; border: none; color: var(--gold); padding: 8px 10px; 
            cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px;
            font-family: 'Share Tech Mono', monospace; width: 100%; font-size: 11px;
        }

        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold); 
            pointer-events: none; height: 35px; display: flex; align-items: center;
            font-family: 'Share Tech Mono', monospace; /* ШРИФТ И ВЫСОТА В УРОВЕНЬ (.) */
        }

        /* ДВЕРЬ +15px (Итого calc(44vh + 25px)) (.) */
        #main-door { 
            height: calc(44vh + 25px) !important; width: auto !important;
            cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; 
            z-index: 9999; pointer-events: auto !important; 
        }

        /* БЛОКИ (.) */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; color: var(--gold); text-align: center; max-width: 85%; line-height: 1.3; margin-bottom: 25px; }
        .btn-gy { min-width: 260px; padding: 12px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-family: 'Share Tech Mono'; margin: 6px 0; font-weight: 900; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }
        .id-card-hall { position: absolute; top: 72%; left: 50%; transform: translate(-50%,-50%); width: 220px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 80px; height: 80px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="lang-container">
        <div class="lang-current" id="active-lang">
            <img src="https://flagcdn.com/w20/gb.png" id="main-flag"> <span>ENGLISH</span>
        </div>
        <div class="lang-dropdown" id="drop-menu">
            <button class="lang-btn" onclick="selectLang('en','ENGLISH','gb')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button class="lang-btn" onclick="selectLang('ua','УКРАЇНСЬКА','ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="selectLang('ru','РУССКИЙ','ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button class="lang-btn" onclick="selectLang('pl','POLSKI','pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button class="lang-btn" onclick="selectLang('de','DEUTSCH','de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
        </div>
    </div>

    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe" preload="auto"><source src="charlie_bar_fx.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour" preload="auto"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1; display: flex; pointer-events: auto;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div class="quote-text">"In every joke there is a drop of whisky"</div>
        <img src="horse_welcome.png" style="max-height: 45vh; width: auto;">
        <button class="btn-gy" onclick="portalTransition('block-identity')">GET CLUB ID</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <div class="box-final" id="qr-box-reg"></div>
            <div class="box-final" onclick="document.getElementById('file-input').click()" style="cursor:pointer;">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="font-size:10px;">PHOTO</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">SAVE</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED</button>
    </div>

    <div id="block-hall" class="block">
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900; margin-bottom:10px;">#ID</div>
            <img id="h-photo" style="width:70px; height:70px; object-fit:cover; border:1px solid #000;">
            <button class="btn-gy" style="min-width:100%; color:#000; border-color:#000; margin-top:10px;" onclick="portalTransition('block-bar')">ENTER BAR</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <img src="horse_bar.png" style="height: 75vh; width: auto;">
    </div>

    <script>
        let currentID = "";

        function selectLang(code, name, flag) {
            document.querySelector('#active-lang span').innerText = name;
            document.getElementById('main-flag').src = `https://flagcdn.com/w20/${flag}.png`;
            document.getElementById('drop-menu').style.display = 'none';
            setTimeout(() => { document.getElementById('drop-menu').style.removeProperty('display'); }, 300);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            const amb = document.getElementById('snd-ambient');
            if(current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }
            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { 
                    next.classList.add('active'); next.style.opacity = "1"; next.style.pointerEvents = "auto"; 
                    if(nextId === 'block-bar') { amb.volume = 0.5; amb.play(); document.getElementById('snd-khe').play(); }
                }, 50);
            }, 800);
        }

        function handleDoor() {
            const d = document.getElementById('main-door');
            document.getElementById('snd-door').play();
            d.style.transform = "scale(1.2)"; d.style.opacity = "0";
            currentID = `#GY-${Math.floor(100+Math.random()*899)}`;
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 80, height: 80 });
            setTimeout(() => { portalTransition('block-welcome'); }, 1500);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result;
                    document.getElementById('txt-photo').style.display = "none";
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function swapButtons(a, s) {
            document.getElementById(a).classList.add('btn-sleep');
            document.getElementById(s).classList.remove('btn-sleep');
        }
    </script>
</body>
</html>
