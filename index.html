<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.40 CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* ЯЗЫКОВАЯ ПАНЕЛЬ — Сдвинута влево на 5% от исходной позиции */
        .lang-frame-locked {
            position: fixed; top: 15px; left: calc(110px - 5%); z-index: 9999999; 
            width: 175px; height: 38px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 10px;
            font-size: 13px; box-shadow: 0 0 8px rgba(214, 175, 55, 0.2);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .lang-frame-locked:hover {
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 42px; left: -2px; 
            width: 210px; background: #000; border: 2px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .lang-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 12px; 
            cursor: pointer; 
            line-height: 1; 
            border-bottom: 1px solid rgba(214, 175, 55, 0.1);
            transition: background 0.2s;
        }
        .lang-item:hover { background: rgba(214, 175, 55, 0.15); }
        .flag-icon { width: 22px; height: 15px; object-fit: cover; margin-right: 10px; border: 1px solid rgba(214,175,55,0.3); }

        /* Элегантный счетчик-индикатор */
        .member-counter {
            font-size: 10px;
            font-weight: 900;
            color: #000;
            background: var(--gold);
            padding: 2px 6px;
            border-radius: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 5px rgba(214, 175, 55, 0.5);
            margin-left: auto;
            transition: transform 0.2s;
        }
        .lang-item:hover .member-counter {
            transform: scale(1.08);
        }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            z-index: 1000000; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        /* УНИВЕРСАЛЬНЫЙ КЛАСС ДЛЯ БЛОКОВ СТРАНИЦ */
        .block { 
            position: fixed; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            z-index: 10; 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
        }
        .block.active { 
            display: flex !important; 
            opacity: 1 !important; 
            z-index: 5000 !important; 
        }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; cursor: not-allowed; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        body { top: 0 !important; }
        #block-welcome { justify-content: flex-start !important; padding-top: 12vh !important; }
        #block-welcome .quote-text { margin-bottom: 2vh !important; font-size: 24px; }
        #block-welcome img { max-height: 35vh !important; width: auto; object-fit: contain; margin-bottom: 2vh !important; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); }
        #block-welcome .btn-gy { margin: 4px 0 !important; padding: 12px !important; }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В УГЛУ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 20px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: auto !important; user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* ХОЛЛ И ИНТЕРАКТИВНЫЕ КАРТИНЫ */
        #block-hall { background: url('hall_bg_jpg.jpg') center/cover no-repeat #000; }
        .hall-interior { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
        
        .hall-interior .quote-text { 
            position: absolute; 
            top: 12vh; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85%; 
            margin: 0; 
            text-align: center;
            padding: 0;
            background: transparent !important;
            color: var(--gold) !important;       
            font-size: 28px;
            font-weight: 700;
            -webkit-text-stroke: 1px #000000;
            text-stroke: 1px #000000;
        }
        .hall-door-target {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24vw; height: 65vh; cursor: pointer; z-index: 5;
            background: transparent;
        }

        /* Интерактивные зоны стрелок в Холле */
        .painting-zone {
            position: absolute; 
            top: 25vh; 
            width: 6vw; 
            height: 12vh; 
            cursor: pointer; 
            z-index: 6; 
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .painting-left { left: 23vw; }
        .painting-right { right: 23vw; }

        .cue-arrow-hall { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s;
        }
        .painting-zone:hover .cue-arrow-hall { opacity: 0.8; }

        /* Выплывающие подменю для стрелок Холла */
        .manifest-btn-box { 
            position: absolute; 
            bottom: -50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 140px; 
            display: flex; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.4s, bottom 0.4s; 
            z-index: 10; 
        }
        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; margin: 0; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.9); }
        
        /* Защита от сдвигов перевода Google */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        body { top: 0 !important; background-color: #000 !important; opacity: 0; transition: opacity 0.4s ease-in-out !important; }
        body.page-loaded { opacity: 1 !important; }
        
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
        .goog-text-highlight { background-color: transparent !important; background: transparent !important; box-shadow: none !important; color: inherit !important; }
        .btn-gy font, .quote-text font, .ui-header-right font { color: inherit !important; }
        
        /* СТИЛИ ПЕРВОЙ СТРАНИЦЫ ВХОДА И ДВЕРИ */
        #main-door {
            display: block;
            height: calc(50vh + 20px);
            width: auto;
            max-width: 100%;
            object-fit: contain;
            margin: 0 auto; 
            transform: scale(1);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease-out;
            cursor: pointer;
        }

        .door-exploded {
            transform: scale(3.5) !important;
            opacity: 0 !important;
        }
        
        /* Поле ввода никнейма */
        .nick-input-field {
            text-align: center; 
            background: #000; 
            color: var(--gold); 
            border: 2px solid var(--gold); 
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            outline: none;
            transition: box-shadow 0.3s;
        }
        .nick-input-field:focus {
            box-shadow: 0 0 10px var(--gold);
        }
    </style>
</head>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',

            autoDisplay: false
        }, 'google_translate_element');
    }

    let currentID = "";
    // По умолчанию выбран Английский (код 'en', флаг 'gb')
    let currentActiveCode = 'en';
    let currentFlagCode = 'gb';
    let currentUserImage = "";
    let currentBlockId = 'block-entrance';

    // База данных со счетчиками для КАЖДОГО языка клуба
    const allLangs = [
        {n:'ENGLISH', c:'gb', code:'en', count: 12, users: [{name: 'Charlie_Whisky', avatar: ''}, {name: 'Alice_In_Club', avatar: ''}, {name: 'Bob_The_Tee', avatar: ''}]}, 
        {n:'DEUTSCH', c:'de', code:'de', count: 4, users: [{name: 'Hans_Bier', avatar: ''}, {name: 'Klaus_S.', avatar: ''}, {name: 'Helga_M', avatar: ''}, {name: 'Dieter_N', avatar: ''}]}, 
        {n:'ESPAÑOL', c:'es', code:'es', count: 2, users: [{name: 'Carlos_Amigo', avatar: ''}, {name: 'Sofia_Sol', avatar: ''}]}, 
        {n:'FRANÇAIS', c:'fr', code:'fr', count: 5, users: [{name: 'Pierre_Champagne', avatar: ''}, {name: 'Amelie_Eiffel', avatar: ''}, {name: 'Jean_Luc', avatar: ''}, {name: 'Chloe_Paris', avatar: ''}, {name: 'Francois', avatar: ''}]},
        {n:'ITALIANO', c:'it', code:'it', count: 3, users: [{name: 'Giovanni_V', avatar: ''}, {name: 'Francesca_B', avatar: ''}, {name: 'Marco_Roma', avatar: ''}]}, 
        {n:'POLSKI', c:'pl', code:'pl', count: 2, users: [{name: 'Janusz_K', avatar: ''}, {name: 'Agnieszka', avatar: ''}]}, 
        {n:'PORTUGUÊС', c:'pt', code:'pt', count: 1, users: [{name: 'Thiago_Lisbon', avatar: ''}]}, 
        {n:'РУССКИЙ', c:'ru', code:'ru', count: 8, users: [{name: 'Модермех', avatar: ''}, {name: 'Дядя_Вася', avatar: ''}, {name: 'Кот_Матрос', avatar: ''}, {name: 'Ася_Дизайн', avatar: ''}, {name: 'Петр_Павлов', avatar: ''}, {name: 'Ольга_Креатив', avatar: ''}, {name: 'Шурик', avatar: ''}, {name: 'Маша_Арт', avatar: ''}]}, 
        {n:'TÜRKЧЕ', c:'tr', code:'tr', count: 2, users: [{name: 'Mustafa_Ist', avatar: ''}, {name: 'Canan_K', avatar: ''}]}, 
        {n:'УКРАЇНСЬКА', c:'ua', code:'uk', count: 3, users: [{name: 'Козак_Сміх', avatar: ''}, {name: 'Оксана_Д', avatar: ''}, {name: 'Дмитро_В', avatar: ''}]}, 
        {n:'中文', c:'cn', code:'zh-CN', count: 6, users: [{name: 'Lee_Shaolin', avatar: ''}, {name: 'Mei_Ling', avatar: ''}, {name: 'Zhang_Wei', avatar: ''}, {name: 'Wang_Fang', avatar: ''}, {name: 'Chen_Qiang', avatar: ''}, {name: 'Li_Jie', avatar: ''}]}, 
        {n:'日本語', c:'jp', code:'ja', count: 4, users: [{name: 'Satoshi_N', avatar: ''}, {name: 'Yuki_Tokyo', avatar: ''}, {name: 'Kenji_K', avatar: ''}, {name: 'Haruka_A', avatar: ''}]}
    ];

    function renderLangList() {
        const container = document.getElementById('lang-list-container');
        if (!container) return;
        container.innerHTML = ''; 
        
        allLangs.forEach(lang => {
            // Исключаем тот язык, который сейчас активен в рамке
            if(lang.code === currentActiveCode) return; 
            
            const div = document.createElement('div');
            div.className = 'lang-item notranslate';
            div.setAttribute('translate', 'no');
            
            const stringifiedLang = JSON.stringify(lang).replace(/"/g, '&quot;');
            
            div.innerHTML = `
                <div style="display:flex; align-items:center; flex-grow:1;" onclick="applyLanguage(${stringifiedLang})">
                    <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon notranslate" translate="no">
                    <span class="notranslate" translate="no" style="color:#fff;">${lang.n}</span>
                </div>
                ${lang.count > 0 ? `
                    <span class="member-counter notranslate" translate="no" onclick="event.stopPropagation(); openUsersList('${lang.c}')">
                        ${lang.count}
                    </span>` : ''
                }
            `;
            container.appendChild(div);
        });
    }

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }
    function safeStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

    // Применение выбранного языка и ротация
    function applyLanguage(lang) {
        currentActiveCode = lang.code;
        currentFlagCode = lang.c; 
        safeStorageSet('gygy_flag', lang.c);
        safeStorageSet('gy_user_flag', lang.c);
        safeStorageSet('gy_lang', lang.code);
        safeStorageSet('gygy_lang', lang.code);
        
        // Обновляем главную золотую рамку на лету
        const activeDisplay = document.getElementById('active-lang-display');
        if (activeDisplay) { 
            activeDisplay.innerHTML = `
                <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> 
                <span style="color:var(--gold); font-weight:900;">${lang.n}</span>
                ${lang.count > 0 ? `<span class="member-counter" style="margin-left: auto; transform: scale(0.9);" onclick="event.stopPropagation(); openUsersList('${lang.c}')">${lang.count}</span>` : ''}
            `; 
        }
        
        const badgeFlagImg = document.getElementById('badge-flag-img');
        if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${lang.c}.png`;
        
        const langListContainer = document.getElementById('lang-list-container');
        if (langListContainer) langListContainer.style.display = 'none';
        
        // Перерисовываем список, чтобы бывший активный язык вернулся вниз к остальным
        renderLangList();
        
        forceTriggerGoogleTranslate(lang.code);
    }

    function forceTriggerGoogleTranslate(langCode) {
        if (window.langTimer) clearInterval(window.langTimer);
        let attempts = 0;
        window.langTimer = setInterval(() => {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                clearInterval(window.langTimer);
                if (selectEl.value === langCode) return;
                selectEl.value = langCode;
                selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                console.log(`[GY-GY] Google Translate успешно переключен на: ${langCode}`);
            }
            if (++attempts > 100) {
                clearInterval(window.langTimer);
                console.error("[GY-GY] Виджет Google Translate не загрузился вовремя.");
            }
        }, 100);
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function toggleManifest(boxId) {
        document.querySelectorAll('.manifest-btn-box').forEach(box => {
            if(box.id === boxId) {
                const isOpened = box.getAttribute('data-opened') === "true";
                box.style.opacity = isOpened ? "0" : "1";
                box.style.pointerEvents = isOpened ? "none" : "auto";
                box.setAttribute('data-opened', isOpened ? "false" : "true");
                box.style.bottom = isOpened ? "-50px" : "-35px";
            } else {
                box.style.opacity = "0"; box.style.pointerEvents = "none"; box.setAttribute('data-opened', "false"); box.style.bottom = "-50px";
            }
        });
    }

    function renderUserPassports(targetID) {
        const idLabel = document.getElementById('id-label');
        const passIdVal = document.getElementById('pass-id-val');
        const qrBoxReg = document.getElementById('qr-box-reg');
        const passQrBox = document.getElementById('pass-qr-box');
        if (idLabel) idLabel.innerText = targetID;
        if (passIdVal) passIdVal.innerText = targetID;
        if (qrBoxReg && typeof QRCode !== 'undefined') { qrBoxReg.innerHTML = ""; new QRCode(qrBoxReg, { text: targetID, width: 85, height: 85 }); }
        if (passQrBox && typeof QRCode !== 'undefined') { passQrBox.innerHTML = ""; new QRCode(passQrBox, { text: targetID, width: 100, height: 100 }); }
    }

    function checkAndFillRegistrationForm() {
        const savedAvatar = safeStorageGet('gy_user_img') || safeStorageGet('gygy_avatar');
        const savedNickname = safeStorageGet('gygy_nickname');
        currentID = safeStorageGet('gygy_id') || safeStorageGet('gy_user_id') || safeStorageGet('gy_trace');
        
        if (!currentID) {
            currentID = "GY-" + Math.floor(100000 + Math.random() * 900000);
            safeStorageSet('gygy_id', currentID);
            safeStorageSet('gy_user_id', currentID);
        }

        let savedLangCode = safeStorageGet('gy_lang') || safeStorageGet('gygy_lang');
        const savedFlag = safeStorageGet('gygy_flag') || safeStorageGet('gy_user_flag');
        
        if (savedLangCode) {
            savedLangCode = savedLangCode.toLowerCase();
            if (savedLangCode === 'ua') savedLangCode = 'uk';
        }

        let matchedLang = null;
        if (savedFlag) {
            matchedLang = allLangs.find(l => l.c.toLowerCase() === savedFlag.toLowerCase());
        } else if (savedLangCode) {
            matchedLang = allLangs.find(l => l.code === savedLangCode);
        }

        // Если ничего не сохранено — берем Английский по умолчанию
        if (!matchedLang) {
            matchedLang = allLangs.find(l => l.code === 'en');
        }

        if (matchedLang) {
            applyLanguage(matchedLang);
        } else {
            renderLangList();
        }
        
        if (currentID) { renderUserPassports(currentID); }
        
        if (savedNickname) {
            const nickInput = document.getElementById('user-nickname');
            if (nickInput) nickInput.value = savedNickname;
            const passNick = document.getElementById('pass-nickname');
            if (passNick) passNick.innerText = '@' + savedNickname;
        }

        if (savedAvatar) {
            currentUserImage = savedAvatar;
            const badgeImg = document.getElementById('badge-avatar-img');
            const passImg = document.getElementById('pass-avatar-img');
            if (badgeImg) badgeImg.src = savedAvatar;
            if (passImg) passImg.src = savedAvatar;

            if (savedAvatar.startsWith('data:image/svg+xml')) {
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) { avatarImg.src = savedAvatar; avatarImg.style.display = "block"; }
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = "none";
            } else { 
                const ppImg = document.getElementById('pp'); if (ppImg) { ppImg.src = savedAvatar; ppImg.style.display = "block"; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = "none";
            }
            const btnWHall = document.getElementById('btn-w-hall'); if(btnWHall) btnWHall.classList.remove('btn-sleep');
            const btnPass = document.getElementById('btn-pass'); if(btnPass) btnPass.classList.remove('btn-sleep');
        }
    }

    function enterStudio() { 
        window.location.href = 'studio.html'; 
    }

    function handleNavigationBack() {
        if (currentBlockId === 'block-hall') {
            portalTransition('block-identity');
        } else if (currentBlockId === 'block-identity') {
            portalTransition('block-welcome');
        } else if (currentBlockId === 'block-welcome') {
            portalTransition('block-entrance');
        }
    }

    function portalTransition(nextId) {
        if (nextId === 'block-server') { window.location.href = 'verses.html'; return; }
        if (nextId === 'block-bar') { window.location.href = 'bar.html'; return; }
        if (nextId === 'block-tables') { window.location.href = 'tables.html'; return; } 
        
        if (nextId === 'block-office') {
            const currentNickname = safeStorageGet('gygy_nickname') || safeStorageGet('gy_user_id') || '';
            if (currentNickname.toLowerCase() === 'модермех') { 
                safeStorageSet('gygy_is_boss', 'true'); 
            }
            window.location.href = 'office.html';
            return;
        }

        const targetBlock = document.getElementById(nextId);
        if (!targetBlock) { console.error(`Блок не найден: ${nextId}`); return; }

        currentBlockId = nextId;

        const badge = document.getElementById('global-user-badge');
        const langSwitcher = document.getElementById('lang-switcher');
        const navArrows = document.getElementById('club-nav-arrows');

        if (nextId === 'block-entrance') {
            const mainDoor = document.getElementById('main-door');
            if (mainDoor) mainDoor.classList.remove('door-exploded');
            if (langSwitcher) langSwitcher.style.display = 'flex';
            if (navArrows) navArrows.style.display = 'none';
            if (badge) badge.style.display = 'none';
        } else {
            if (navArrows) navArrows.style.display = 'flex';
            if (badge && currentUserImage) badge.style.display = 'block';
            
            // Прячем языки на внутренних экранах, чтобы не загромождать UI
            if (nextId === 'block-welcome' || nextId === 'block-identity' || nextId === 'block-hall') {
                if (langSwitcher) langSwitcher.style.display = 'none';
            } else {
                if (langSwitcher) langSwitcher.style.display = 'flex';
            }
        }

        document.querySelectorAll('.block').forEach(b => {
            b.classList.remove('active');
            b.style.display = 'none';
        });

        targetBlock.style.display = 'flex';
        
        setTimeout(() => {
            targetBlock.classList.add('active');
        }, 20);
    }

    function handleDoor() {
        const sndDoor = document.getElementById('snd-door');
        const sndAmbient = document.getElementById('snd-ambient');
        const mainDoor = document.getElementById('main-door');

        if (sndDoor) sndDoor.play();
        if (mainDoor) mainDoor.classList.add('door-exploded');

        setTimeout(() => {
            if (sndAmbient) {
                sndAmbient.volume = 0.5;
                sndAmbient.play().catch(e => console.log("Ambient blocked"));
            }
            portalTransition('block-welcome');
        }, 700);
    }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUserImage = e.target.result;
                const pp = document.getElementById('pp'); if (pp) { pp.src = currentUserImage; pp.style.display = 'block'; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = 'none';
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) avatarImg.style.display = 'none';
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function generateAvatar() {
        const hex = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><rect width="100" height="100" fill="#${hex}"/><circle cx="50" cy="40" r="20" fill="#000"/><path d="M20,90 C20,70 80,70 80,90" fill="#000"/></svg>`;
        currentUserImage = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
        const avatarImg = document.getElementById('avatar-img'); if (avatarImg) { avatarImg.src = currentUserImage; avatarImg.style.display = "block"; }
        const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = "none";
        const pp = document.getElementById('pp'); if (pp) pp.style.display = "none";
        const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = "block";
    }

    function saveUserProfile() {
        if (!currentUserImage) return;
        
        const nickInput = document.getElementById('user-nickname');
        const nickname = (nickInput && nickInput.value.trim()) ? nickInput.value.trim() : "GUEST";
        
        safeStorageSet('gygy_avatar', currentUserImage);
        safeStorageSet('gy_user_img', currentUserImage);
        safeStorageSet('gy_user_avatar', currentUserImage); 
        safeStorageSet('gy_user_id', currentID);
        safeStorageSet('gygy_nickname', nickname);

        const badgeImg = document.getElementById('badge-avatar-img');
        const passImg = document.getElementById('pass-avatar-img');
        if (badgeImg) badgeImg.src = currentUserImage;
        if (passImg) passImg.src = currentUserImage;

        const passNick = document.getElementById('pass-nickname');
        if (passNick) passNick.innerText = '@' + nickname;

        const badge = document.getElementById('global-user-badge');
        if (badge) badge.style.display = 'block';

        const btnWHall = document.getElementById('btn-w-hall'); if (btnWHall) btnWHall.classList.remove('btn-sleep');
        const btnPass = document.getElementById('btn-pass'); if (btnPass) btnPass.classList.remove('btn-sleep');
    }

    function openPassport() {
        const modal = document.getElementById('modal-passport');
        if (modal) { 
            modal.style.display = 'flex'; 
            setTimeout(() => { modal.style.opacity = '1'; }, 10); 
        }
    }

    function closePassport() {
        const modal = document.getElementById('modal-passport');
        if (modal) {
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
    }

    // ЛОГИКА ОКНА СПИСКА ПОЛЬЗОВАТЕЛЕЙ ИЗ ВЫБРАННОЙ СТРАНЫ
    function openUsersList(countryCode) {
        const lang = allLangs.find(l => l.c === countryCode);
        if (!lang || !lang.users.length) return;

        const title = document.getElementById('users-list-title');
        const content = document.getElementById('users-list-content');
        if (title) title.innerText = `${lang.n} RESIDENTS`;
        
        if (content) {
            content.innerHTML = '';
            // Сортировка по алфавиту
            const sortedUsers = [...lang.users].sort((a, b) => a.name.localeCompare(b.name));
            
            sortedUsers.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.style.display = 'flex';
                userDiv.style.alignItems = 'center';
                userDiv.style.gap = '12px';
                userDiv.style.padding = '8px 0';
                userDiv.style.borderBottom = '1px dashed rgba(0,0,0,0.15)';

                // Стандартный дефолтный SVG аватар, если нет кастомного
                const avatarSrc = user.avatar || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="30" height="30"><rect width="100" height="100" fill="%23d4af37"/><circle cx="50" cy="40" r="20" fill="%23000"/><path d="M20,90 C20,70 80,70 80,90" fill="%23000"/></svg>';

                userDiv.innerHTML = `
                    <img src="${avatarSrc}" style="width:36px; height:36px; border-radius:50%; border:1.5px solid var(--gold); object-fit:cover; background:#000;">
                    <span style="font-weight:900; font-size:14px; color:#000; font-family:'Share Tech Mono';">@${user.name}</span>
                `;
                content.appendChild(userDiv);
            });
        }

        const modal = document.getElementById('modal-users-list');
        if (modal) {
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; }, 10);
        }
    }

    function closeUsersList() {
        const modal = document.getElementById('modal-users-list');
        if (modal) {
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
    }

    window.addEventListener('load', () => {
        checkAndFillRegistrationForm();
        document.body.classList.add('page-loaded');
    });
</script>
