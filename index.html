<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.4 FIXED - HYBRID TRANSLATION ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* === ЕДИНЫЙ ВЕРХНИЙ БАР КЛУБА (СТАНДАРТ) === */
        .gy-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000000;
            pointer-events: none;
        }
        .gy-top-bar * { pointer-events: auto; }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-frame-locked {
            position: fixed; top: 15px; left: 15px; z-index: 9999999; 
            width: 180px; height: 40px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 12px;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 180px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 22px; margin-right: 12px; }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В БАРЕ */
        .ui-nav-arrows {
            display: none; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
            user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: absolute; left: 50%; top: 14px; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
            user-select: none;
        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        .ui-back-to-bar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005; background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold); padding: 12px 24px; cursor: pointer; display: none; opacity: 0; transition: opacity 0.5s; }

        /* БЛОКИ (ЛОКАЦИИ) */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.4s ease-in-out; }
        
        /* КРИТИЧЕСКИЙ ФИКС: Принудительная работа активного экрана */
        .block.active { display: flex !important; opacity: 1 !important; z-index: 5000 !important; }

        }

        .hall-door-target {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24vw; height: 65vh; cursor: pointer; z-index: 5;
            background: transparent;
        }

        .painting-zone {
            position: absolute; 
            top: 25vh; 
            width: 6vw; 
            height: 12vh; 
            cursor: pointer; 
            z-index: 6; 
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .painting-left { left: 23vw; }
        .painting-right { right: 23vw; }

        .cue-arrow-hall { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900;

            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s;
        }
        .painting-zone:hover .cue-arrow-hall { opacity: 0.8; }

        .manifest-btn-box { 
            position: absolute; 
            bottom: -50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 140px; 
            display: flex; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none;

        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; margin: 0; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.9); }
        
        /* Защита от сдвигов перевода Google */

        body { top: 0 !important; background-color: #000 !important; opacity: 0; transition: opacity 0.4s ease-in-out !important; }

        .goog-text-highlight { background-color: transparent !important; background: transparent !important; box-shadow: none !important; color: inherit !important; }

        #lang-switcher.force-hide { display: none !important; opacity: 0 !important; visibility: hidden !important; transition: none !important; }
    </style>
</head>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        let currentID = "";
        let currentActiveCode = 'en';
        let currentUserImage = "";
        let currentFlagCode = 'gb';

        const allLangs = [
            {n:'ENGLISH', c:'gb', code:'en'}, 
            {n:'DEUTSCH', c:'de', code:'de'}, 
            {n:'ESPAÑOL', c:'es', code:'es'}, 
            {n:'FRANÇAIS', c:'fr', code:'fr'},
            {n:'ITALIANO', c:'it', code:'it'}, 
            {n:'POLSKI', c:'pl', code:'pl'}, 
            {n:'PORTUGUÊS', c:'pt', code:'pt'}, 
            {n:'РУССКИЙ', c:'ru', code:'ru'}, 
            {n:'TÜRKЧЕ', c:'tr', code:'tr'}, 
            {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
            {n:'中文', c:'cn', code:'zh-CN'}, 
            {n:'日本語', c:'jp', code:'ja'}
        ];

        function renderLangList() {
            const container = document.getElementById('lang-list-container');
            if (!container) return;
            container.innerHTML = ''; 
            allLangs.forEach(lang => {
                if(lang.code === currentActiveCode) return; 
                const div = document.createElement('div');
                div.className = 'lang-item notranslate';
                div.setAttribute('translate', 'no');
                div.innerHTML = `
                    <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon notranslate" translate="no">
                    <span class="notranslate" translate="no">${lang.n}</span>
                `;
                div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
                container.appendChild(div);
            });
        }

        function safeStorageGet(key, fallback = "") {
            try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; }
        }

        function safeStorageSet(key, value) {
            try { localStorage.setItem(key, value); } catch (e) {}
        }

        function applyLanguage(lang) {
            currentActiveCode = lang.code;
            currentFlagCode = lang.c; 
            safeStorageSet('gygy_flag', lang.c);
            safeStorageSet('gy_lang', lang.code.toUpperCase() === 'UK' ? 'UA' : lang.code.toUpperCase());
            
            const activeDisplay = document.getElementById('active-lang-display');
            if (activeDisplay) {
                activeDisplay.innerHTML = `
                    <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> 
                    <span>${lang.n}</span>
                `;
            }
            
            const badgeFlagImg = document.getElementById('badge-flag-img');
            if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${lang.c}.png`;
            
            const langListContainer = document.getElementById('lang-list-container');
            if (langListContainer) langListContainer.style.display = 'none';
            
            renderLangList();
            
            let attempts = 0;
            const selectTimer = setInterval(() => {
                const selectEl = document.querySelector('.goog-te-combo');
                if (selectEl) {
                    selectEl.value = lang.code;
                    selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                    clearInterval(selectTimer);
                }
                if (++attempts > 50) clearInterval(selectTimer);
            }, 150);
        }

        function toggleLangList() {
            const list = document.getElementById('lang-list-container');
            if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
        }

        function toggleManifest(boxId) {
            document.querySelectorAll('.manifest-btn-box').forEach(box => {
                if(box.id === boxId) {
                    const isOpened = box.getAttribute('data-opened') === "true";
                    box.style.opacity = isOpened ? "0" : "1";
                    box.style.pointerEvents = isOpened ? "none" : "auto";
                    box.setAttribute('data-opened', isOpened ? "false" : "true");
                    box.style.bottom = isOpened ? "-50px" : "-35px";
                } else {
                    box.style.opacity = "0";
                    box.style.pointerEvents = "none";
                    box.setAttribute('data-opened', "false");
                    box.style.bottom = "-50px";
                }
            });
        }

        function handleDoor() {
            safePlaySound('snd-door');
            const d = document.getElementById('main-door');
            if (d) {
                d.style.transform = "scale(5)"; 
                d.style.opacity = "0"; 
                d.style.pointerEvents = "none";
            }
            
            const langSwitcher = document.getElementById('lang-switcher');
            if (langSwitcher) langSwitcher.style.opacity = "0";
            
            if(!currentID) {
                currentID = `GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
                safeStorageSet('gygy_id', currentID);
                safeStorageSet('gy_trace', currentID);
            }
            
            renderUserPassports(currentID);
            
            setTimeout(() => { 
                portalTransition('block-welcome'); 
                if (window.GY_AUDIO_ENGINE && typeof window.GY_AUDIO_ENGINE.fadeBarAmbient === 'function') {
                    window.GY_AUDIO_ENGINE.fadeBarAmbient(0.12, 1500);
                }
            }, 1000);
        }

        function renderUserPassports(targetID) {
            const idLabel = document.getElementById('id-label');
            const passIdVal = document.getElementById('pass-id-val');
            const qrBoxReg = document.getElementById('qr-box-reg');
            const passQrBox = document.getElementById('pass-qr-box');

            if (idLabel) idLabel.innerText = targetID;
            if (passIdVal) passIdVal.innerText = targetID;
            
            if (qrBoxReg && typeof QRCode !== 'undefined') {
                qrBoxReg.innerHTML = "";
                new QRCode(qrBoxReg, { text: targetID, width: 85, height: 85 });
            }
            if (passQrBox && typeof QRCode !== 'undefined') {
                passQrBox.innerHTML = "";
                new QRCode(passQrBox, { text: targetID, width: 100, height: 100 });
            }
        }

        function checkAndFillRegistrationForm() {
            const savedAvatar = safeStorageGet('gy_user_img') || safeStorageGet('gygy_avatar');
            currentID = safeStorageGet('gygy_id') || safeStorageGet('gy_user_id') || safeStorageGet('gy_trace');
            
            if (currentID) { renderUserPassports(currentID); }
            if (savedAvatar) {
                currentUserImage = savedAvatar;
                if (savedAvatar.startsWith('data:image/svg+xml')) {
                    const avatarImg = document.getElementById('avatar-img');
                    if (avatarImg) { avatarImg.src = savedAvatar; avatarImg.style.display = "block"; }
                    const txtAvatar = document.getElementById('txt-avatar');
                    if (txtAvatar) txtAvatar.style.display = "none";
                } else { 
                    const ppImg = document.getElementById('pp');
                    if (ppImg) { ppImg.src = savedAvatar; ppImg.style.display = "block"; }
                    const txtPhoto = document.getElementById('txt-photo');
                    if (txtPhoto) txtPhoto.style.display = "none";
                }
                const btnWHall = document.getElementById('btn-w-hall');
                if(btnWHall) btnWHall.classList.remove('btn-sleep');
                const btnPass = document.getElementById('btn-pass');
                if(btnPass) btnPass.classList.remove('btn-sleep');
            }
        }

        // === УПРАВЛЕНИЕ ТОЧКАМИ ПЕРЕХОДОВ И ЦЕНТРАЛЬНЫМ БАРОМ ШАПКИ ===
        function portalTransition(nextId) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            const targetBlock = document.getElementById(nextId);
            if (targetBlock) targetBlock.classList.add('active');

            const navBar = document.getElementById('gy-global-nav');
            const badge = document.getElementById('global-user-badge');
            const langSwitcher = document.getElementById('lang-switcher');

            // 1. Управление видимостью навигации слева
            if (navBar) {
                if (nextId === 'block-entrance' || nextId === 'block-welcome') {
                    navBar.style.display = "none";
                } else {
                    navBar.style.display = "flex";
                    
                    // Динамическая перепривязка шагов назад по твоей карте переходов
                    document.getElementById('nav-arrow-home').onclick = () => portalTransition('block-entrance');
                    if (nextId === 'block-identity') document.getElementById('nav-arrow-back').onclick = () => portalTransition('block-welcome');
                    if (nextId === 'block-hall') document.getElementById('nav-arrow-back').onclick = () => portalTransition('block-identity');
                    if (nextId === 'block-bar') document.getElementById('nav-arrow-back').onclick = () => portalTransition('block-hall');
                    if (nextId === 'block-server') document.getElementById('nav-arrow-back').onclick = () => portalTransition('block-hall');
                    if (nextId === 'block-tables') document.getElementById('nav-arrow-back').onclick = () => portalTransition('block-bar');
                }
            }

            // 2. Управление сквозным аватаром по центру
            if (badge) {
                if (nextId === 'block-entrance' || nextId === 'block-welcome' || nextId === 'block-identity') {
                    badge.style.display = "none";
                } else {
                    badge.style.display = "block";
                }
            }

            // 3. Скрытие селектора языка на внутренних экранах
            if (langSwitcher) {
                if (nextId === 'block-entrance') {
                    langSwitcher.style.display = "flex";
                    langSwitcher.style.opacity = "1";
                } else {
                    langSwitcher.style.display = "none";
                }
            }

            // Контроль фонового звука серверов
            if (nextId === 'block-server') {
                safePlaySound('snd-server');
            } else {
                const sndServer = document.getElementById('snd-server');
                if (sndServer) sndServer.pause();
            }
        }

        function smoothTransitionToTables() {
            portalTransition('block-tables');
        }

        function enterStudio() {
            alert('Studio entering...');
        }

        function openPassport() {
            const modal = document.getElementById('modal-passport');
            if (modal) { modal.style.display = 'flex'; setTimeout(() => modal.style.opacity = '1', 10); }
        }

        function closePassport() {
            const modal = document.getElementById('modal-passport');
            if (modal) { modal.style.opacity = '0'; setTimeout(() => modal.style.display = 'none', 300); }
        }

        function preview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const pp = document.getElementById('pp');
                    if (pp) { pp.src = e.target.result; pp.style.display = 'block'; }
                    currentUserImage = e.target.result;
                    const txtPhoto = document.getElementById('txt-photo');
                    if (txtPhoto) txtPhoto.style.display = 'none';
                    const btnWHall = document.getElementById('btn-w-hall');
                    if (btnWHall) btnWHall.classList.remove('btn-sleep');
                    const btnPass = document.getElementById('btn-pass');
                    if (btnPass) btnPass.classList.remove('btn-sleep');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function generateAvatar() {
            const svg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23${Math.floor(Math.random()*16777215).toString(16)}"/></svg>`;
            const avatarImg = document.getElementById('avatar-img');
            if (avatarImg) { avatarImg.src = svg; avatarImg.style.display = 'block'; }
            currentUserImage = svg;
            const txtAvatar = document.getElementById('txt-avatar');
            if (txtAvatar) txtAvatar.style.display = 'none';
            const btnWHall = document.getElementById('btn-w-hall');
            if (btnWHall) btnWHall.classList.remove('btn-sleep');
            const btnPass = document.getElementById('btn-pass');
            if (btnPass) btnPass.classList.remove('btn-sleep');
        }

        function saveUserProfile() {
            safeStorageSet('gy_user_img', currentUserImage);
            safeStorageSet('gygy_avatar', currentUserImage);
            syncProfileUI();
            alert('Profile saved.');
        }

        function syncProfileUI() {
            const savedAvatar = safeStorageGet('gy_user_img') || safeStorageGet('gygy_avatar');
            const savedID = safeStorageGet('gygy_id') || safeStorageGet('gy_trace');
            const savedFlag = safeStorageGet('gygy_flag') || 'gb';
            
            if (savedAvatar) {
                const badgeImg = document.getElementById('badge-avatar-img');
                const passImg = document.getElementById('pass-avatar-img');
                if (badgeImg) badgeImg.src = savedAvatar;
                if (passImg) passImg.src = savedAvatar;
            }
            
            const flagImg = document.getElementById('badge-flag-img');
            if (flagImg) flagImg.src = `https://flagcdn.com/w20/${savedFlag}.png`;

            if (savedID) {
                renderUserPassports(savedID);
            }
        }

        function safePlaySound(audioId) {
            const audio = document.getElementById(audioId);
            if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add('page-loaded');
            renderLangList();
            checkAndFillRegistrationForm();
            syncProfileUI();
            
            // Включение фонового шума бара при первом клике на документ
            document.addEventListener('click', () => {
                safePlaySound('snd-ambient');
            }, { once: true });
        });
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
