<!DOCTYPE html>
<!-- PROJECT: GY-GY Club | VERSION: 2.8.4 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY Club | v.2.8.4</title>
    <link rel="stylesheet" href="style.css?v=2.8.4">
</head>
<body class="gate-keeper">

    <div id="portal-doors">
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <header class="permanent-header">
        <div id="logo-block">
            <img src="logo_gygy.png" id="main-logo" alt="GY-GY"> <!-- Постоянный атрибут: Логотип GY-GY -->
            <div id="dynamic-slogan-box"><span id="slogan-text">Загрузка атмосферы...</span></div>
        </div>

        <div id="identity-node">
            <div class="avatar-wrapper" onclick="Agent.toggleFlags()">
                <img id="user-avatar" src="default_avatar.png">
                <img id="user-flag" src="flags/en.png"> <!-- Языковая панель -->
            </div>
            <div id="flag-dropdown" class="flag-grid hidden"></div>
        </div>

        <button id="back-btn" class="gy-back-btn" onclick="history.back()">←</button> <!-- Кнопка возврата -->
    </header>

    <main id="main-stage">
        <div id="welcome-content">
            <h1 id="ui-title">WELCOME TO THE CITY</h1>
            <button class="start-trigger" onclick="Agent.enterClub()">OPEN GATES</button>
        </div>
    </main>

    <audio id="snd-door" src="assets/sounds/doors_open.mp3" preload="auto"></audio>
    <audio id="snd-click" src="assets/sounds/click.mp3" preload="auto"></audio>

    <script src="core-agent.js?v=2.8.4"></script>
</body>
</html>
