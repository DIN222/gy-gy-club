<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | v.4.8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { background: var(--dark); color: var(--gold); font-family: 'Share+Tech+Mono', monospace; margin: 0; overflow: hidden; }
        .ui-header { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .gy-logo { font-size: 24px; font-weight: bold; letter-spacing: 5px; }
        .btn-gy { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-family: inherit; }
        .btn-sleep { opacity: 0.3; cursor: not-allowed; }
        .lang-dropdown { position: absolute; top: 60px; left: 20px; background: var(--dark); border: 1px solid var(--gold); display: none; }
        .lang-dropdown.open { display: block; }
        #app-stage { height: 100vh; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .visual-door { max-height: 45vh; cursor: pointer; transition: transform 1.5s; }
        .visual-horse { max-height: 35vh; margin-bottom: 20px; }
        .identity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .slot { width: 100px; height: 100px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; background: rgba(212,175,55,0.05); }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- . ПОСТОЯННЫЕ АТРИБУТЫ -->
    <header class="ui-header">
        <div class="lang-sector">
            <button class="btn-gy" onclick="Agent.toggleLang()">ЯЗЫК / LANG</button>
            <div id="lang-list" class="lang-dropdown">
                <button class="btn-gy" style="display:block; width:100%;" onclick="Agent.setLang('RU')">RU</button>
                <button class="btn-gy" style="display:block; width:100%;" onclick="Agent.setLang('EN')">EN</button>
            </div>
        </div>
        <div class="gy-logo">GY-GY</div>
        <button id="global-back" class="btn-gy" style="visibility:hidden;" onclick="Agent.goBack()">←</button>
    </header>

    <main id="app-stage"></main>

    <script src="core-agent.js"></script>
</body>
</html>
