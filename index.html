<!DOCTYPE html>
<html lang="en">
<!-- GY-GY PROTOCOL v.5.3.3 (.) -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | v.5.3.3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href="door_open.mp3" as="audio">
</head>
<body class="bg-entrance">

    <audio id="door-audio" src="door_open.mp3" preload="auto"></audio>

    <!-- Language Block from your Sample -->
    <div class="lang-container">
        <div class="lang-trigger" onclick="UI.toggle('lang-panel')">
            <img src="https://flagcdn.com/w40/gb.png" id="current-lang-flag"> 
            <span id="current-lang-label">ENGLISH</span>
        </div>
        <div id="lang-panel" class="lang-panel">
            <button class="lang-btn" onclick="setLanguage('ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button class="lang-btn" onclick="setLanguage('en')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button class="lang-btn" onclick="setLanguage('ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="setLanguage('pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button class="lang-btn" onclick="setLanguage('de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
            <button class="lang-btn" onclick="setLanguage('fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
            <button class="lang-btn" onclick="setLanguage('it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
            <button class="lang-btn" onclick="setLanguage('es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
            <button class="lang-btn" onclick="setLanguage('cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
            <button class="lang-btn" onclick="setLanguage('jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
            <button class="lang-btn" onclick="setLanguage('ae')"><img src="https://flagcdn.com/w20/ae.png"> العربية</button>
            <button class="lang-btn" onclick="setLanguage('br')"><img src="https://flagcdn.com/w20/br.png"> PORTUGUÊS</button>
        </div>
    </div>

    <header class="fixed-header">
        <!-- Logo strictly in the right corner -->
        <div class="logo-text">GY-GY</div>
    </header>

    <main class="portal-zone">
        <!-- Door +15% (46vh) -->
        <img src="door_1.jpg" id="main-door" class="door-img-v533" onclick="enterClub()">
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function enterClub() {
            const doorSound = document.getElementById('door-audio');
            if (doorSound) {
                doorSound.currentTime = 0;
                doorSound.play().catch(err => console.log("Sound block info"));
            }

            const door = document.getElementById('main-door');
            door.classList.add('door-open-anim');

            // 1.2s Fade-out Transition
            document.body.style.opacity = '0';
            setTimeout(() => { 
                window.location.href = 'welcome.html'; 
            }, 1200);
        }

        function setLanguage(lang) {
            console.log("GY-GY Lang:", lang);
            UI.toggle('lang-panel');
        }
    </script>
</body>
</html>
