<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.6.3 (.)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --frame-w: 210px; }
        
        /* ZERO SCROLL FOUNDATION (.) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; /* Глобальный запрет скролла */
            position: fixed; /* Блокировка резинового скролла на iOS */
        }

        /* HEADER ALIGNMENT (.) */
        .ui-header { 
            position: absolute; top: 20px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding: 0 25px; z-index: 1000; 
        }

        /* LANG BOX (FIXED 210px) (.) */
        .lang-wrapper { width: var(--frame-w); position: relative; }
        .lang-active { 
            border: 2px solid var(--gold); height: 44px; display: flex; 
            align-items: center; padding: 0 10px; background: var(--bg); 
            cursor: pointer; font-size: 14px; font-weight: bold;
        }
        .lang-active img { width: 20px; height: 14px; margin-right: 10px; object-fit: cover; }

        /* DROPDOWN WITHOUT SCROLLING BODY (.) */
        .lang-dropdown { 
            display: none; position: absolute; top: 42px; left: 0; width: 100%; 
            background: var(--bg); border: 2px solid var(--gold); border-top: none; 
            max-height: 70vh; /* Ограничение по высоте экрана */
            overflow-y: auto; /* Скролл только внутри маленького списка, если надо */
            z-index: 1001;
        }
        .lang-wrapper:hover .lang-dropdown { display: block; }
        .lang-item { 
            padding: 10px; display: flex; align-items: center; cursor: pointer; 
            font-size: 13px; border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .lang-item:hover { background: rgba(212, 175, 55, 0.2); }
        .lang-item img { width: 18px; margin-right: 10px; }

        /* LOGO (.) */
        .logo { 
            font-size: 24px; font-weight: 900; letter-spacing: 5px; 
            height: 44px; display: flex; align-items: center;
        }

        /* SLOGAN (.) */
        #top-slogan { 
            position: absolute; top: 80px; width: 100%; text-align: center; 
            font-family: 'Playfair Display', serif; font-style: italic; 
            font-size: 17px; padding: 0 30px; line-height: 1.2;
            text-shadow: 0 0 10px #000; z-index: 900;
        }

        /* DOOR STAGE (.) */
        .stage { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            padding-top: 40px; 
        }
        .door-img { 
            width: 260px; max-width: 70vw; cursor: pointer; 
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s;
        }
    </style>
</head>
<body>

    <div class="ui-header">
        <div class="lang-wrapper">
            <div class="lang-active" id="current-lang">
                <img src="https://flagcdn.com/w40/gb.png"> <span>ENGLISH</span>
            </div>
            <div class="lang-dropdown" id="lang-list"></div>
        </div>
        <div class="logo">GY-GY</div>
    </div>

    <div id="top-slogan">«Заходите, здесь вам так рады, что вы даже не представляете, как быстро захотите уйти, чтобы вернуться снова»</div>

    <div class="stage">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="enterClub()">
    </div>

    <script>
        const languages = [
            { n: 'UKRAINIAN', c: 'ua' },
            { n: 'РУССКИЙ', c: 'ru' },
            { n: 'DEUTSCH', c: 'de' },
            { n: 'POLSKI', c: 'pl' },
            { n: 'FRANÇAIS', c: 'fr' },
            { n: 'ESPAÑOL', c: 'es' },
            { n: 'ITALIANO', c: 'it' },
            { n: 'TÜRKÇE', c: 'tr' },
            { n: '中文', c: 'cn' },
            { n: '日本語', c: 'jp' }
        ];

        const listDiv = document.getElementById('lang-list');
        
        languages.forEach(lang => {
            const div = document.createElement('div');
            div.className = 'lang-item';
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png"> <span>${lang.n}</span>`;
            div.onclick = () => {
                const active = document.getElementById('current-lang');
                const oldContent = active.innerHTML;
                active.innerHTML = div.innerHTML;
                div.innerHTML = oldContent;
            };
            listDiv.appendChild(div);
        });

        function enterClub() {
            const door = document.getElementById('main-door');
            door.style.transform = "scale(12)";
            door.style.opacity = "0";
            // Тут будет мгновенный переход без скролла
        }
    </script>
</body>
</html>
