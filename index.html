<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin: 0; }
        
        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-frame-locked {
            position: fixed; top: 15px; left: 15px; z-index: 9999999; 
            width: 180px; height: 40px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 12px;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 180px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 22px; margin-right: 12px; }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed !important; top: 18px !important; right: 25px !important; z-index: 1000000 !important; 
            font-size: 24px !important; letter-spacing: 3px !important; font-weight: bold !important; user-select: none !important;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        /* ПРЕМИАЛЬНЫЙ СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed !important; top: 12px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 50px !important; height: 50px !important; border-radius: 50% !important;
            border: 2px solid var(--gold) !important; background: transparent !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.35) !important; z-index: 1000000 !important; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { 
            width: 100% !important; height: 100% !important; border-radius: 50% !important; object-fit: cover !important; 
            flex-shrink: 0 !important; display: block !important; background: transparent !important; border: none !important; 
        }
        .ui-user-badge .badge-flag {
            position: absolute !important; bottom: -2px !important; right: -2px !important;

        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }

        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        /* УНИВЕРСАЛЬНЫЙ КЛАСС ДЛЯ БЛОКОВ СТРАНИЦ */

            position: fixed; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            z-index: 10;

            transition: opacity 0.5s ease-in-out; 
        }
        .block.active {

        }

        /* ФИКС СЛОГАНА */

        .goog-text-highlight { background-color: transparent !important; background: transparent !important; box-shadow: none !important; color: inherit !important; }
        .btn-gy font, .quote-text font, .ui-header-right font { color: inherit !important; }

        #lang-switcher.force-hide { display: none !important; opacity: 0 !important; visibility: hidden !hidden; transition: none !important; }
      
        body:has(#block-entrance.active) #lang-switcher {

        #main-door {

        }
        .hall-interior .quote-text font, #id-label font, #pass-id-val font { text-shadow: none !important; filter: none !important; -webkit-font-smoothing: antialiased; }
    </style>
</head>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        let currentID = "";
        let currentActiveCode = 'en';
        let currentUserImage = "";
        let currentFlagCode = 'gb';

        const allLangs = [
            {n:'ENGLISH', c:'gb', code:'en'}, {n:'DEUTSCH', c:'de', code:'de'}, 
            {n:'ESPAÑOL', c:'es', code:'es'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
            {n:'ITALIANO', c:'it', code:'it'}, {n:'POLSKI', c:'pl', code:'pl'}, 
            {n:'PORTUGUÊS', c:'pt', code:'pt'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
            {n:'TÜRKÇЕ', c:'tr', code:'tr'}, {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
            {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
        ];

        function renderLangList() {
            const container = document.getElementById('lang-list-container');
            if (!container) return;
            container.innerHTML = ''; 
            allLangs.forEach(lang => {
                if(lang.code === currentActiveCode) return; 
                const div = document.createElement('div');
                div.className = 'lang-item notranslate';
                div.setAttribute('translate', 'no');
                div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon notranslate" translate="no"><span class="notranslate" translate="no">${lang.n}</span>`;
                div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
                container.appendChild(div);
            });
        }

        function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }
        function safeStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

        function applyLanguage(lang) {
            currentActiveCode = lang.code;
            currentFlagCode = lang.c; 
            safeStorageSet('gygy_flag', lang.c);
            safeStorageSet('gy_user_flag', lang.c);
            safeStorageSet('gy_lang', lang.code);
            safeStorageSet('gygy_lang', lang.code);
            
            const activeDisplay = document.getElementById('active-lang-display');
            if (activeDisplay) { activeDisplay.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> <span>${lang.n}</span>`; }
            const badgeFlagImg = document.getElementById('badge-flag-img');
            if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${lang.c}.png`;
            
            const langListContainer = document.getElementById('lang-list-container');
            if (langListContainer) langListContainer.style.display = 'none';
            renderLangList();
            
            forceTriggerGoogleTranslate(lang.code);
        }

        function forceTriggerGoogleTranslate(langCode) {
            if (window.langTimer) clearInterval(window.langTimer);
            let attempts = 0;
            window.langTimer = setInterval(() => {
                const selectEl = document.querySelector('.goog-te-combo');
                if (selectEl) {
                    clearInterval(window.langTimer);
                    if (selectEl.value === langCode) return;
                    selectEl.value = langCode;
                    selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                    console.log(`[GY-GY] Google Translate успешно переключен на: ${langCode}`);
                }
                if (++attempts > 100) {
                    clearInterval(window.langTimer);
                    console.error("[GY-GY] Виджет Google Translate не загрузился вовремя.");
                }
            }, 100);
        }

        function toggleLangList() {
            const list = document.getElementById('lang-list-container');
            if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
        }

        function toggleManifest(boxId) {
            document.querySelectorAll('.manifest-btn-box').forEach(box => {
                if(box.id === boxId) {
                    const isOpened = box.getAttribute('data-opened') === "true";
                    box.style.opacity = isOpened ? "0" : "1";
                    box.style.pointerEvents = isOpened ? "none" : "auto";
                    box.setAttribute('data-opened', isOpened ? "false" : "true");
                    box.style.bottom = isOpened ? "-50px" : "-35px";
                } else {
                    box.style.opacity = "0"; box.style.pointerEvents = "none"; box.setAttribute('data-opened', "false"); box.style.bottom = "-50px";
                }
            });
        }
