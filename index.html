<!-- GY-GY PROTOCOL v.5.2.9 (.) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href="door_open.mp3" as="audio">
</head>
<body class="bg-entrance"> <!-- Фон задаем через класс -->

    <audio id="door-audio" src="door_open.mp3" preload="auto"></audio>

    <header class="fixed-header">
        <div class="lang-container">
            <div class="lang-trigger" onclick="UI.toggle('lang-panel')">
                <img src="https://flagcdn.com/w40/gb.png" id="current-lang-flag"> 
                <span id="current-lang-label">ENGLISH</span>
            </div>
            <div id="lang-panel" class="lang-panel">
                <button class="lang-btn" onclick="UI.setLang('ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
                <button class="lang-btn" onclick="UI.setLang('en')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
                <button class="lang-btn" onclick="UI.setLang('fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
                <button class="lang-btn" onclick="UI.setLang('de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
                <button class="lang-btn" onclick="UI.setLang('es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
                <button class="lang-btn" onclick="UI.setLang('it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
                <button class="lang-btn" onclick="UI.setLang('cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
                <button class="lang-btn" onclick="UI.setLang('jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
                <button class="lang-btn" onclick="UI.setLang('ae')"><img src="https://flagcdn.com/w20/ae.png"> العربية</button>
                <button class="lang-btn" onclick="UI.setLang('tr')"><img src="https://flagcdn.com/w20/tr.png"> TÜRKÇE</button>
                <button class="lang-btn" onclick="UI.setLang('br')"><img src="https://flagcdn.com/w20/br.png"> PORTUGUÊS</button>
            </div>
        </div>
        <div class="logo-text">GY-GY</div>
        <div id="back-btn-place"></div> <!-- Место для кнопки Назад на других страницах -->
    </header>

    <main class="portal-zone">
        <!-- Визуал двери: макс 40vh по Протоколу -->
        <img src="door_1.jpg" id="main-door" class="door-img" onclick="enterClub()">
        <p class="humor-text">CLICK THE DOOR... IT WON'T BITE (MUCH). ГЫ-ГЫ!</p>
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function enterClub() {
            const doorSound = document.getElementById('door-audio');
            if (doorSound) {
                doorSound.play().catch(() => console.log("Sound blocked"));
            }

            const door = document.getElementById('main-door');
            door.classList.add('door-open-anim'); // Твоя анимация

            // Плавный переход 1.2 сек (Протокол)
            document.body.style.opacity = '0';
            setTimeout(() => { 
                window.location.href = 'welcome.html'; 
            }, 1200);
        }
    </script>
</body>
</html>
