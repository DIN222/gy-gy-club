<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.23 CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-frame-locked {
            position: fixed; top: 15px; left: 15px; z-index: 9999999; 
            width: 180px; height: 40px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 12px;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 180px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 22px; margin-right: 12px; }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            z-index: 1000000; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .block.active { display: flex !important; opacity: 1 !important; z-index: 5000 !important; }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; cursor: not-allowed; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        body { top: 0 !important; }
        #block-welcome { justify-content: flex-start !important; padding-top: 12vh !important; }
        #block-welcome .quote-text { margin-bottom: 2vh !important; font-size: 24px; }
        #block-welcome img { max-height: 35vh !important; width: auto; object-fit: contain; margin-bottom: 2vh !important; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); }
        #block-welcome .btn-gy { margin: 4px 0 !important; padding: 12px !important; }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В УГЛУ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: auto !important; user-select: none; display: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* ХОЛЛ И ИНТЕРАКТИВНЫЕ КАРТИНЫ */
        #block-hall { background: url('hall_bg_jpg.jpg') center/cover no-repeat #000; }
        .hall-interior { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
        
        .hall-interior .quote-text { 
            position: absolute; 
            top: 8vh; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85%; 
            margin: 0; 
            text-align: center;
            padding: 0;
            background: transparent !important;
            color: var(--gold) !important;       
            font-size: 28px;
            font-weight: 700;
            text-shadow: 
                0 0 8px rgba(20, 20, 20, 1),
                0 0 15px rgba(15, 15, 15, 1),
                0 0 25px rgba(10, 10, 10, 1),
                0 0 35px rgba(5, 5, 5, 1),
                0 0 50px rgba(0, 0, 0, 1) !important;
        }

        .hall-door-target {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24vw; height: 65vh; cursor: pointer; z-index: 5;
            background: transparent;
        }

        /* Интерактивные зоны стрелок в Холле */
        .painting-zone {
            position: absolute; 
            top: 25vh; 
            width: 6vw; 
            height: 12vh; 
            cursor: pointer; 
            z-index: 6; 
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .painting-left { left: 23vw; }
        .painting-right { right: 23vw; }

        .cue-arrow-hall { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s;
        }
        .painting-zone:hover .cue-arrow-hall { opacity: 0.8; }

        /* Выплывающие подменю для стрелок Холла */
        .manifest-btn-box { 
            position: absolute; 
            bottom: -50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 140px; 
            display: flex; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.4s, bottom 0.4s; 
            z-index: 10; 
        }
        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; margin: 0; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.9); }
        
        /* Защита от сдвигов перевода Google */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        body { top: 0 !important; background-color: #000 !important; opacity: 0; transition: opacity 0.4s ease-in-out !important; }
        body.page-loaded { opacity: 1 !important; }
        
        body:has(#block-welcome.active) #lang-switcher,
        body:has(#block-identity.active) #lang-switcher,
        body:has(#block-hall.active) #lang-switcher {
            display: none !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important;
        }
        
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
        .goog-text-highlight { background-color: transparent !important; background: transparent !important; box-shadow: none !important; color: inherit !important; }
        .btn-gy font, .quote-text font, .ui-header-right font { color: inherit !important; }
        #lang-switcher.force-hide { display: none !important; opacity: 0 !important; visibility: hidden !important; transition: none !important; }
        
        /* МОНУМЕНТАЛЬНОЕ ЦЕНТРИРОВАНИЕ ЭКРАНА ВХОДА */
        body #block-entrance {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important; 
            align-items: center !important;     
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            padding: 0 !important;
            margin: 0 !important;
            background: #000 !important;
            z-index: 5000 !important;
            opacity: 1;
            transition: opacity 0.8s ease-out;
        }
        
        /* Чистые исходные стили двери */
        body #main-door {
            display: block !important;
            height: calc(50vh + 20px) !important;
            width: auto !important;
            max-width: 100% !important;
            object-fit: contain !important;
            margin: 0 auto !important; 
            opacity: 1 !important;
            visibility: visible !important;
            transform: scale(1);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease-out !important;
        }

        /* КЛАССЫ АНИМАЦИИ ВЗРЫВА И РАСТВОРЕНИЯ (назначаются через JS) */
        body #block-entrance.door-fading {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        body #block-entrance.door-fading #main-door {
            transform: scale(3.5) !important;
            opacity: 0 !important;
        }
    </style>
</head>

<script type="text/javascript">
    // === ИНИЦИАЛИЗАЦИЯ И НАСТРОЙКА GOOGLE TRANSLATE ===
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }

    let currentID = "";
    let currentActiveCode = 'en';
    let currentUserImage = "";
    let currentFlagCode = 'gb';

    const allLangs = [
        {n:'ENGLISH', c:'gb', code:'en'}, {n:'DEUTSCH', c:'de', code:'de'}, 
        {n:'ESPAÑOL', c:'es', code:'es'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
        {n:'ITALIANO', c:'it', code:'it'}, {n:'POLSKI', c:'pl', code:'pl'}, 
        {n:'PORTUGUÊS', c:'pt', code:'pt'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
        {n:'TÜRKЧЕ', c:'tr', code:'tr'}, {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
        {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
    ];

    function renderLangList() {
        const container = document.getElementById('lang-list-container');
        if (!container) return;
        container.innerHTML = ''; 
        allLangs.forEach(lang => {
            if(lang.code === currentActiveCode) return; 
            const div = document.createElement('div');
            div.className = 'lang-item notranslate';
            div.setAttribute('translate', 'no');
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon notranslate" translate="no"><span class="notranslate" translate="no">${lang.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
            container.appendChild(div);
        });
    }

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }
    function safeStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

    function applyLanguage(lang) {
        currentActiveCode = lang.code;
        currentFlagCode = lang.c; 
        safeStorageSet('gygy_flag', lang.c);
        safeStorageSet('gy_lang', lang.code.toUpperCase() === 'UK' ? 'UA' : lang.code.toUpperCase());
        
        const activeDisplay = document.getElementById('active-lang-display');
        if (activeDisplay) { activeDisplay.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> <span>${lang.n}</span>`; }
        const badgeFlagImg = document.getElementById('badge-flag-img');
        if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${lang.c}.png`;
        
        const langListContainer = document.getElementById('lang-list-container');
        if (langListContainer) langListContainer.style.display = 'none';
        renderLangList();
        
        let attempts = 0;
        const selectTimer = setInterval(() => {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                selectEl.value = lang.code;
                selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                clearInterval(selectTimer);
            }
            if (++attempts > 50) clearInterval(selectTimer);
        }, 150);
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function toggleManifest(boxId) {
        document.querySelectorAll('.manifest-btn-box').forEach(box => {
            if(box.id === boxId) {
                const isOpened = box.getAttribute('data-opened') === "true";
                box.style.opacity = isOpened ? "0" : "1";
                box.style.pointerEvents = isOpened ? "none" : "auto";
                box.setAttribute('data-opened', isOpened ? "false" : "true");
                box.style.bottom = isOpened ? "-50px" : "-35px";
            } else {
                box.style.opacity = "0"; box.style.pointerEvents = "none"; box.setAttribute('data-opened', "false"); box.style.bottom = "-50px";
            }
        });
    }

    function renderUserPassports(targetID) {
        const idLabel = document.getElementById('id-label');
        const passIdVal = document.getElementById('pass-id-val');
        const qrBoxReg = document.getElementById('qr-box-reg');
        const passQrBox = document.getElementById('pass-qr-box');
        if (idLabel) idLabel.innerText = targetID;
        if (passIdVal) passIdVal.innerText = targetID;
        if (qrBoxReg && typeof QRCode !== 'undefined') { qrBoxReg.innerHTML = ""; new QRCode(qrBoxReg, { text: targetID, width: 85, height: 85 }); }
        if (passQrBox && typeof QRCode !== 'undefined') { passQrBox.innerHTML = ""; new QRCode(passQrBox, { text: targetID, width: 100, height: 100 }); }
    }

    function checkAndFillRegistrationForm() {
        const savedAvatar = safeStorageGet('gy_user_img') || safeStorageGet('gygy_avatar');
        currentID = safeStorageGet('gygy_id') || safeStorageGet('gy_user_id') || safeStorageGet('gy_trace');
        if (currentID) { renderUserPassports(currentID); }
        if (savedAvatar) {
            currentUserImage = savedAvatar;
            if (savedAvatar.startsWith('data:image/svg+xml')) {
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) { avatarImg.src = savedAvatar; avatarImg.style.display = "block"; }
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = "none";
            } else { 
                const ppImg = document.getElementById('pp'); if (ppImg) { ppImg.src = savedAvatar; ppImg.style.display = "block"; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = "none";
            }
            const btnWHall = document.getElementById('btn-w-hall'); if(btnWHall) btnWHall.classList.remove('btn-sleep');
            const btnPass = document.getElementById('btn-pass'); if(btnPass) btnPass.classList.remove('btn-sleep');
        }
    }

    function portalTransition(nextId) {
        if (nextId === 'block-server') { window.location.href = 'verses.html'; return; }
        if (nextId === 'block-bar') { window.location.href = 'bar.html'; return; }
        if (nextId === 'block-tables') { window.location.href = 'tables.html'; return; } 
        if (nextId === 'block-office') { alert('Office coming soon...'); return; }

        const currentActiveBlock = document.querySelector('.block.active');
        const targetBlock = document.getElementById(nextId);
        const badge = document.getElementById('global-user-badge');
        const langSwitcher = document.getElementById('lang-switcher');

        // КРИТИЧЕСКИЙ СБРОС АНИМАЦИИ ДВЕРИ ПРИ ВОЗВРАТЕ НА ПЕРВУЮ СТРАНИЦУ
        if (nextId === 'block-entrance') {
            const blockEntrance = document.getElementById('block-entrance');
            if (blockEntrance) {
                blockEntrance.classList.remove('door-fading'); // Убираем класс растворения
            }
            if (langSwitcher) { langSwitcher.style.setProperty('display', 'flex', 'important'); langSwitcher.style.opacity = '1'; }
            if (badge) badge.style.display = 'none';
        } else {
            if (badge && currentUserImage) badge.style.display = 'block';
        }

        if (currentActiveBlock) { currentActiveBlock.classList.remove('active'); currentActiveBlock.style.setProperty('display', 'none', 'important'); }
        
        if (targetBlock) {
            targetBlock.style.setProperty('display', 'flex', 'important');
            setTimeout(() => { targetBlock.classList.add('active'); }, 20);
            const embeddedArrows = targetBlock.querySelector('.ui-nav-arrows');
            if (embeddedArrows) embeddedArrows.style.display = 'flex';
        } else {
            console.error(`Ошибка DOM: Целевой блок "${nextId}" отсутствует.`);
            if (currentActiveBlock) { currentActiveBlock.style.setProperty('display', 'flex', 'important'); currentActiveBlock.classList.add('active'); }
        }
    }

    function handleDoor() {
        const sndDoor = document.getElementById('snd-door');
        const sndAmbient = document.getElementById('snd-ambient');
        const blockEntrance = document.getElementById('block-entrance');

        if (sndDoor) sndDoor.play();

        // Запускаем синхронную CSS-анимацию «взрыва» двери и затухания фона через класс
        if (blockEntrance) {
            blockEntrance.classList.add('door-fading');
        }

        // Ждем окончания CSS transition (700-800мс) и переключаемся
        setTimeout(() => {
            if (sndAmbient) {
                sndAmbient.volume = 0.5;
                sndAmbient.play().catch(e => console.log("Ambient autoplay blocked"));
            }
            // Переходим к Чарли штатными рельсами архитектуры
            portalTransition('block-welcome');
        }, 750);
    }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUserImage = e.target.result;
                const pp = document.getElementById('pp'); if (pp) { pp.src = currentUserImage; pp.style.display = 'block'; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = 'none';
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) avatarImg.style.display = 'none';
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

        const pp = document.getElementById('pp'); if (pp) pp.style.display = 'none';

    }
