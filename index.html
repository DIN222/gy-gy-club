<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB  010</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        .portal { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #door { width: 320px; cursor: pointer; transition: 0.8s ease; }
        .open { transform: scale(1.1); opacity: 0; }
    </style>
</head>
<body>
    <audio id="door-snd" src="door_open.mp3" preload="auto"></audio>

    <div class="portal">
        <img src="door_1.jpg" id="door" onclick="go()">
    </div>

    <script src="shared-logic.js"></script>
    <script>
        function go() {
            // 1. Звук двери
            const s = document.getElementById('door-snd');
            if(s) s.play();
            
            // 2. Активируем контекст бара (ВАЖНО!)
            if(window.playZoneSound) playZoneSound(0.2);

            document.getElementById('door').classList.add('open');
            
            setTimeout(() => {
                window.location.href = "welcome.html";
            }, 1000);
        }
    </script>
</body>
</html>
