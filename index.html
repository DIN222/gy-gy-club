<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GY-GY | Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body, html { width:100%; height:100%; background:#000; margin:0; padding:0; overflow:hidden; font-family:'Share Tech Mono', monospace; }
        .fixed-header { position:fixed; top:20px; right:30px; z-index:10000; }
        .logo-text { font-size:35px; font-weight:900; color:#D4AF37; letter-spacing:4px; }
        .lang-container { position:fixed; top:20px; left:25px; z-index:10000; }
        .lang-trigger { border:1px solid #D4AF37; background:rgba(0,0,0,0.8); padding:5px 10px; cursor:pointer; display:flex; align-items:center; gap:10px; width:110px; justify-content:space-between; }
        .lang-panel { position:absolute; top:100%; left:0; width:132px; background:#000; border:1px solid #D4AF37; border-top:none; display:none; max-height:400px; overflow-y:auto; }
        .door-zone { height:100vh; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <header class="fixed-header"><div class="logo-text">GY-GY</div></header>
    <div class="lang-container">
        <div class="lang-trigger" onclick="toggleMenu()">
            <div style="display:flex; align-items:center; gap:8px;">
                <img src="" id="current-lang-flag" width="25"> 
                <span id="current-lang-label" style="font-weight:900; color:#D4AF37;">RU</span>
            </div>
            <span style="font-size:10px; color:#D4AF37;">▼</span>
        </div>
        <div id="lang-list-12" class="lang-panel"></div>
    </div>
    <main class="door-zone">
        <button onclick="location.href='welcome.html'" style="background:none; border:2px solid #D4AF37; color:#D4AF37; padding:20px 40px; cursor:pointer; font-family:inherit; font-weight:900;">ENTER</button>
    </main>
    <script src="shared-logic.js"></script>
</body>
</html>
