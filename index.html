<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | v8.2.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="top-bar">
        <div class="logo-zone"><img src="logo.png" alt="GY-GY" id="main-logo"></div>
        <div class="lang-gateway">
            <button class="btn-ui" id="lang-trigger">
                <img id="cur-flag" src="https://flagcdn.com/w20/gb.png" class="flag-icon">
                <span id="cur-name">EN</span>
            </button>
            <div id="lang-list" class="lang-dropdown"></div>
        </div>
        <button class="btn-ui btn-back" id="btn-back" onclick="goBack()">←</button>
    </div>

    <section id="scr-entry" class="block active">
        <img src="door_1.jpg" id="main-door" class="asset-door">
    </section>

    <section id="scr-welcome" class="block">
        <div class="horse-podium">
            <div class="glow-aura"></div>
            <img src="horse.png" class="asset-horse">
        </div>
        <div class="quote-box">
            <h2 id="quote" data-key="q_whiskey">...</h2>
        </div>
        <div class="nav-cluster">
            <button class="btn-gy" id="go-id" data-key="btn_get_id">GET ID</button>
            <button class="btn-gy btn-sleep" id="go-hall" data-key="btn_to_hall">TO HALL</button>
        </div>
    </section>

    <section id="scr-id" class="block">
        <div class="registration-ui">
            <div class="id-assets">
                <div id="avatar-zone" class="box-frame" onclick="generateAvatar()">
                    <img id="user-photo" style="display:none">
                    <span data-key="label_avatar">AVATAR</span>
                </div>
                <div id="qr-reg" class="box-frame"></div>
            </div>
            <div class="id-display">#<span id="id-label">GY-000</span></div>
            <button class="btn-gy" id="save-btn" data-key="btn_save">SAVE</button>
        </div>
    </section>

    <section id="scr-hall" class="block">
        <div class="id-card">
            <div class="card-header">MEMBERSHIP</div>
            <div class="card-body">
                <div class="main-av-wrap">
                    <img id="h-photo" src="">
                    <img id="h-flag" src="" class="mini-flag">
                </div>
                <div id="h-id">#GY-000</div>
            </div>
            <button class="btn-gy" onclick="go('scr-bar')" data-key="btn_to_bar">ENTER BAR</button>
        </div>
    </section>

    <section id="scr-bar" class="block">
        <div class="bar-interior">
            <img src="horse.png" class="asset-horse-small">
            <h1 data-key="bar_welcome">GY-GY BAR</h1>
            <div class="bar-controls">
                <button class="btn-gy">WHISKEY LIST</button>
                <button class="btn-gy">JOKE BOARD</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
