<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #000; --paper: #F5F5DC; }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; outline: none !important; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; margin: 0; padding: 0; }
        body { opacity: 1; transition: opacity 0.5s ease; }

        .back-nav { position: fixed; top: 15px; left: 15px; z-index: 10002; cursor: pointer; color: var(--gold); font-size: 45px; font-weight: 900; line-height: 0.6; display: none; width: 50px; }
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000; font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; line-height: 1; }
        .lang-gateway { position: fixed; top: 65px; left: 15px; z-index: 10000; width: 170px; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; text-align: center; max-width: 85%; line-height: 1.2; margin-bottom: 25px; }
        .btn-gy { min-width: 275px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: inherit; transition: 0.3s; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        .horse-light { max-height: 40vh; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); animation: horse-pulse 3s infinite alternate ease-in-out; }
        @keyframes horse-pulse { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }
        #main-door { width: 280px; cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; }

        .lang-panel { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #000; border: 1.5px solid var(--gold); border-top: none; max-height: 50vh; overflow-y: auto; z-index: 10001; }
        .btn-main-lang { width: 100%; padding: 10px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }
        .lang-btn { width: 100%; padding: 12px; background: none; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.1); color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; font-family: inherit; text-align: left; }
        .flag-icon { width: 20px; border: 0.5px solid var(--gold); }
    </style>
</head>
<body>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="global-back" class="back-nav" onclick="goBack()">«</div>
    <div class="ui-header-right">GY-GY</div>

    <div class="lang-gateway" id="gy-lang-root">
        <button class="btn-main-lang" onclick="toggleMenu()">
            <img id="current-lang-flag" src="https://flagcdn.com/w20/ru.png" class="flag-icon">
            <span id="current-lang-label">RU</span>
        </button>
        <div id="lang-list-12" class="lang-panel"></div>
    </div>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div class="quote-text" data-t="q_whiskey">...</div>
        <img src="horse_welcome.png" class="horse-light">
        <div style="font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: 8px; margin-bottom: 15px; font-style: italic;">WELCOME</div>
        <button class="btn-gy" onclick="fadeOutAndLink('registration.html')" data-t="btn_get_id">ПРОЙДИТЕ НА РЕГИСТРАЦИЮ</button>
    </div>

<script src="shared-logic.js"></script>
<script>
    const ambient = document.getElementById('snd-ambient');
    let navigationHistory = ['block-entrance'];

    // Синхронизация звука при загрузке
    window.addEventListener('DOMContentLoaded', () => {
        const savedTime = localStorage.getItem('gy_music_time');
        if (savedTime) ambient.currentTime = parseFloat(savedTime);
    });

    // Постоянное сохранение времени
    setInterval(() => {
        if (!ambient.paused) localStorage.setItem('gy_music_time', ambient.currentTime);
    }, 1000);

    function handleDoor() {
        document.getElementById('snd-door').play();
        document.getElementById('main-door').style.transform = "scale(5)"; 
        document.getElementById('main-door').style.opacity = "0";
        
        // Включаем эмбиент плавно
        ambient.volume = 0;
        ambient.play();
        fadeIn(ambient);

        setTimeout(() => { portalTransition('block-welcome'); }, 1800);
    }

    function portalTransition(nextId) {
        const cur = document.querySelector('.block.active');
        if(cur) { 
            cur.style.opacity = "0"; 
            setTimeout(() => { cur.classList.remove('active'); cur.style.display="none"; }, 600); 
        }
        navigationHistory.push(nextId);
        setTimeout(() => {
            const n = document.getElementById(nextId);
            n.style.display = "flex";
            setTimeout(() => { 
                n.classList.add('active'); n.style.opacity = "1"; 
                document.getElementById('global-back').style.display = (nextId === 'block-entrance') ? 'none' : 'block';
            }, 50);
        }, 650);
    }

    function fadeOutAndLink(url) {
        document.body.style.opacity = "0";
        localStorage.setItem('gy_music_time', ambient.currentTime);
        
        let vol = ambient.volume;
        const fade = setInterval(() => {
            if (vol > 0.05) { vol -= 0.05; ambient.volume = vol; }
            else { clearInterval(fade); window.location.href = url; }
        }, 40);
    }

    function fadeIn(audio) {
        let vol = 0;
        const fade = setInterval(() => {
            if (vol < 0.5) { vol += 0.05; audio.volume = vol; }
            else { clearInterval(fade); }
        }, 50);
    }

    function toggleMenu() {
        const list = document.getElementById('lang-list-12');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
