    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* ЯЗЫКОВАЯ ПАНЕЛЬ (Слева) */
        .lang-frame-locked {
            position: fixed; top: 15px; left: 15px; z-index: 9999999; 
            width: 180px; height: 40px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 12px;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 180px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 22px; margin-right: 12px; }

        /* ЛОГОТИП GY-GY (Справа) */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            z-index: 1000000; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        .ui-back-to-bar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005; background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold); padding: 12px 24px; cursor: pointer; display: none; opacity: 0; transition: opacity 0.5s; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .block.active { display: flex !important; opacity: 1 !important; z-index: 5000 !important; }

        #main-door { height: calc(50vh + 20px); width: auto; cursor: pointer; transition: transform 1.2s ease-in, opacity 1s; z-index: 9999999 !important; }
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        
        /* Стили блокировки кнопок */
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; cursor: not-allowed; }

        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        #block-tables { background: url('lounge.jpg') no-repeat center bottom / contain #000; }
        .lamp-zone { position: absolute; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; background: radial-gradient(circle, var(--neon-glow) 0%, transparent 75%); border: 1px solid var(--violet); box-shadow: 0 0 18px var(--neon-glow); transform: translate(-50%, -50%); }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В УГЛУ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: auto !important; user-select: none; display: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* КОМПОНОВКА ХОЛЛА И КАРТИН С БОКОВЫМИ СТРЕЛКАМИ */
        #block-hall { background: url('hall_bg_jpg.jpg') center/cover no-repeat #000; display: none; }
        .hall-interior { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
        .hall-interior .quote-text { position: absolute; top: 8vh; left: 50%; transform: translateX(-50%); width: 80%; margin: 0; text-align: center; }

        .hall-door-target {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 25vw; height: 65vh; cursor: pointer; z-index: 5;
            background: transparent;
        }
/* Расширяем зоны до 18vw, чтобы они покрывали и картину, и стрелку рядом */
        .painting-zone {
            position: absolute; 
            top: 25vh; 
            width: 10vw; 
            height: 24vh; 
            cursor: pointer; 
            z-index: 6; 
            background: rgba(255,255,255,0.01);
            border: 1px dashed rgba(138, 43, 226, 0.4); /* Фиолетовый пунктир, чтобы ты видел новые границы */
        }
        /* Корректируем положение зон, чтобы они сели точно поверх картин на фоне */
        .painting-left { left: 25vw; }
        .painting-right { right: 25vw; }

        /* Статичная фиолетовая стрелка */
        .cue-arrow-side { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #8A2BE2; 
            font-size: 48px; 
            font-weight: 900; 
            text-shadow: 0 0 15px #8A2BE2, 0 0 25px #8A2BE2; 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            animation: none !important; /* Полная статика, как договаривались */
        }
        
        /* Левая стрелка: упирается в левый край расширенной зоны (снаружи от картины) */
        .painting-left .cue-arrow-side { 
            left: 0; 
            right: auto;
        }
        
        /* Правая стрелка: упирается в правый край расширенной зоны (снаружи от картины) */
        .painting-right .cue-arrow-side { 
            right: 0; 
            left: auto;
        }
        /* Выплывающие кнопки под картинами */
        .manifest-btn-box { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); width: 140px; display: flex; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s, bottom 0.4s; z-index: 10; }
        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; margin: 0; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.9); }

        /* СЕРВЕРНЫЙ КОРИДОР */

        .led { width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; animation: blink 0.4s infinite alternate; }
        .led:nth-child(even) { animation-delay: 0.2s; background: #f00; box-shadow: 0 0 8px #f00; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        .corridor-door-btn { margin-top: 45px; min-width: 240px; padding: 20px; background: #111; border: 2px solid var(--violet); color: #fff; font-size: 16px; font-weight: 900; letter-spacing: 4px; box-shadow: 0 0 20px var(--neon-glow); cursor: pointer; text-transform: uppercase; text-align: center; transition: background 0.3s, transform 0.2s; }

        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        body { top: 0 !important; }
    </style>

<!-- СКРИПТ ПОДКЛЮЧЕНИЯ И ЛОГИКИ СТРАНИЦЫ -->
<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }

    // Очистка данных для теста
    localStorage.clear(); 

    let currentID = "";
    let currentActiveCode = 'en';
    let currentUserImage = "";
    let currentFlagCode = 'gb';

    const allLangs = [
        {n:'ENGLISH', c:'gb', code:'en'}, {n:'DEUTSCH', c:'de', code:'de'}, 
        {n:'ESPAÑOL', c:'es', code:'es'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
        {n:'ITALIANO', c:'it', code:'it'}, {n:'POLSKI', c:'pl', code:'pl'}, 
        {n:'PORTUGUÊS .', c:'pt', code:'pt'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
        {n:'TÜRKÇЕ', c:'tr', code:'tr'}, {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
        {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
    ];

    function renderLangList() {
        const container = document.getElementById('lang-list-container');
        if (!container) return;
        container.innerHTML = ''; 
        allLangs.forEach(lang => {
            if(lang.code === currentActiveCode) return; 
            const div = document.createElement('div');
            div.className = 'lang-item notranslate'; 
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"><span>${lang.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
            container.appendChild(div);
        });
    }

    function applyLanguage(lang) {
        currentActiveCode = lang.code;
        currentFlagCode = lang.c;
        document.getElementById('active-lang-display').innerHTML = `
            <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> 
            <span>${lang.n}</span>
        `;
        document.getElementById('badge-flag-img').src = `https://flagcdn.com/w20/${lang.c}.png`;
        document.getElementById('lang-list-container').style.display = 'none';
        renderLangList();

        let attempts = 0;
        const selectTimer = setInterval(() => {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                selectEl.value = lang.code;
                selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                clearInterval(selectTimer);
            }
            if (++attempts > 50) clearInterval(selectTimer);
        }, 150);
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function toggleManifest(boxId) {
        document.querySelectorAll('.manifest-btn-box').forEach(box => {
            if(box.id === boxId) {
                const isOpened = box.getAttribute('data-opened') === "true";
                box.style.opacity = isOpened ? "0" : "1";
                box.style.pointerEvents = isOpened ? "none" : "auto";
                box.setAttribute('data-opened', isOpened ? "false" : "true");
                box.style.bottom = isOpened ? "-50px" : "-35px";
            } else {
                box.style.opacity = "0";
                box.style.pointerEvents = "none";
                box.setAttribute('data-opened', "false");
                box.style.bottom = "-50px";
            }
        });
    }

    function handleDoor() {
        document.getElementById('snd-door').play();
        const d = document.getElementById('main-door');
        d.style.transform = "scale(5)"; 
        d.style.opacity = "0"; 
        d.style.pointerEvents = "none";
        document.getElementById('lang-switcher').style.opacity = "0";
        
        currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
        document.getElementById('id-label').innerText = currentID;
        document.getElementById('pass-id-val').innerText = currentID;
        
        document.getElementById('qr-box-reg').innerHTML = "";
        new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
        document.getElementById('pass-qr-box').innerHTML = "";
        new QRCode(document.getElementById("pass-qr-box"), { text: currentID, width: 100, height: 100 });
        
        setTimeout(() => { 
            portalTransition('block-welcome'); 
            const a = document.getElementById('snd-ambient'); a.volume = 1; a.play();
        }, 1000);
    }

function portalTransition(nextId) {
        const current = document.querySelector('.block.active');
        const backBtn = document.getElementById('btn-global-back');
        const amb = document.getElementById('snd-ambient');
        const srvSnd = document.getElementById('snd-server');
        const badge = document.getElementById('global-user-badge');
        
        if (current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }
        if (backBtn) backBtn.style.opacity = "0";

        // ГАСИМ ЗВУКИ ПРИ ВОЗВРАТЕ К ДВЕРЯМ
        if (nextId === 'block-entrance') {
            if (amb) { amb.pause(); amb.currentTime = 0; }
            if (srvSnd) { srvSnd.pause(); srvSnd.currentTime = 0; }
        }

        setTimeout(() => {
            if (current) { current.classList.remove('active'); current.style.display = "none"; }
            const next = document.getElementById(nextId);
            if (!next) return;
            
            next.style.display = "flex";
            const langPanel = document.getElementById('lang-switcher');
            
            if (nextId === 'block-entrance') {
                const door = document.getElementById('main-door');
                door.style.transform = "scale(1)"; door.style.opacity = "1"; door.style.pointerEvents = "auto";
                if (langPanel) { langPanel.style.display = 'flex'; langPanel.style.opacity = '1'; }
                badge.style.display = "none";
            } else {
                if (langPanel) langPanel.style.display = 'none';
                
                if (nextId === 'block-welcome') { document.getElementById('nav-welcome').style.display = "flex"; }
                if (nextId === 'block-identity') { document.getElementById('nav-identity').style.display = "flex"; }
                
                if(['block-hall', 'block-bar', 'block-tables', 'block-server'].includes(nextId)) {
                    if (currentUserImage) {
                        document.getElementById('badge-avatar-img').src = currentUserImage;
                        document.getElementById('pass-avatar-img').src = currentUserImage;
                        badge.style.display = "block";
                    }
                    if(nextId === 'block-hall') document.getElementById('nav-hall').style.display = "flex";
                    if(nextId === 'block-tables') document.getElementById('nav-tables').style.display = "flex";
                }
            }

            setTimeout(() => { 
                next.classList.add('active'); next.style.pointerEvents = "auto";
                if (nextId === 'block-bar') { amb.play(); setTimeout(() => document.getElementById('snd-khe').play(), 800); }
                if (nextId === 'block-server') { srvSnd.play(); }
            }, 50);
        }, 400); 
    }

function preview(i) {
    if(i.files && i.files[0]) {
        const r = new FileReader();
        r.onload = (e) => { 
            document.getElementById('avatar-img').style.display = "none";
            document.getElementById('pp').src = e.target.result; 
            document.getElementById('pp').style.display = "block";
            document.getElementById('txt-photo').style.display = "none";
            currentUserImage = e.target.result;

            // Блокируем кнопку "PROCEED", так как данные изменились и их нужно сохранить!
            const btnPass = document.getElementById('btn-pass');
            if(btnPass) btnPass.classList.add('btn-sleep');
        };
        r.readAsDataURL(i.files[0]);
    }
}

function generateAvatar() {
    document.getElementById('pp').style.display = "none"; 
    document.getElementById('txt-photo').style.display = "block";
    
    const randomColor = Math.floor(Math.random()*16777215).toString(16);
    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><rect width="100" height="100" fill="#${randomColor}"/><circle cx="50" cy="40" r="20" fill="#000"/><path d="M20,90 Q50,50 80,90 Z" fill="#000"/></svg>`;
    currentUserImage = 'data:image/svg+xml;utf8,' + encodeURIComponent(svgString);
    
    document.getElementById('avatar-img').src = currentUserImage; 
    document.getElementById('avatar-img').style.display = "block";
    document.getElementById('txt-avatar').style.display = "none";

    // Блокируем "PROCEED" обратно — аватар новый, надо пересохранить
    const btnPass = document.getElementById('btn-pass');
    if(btnPass) btnPass.classList.add('btn-sleep');
}

function saveUserProfile() {
    if(!currentUserImage) { 
        alert("Генерируй аватар или загрузи фото!"); 
        return; 
    }
    
    // Запись в локальное хранилище браузера
    localStorage.setItem('gy_user_id', currentID);
    localStorage.setItem('gy_user_img', currentUserImage);
    
    // Оживляем кнопку продолжения в блоке Welcome
    const btnWHall = document.getElementById('btn-w-hall');
    if(btnWHall) {
        btnWHall.classList.remove('btn-sleep');
    }
    
    // СТРОГАЯ АКТИВАЦИЯ КНОПКИ "PROCEED"
    const btnPass = document.getElementById('btn-pass');
    if(btnPass) {
        btnPass.classList.remove('btn-sleep'); // Убираем сонный режим
    }
    
    
}

function openPassport() { 
    document.getElementById('modal-passport').style.display = "flex"; 
    setTimeout(() => { document.getElementById('modal-passport').style.opacity = "1"; }, 10);
}

function closePassport() { 
    document.getElementById('modal-passport').style.opacity = "0";
    setTimeout(() => { document.getElementById('modal-passport').style.display = "none"; }, 300);
}

function deepDive() { 
    portalTransition('block-bar'); // Ссылка вела в никуда, теперь переводит в Бар/AI Room
} 

function enterStudio() { 
    alert("Entering Studio... Печатные станки прогреваются!"); 
}
    
window.onload = () => { renderLangList(); };
</script>
