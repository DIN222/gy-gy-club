<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | v.4.7.2 Full</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <!-- . ПОСТОЯННЫЕ АТРИБУТЫ (Согласно Пояснительной записке) -->
    <header class="ui-persistent-layer">
        <div class="lang-gateway">
            <button class="btn-main-lang" onclick="Agent.toggleLangList()">
                <img id="cur-flag" src="https://flagcdn.com/w20/gb.png" class="flag-icon">
                <span id="cur-name">EN</span>
            </button>
            <div id="lang-list" class="lang-dropdown">
                <!-- Языки подтянутся из скрипта -->
            </div>
        </div>
        
        <div class="gy-logo-top">GY-GY</div> <!-- -->
        
        <button id="global-back" class="gy-back-btn" onclick="Agent.goBack()" style="display:none;">← BACK</button> <!-- -->
    </header>

    <!-- СЦЕНА СБОРКИ -->
    <main id="app-stage"></main>

    <script src="core-agent.js"></script>
</body>
</html>
