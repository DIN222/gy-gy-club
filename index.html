<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="ui-fixed">
        <div class="lang-zone">
            <button class="btn-gy" onclick="UI.toggle('lang-list')">GAB / LANG</button>
            <div id="lang-list" class="drop-list">
                <div class="drop-item" onclick="UI.setLang('EN')">EN 🇬🇧</div>
                <div class="drop-item" onclick="UI.setLang('RU')">RU 🇷🇺</div>
                <!-- Другие языки добавляются сюда -->
            </div>
        </div>
        <div class="gy-logo">GY-GY</div>
        <button id="btn-back" class="btn-gy" style="display:none;" onclick="Agent.goBack()">← BACK</button>
    </header>

    <main id="app-stage"></main>

    <!-- Важен порядок: сначала данные, потом логика -->
    <script src="blocks.js"></script>
    <script src="script.js"></script>
</body>
</html>
