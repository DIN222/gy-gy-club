<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { width: 100%; height: 100vh; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; opacity: 0; transition: opacity 0.6s ease; }

        /* ЛЕВАЯ ВЕРХНЯЯ ПАНЕЛЬ: ЯЗЫК */
        .lang-gateway { position: fixed; top: 15px; left: 15px; z-index: 10000; }
        .btn-main-lang { padding: 10px 15px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }

        /* ПРАВАЯ ВЕРХНЯЯ ПАНЕЛЬ: ЛОГОТИП И ПЕРЕХОД */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 10001; 
            font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; 
            letter-spacing: 5px; text-transform: uppercase; cursor: pointer;
        }

        /* ЦЕНТРАЛЬНАЯ ДВЕРЬ */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.6s ease; }
        .block.active { display: flex; opacity: 1; }
        #main-door { width: 280px; cursor: pointer; transition: transform 2s, opacity 1.5s; z-index: 10; }

        /* ПРИВЕТСТВИЕ */
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; text-align: center; max-width: 85%; margin-bottom: 25px; }
        .btn-gy { min-width: 275px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; font-family: inherit; }
    </style>
</head>
<body onload="initPage()">

    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>

    <!-- ЯЗЫКОВОЙ БЛОК (ВЕРХНИЙ ЛЕВЫЙ УГОЛ) -->
    <div class="lang-gateway">
        <button class="btn-main-lang" onclick="alert('Language switch: Soon!')">
            <img src="https://flagcdn.com/w20/gb.png" style="width:20px;">
            <span>EN</span>
        </button>
    </div>

    <!-- ЛОГОТИП (ВЕРХНИЙ ПРАВЫЙ УГОЛ - ПЕРЕХОД) -->
    <div class="ui-header-right" onclick="portalTransition('block-welcome')">GY-GY</div>

    <!-- ПЕРВАЯ СТРАНИЦА: ЦЕНТРАЛЬНАЯ ДВЕРЬ -->
    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <!-- ВТОРАЯ СТРАНИЦА: ПРИВЕТСТВИЕ -->
    <div id="block-welcome" class="block">
        <div class="quote-text">«Шампанского много не бывает»</div>
        <button class="btn-gy" onclick="window.location.href='registration.html'">REGISTRATION</button>
    </div>

<script>
    const ambient = document.getElementById('snd-ambient');
    const doorSnd = document.getElementById('snd-door');

    function initPage() {
        document.body.style.opacity = "1";
        const savedTime = localStorage.getItem('gy_music_time');
        if (savedTime) ambient.currentTime = parseFloat(savedTime);
    }

    function handleDoor() {
        // 1. Звук двери
        doorSnd.play();
        
        // Визуальный эффект
        const doorImg = document.getElementById('main-door');
        doorImg.style.transform = "scale(4)";
        doorImg.style.opacity = "0";
        
        // 2. Задержка перед звуком бара
        setTimeout(() => {
            ambient.volume = 0;
            ambient.play();
            smoothFadeIn(ambient, 0.5);
            portalTransition('block-welcome');
        }, 1200); // Задержка для синхронизации со звуком открытия двери
    }

    function portalTransition(nextId) {
        document.querySelectorAll('.block').forEach(b => {
            b.classList.remove('active');
            b.style.display = 'none';
        });
        const next = document.getElementById(nextId);
        next.style.display = 'flex';
        setTimeout(() => next.classList.add('active'), 50);
    }

    function smoothFadeIn(audio, target) {
        let v = 0;
        const intr = setInterval(() => {
            if (v < target) {
                v += 0.05;
                audio.volume = v;
            } else {
                clearInterval(intr);
            }
        }, 50);
    }
</script>
</body>
</html>
