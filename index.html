<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY | Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* --- БАЗОВЫЕ СТИЛИ --- */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; background: #000; margin: 0; padding: 0; 
            overflow: hidden; font-family: 'Share Tech Mono', monospace; 
        }

        /* --- ПОСТОЯННЫЕ АТРИБУТЫ --- */
        .fixed-header { position: fixed; top: 20px; right: 30px; z-index: 10000; }
        .logo-text { 
            font-size: 35px; font-weight: 900; color: #D4AF37; 
            letter-spacing: 4px; text-transform: uppercase; line-height: 1;
        }

        .lang-container { position: fixed; top: 20px; left: 25px; z-index: 10000; user-select: none; }
        .lang-trigger { 
            border: 1px solid #D4AF37; background: rgba(0,0,0,0.8); padding: 5px 10px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; 
            width: 110px; justify-content: space-between;
        }
        .lang-label { font-weight: 900; color: #D4AF37; font-size: 14px; }
        .lang-panel { 
            display: none; position: absolute; top: 100%; left: 0; 
            width: 132px; background: #000; border: 1px solid #D4AF37; border-top: none; 
            max-height: 400px; overflow-y: auto; 
        }

        /* --- ЗОНА ДВЕРЕЙ --- */
        .door-zone {
            height: 100vh; width: 100%; display: flex; align-items: center; 
            justify-content: center; position: relative; perspective: 1200px;
        }

        .door {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: #050505; border: 2px solid #D4AF37;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; display: flex; align-items: center; justify-content: center;
        }

        #door-left { left: 0; border-right: 1px solid #D4AF37; transform-origin: left; }
        #door-right { right: 0; border-left: 1px solid #D4AF37; transform-origin: right; }

        /* Эффект открытия при клике */
        .door-open #door-left { transform: rotateY(-90deg); }
        .door-open #door-right { transform: rotateY(90deg); }

        /* Центральная кнопка ВХОД */
        .enter-btn {
            z-index: 10; position: relative;
            background: #000; color: #D4AF37; border: 2px solid #D4AF37;
            padding: 20px 50px; font-size: 24px; font-weight: 900;
            cursor: pointer; transition: 0.3s; letter-spacing: 5px;
            font-family: 'Share Tech Mono', monospace;
        }
        .enter-btn:hover { background: #D4AF37; color: #000; box-shadow: 0 0 20px #D4AF37; }

        /* Скрытый контент за дверями */
        .inner-content {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 1;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="fixed-header">
        <div class="logo-text">GY-GY</div>
    </header>

    <div class="lang-container" id="gy-lang-root">
        <div class="lang-trigger" onclick="toggleMenu()">
            <div style="display: flex; align-items: center; gap: 8px;">
                <img src="" id="current-lang-flag" width="25"> 
                <span id="current-lang-label" class="lang-label">RU</span>
            </div>
            <span style="font-size: 10px; color: #D4AF37;">▼</span>
        </div>
        <div id="lang-list-12" class="lang-panel"></div>
    </div>

    <main class="door-zone" id="main-zone">
        <div class="inner-content">
            </div>

        <div id="door-left" class="door"></div>
        <div id="door-right" class="door"></div>

        <button class="enter-btn" id="btn-enter">ENTER</button>
    </main>

    <script>
        // Логика открытия дверей
        const btn = document.getElementById('btn-enter');
        const zone = document.getElementById('main-zone');

        btn.onclick = () => {
            zone.classList.add('door-open');
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';
            
            // Переход на вторую страницу после анимации
            setTimeout(() => {
                window.location.href = 'welcome.html';
            }, 1500);
        };

        // Управление выпадающим списком языков
        function toggleMenu() {
            const list = document.getElementById('lang-list-12');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('click', (e) => {
            const root = document.getElementById('gy-lang-root');
            if (root && !root.contains(e.target)) {
                document.getElementById('lang-list-12').style.display = 'none';
            }
        });
    </script>

    <script src="shared-logic.js"></script>
</body>
</html>
