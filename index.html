  PROJECT: GY-GY Club
  FILE: index.html
  VERSION: 2.2.2
  STATUS: Реализован блок из 11 языков. Фиксация атрибутов.
  MARKER: .
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { width: 100%; height: 100vh; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; }

        /* БЛОК ЯЗЫКА (11 ЯЗЫКОВ) */
        .lang-gateway { 
            position: fixed; top: 20px; left: 20px; z-index: 20000; 
            font-family: inherit;
        }
        .lang-list { 
            display: none; position: absolute; top: 100%; left: 0; 
            background: rgba(0,0,0,0.95); border: 1.5px solid var(--gold);
            list-style: none; padding: 5px 0; margin: 5px 0 0 0; min-width: 120px;
        }
        .lang-list.show { display: block; }
        .lang-item { 
            padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: 0.3s; font-size: 14px;
        }
        .lang-item:hover { background: var(--gold); color: #000; }
        
        .btn-main-lang { 
            padding: 8px 12px; background: #000; border: 1.5px solid var(--gold); 
            color: var(--gold); font-weight: 900; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; font-family: inherit;
        }

        /* ОСТАЛЬНЫЕ АТРИБУТЫ */
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 10001; font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 5px; cursor: pointer; }
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .block.active { display: flex; }
        #main-door { width: 280px; cursor: pointer; transition: 2s; z-index: 10; }
    </style>
</head>
<body onload="document.body.style.opacity=1">

    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>

    <!-- ЯЗЫКОВОЙ БЛОК (ВЕРХНИЙ ЛЕВЫЙ УГОЛ) -->
    <div class="lang-gateway">
        <button class="btn-main-lang" onclick="toggleLangs()">
            <img id="current-flag" src="https://flagcdn.com/w20/gb.png" style="width:20px;">
            <span id="current-lang">EN</span>
        </button>
        <ul class="lang-list" id="lang-list">
            <li class="lang-item" onclick="setLang('RU', 'ru')"><img src="https://flagcdn.com/w20/ru.png" width="20"> RU</li>
            <li class="lang-item" onclick="setLang('EN', 'gb')"><img src="https://flagcdn.com/w20/gb.png" width="20"> EN</li>
            <li class="lang-item" onclick="setLang('DE', 'de')"><img src="https://flagcdn.com/w20/de.png" width="20"> DE</li>
            <li class="lang-item" onclick="setLang('FR', 'fr')"><img src="https://flagcdn.com/w20/fr.png" width="20"> FR</li>
            <li class="lang-item" onclick="setLang('ES', 'es')"><img src="https://flagcdn.com/w20/es.png" width="20"> ES</li>
            <li class="lang-item" onclick="setLang('IT', 'it')"><img src="https://flagcdn.com/w20/it.png" width="20"> IT</li>
            <li class="lang-item" onclick="setLang('CN', 'cn')"><img src="https://flagcdn.com/w20/cn.png" width="20"> CN</li>
            <li class="lang-item" onclick="setLang('JP', 'jp')"><img src="https://flagcdn.com/w20/jp.png" width="20"> JP</li>
            <li class="lang-item" onclick="setLang('KR', 'kr')"><img src="https://flagcdn.com/w20/kr.png" width="20"> KR</li>
            <li class="lang-item" onclick="setLang('AR', 'sa')"><img src="https://flagcdn.com/w20/sa.png" width="20"> AR</li>
            <li class="lang-item" onclick="setLang('BY', 'by')"><img src="https://flagcdn.com/w20/by.png" width="20"> BY</li>
        </ul>
    </div>

    <div class="ui-header-right" onclick="portalTransition('block-welcome')">GY-GY</div>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <button class="btn-gy" onclick="window.location.href='registration.html'">REGISTRATION</button>
    </div>

<script>
    function toggleLangs() {
        document.getElementById('lang-list').classList.toggle('show');
    }

    function setLang(code, flag) {
        document.getElementById('current-lang').innerText = code;
        document.getElementById('current-flag').src = `https://flagcdn.com/w20/${flag}.png`;
        toggleLangs();
        alert(`Гы-гы! Теперь мы говорим на ${code}. Но юмор остался прежним.`);
    }

    function handleDoor() {
        document.getElementById('snd-door').play();
        const door = document.getElementById('main-door');
        door.style.transform = "scale(4)";
        door.style.opacity = "0";
        setTimeout(() => {
            const ambient = document.getElementById('snd-ambient');
            ambient.play();
            portalTransition('block-welcome');
        }, 1200);
    }

    function portalTransition(nextId) {
        document.querySelectorAll('.block').forEach(b => {
            b.classList.remove('active');
            b.style.display = 'none';
        });
        document.getElementById(nextId).style.display = 'flex';
        setTimeout(() => document.getElementById(nextId).classList.add('active'), 50);
    }
</script>
</body>
</html>
