<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.8.2 CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; top: 0 !important; }
        
        /* ЖЕСТКАЯ БЛОКИРОВКА ВЫПАДЕНИЯ ПАНЕЛЕЙ ГУГЛА */
        .goog-te-banner-frame, 
        .goog-te-banner, 
        .goog-te-balloon-frame,
        #goog-gt-tt, 
        .skiptranslate, 
        .goog-te-spinner-pos { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important; 
            pointer-events: none !important; 
        }
        goog-te-gadget { display: none !important; }
        .goog-text-highlight { background: transparent !important; box-shadow: none !important; }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-frame-locked {
            position: fixed; top: 15px; left: calc(110px - 5%); z-index: 9999999; 
            width: 150px; height: 36px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 10px;
            font-size: 13px;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 40px; left: -2px; 
            width: 150px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 10px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 20px; margin-right: 10px; }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
        }
        
        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            z-index: 1000000; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* КЛАСС ДЛЯ СТРАНИЦ */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .block.active { display: flex !important; opacity: 1 !important; z-index: 5000 !important; }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; cursor: not-allowed; }
        
        /* Сетка Квадратов */
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; transition: all 0.3s; }

        #block-welcome { justify-content: flex-start !important; padding-top: 12vh !important; }
        #block-welcome .quote-text { margin-bottom: 2vh !important; font-size: 24px; }
        #block-welcome img { max-height: 35vh !important; width: auto; object-fit: contain; margin-bottom: 2vh !important; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 20px; font-size: 26px; font-weight: 900 !important; 
            cursor: pointer; color: var(--gold); line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* ОКНА МОДАЛОК (ПАСПОРТ И ХАБ СВЯЗИ) */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 310px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; }

        /* Поля ввода внутри Хаба коммуникаций */
        .hub-input-group { display: flex; flex-direction: column; text-align: left; margin-bottom: 12px; width: 100%; }
        .hub-input-group label { font-size: 11px; font-weight: 900; margin-bottom: 4px; color: #333; }
        .hub-field { width: 100%; padding: 8px; border: 1px solid #333; background: #fff; font-family: 'Share Tech Mono'; font-size: 13px; color: #000; }
        .hub-toggle-lang { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 10px; font-weight: bold; color: var(--door-wood); }

        /* ХОЛЛ И ИСПРАВЛЕННЫЕ СТИЛИ */
        #block-hall { background: url('hall_bg_jpg.jpg') center/cover no-repeat #000; }
        .hall-interior { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
        
        .hall-interior .quote-text { 
            position: absolute; top: 12vh; left: 50%; transform: translateX(-50%); width: 85%; 
            text-align: center; color: var(--gold) !important; font-size: 28px; 
            background: transparent !important;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 3px 5px rgba(0,0,0,0.8);
        }
        .hall-interior .quote-text font, .hall-interior .quote-text span { background: transparent !important; }

        /* Корректные зоны картин и фиолетовые стрелки Офиса */
        .painting-zone { 
            position: absolute; top: 35vh; width: 60px; height: auto; cursor: pointer; z-index: 6; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .painting-left { left: 5vw; }
        .painting-right { right: 5vw; }

        .cue-arrow-hall { color: var(--violet); font-size: 32px; font-weight: 900; text-shadow: 0 0 12px var(--violet); display: block; text-align: center; }
        
        .manifest-btn-box { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); width: 140px; display: flex; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s, bottom 0.4s; z-index: 10; }
        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; background: #000; }

        /* Чиним Дверь и Стрелку Бара прямо по центру двери */
        .hall-door-target { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30vw; height: 60vh; cursor: pointer; z-index: 5; 
            display: flex; align-items: center; justify-content: center;
        }
        #hall-doors::before {
            content: "↓"; color: var(--violet); font-size: 42px; font-weight: 900; text-shadow: 0 0 15px var(--violet); position: absolute; top: 40%;
        }

        .main-door-style { display: block; height: calc(50vh + 20px); width: auto; max-width: 100%; object-fit: contain; margin: 0 auto; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease-out; cursor: pointer; }
        .door-exploded { transform: scale(3.5) !important; opacity: 0 !important; }
    </style>
</head>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({ 
            pageLanguage: 'en', 
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja', 
            autoDisplay: false 
        }, 'google_translate_element');
    }

    let currentID = "";
    let currentActiveCode = 'en';
    let currentUserImage = "";
    let currentFlagCode = 'gb';
    let currentBlockId = 'block-entrance';
    
    let commsData = { telegram: "", whatsapp: "", email: "", tgTranslate: true, waTranslate: true };

    const allLangs = [
        {n:'ENGLISH', c:'gb', code:'en'}, {n:'DEUTSCH', c:'de', code:'de'}, {n:'ESPAÑOL', c:'es', code:'es'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
        {n:'ITALIANO', c:'it', code:'it'}, {n:'POLSKI', c:'pl', code:'pl'}, {n:'PORTUGUÊС', c:'pt', code:'pt'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
        {n:'TÜRKЧЕ', c:'tr', code:'tr'}, {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
    ];

    function renderLangList() {
        const container = document.getElementById('lang-list-container');
        if (!container) return; container.innerHTML = ''; 
        allLangs.forEach(lang => {
            if(lang.code === currentActiveCode) return; 
            const div = document.createElement('div'); div.className = 'lang-item notranslate'; div.setAttribute('translate', 'no');
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"><span>${lang.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
            container.appendChild(div);
        });
    }

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }
    function safeStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

    function applyLanguage(lang) {
        currentActiveCode = lang.code; currentFlagCode = lang.c; 
        safeStorageSet('gygy_flag', lang.c); safeStorageSet('gygy_lang', lang.code);
        
        const activeDisplay = document.getElementById('active-lang-display');
        if (activeDisplay) { activeDisplay.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> <span>${lang.n}</span>`; }
        const badgeFlagImg = document.getElementById('badge-flag-img');
        if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${lang.c}.png`;
        
        if (document.getElementById('lang-list-container')) document.getElementById('lang-list-container').style.display = 'none';
        renderLangList(); forceTriggerGoogleTranslate(lang.code);

        const rawPassport = safeStorageGet('gygy_passport');
        if (rawPassport) {
            const passport = JSON.parse(rawPassport); passport.lang = currentActiveCode; passport.flagCode = currentFlagCode;
            safeStorageSet('gygy_passport', JSON.stringify(passport));
        }
    }

    function forceTriggerGoogleTranslate(langCode) {
        if (window.langTimer) clearInterval(window.langTimer);
        let attempts = 0;
        window.langTimer = setInterval(() => {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                clearInterval(window.langTimer);
                if (selectEl.value === langCode) return;
                selectEl.value = langCode; selectEl.dispatchEvent(new Event('change', { bubbles: true }));
            }
            if (++attempts > 100) clearInterval(window.langTimer);
        }, 100);
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function toggleManifest(boxId) {
        document.querySelectorAll('.manifest-btn-box').forEach(box => {
            if(box.id === boxId) {
                const isOpened = box.getAttribute('data-opened') === "true";
                box.style.opacity = isOpened ? "0" : "1"; box.style.pointerEvents = isOpened ? "none" : "auto";
                box.setAttribute('data-opened', isOpened ? "false" : "true"); box.style.bottom = isOpened ? "-50px" : "-35px";
            } else {
                box.style.opacity = "0"; box.style.pointerEvents = "none"; box.setAttribute('data-opened', "false"); box.style.bottom = "-50px";
            }
        });
    }

    function openCommsHub() {
        document.getElementById('hub-tg').value = commsData.telegram;
        document.getElementById('hub-wa').value = commsData.whatsapp;
        document.getElementById('hub-mail').value = commsData.email;
        document.getElementById('hub-tg-trans').checked = commsData.tgTranslate;
        document.getElementById('hub-wa-trans').checked = commsData.waTranslate;

        const modal = document.getElementById('modal-comms-hub');
        modal.style.display = 'flex'; setTimeout(() => { modal.style.opacity = '1'; }, 10);
    }

    function closeCommsHub() {
        const modal = document.getElementById('modal-comms-hub');
        modal.style.opacity = '0'; setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    function applyCommsHubData() {
        commsData.telegram = document.getElementById('hub-tg').value.trim().replace(/^@+/, "");
        commsData.whatsapp = document.getElementById('hub-wa').value.trim().replace(/[+\s()]/g, "");
        commsData.email = document.getElementById('hub-mail').value.trim();
        commsData.tgTranslate = document.getElementById('hub-tg-trans').checked;
        commsData.waTranslate = document.getElementById('hub-wa-trans').checked;

        const box = document.getElementById('comms-hub-box');
        const statusTxt = document.getElementById('txt-hub-status');
        
        if (commsData.telegram || commsData.whatsapp || commsData.email) {
            box.style.borderColor = "#00FF00";
            box.style.boxShadow = "0 0 12px rgba(0,255,0,0.5)";
            statusTxt.innerHTML = "COMMS<br><span style='color:#00FF00;'>READY</span><br><small style='color:#00FF00;font-size:7px;'>AI TRANSLATE</small>";
        } else {
            box.style.borderColor = "var(--gold)"; box.style.boxShadow = "none";
            statusTxt.innerHTML = "COMMS<br>HUB<br><small style='color:var(--violet); font-size:8px;'>12 LANGS</small>";
        }
        closeCommsHub();
    }

    function renderUserPassports(targetID) {
        const idLabel = document.getElementById('id-label');
        const passIdVal = document.getElementById('pass-id-val');
        const qrBoxReg = document.getElementById('qr-box-reg');
        const passQrBox = document.getElementById('pass-qr-box');
        const passActiveComms = document.getElementById('pass-active-comms');

        if (idLabel) idLabel.innerText = targetID;
        if (passIdVal) passIdVal.innerText = targetID;
        
        if (passActiveComms) {
            let icons = [];
            if (commsData.telegram) icons.push("✈️TG");
            if (commsData.whatsapp) icons.push("💬WA");
            if (commsData.email) icons.push("✉️MAIL");
            passActiveComms.innerText = icons.length ? `ACTIVE CODES: ${icons.join(' | ')}` : "NO MATRIX CONNECTED";
        }

        if (qrBoxReg && typeof QRCode !== 'undefined') { qrBoxReg.innerHTML = ""; new QRCode(qrBoxReg, { text: targetID, width: 85, height: 85 }); }
        if (passQrBox && typeof QRCode !== 'undefined') { passQrBox.innerHTML = ""; new QRCode(passQrBox, { text: targetID, width: 100, height: 100 }); }
    }

    function checkAndFillRegistrationForm() {
        const rawPassport = safeStorageGet('gygy_passport');
        if (rawPassport) {
            const passport = JSON.parse(rawPassport);
            currentID = passport.id; currentUserImage = passport.avatar;
            currentActiveCode = passport.lang; currentFlagCode = passport.flagCode || 'gb';
            if (passport.comms) commsData = passport.comms;
        } else {
            currentUserImage = safeStorageGet('gygy_avatar');
            currentID = safeStorageGet('gygy_id');
            currentActiveCode = safeStorageGet('gygy_lang') || 'en';
            currentFlagCode = safeStorageGet('gygy_flag') || 'gb';
        }

        if (!currentID) currentID = 'GY-' + Math.random().toString(36).substr(2, 9).toUpperCase();

        let matchedLang = allLangs.find(l => l.code === currentActiveCode);
        if (matchedLang) {
            const activeDisplay = document.getElementById('active-lang-display');
            if (activeDisplay) activeDisplay.innerHTML = `<img src="https://flagcdn.com/w40/${matchedLang.c}.png" class="flag-icon"> <span>${matchedLang.n}</span>`;
            const badgeFlagImg = document.getElementById('badge-flag-img');
            if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${matchedLang.c}.png`;
            forceTriggerGoogleTranslate(matchedLang.code);
        }

        renderUserPassports(currentID);
        
        if (commsData.telegram || commsData.whatsapp || commsData.email) {
            const box = document.getElementById('comms-hub-box');
            const statusTxt = document.getElementById('txt-hub-status');
            if (box && statusTxt) {
                box.style.borderColor = "#00FF00";
                statusTxt.innerHTML = "COMMS<br><span style='color:#00FF00;'>READY</span><br><small style='color:#00FF00;font-size:7px;'>AI TRANSLATE</small>";
            }
        }

        if (currentUserImage) {
            const badgeImg = document.getElementById('badge-avatar-img');
            const passImg = document.getElementById('pass-avatar-img');
            if (badgeImg) badgeImg.src = currentUserImage;
            if (passImg) passImg.src = currentUserImage;

            if (currentUserImage.startsWith('data:image/svg+xml')) {
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) { avatarImg.src = currentUserImage; avatarImg.style.display = "block"; }
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = "none";
            } else { 
                const ppImg = document.getElementById('pp'); if (ppImg) { ppImg.src = currentUserImage; ppImg.style.display = "block"; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = "none";
            }
            if(document.getElementById('btn-w-hall')) document.getElementById('btn-w-hall').classList.remove('btn-sleep');
            if(document.getElementById('btn-pass')) document.getElementById('btn-pass').classList.remove('btn-sleep');
        }
    }

    function saveUserProfile() {
        if (!currentUserImage) return;

        const gygy_passport = {
            id: currentID, nickname: currentID, avatar: currentUserImage,
            lang: currentActiveCode, flagCode: currentFlagCode,
            comms: commsData 
        };

        safeStorageSet('gygy_passport', JSON.stringify(gygy_passport));
        safeStorageSet('gygy_avatar', currentUserImage); safeStorageSet('gygy_id', currentID);

        const badgeImg = document.getElementById('badge-avatar-img');
        const passImg = document.getElementById('pass-avatar-img');
        if (badgeImg) badgeImg.src = currentUserImage;
        if (passImg) passImg.src = currentUserImage;

        renderUserPassports(currentID);

        const badge = document.getElementById('global-user-badge');
        if (badge) badge.style.display = 'block';

        if (document.getElementById('btn-w-hall')) document.getElementById('btn-w-hall').classList.remove('btn-sleep');
        if (document.getElementById('btn-pass')) document.getElementById('btn-pass').classList.remove('btn-sleep');
    }

    function enterStudio() { window.location.href = 'studio.html'; }
    function openPassport() { const modal = document.getElementById('modal-passport'); if (modal) { modal.style.display = 'flex'; setTimeout(() => { modal.style.opacity = '1'; }, 10); } }
    function closePassport() { const modal = document.getElementById('modal-passport'); if (modal) { modal.style.opacity = '0'; setTimeout(() => { modal.style.display = 'none'; }, 300); } }

    function handleNavigationBack() {
        if (currentBlockId === 'block-hall') portalTransition('block-identity');
        else if (currentBlockId === 'block-identity') portalTransition('block-welcome');
        else if (currentBlockId === 'block-welcome') portalTransition('block-entrance');
    }

    function portalTransition(nextId) {
        if (nextId === 'block-server') { window.location.href = 'verses.html'; return; }
        if (nextId === 'block-bar') { window.location.href = 'bar.html'; return; }
        if (nextId === 'block-office') { window.location.href = 'office.html'; return; }

        const targetBlock = document.getElementById(nextId);
        if (!targetBlock) return; currentBlockId = nextId;

        const badge = document.getElementById('global-user-badge');
        const langSwitcher = document.getElementById('lang-switcher');
        const navArrows = document.getElementById('club-nav-arrows');

        if (nextId === 'block-entrance') {
            if (document.getElementById('main-door')) document.getElementById('main-door').classList.remove('door-exploded');
            if (langSwitcher) langSwitcher.style.display = 'flex';
            if (navArrows) navArrows.style.display = 'none';
            if (badge) badge.style.display = 'none';
        } else {
            if (navArrows) navArrows.style.display = 'flex';
            if (badge && currentUserImage) badge.style.display = 'block';
            if (nextId === 'block-welcome' || nextId === 'block-identity' || nextId === 'block-hall') {
                if (langSwitcher) langSwitcher.style.display = 'none';
            } else {
                if (langSwitcher) langSwitcher.style.display = 'flex';
            }
        }

        document.querySelectorAll('.block').forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
        targetBlock.style.display = 'flex'; setTimeout(() => { targetBlock.classList.add('active'); }, 20);
    }

    function handleDoor() {
        const sndDoor = document.getElementById('snd-door');
        const sndAmbient = document.getElementById('snd-ambient');
        if (sndDoor) sndDoor.play();
        if (document.getElementById('main-door')) document.getElementById('main-door').classList.add('door-exploded');

        setTimeout(() => {
            if (sndAmbient) { sndAmbient.volume = 0.5; sndAmbient.play().catch(e => {}); }
            portalTransition('block-welcome');
        }, 700);
    }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUserImage = e.target.result;
                if (document.getElementById('pp')) { document.getElementById('pp').src = currentUserImage; document.getElementById('pp').style.display = 'block'; }
                if (document.getElementById('txt-photo')) document.getElementById('txt-photo').style.display = 'none';
                if (document.getElementById('avatar-img')) document.getElementById('avatar-img').style.display = 'none';
                if (document.getElementById('txt-avatar')) document.getElementById('txt-avatar').style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function generateAvatar() {
        const hex = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><rect width="100" height="100" fill="#${hex}"/><circle cx="50" cy="40" r="20" fill="#000"/><path d="M20,90 C20,70 80,70 80,90" fill="#000"/></svg>`;
        currentUserImage = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
        if (document.getElementById('avatar-img')) { document.getElementById('avatar-img').src = currentUserImage; document.getElementById('avatar-img').style.display = "block"; }
        if (document.getElementById('txt-avatar')) document.getElementById('txt-avatar').style.display = "none";
        if (document.getElementById('pp')) document.getElementById('pp').style.display = "none";
        if (document.getElementById('txt-photo')) document.getElementById('txt-photo').style.display = "block";
    }

    window.addEventListener('load', () => {
        renderLangList(); checkAndFillRegistrationForm(); document.body.classList.add('page-loaded');
    });
</script>
