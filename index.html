<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY v4.7.5 (.)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --frame-w: 210px; --frame-h: 46px; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { 
            width: 100%; height: 100dvh; background: var(--bg); color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; 
        }

        /* HEADER (.) */
        .ui-header { 
            position: absolute; top: 20px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 10000; 
        }
        .frame { border: 2px solid var(--gold); height: var(--frame-h); display: flex; align-items: center; background: var(--bg); position: relative; }
        
        /* ЛЕВО: ЯЗЫКИ (.) */
        .lang-wrapper { width: var(--frame-w); }
        .lang-active { width: 100%; height: 100%; padding: 0 12px; cursor: pointer; display: flex; align-items: center; font-size: 13px; }
        .lang-active img { width: 22px; margin-right: 10px; border: 1px solid rgba(212,175,55,0.3); }
        .lang-dropdown { 
            display: none; position: absolute; top: 44px; left: -2px; width: calc(var(--frame-w) + 4px); 
            background: var(--bg); border: 2px solid var(--gold); border-top: none; max-height: 40dvh; overflow-y: auto; 
        }
        .lang-wrapper:hover .lang-dropdown { display: block; }
        .l-item { padding: 10px 12px; display: flex; align-items: center; cursor: pointer; font-size: 12px; }
        .l-item:hover { background: rgba(212, 175, 55, 0.15); }
        .l-item img { width: 18px; margin-right: 10px; }

        /* ПРАВО: ЛОГО И СТРЕЛКА (.) */
        .ui-right-group { display: flex; gap: 15px; }
        .logo-frame { width: 140px; justify-content: center; font-size: 20px; font-weight: 900; letter-spacing: 3px; }
        
        /* СТРЕЛКА ВОЗВРАТА (КОНСТАНТА) (.) */
        .back-btn { 
            width: 50px; justify-content: center; cursor: pointer; font-size: 24px; 
            transition: 0.3s; display: none; /* Скрыта на главном экране */
        }
        .back-btn:active { background: var(--gold); color: #000; }

        /* КОНТЕНТ (.) */
        .block { 
            position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; 
            padding-top: 100px; opacity: 0; transition: 0.6s ease-in-out; background: var(--bg);
        }
        .active { display: flex !important; opacity: 1; z-index: 50; }

        .btn-gy { width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; }
        .btn-sleep { opacity: 0.2; pointer-events: none; }
        
        #main-door { height: 40dvh; cursor: pointer; transition: 2s; }
        .id-card-hall { width: 240px; padding: 20px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; color: #000; text-align: center; }
        .box-final { width: 85px; height: 85px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 10px auto; overflow: hidden; }

        /* СКРЫТЫЙ GOOGLE TRANSLATE */
        #google_translate_element { display: none; }
    </style>
</head>
<body>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div class="ui-header">
        <div class="lang-wrapper frame">
            <div class="lang-active" id="cur-l"><img src="https://flagcdn.com/w40/gb.png"> <span>ENGLISH</span></div>
            <div class="lang-dropdown" id="l-list"></div>
        </div>
        <div class="ui-right-group">
            <div class="back-btn frame" id="global-back" onclick="goBack()">←</div>
            <div class="logo-frame frame">GY-GY</div>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div style="font-family:'Playfair Display'; font-style:italic; margin-bottom:20px;">«В каждой шутке есть доля виски»</div>
        <img src="horse_welcome.png" style="height:35dvh;">
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПОЛУЧИТЬ ID</button>
    </div>

    <div id="block-identity" class="block">
        <div id="qr-box-reg" class="box-final"></div>
        <div id="id-label" style="margin-bottom:15px;">#ID-LOADING</div>
        <button class="btn-gy" onclick="generateAvatar()">СГЕНЕРИРОВАТЬ АВАТАР</button>
        <button class="btn-gy" onclick="saveAndPass()">СОХРАНИТЬ И ВОЙТИ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900;">#ID</div>
            <div id="h-photo-box" class="box-final" style="border-color:#000;">
                <img id="h-photo" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <button class="btn-gy" style="border-color:#000; color:#000; width:100%;" onclick="portalTransition('block-bar')">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <img src="horse_bar.png" style="height:50dvh;">
        <button class="btn-gy" onclick="portalTransition('block-tables')">ЗА СТОЛИКИ</button>
    </div>

    <div id="block-tables" class="block">
        <div style="font-size:24px;">ЛОКАЦИЯ: СТОЛИКИ</div>
        </div>

    <script>
        let history = ['block-entrance'];
        let currentID = localStorage.getItem('gy_id') || "";

        // ИНИЦИАЛИЗАЦИЯ ЯЗЫКОВ (.)
        const langs = [
            {n:'ENGLISH', c:'gb', l:'en'}, {n:'РУССКИЙ', c:'ru', l:'ru'}, {n:'UKRAINIAN', c:'ua', l:'uk'}
            // ... остальные 9 языков добавляются аналогично
        ];
        const list = document.getElementById('l-list');
        langs.forEach(l => {
            const d = document.createElement('div'); d.className = 'l-item';
            d.innerHTML = `<img src="https://flagcdn.com/w40/${l.c}.png"> <span>${l.n}</span>`;
            d.onclick = () => { changeLang(l); };
            list.appendChild(d);
        });

        function changeLang(l) {
            document.getElementById('cur-l').innerHTML = `<img src="https://flagcdn.com/w40/${l.c}.png"> <span>${l.n}</span>`;
            const select = document.querySelector('.goog-te-combo');
            if(select) { select.value = l.l; select.dispatchEvent(new Event('change')); }
        }

        function portalTransition(nextId, isBack = false) {
            const current = document.querySelector('.block.active');
            current.classList.remove('active');
            
            const next = document.getElementById(nextId);
            next.classList.add('active');

            if(!isBack) history.push(nextId);
            
            // Управление стрелкой возврата
            document.getElementById('global-back').style.display = (nextId === 'block-entrance') ? 'none' : 'flex';
            
            if(nextId === 'block-bar') { document.getElementById('snd-ambient').play(); }
        }

        function goBack() {
            if(history.length > 1) {
                history.pop();
                portalTransition(history[history.length - 1], true);
            }
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').style.transform = "scale(8)";
            document.getElementById('main-door').style.opacity = "0";

            if(!currentID) {
                currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            }
            
            document.getElementById('id-label').innerText = currentID;
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            
            setTimeout(() => { portalTransition('block-welcome'); }, 1500);
        }

        function generateAvatar() {
            const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
            const img = document.getElementById('h-photo');
            img.src = url; img.style.display = "block";
            localStorage.setItem('gy_avatar', url);
        }

        function saveAndPass() {
            localStorage.setItem('gy_id', currentID);
            document.getElementById('h-id').innerText = currentID;
            portalTransition('block-hall');
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
