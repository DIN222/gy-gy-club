<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v.4.8.8 | TOTAL MONOLITH</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: var(--gold); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        /* . ПОСТОЯННЫЕ АТРИБУТЫ */
        .ui-fixed { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .gy-logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; cursor: default; }
        .btn-gy { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-family: inherit; font-weight: 900; transition: 0.3s; }
        .btn-gy:active { background: var(--gold); color: #000; }
        .btn-sleep { opacity: 0.2; pointer-events: none; }
        
        /* КОНТЕЙНЕР СБОРКИ */
        #app-stage { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        
        /* ГРАФИКА */
        .img-door { max-height: 40vh; cursor: pointer; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s; }
        .img-horse { max-height: 30vh; margin-bottom: 20px; }
        
        /* СЕТКА ID (4 КВАДРАТА) */
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .box-slot { width: 95px; height: 95px; border: 1.2px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; text-align: center; background: rgba(212, 175, 55, 0.03); }
        .box-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        .quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; margin-bottom: 25px; text-align: center; max-width: 80%; }
        
        .lang-panel { position: absolute; top: 65px; left: 20px; background: #000; border: 1px solid var(--gold); display: none; flex-direction: column; z-index: 1001; }
        .lang-panel.active { display: flex; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- . HEADER: ПОСТОЯННЫЕ АТРИБУТЫ -->
    <header class="ui-fixed">
        <div class="lang-gate">
            <button class="btn-gy" onclick="Agent.toggleLang()">ЯЗЫК / LANG</button>
            <div id="lang-list" class="lang-panel">
                <button class="btn-gy" onclick="Agent.setLang('RU')">RU</button>
                <button class="btn-gy" onclick="Agent.setLang('EN')">EN</button>
            </div>
        </div>
        <div class="gy-logo">GY-GY</div>
        <button id="nav-back" class="btn-gy" style="visibility:hidden;" onclick="Agent.goBack()">← НАЗАД</button>
    </header>

    <main id="app-stage"></main>

    <script src="core-agent.js"></script>
</body>
</html>
