<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY 009| Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-core.css">
    <style>
        /* Базовые стили первой страницы */
        * { -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; height: 100%; background: #000; margin: 0; padding: 0; 
            overflow: hidden; font-family: 'Share Tech Mono', monospace; 
        }

        /* Логотип: строго 35px, 20px сверху, 30px справа */
        .fixed-header { 
            position: fixed; top: 20px; right: 30px; z-index: 10000; 
        }
        .logo-text { 
            font-size: 35px; font-weight: 900; color: #D4AF37; letter-spacing: 4px; 
            text-transform: uppercase; line-height: 1;
        }

        /* Контейнер языка: строго 20px сверху, 25px слева */
        .lang-container { 
            position: fixed; top: 20px; left: 25px; z-index: 10000; 
            user-select: none;
        }
        .lang-trigger { 
            border: 1px solid #D4AF37; background: rgba(0,0,0,0.8); padding: 5px 10px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; 
            width: 110px; justify-content: space-between;
        }
        .lang-label { font-weight: 900; color: #D4AF37; font-size: 14px; }
        
        .lang-panel { 
            display: none; position: absolute; top: 100%; left: 0; 
            width: 132px; background: #000; border: 1px solid #D4AF37; border-top: none; 
            max-height: 400px; overflow-y: auto;
        }

        /* Стили дверей (твои оригинальные) */
        .door-zone {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        /* Здесь добавь свои стили для анимации дверей, если они в этом файле */

    </style>
</head>
<body oncontextmenu="return false;">

    <header class="fixed-header">
        <div class="logo-text">GY-GY</div>
    </header>

    <div class="lang-container" id="gy-lang-root">
        <div class="lang-trigger" onclick="toggleMenu()">
            <div style="display: flex; align-items: center; gap: 8px;">
                <img src="" id="current-lang-flag" width="25"> 
                <span id="current-lang-label" class="lang-label">RU</span>
            </div>
            <span style="font-size: 10px; color: #D4AF37;">▼</span>
        </div>
        <div id="lang-list-12" class="lang-panel">
            </div>
    </div>

    <main class="door-zone">
        <div id="door-left"></div>
        <div id="door-right"></div>
        <div onclick="location.href='welcome.html'" style="cursor:pointer; color:#D4AF37; border:2px solid #D4AF37; padding:15px 30px; z-index:10;">
            ENTER
        </div>
    </main>

    <script>
        // Локальное управление меню (чтобы не зависеть от внешних настроек)
        function toggleMenu() {
            const list = document.getElementById('lang-list-12');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }

        // Закрытие при клике мимо
        document.addEventListener('click', (e) => {
            if (!document.getElementById('gy-lang-root').contains(e.target)) {
                document.getElementById('lang-list-12').style.display = 'none';
            }
        });

        // Словарь для главной (если нужно что-то переводить на этой странице)
        const dictionary = {
            ru: { enter: "ВХОД" },
            en: { enter: "ENTER" }
        };
    </script>

    <script src="shared-logic.js"></script>
</body>
</html>
