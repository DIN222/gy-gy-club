<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY CLUB | v8.5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #000; --paper: #f5f5dc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ (Всегда сверху) */
        .header { position: fixed; top: 0; width: 100%; height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 2000; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(212,175,55,0.1); }
        .logo-wrap img { height: 40px; }
        .nav-tools { display: flex; align-items: center; gap: 10px; }
        
        .btn-tool { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .lang-drop { display: none; position: absolute; top: 65px; right: 15px; background: #000; border: 1px solid var(--gold); width: 160px; z-index: 2001; }
        .lang-drop.show { display: block; }
        .lang-option { width: 100%; padding: 10px; border: none; border-bottom: 1px solid rgba(212,175,55,0.1); background: none; color: var(--gold); text-align: left; cursor: pointer; font-family: inherit; }

        /* ЭКРАНЫ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.5s ease-in-out; }
        .active { display: flex !important; opacity: 1; }

        /* КОНЬ И ПОДСВЕТКА */
        .horse-scene { position: relative; width: 240px; height: 240px; margin-bottom: 20px; }
        .horse-asset { width: 100%; z-index: 10; position: relative; }
        .glow-circle { position: absolute; inset: 10%; background: radial-gradient(circle, rgba(212, 175, 55, 0.45) 0%, transparent 70%); border-radius: 50%; animation: pulse-gold 4s infinite ease-in-out; }
        @keyframes pulse-gold { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.4); opacity: 0.7; } }

        /* КНОПКИ И ТЕКСТ */
        .btn-gy { min-width: 280px; padding: 18px; border: 1.5px solid var(--gold); background: none; color: var(--gold); cursor: pointer; margin: 8px; font-family: inherit; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; position: relative; }
        .btn-gy:active { background: var(--gold); color: #000; }
        .btn-sleep { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        #quote { font-family: 'Playfair Display', serif; font-size: 1.6rem; text-align: center; font-style: italic; margin-bottom: 30px; line-height: 1.3; }

        /* ХОЛЛ: КАРТОЧКА */
        .card { background: var(--paper); color: #000; padding: 25px; border: 4px double var(--gold); width: 300px; text-align: center; box-shadow: 0 0 40px rgba(212,175,55,0.2); }
        .av-holder { position: relative; width: 130px; height: 130px; border: 3px solid #000; margin: 0 auto 15px; background: #fff; }
        .av-img { width: 100%; height: 100%; object-fit: cover; }
        .flag-mark { position: absolute; bottom: -8px; right: -8px; width: 40px; border: 2px solid var(--paper); }
        .qr-area { background: #fff; padding: 5px; margin: 15px 0; display: inline-block; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-wrap"><img src="logo.png" alt="GY-GY"></div>
        <div class="nav-tools">
            <button class="btn-tool" onclick="historyBack()">←</button>
            <button class="btn-tool" id="lang-btn">
                <img id="cur-flag" src="https://flagcdn.com/w20/gb.png" width="18"> <span id="cur-name">EN</span>
            </button>
        </div>
        <div id="lang-menu" class="lang-drop"></div>
    </header>

    <section id="scr-entry" class="screen active">
        <img src="door_1.jpg" id="gate" onclick="unlock()" style="width:280px; cursor:pointer; transition:1.2s;">
    </section>

    <section id="scr-welcome" class="screen">
        <div class="horse-scene">
            <div class="glow-circle"></div>
            <img src="horse.png" class="horse-asset">
        </div>
        <h2 id="quote" data-key="q_whiskey">...</h2>
        <button class="btn-gy" onclick="go('scr-reg')" data-key="btn_get_id">GET ID TOKEN</button>
        <button class="btn-gy btn-sleep" id="to-hall-btn" onclick="go('scr-hall')" data-key="btn_to_hall">PROCEED</button>
    </section>

    <section id="scr-reg" class="screen">
        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <div id="av-trigger" onclick="genAv()" style="width:110px; height:110px; border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;">
                <img id="temp-img" style="display:none; width:100%;">
                <span data-key="label_avatar">AVATAR</span>
            </div>
            <div id="qr-reg" style="background:#fff; padding:5px; width:110px; height:110px;"></div>
        </div>
        <div style="font-size:1.4rem; margin-bottom:20px;">ID: <span id="id-val">#000</span></div>
        <button class="btn-gy" onclick="save()" data-key="btn_save">SAVE PROFILE</button>
    </section>

    <section id="scr-hall" class="screen">
        <div class="card">
            <div class="av-holder">
                <img id="hall-av" class="av-img">
                <img id="hall-flag" class="flag-mark">
            </div>
            <div id="hall-id" style="font-weight:900; font-size:1.2rem;">#GY-000</div>
            <div id="qr-hall" class="qr-area"></div>
            <button class="btn-gy" style="min-width:100%; color:#000; border-color:#000;" onclick="go('scr-bar')" data-key="btn_enter">ENTER BAR</button>
        </div>
    </section>

    <section id="scr-bar" class="screen">
        <img src="horse.png" style="width:100px; opacity:0.3; margin-bottom:30px;">
        <h1 data-key="bar_title">GY-GY BAR</h1>
        <button class="btn-gy" data-key="btn_whiskey">WHISKEY LIST</button>
        <button class="btn-gy" onclick="location.reload()" data-key="btn_exit">EXIT</button>
    </section>

    <script>
        const langs = {
            en: { f: 'gb', n: 'EN', q_whiskey: "«Every joke has a grain of whiskey»", btn_get_id: "GET ID TOKEN", btn_to_hall: "PROCEED", btn_save: "SAVE PROFILE", btn_enter: "ENTER BAR", label_avatar: "AVATAR", bar_title: "BAR INTERIOR", btn_whiskey: "WHISKEY", btn_exit: "LOG OUT" },
            ru: { f: 'ru', n: 'RU', q_whiskey: "«В каждой шутке есть доля виски»", btn_get_id: "ПОЛУЧИТЬ ID", btn_to_hall: "В ХОЛЛ", btn_save: "СОХРАНИТЬ", btn_enter: "В БАР", label_avatar: "АВАТАР", bar_title: "ИНТЕРЬЕР БАРА", btn_whiskey: "ВИСКИ", btn_exit: "ВЫХОД" }
            // Дополнительные языки добавляются в этот массив
        };

        let db = { lang: 'en', id: null, photo: null, history: ['scr-entry'] };

        window.onload = () => {
            // Сенсор языка
            const sys = navigator.language.split('-')[0];
            initLang(langs[sys] ? sys : 'en');
            
            // Меню языков
            const m = document.getElementById('lang-menu');
            Object.keys(langs).forEach(k => {
                const b = document.createElement('button');
                b.className = 'lang-option';
                b.innerHTML = `<img src="https://flagcdn.com/w20/${langs[k].f}.png"> ${langs[k].n}`;
                b.onclick = () => { initLang(k); m.classList.remove('show'); };
                m.appendChild(b);
            });
            document.getElementById('lang-btn').onclick = (e) => { e.stopPropagation(); m.classList.toggle('show'); };

            // Восстановление сессии
            const saved = localStorage.getItem('gy_v85');
            if(saved) { db = JSON.parse(saved); document.getElementById('to-hall-btn').classList.remove('btn-sleep'); updateAll(); }
        };

        function initLang(l) {
            db.lang = l;
            const d = langs[l];
            document.getElementById('cur-flag').src = `https://flagcdn.com/w20/${d.f}.png`;
            document.getElementById('cur-name').innerText = d.n;
            document.querySelectorAll('[data-key]').forEach(el => {
                const k = el.getAttribute('data-key');
                if(d[k]) el.innerText = d[k];
            });
            localStorage.setItem('gy_lang', l);
        }

        function unlock() {
            new Audio('door.mp3').play().catch(()=>{});
            const g = document.getElementById('gate');
            g.style.transform = "scale(6) rotate(15deg)"; g.style.opacity = "0";
            setTimeout(() => go('scr-welcome'), 800);
        }

        function go(id) {
            db.history.push(id);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-reg' && !db.id) {
                db.id = "GY-" + Math.floor(Math.random()*900 + 100);
                document.getElementById('id-val').innerText = db.id;
                new QRCode(document.getElementById("qr-reg"), { text: db.id, width: 100, height: 100 });
            }
        }

        function historyBack() {
            if(db.history.length > 1) { db.history.pop(); go(db.history.pop()); }
        }

        function genAv() {
            db.photo = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
            const i = document.getElementById('temp-img');
            i.src = db.photo; i.style.display = "block";
        }

        function save() {
            if(!db.photo) return;
            localStorage.setItem('gy_v85', JSON.stringify(db));
            updateAll(); go('scr-hall');
        }

        function updateAll() {
            document.getElementById('hall-av').src = db.photo;
            document.getElementById('hall-id').innerText = "#" + db.id;
            document.getElementById('hall-flag').src = `https://flagcdn.com/w20/${langs[db.lang].f}.png`;
            const hqr = document.getElementById('qr-hall'); hqr.innerHTML = "";
            new QRCode(hqr, { text: db.id, width: 80, height: 80 });
        }

        window.onclick = () => document.getElementById('lang-menu').classList.remove('show');
    </script>
</body>
</html>
