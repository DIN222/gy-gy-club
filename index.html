<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB 005</title>
    <link rel="stylesheet" href="shared-core.css">
    <style>
        body { background: #000; overflow: hidden; margin: 0; }
        .portal-zone { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; cursor: pointer; 
        }
        #main-door { 
            width: 60%; max-width: 350px; 
            transition: opacity 0.8s ease, transform 0.8s ease; 
        }
        .door-open { transform: scale(1.1); opacity: 0; }
    </style>
</head>
<body>

    <audio id="door-audio" src="door_open.mp3" preload="auto"></audio>

    <main class="portal-zone" onclick="enterClub()">
        <img src="door_1.jpg" id="main-door">
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function enterClub() {
            const doorAudio = document.getElementById('door-audio');
            
            // 1. Звук двери
            if (doorAudio) doorAudio.play();

            // 2. ПРИНУДИТЕЛЬНЫЙ ЗАПУСК ФОНА БАРА
            // Клик по двери - это легальное взаимодействие, которое разблокирует звук
            if (typeof playZoneSound === 'function') {
                playZoneSound(0.4, 0.1); // Включаем тихо сразу при клике
            }

            document.getElementById('main-door').classList.add('door-open');

            setTimeout(() => {
                location.href = 'welcome.html';
            }, 1000);
        }
    </script>
</body>
</html>
