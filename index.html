<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB 005</title>
    <link rel="stylesheet" href="shared-core.css">
    <link rel="preload" href="door_open.mp3" as="audio">
</head>
<body>

    <audio id="door-audio" src="door_open.mp3" preload="auto"></audio>

    <div class="lang-container">
        <div class="lang-trigger">
            <img src="https://flagcdn.com/w40/ru.png" id="current-lang-flag"> 
            <span id="current-lang-label">РУССКИЙ</span>
        </div>
        <div class="lang-panel">
            <button class="lang-btn" onclick="setLanguage('ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button class="lang-btn" onclick="setLanguage('en')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button class="lang-btn" onclick="setLanguage('ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="setLanguage('pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button class="lang-btn" onclick="setLanguage('de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
            <button class="lang-btn" onclick="setLanguage('fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
            <button class="lang-btn" onclick="setLanguage('it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
            <button class="lang-btn" onclick="setLanguage('es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
            <button class="lang-btn" onclick="setLanguage('cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
            <button class="lang-btn" onclick="setLanguage('jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
            <button class="lang-btn" onclick="setLanguage('ae')"><img src="https://flagcdn.com/w20/ae.png"> العربية</button>
            <button class="lang-btn" onclick="setLanguage('br')"><img src="https://flagcdn.com/w20/br.png"> PORTUGUÊS</button>
        </div>
    </div>

    <header class="fixed-header">
        <div class="logo-link">
            <div class="logo-text">GY-GY</div>
        </div>
    </header>

    <main class="portal-zone">
        <img src="door_1.jpg" id="main-door" onclick="enterClub()">
    </main>

  <script src="shared-logic.js"></script>
<script>
    const doorsDict = {
        en: { doors_slogan: "STYLE IS THE ONLY JOKE", enter_btn: "ENTER" },
        ru: { doors_slogan: "СТИЛЬ — ЭТО ЕДИНСТВЕННАЯ ШУТКА", enter_btn: "ВОЙТИ" }
    };

    document.addEventListener('DOMContentLoaded', () => {
        // 1. Принудительный English при первом входе
        if (!localStorage.getItem('gy_lang')) localStorage.setItem('gy_lang', 'en');
        
        // 2. Рисуем только выбор языка
        renderDoorsLangOnly(); 
        applyTranslations(doorsDict);

        // 3. Исправляем клик: находим дверь по ID или классу
        const doorBtn = document.getElementById('main-door') || document.querySelector('.portal-zone');
        
        if (doorBtn) {
            doorBtn.style.cursor = 'pointer';
            doorBtn.onclick = (e) => {
                // Если кликнули по языку — не входим
                if (e.target.closest('#gy-lang-selector')) return;
                
                enterClub();
            };
        }
    });

    function enterClub() {
        const doorSound = document.getElementById('door-audio');
        if (doorSound) {
            doorSound.play().catch(err => console.log("Sound interaction required"));
        }

        // Анимация (если есть класс в CSS)
        const doorImg = document.getElementById('main-door');
        if (doorImg) doorImg.classList.add('door-open');

        // Уходим в следующую зону через 1 сек (чтобы звук двери успел начаться)
        setTimeout(() => {
            location.href = 'welcome.html';
        }, 1000);
    }

    function renderDoorsLangOnly() {
        const lang = localStorage.getItem('gy_lang') || 'en';
        const current = GY_LANGS.find(l => l.c === lang) || GY_LANGS[0];
        const div = document.createElement('div');
        div.id = "gy-lang-selector";
        div.style = "position: fixed; top: 30px; right: 40px; z-index: 10001; cursor: pointer;";
        div.innerHTML = `
            <div onclick="toggleGyLangMenu()" style="display:flex; align-items:center; gap:10px; color:gold;">
                <img src="https://flagcdn.com/w40/${current.f}.png" width="35">
                <span style="font-weight:900; font-size:1.4rem;">${current.c.toUpperCase()}</span>
            </div>
            <div id="gy-lang-menu" style="display:none; position:absolute; right:0; top:50px; background:rgba(0,0,0,0.9); border:1px solid gold; padding:10px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; pointer-events:auto;"></div>
        `;
        document.body.appendChild(div);
        
        const menu = document.getElementById('gy-lang-menu');
        GY_LANGS.forEach(l => {
            const img = document.createElement('img');
            img.src = `https://flagcdn.com/w40/${l.f}.png`;
            img.style = "width:25px; cursor:pointer; margin:5px;";
            img.onclick = (e) => { 
                e.stopPropagation();
                localStorage.setItem('gy_lang', l.c); 
                location.reload(); 
            };
            menu.appendChild(img);
        });
    }
</script>
</body>
</html>
