<!DOCTYPE html>
<html lang="en"> <!-- По умолчанию английский -->

    <title>GY-GY Club | v.3.10.0</title>
    <link rel="stylesheet" href="style.css?v=3.10.0">
</head>
<body class="gate-keeper">
    <!-- ПОСТОЯННЫЕ АТРИБУТЫ -->
    <header class="permanent-header">
        <img src="logo_gygy.png" id="main-logo" alt="GY-GY">
        <div id="identity-node">
            <div class="avatar-wrapper">
                <img id="user-avatar" src="default_avatar.png"> <!-- Авто-аватар -->

            </div>
        </div>
        <button id="back-btn" onclick="Agent.goBack()">← BACK</button>
    </header>

    <!-- ЕДИНСТВЕННЫЙ ПОРТАЛ (Одни двери на весь Клуб) -->
    <div id="portal-doors">
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <main id="app-stage">
        <!-- Место для Коня, Квадратов и Холла -->
    </main>

    <script src="core-agent.js?v=3.10.0"></script>

</html>
