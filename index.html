<!DOCTYPE html>
<html lang="en">
<!-- GY-GY PROTOCOL v.5.4.3 (.) -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | ENTRANCE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

    <div class="lang-container">
        <!-- Одиночная рамка выбранного языка (Английский по умолчанию) -->
        <div class="lang-current" id="active-lang">
            <img src="https://flagcdn.com/w20/gb.png" id="main-flag"> 
            <span>ENGLISH</span>
        </div>
        
        <!-- Выпадающий вертикальный список 11 языков -->
        <div class="lang-dropdown">
            <button class="lang-btn" onclick="selectLang('ru', 'РУССКИЙ', 'ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button class="lang-btn" onclick="selectLang('en', 'ENGLISH', 'gb')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button class="lang-btn" onclick="selectLang('ua', 'УКРАЇНСЬКА', 'ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="selectLang('pl', 'POLSKI', 'pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button class="lang-btn" onclick="selectLang('de', 'DEUTSCH', 'de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
            <button class="lang-btn" onclick="selectLang('fr', 'FRANÇAIS', 'fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
            <button class="lang-btn" onclick="selectLang('it', 'ITALIANO', 'it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
            <button class="lang-btn" onclick="selectLang('es', 'ESPAÑOL', 'es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
            <button class="lang-btn" onclick="selectLang('cn', '中文', 'cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
            <button class="lang-btn" onclick="selectLang('jp', '日本語', 'jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
            <button class="lang-btn" onclick="selectLang('br', 'PORTUGUÊS', 'br')"><img src="https://flagcdn.com/w20/br.png"> PORTUGUÊS</button>
        </div>
    </div>

    <header class="fixed-header">
        <div class="logo-text">GY-GY</div>
    </header>

    <main class="portal-zone">
        <img src="door_1.jpg" id="main-door" class="door-v543" onclick="enterClub()">
    </main>

    <script>
        function selectLang(code, name, flag) {
            // При выборе: язык попадает в рамку, список закроется автоматически (из-за потери hover)
            document.querySelector('#active-lang span').innerText = name;
            document.getElementById('main-flag').src = `https://flagcdn.com/w20/${flag}.png`;
        }

        function enterClub() {
            document.getElementById('main-door').style.transform = 'scale(4)';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'welcome.html'; }, 1000);
        }
    </script>
</body>
</html>
