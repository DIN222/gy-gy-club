<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | 9 TOTAL MONOLITH</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --black: #000; --paper: #F5F5DC; }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; outline: none !important; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; margin: 0; padding: 0; }
        
        /* СТРЕЛКА ВОЗВРАТА (Теперь сверху) */
        .back-nav { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 10002; 
            cursor: pointer; 
            color: var(--gold); 
            font-size: 45px; 
            font-weight: 900; 
            line-height: 0.6; 
            display: none; /* Скрыта на первом экране */
        }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ (Теперь под стрелкой) */
        .lang-gateway { 
            position: fixed; 
            top: 65px; /* Сдвинута вниз, чтобы освободить место стрелке */
            left: 15px; 
            z-index: 10000; 
            width: 170px; 
        }
        
        .btn-main-lang { 
            width: 100%; padding: 10px; background: #000; border: 1.5px solid var(--gold); 
            color: var(--gold); font-weight: 900; cursor: pointer; display: flex; 
            align-items: center; gap: 8px; font-family: inherit; 
        }

        .lang-panel { 
            display: none; position: absolute; top: 100%; left: 0; width: 100%; 
            background: #000; border: 1.5px solid var(--gold); border-top: none; 
            max-height: 50vh; overflow-y: auto; z-index: 10001; 
        }

        .lang-btn { 
            width: 100%; padding: 12px; background: none; border: none; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.1); color: var(--gold); 
            cursor: pointer; display: flex; align-items: center; gap: 10px; 
            font-size: 11px; font-family: inherit; text-align: left; 
        }

        .flag-icon { width: 20px; border: 0.5px solid var(--gold); }

        /* ЛОГОТИП */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000; 
            font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; 
            letter-spacing: 5px; color: var(--gold); text-transform: uppercase; 
        }

        /* БЛОКИ */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; text-align: center; max-width: 85%; line-height: 1.2; margin-bottom: 25px; }
        .btn-gy { min-width: 275px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: inherit; transition: 0.3s; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        .id-card-hall { width: 230px; padding: 20px; border: 2px solid var(--gold); background: var(--paper); border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-door { width: 280px; cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; }
        
        .rtl { direction: rtl; }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="global-back" class="back-nav" onclick="goBack()">«</div>

    <div class="lang-gateway" id="gy-lang-root">
        <button class="btn-main-lang" onclick="toggleMenu()">
            <img id="current-lang-flag" src="https://flagcdn.com/w20/gb.png" class="flag-icon">
            <span id="current-lang-label">ENGLISH</span>
        </button>
        <div id="lang-list-12" class="lang-panel"></div>
    </div>
    
    <div class="ui-header-right">GY-GY</div>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div class="quote-text" data-t="q_whiskey">«В каждой шутке есть доля виски»</div>
        <img src="horse_welcome.png" style="max-height: 40vh; margin-bottom: 10px;">
        <div style="font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: 8px; margin-bottom: 15px; font-style: italic;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')" data-t="btn_to_hall">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')" data-t="btn_get_id">ПОЛУЧИТЬ ID</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-text" data-t="q_champ">«Шампанского много не бывает»</div>
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <div class="box-final" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg"></div>
            <div class="box-final" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" data-t="label_photo">ФОТО</span>
            </div>
            <div class="box-final" onclick="generateAvatar()">
                <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-avatar" data-t="label_avatar">GEN<br>AVATAR</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')" data-t="btn_save">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')" data-t="btn_to_hall">ПРОЙТИ В ХОЛЛ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; opacity:0.6; z-index:15;"></div>
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900; margin-bottom:10px;">#ID</div>
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="color:#000; border-color:#000;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')" data-t="btn_confirm">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="color:#000; border-color:#000;" onclick="window.location.href='bar.html'" data-t="btn_enter">ВХОД В БАР</button>
        </div>
    </div>

<script>
    let currentID = localStorage.getItem('gy_trace') || "";
    let navigationHistory = ['block-entrance'];

    function handleDoor() {
        document.getElementById('snd-door').play();
        document.getElementById('main-door').style.transform = "scale(5)"; 
        document.getElementById('main-door').style.opacity = "0";
        if (!currentID) currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
        localStorage.setItem('gy_trace', currentID);
        updateIDUI(currentID);
        setTimeout(() => { 
            portalTransition('block-welcome'); 
            document.getElementById('snd-ambient').play();
        }, 1800);
    }

    function updateIDUI(id) {
        document.getElementById('id-label').innerText = id;
        document.getElementById('h-id').innerText = id;
        document.getElementById('qr-box-reg').innerHTML = "";
        new QRCode(document.getElementById("qr-box-reg"), { text: id, width: 85, height: 85 });
        document.getElementById('h-qr').innerHTML = "";
        new QRCode(document.getElementById("h-qr"), { text: id, width: 85, height: 85 });
    }

  function portalTransition(nextId) {
    const cur = document.querySelector('.block.active');
    if(cur) { 
        cur.style.opacity = "0"; 
        setTimeout(() => { cur.classList.remove('active'); cur.style.display="none"; }, 600); 
    }
    
    if (navigationHistory[navigationHistory.length - 1] !== nextId) {
        navigationHistory.push(nextId);
    }

    setTimeout(() => {
        const n = document.getElementById(nextId);
        
        // --- СПЕЦИАЛЬНАЯ ЛОГИКА ДЛЯ ДВЕРЕЙ ---
        if (nextId === 'block-entrance') {
            const door = document.getElementById('main-door');
            door.style.transform = "scale(1)"; // Сбрасываем зум
            door.style.opacity = "1";          // Проявляем двери
            document.getElementById('snd-ambient').pause(); // Стоп звуки бара
            document.getElementById('snd-ambient').currentTime = 0;
        }
        // -------------------------------------

        n.style.display = "flex";
        setTimeout(() => { 
            n.classList.add('active'); 
            n.style.opacity = "1"; 
            document.getElementById('global-back').style.display = (nextId === 'block-entrance') ? 'none' : 'block';
        }, 50);
    }, 650);
}

    function goBack() {
        if (navigationHistory.length > 1) {
            navigationHistory.pop(); // убираем текущий блок
            const prev = navigationHistory.pop(); // берем предыдущий
            portalTransition(prev);
        }
    }

    function preview(i) {
        if(i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result; document.getElementById('txt-photo').style.display = "none";
            };
            r.readAsDataURL(i.files[0]);
        }
    }

    function generateAvatar() {
        const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
        document.getElementById('avatar-img').src = url; document.getElementById('avatar-img').style.display = "block";
        document.getElementById('h-photo').src = url; document.getElementById('txt-avatar').style.display = "none";
    }

    function swapButtons(a, s) { 
        document.getElementById(a).classList.add('btn-sleep'); 
        document.getElementById(s).classList.remove('btn-sleep'); 
        if(a === 'btn-save') document.getElementById('btn-w-hall').classList.remove('btn-sleep');
    }

    function toggleMenu() {
        const list = document.getElementById('lang-list-12');
        if(list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    window.onload = () => { 
        if(currentID) { updateIDUI(currentID); document.getElementById('btn-w-hall').classList.remove('btn-sleep'); } 
    };

        ae: { q_whiskey: "«كل نكتة فيها ذرة من الويسكي»", q_champ: "«الشمبانيا لا تكفي أبدا»", btn_to_hall: "المضي قدما إلى القاعة", btn_get_id: "احصل على معرف", btn_save: "حفظ", btn_confirm: "تأكيد", btn_enter: "ادخل إلى البار", label_photo: "صورة", label_avatar: "الصورة الرمزية" },

    };
</script>
<script src="shared-logic.js"></script>
</body>
</html>
