<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.570 | PASSPORT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; outline: none !important; }
        
        html, body { 
            width: 100vw; height: 100vh; height: 100dvh; 
            background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; 
            overflow: hidden !important; position: fixed !important; margin:0; padding:0; touch-action: none;
        }
        
        /* Глушилка мусора Google */
        #google_translate_element, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; visibility: hidden !important; }
        body { top: 0 !important; }

        /* Языковой шлюз v5.0 */
       .lang-frame-locked {
    position: fixed !important;
    top: 15px;
    left: 15px;
    z-index: 9999999 !important;
    width: 235px; /* Размер под PORTUGUÊS (.) */
    height: 46px;
    border: 2px solid var(--gold) !important; /* Рамка остается здесь */
    background: #000;
    cursor: pointer;
    pointer-events: auto !important;
}
        .lang-active-zone { width: 100%; height: 100%; display: flex; align-items: center; padding: 0 12px; }
        .flag-icon { width: 22px; height: auto; margin-right: 12px; border: 1px solid rgba(214, 175, 55, 0.3); }
        .lang-text { font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--gold); }

        .lang-dropdown-adaptive {
    display: none;
    position: absolute;
    top: 44px; /* Вплотную к нижней границе рамки */
    left: -2px; /* Выравнивание с учетом толщины рамки */
    width: 235px;
    background: #000;
    overflow-y: auto;
    border: none !important; /* Рамки нет */
    box-shadow: none !important;
    z-index: 2000001;
}

/* Убираем рамки у элементов списка, если они были */
.lang-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border: none !important; 
    transition: 0.2s;
}

.lang-item:hover {
    background: rgba(214, 175, 55, 0.15); /* Подсветка при наведении */
}
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000000; font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold); pointer-events: none; }
        
        .block { 
            position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 100; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; 
        }
        .block.active { pointer-events: auto; }

       #main-door {
    position: relative;
    z-index: 110;
    pointer-events: auto !important;
    cursor: pointer;
    transition: transform 1.8s, opacity 1.5s;
    height: 40vh !important; /* Константа высоты */
    width: auto;
}
        
        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        .id-card-hall { position: absolute; top: 70%; left: 50%; transform: translate(-50%,-50%); width: 230px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; color: var(--gold); text-align: center; max-width: 85%; line-height: 1.2; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lang-switcher" class="lang-frame-locked">
        <div class="lang-active-zone" id="active-lang-display" onclick="toggleLangList()">
            <img src="https://flagcdn.com/w40/gb.png" class="flag-icon">
            <span class="lang-text">ENGLISH</span>
        </div>
        <div id="lang-list-container" class="lang-dropdown-adaptive"></div>
    </div>
    
    <div id="google_translate_element" style="display:none;"></div>

    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1; display: flex; pointer-events: auto;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block" style="justify-content: flex-start; padding-top: 5vh;">
        <div class="quote-text">«В каждой шутке есть доля виски»</div>
        <img src="horse_welcome.png" style="max-height: 40vh; width: auto;">
        <div style="font-size: 38px; font-weight: 700; letter-spacing: 12px; color: var(--gold); font-style: italic;">WELCOME</div>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПОЛУЧИТЬ ID</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-text">«Шампанского много не бывает»</div>
        <div style="display:flex; gap:10px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold); font-size:11px;" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg"></div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОЙТИ В ХОЛЛ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:15;"></div>
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900; font-size:12px;">#ID</div>
            <div id="user-flag-icon"></div>
            <div id="h-qr" class="box-final" style="margin: 10px 0;"></div>
            <button class="btn-gy" style="border-color:#000; color:#000;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="quote-text">«Игого, сейчас начнем!»</div>
        <img src="horse_bar.png" style="max-height: 60vh;">
    </div>

    <script>
        let currentID = "";
        let selectedFlag = "gb";

        const clubLangs = [
            {n:'ENGLISH', c:'gb', code:'en'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
            {n:'UKRAINIAN', c:'ua', code:'uk'}, {n:'POLSKI', c:'pl', code:'pl'}, 
            {n:'DEUTSCH', c:'de', code:'de'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
            {n:'ITALIANO', c:'it', code:'it'}, {n:'ESPAÑOL', c:'es', code:'es'}, 
            {n:'TÜRKÇE', c:'tr', code:'tr'}, {n:'PORTUGUÊS', c:'pt', code:'pt'}, 
            {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
        ];

        function initLangEngine() {
            const container = document.getElementById('lang-list-container');
            if (!container) return;
            container.style.maxHeight = (window.innerHeight - 80) + 'px';
            container.innerHTML = '';
            clubLangs.forEach(lang => {
                if(lang.code === 'en') return;
                const div = document.createElement('div');
                div.className = 'lang-item';
                div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> <span class="lang-text">${lang.n}</span>`;
                div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
                container.appendChild(div);
            });
        }

        function toggleLangList() {
            const list = document.getElementById('lang-list-container');
            list.style.display = (list.style.display === 'block') ? 'none' : 'block';
        }

        function applyLanguage(lang) {
            selectedFlag = lang.c;
            document.getElementById('active-lang-display').innerHTML = `
                <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon">
                <span class="lang-text">${lang.n}</span>
            `;
            const gtCombo = document.querySelector('.goog-te-combo');
            if (gtCombo) {
                gtCombo.value = lang.code;
                gtCombo.dispatchEvent(new Event('change', { bubbles: true }));
            }
            document.getElementById('lang-list-container').style.display = 'none';
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            const langS = document.getElementById('lang-switcher');
            if(current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }
            
            langS.style.display = (nextId === 'block-entrance') ? 'block' : 'none';

            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { next.classList.add('active'); next.style.opacity = "1"; next.style.pointerEvents = "auto"; }, 50);
            }, 800);
        }

        function handleDoor() {
            document.getElementById('lang-switcher').style.display = 'none';
            document.getElementById('snd-door').play();
            const d = document.getElementById('main-door');
            d.style.transform = "scale(5)"; d.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            document.getElementById('user-flag-icon').innerHTML = `<img src="https://flagcdn.com/w40/${selectedFlag}.png" style="width:25px;">`;
            
            document.getElementById('qr-box-reg').innerHTML = "";
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            
            setTimeout(() => { portalTransition('block-welcome'); document.getElementById('snd-ambient').play(); }, 1800);
        }

        function swapButtons(a, s) { 
            document.getElementById(a).classList.add('btn-sleep'); 
            document.getElementById(s).classList.remove('btn-sleep'); 
        }

        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element'); }
        
        window.addEventListener('load', () => {
            initLangEngine();
            setInterval(() => {
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) banner.style.display = 'none';
                document.body.style.top = '0';
            }, 500);
        });
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
