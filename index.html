<!DOCTYPE html>
<html lang="en"> <!-- Default: English -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY Club | Block Structure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="gate-keeper">
    <!-- ПОСТОЯННЫЕ АТРИБУТЫ -->
    <header class="permanent-header">
        <div id="logo-block">
            <img src="logo_gygy.png" id="main-logo" alt="GY-GY"> <!-- Logo GY-GY -->
            <div id="humor-slogan">Humor is everywhere</div>
        </div>
        
        <div id="identity-node">
            <div class="avatar-wrapper" onclick="Agent.toggleFlags()">
                <img id="user-avatar" src="default_avatar.png"> <!-- Auto-avatar -->
                <img id="user-flag" src="flags/en.png"> <!-- Language panel -->
            </div>
        </div>
        
        <button id="back-level" onclick="Agent.goBack()">← BACK</button> <!-- Return button -->
    </header>

    <!-- ПОРТАЛ (ДВЕРИ) -->
    <div id="portal-doors">
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <!-- ГИБКАЯ СЦЕНА (МЕСТО СОЗИДАНИЯ) -->
    <main id="app-stage">
        <!-- Сюда вставляются блоки локаций -->
    </main>

    <script src="core-agent.js"></script>
</body>
</html>
