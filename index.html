<!DOCTYPE html>
<html lang="en">
<!-- GY-GY PROTOCOL v.5.4.1 (.) -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | ENTRANCE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

    <audio id="snd-door" src="door_creak.mp3" preload="auto"></audio>
    <audio id="snd-ambient" src="club_ambient.mp3" loop autoplay></audio>

    <!-- Вертикальная языковая панель слева -->
    <div class="lang-container">
        <div class="lang-trigger" onclick="UI.toggle('lang-panel')">
            <img src="https://flagcdn.com/w40/gb.png" id="current-lang-flag"> 
            <span class="monospace">ENGLISH</span>
        </div>
        <div id="lang-panel" class="lang-panel-vertical">
            <button class="lang-btn" onclick="setLang('ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button class="lang-btn" onclick="setLang('en')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button class="lang-btn" onclick="setLang('ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="setLang('pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button class="lang-btn" onclick="setLang('de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
            <button class="lang-btn" onclick="setLang('fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
            <button class="lang-btn" onclick="setLang('it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
            <button class="lang-btn" onclick="setLang('es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
            <button class="lang-btn" onclick="setLang('cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
            <button class="lang-btn" onclick="setLang('jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
            <button class="lang-btn" onclick="setLang('ae')"><img src="https://flagcdn.com/w20/ae.png"> العربية</button>
            <button class="lang-btn" onclick="setLang('br')"><img src="https://flagcdn.com/w20/br.png"> PORTUGUÊS</button>
        </div>
    </div>

    <!-- Логотип GY-GY справа -->
    <header class="fixed-header">
        <div class="logo-text monospace">GY-GY</div>
    </header>

    <main class="portal-zone">
        <!-- Дверь 44vh (40vh + 10%) -->
        <img src="door_1.jpg" id="main-door" class="door-v541" onclick="enterSequence()">
    </main>

    <script>
        const UI = {
            toggle: (id) => {
                const el = document.getElementById(id);
                el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
            }
        };

        function enterSequence() {
            const door = document.getElementById('main-door');
            const snd = document.getElementById('snd-door');
            if(snd) snd.play().catch(e => console.log("Sound muted"));
            door.classList.add('door-open-anim');
            setTimeout(() => {
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = 'welcome.html'; }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
