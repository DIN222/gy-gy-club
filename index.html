<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY CLUB MONOLITH v8.2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-dark: #aa8c2c; --black: #000; --paper: #f5f5dc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* HEADER */
        .top-nav { position: fixed; top: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(212,175,55,0.1); background: rgba(0,0,0,0.8); }
        #logo-img { height: 45px; filter: drop-shadow(0 0 5px var(--gold)); }
        
        .ui-group { display: flex; align-items: center; gap: 15px; }
        .btn-ui { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; cursor: pointer; font-family: inherit; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        
        .lang-list { display: none; position: absolute; top: 70px; right: 20px; background: var(--black); border: 1px solid var(--gold); width: 180px; max-height: 400px; overflow-y: auto; z-index: 1001; }
        .lang-list.open { display: block; }
        .lang-item { width: 100%; padding: 12px; border: none; border-bottom: 1px solid rgba(212,175,55,0.1); background: none; color: var(--gold); text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; font-family: inherit; }

        /* SCREENS */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.6s ease; }
        .active { display: flex !important; opacity: 1; }

        /* ASSETS */
        #main-door { width: 280px; cursor: pointer; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .horse-podium { position: relative; width: 220px; height: 220px; margin-bottom: 20px; }
        .horse-img { width: 100%; z-index: 10; position: relative; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); }
        .glow { position: absolute; inset: 20px; background: radial-gradient(circle, rgba(212, 175, 55, 0.6) 0%, transparent 75%); border-radius: 50%; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.3); opacity: 0.8; } }

        /* TYPOGRAPHY & BUTTONS */
        #quote { font-family: 'Playfair Display', serif; font-size: 1.8rem; text-align: center; margin-bottom: 40px; font-style: italic; max-width: 80%; }
        .btn-gy { min-width: 280px; padding: 18px; border: 1.5px solid var(--gold); background: none; color: var(--gold); cursor: pointer; margin: 10px; font-family: inherit; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .btn-gy:active { background: var(--gold); color: var(--black); }
        .btn-sleep { opacity: 0.2; pointer-events: none; }

        /* ID CARD & BAR */
        .id-card { background: var(--paper); color: var(--black); padding: 30px; border: 5px double var(--gold); text-align: center; width: 300px; box-shadow: 0 0 30px rgba(212,175,55,0.3); }
        .av-wrap { position: relative; width: 130px; height: 130px; border: 3px solid var(--black); margin: 0 auto 15px; background: #fff; }
        .av-img-final { width: 100%; height: 100%; object-fit: cover; }
        .flag-mini { position: absolute; bottom: -8px; right: -8px; width: 40px; border: 2px solid var(--paper); box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        #qr-box { background: white; padding: 5px; margin: 15px auto; display: inline-block; }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="logo.png" id="logo-img" alt="LOGO">
        <div class="ui-group">
            <button class="btn-ui" onclick="goBack()">←</button>
            <button class="btn-ui" id="lang-trigger">
                <img id="cur-flag" src="https://flagcdn.com/w20/gb.png" width="20">
                <span id="cur-name">EN</span>
            </button>
        </div>
        <div id="lang-list" class="lang-list"></div>
    </div>

    <section id="scr-1" class="screen active">
        <img src="door_1.jpg" id="main-door" onclick="openDoor()">
    </section>

    <section id="scr-2" class="screen">
        <div class="horse-podium">
            <div class="glow"></div>
            <img src="horse.png" class="horse-img">
        </div>
        <h2 id="quote" data-key="q_whiskey">...</h2>
        <button class="btn-gy" onclick="go(3)" data-key="btn_get_id">GET ID TOKEN</button>
        <button class="btn-gy btn-sleep" id="btn-to-hall" onclick="go(4)" data-key="btn_to_hall">PROCEED</button>
    </section>

    <section id="scr-3" class="screen">
        <div style="display:flex; gap:20px; margin-bottom:30px;">
            <div style="width:120px; height:120px; border:2px solid var(--gold); cursor:pointer; display:flex; align-items:center; justify-content:center; overflow:hidden;" onclick="newAvatar()">
                <img id="temp-av" style="display:none; width:100%;">
                <span id="av-label" data-key="label_avatar">AVATAR</span>
            </div>
            <div id="qr-reg" style="background:white; padding:5px; height:120px;"></div>
        </div>
        <div style="font-size:1.5rem; margin-bottom:20px;">#<span id="label-id">GY-000</span></div>
        <button class="btn-gy" onclick="saveProfile()" data-key="btn_save">SAVE PROFILE</button>
    </section>

    <section id="scr-4" class="screen">
        <div class="id-card">
            <div style="font-size:14px; font-weight:900; border-bottom:1px solid #000; margin-bottom:15px; padding-bottom:5px;">GY-GY CLUB MEMBER</div>
            <div class="av-wrap">
                <img id="final-av" class="av-img-final">
                <img id="final-flag" class="flag-mini">
            </div>
            <div id="final-id" style="font-weight:900; font-size:1.2rem;">#GY-000</div>
            <div id="qr-hall"></div>
            <button class="btn-gy" style="min-width:100%; border-color:#000; color:#000;" onclick="go(5)" data-key="btn_to_bar">ENTER BAR</button>
        </div>
    </section>

    <section id="scr-5" class="screen">
        <img src="horse.png" style="width:80px; opacity:0.5; margin-bottom:20px;">
        <h1 data-key="bar_name">GY-GY BAR</h1>
        <button class="btn-gy">WHISKEY LIST</button>
        <button class="btn-gy" onclick="location.reload()">LOG OUT</button>
    </section>

    <script>
        const langData = {
            en: { f: 'gb', n: 'EN', q_whiskey: "«Every joke has a grain of whiskey»", btn_get_id: "GET ID TOKEN", btn_to_hall: "PROCEED", btn_save: "SAVE PROFILE", btn_to_bar: "ENTER BAR", label_avatar: "AVATAR", bar_name: "GY-GY BAR" },
            ru: { f: 'ru', n: 'RU', q_whiskey: "«В каждой шутке есть доля виски»", btn_get_id: "ПОЛУЧИТЬ ID", btn_to_hall: "В ХОЛЛ", btn_save: "СОХРАНИТЬ", btn_to_bar: "В БАР", label_avatar: "АВАТАР", bar_name: "GY-GY БАР" },
            ua: { f: 'ua', n: 'UA', q_whiskey: "«У кожному жарті є частка віскі»", btn_get_id: "ОТРИМАТИ ID", btn_to_hall: "У ХОЛ", btn_save: "ЗБЕРЕГТИ", btn_to_bar: "В БАР", label_avatar: "АВАТАР", bar_name: "GY-GY БАР" },
            ae: { f: 'ae', n: 'AR', q_whiskey: "«كل نكتة فيها القليل من الويسكي»", btn_get_id: "الحصول على الهوية", btn_to_hall: "إلى القاعة", btn_save: "حفظ", btn_to_bar: "دخول", label_avatar: "الصورة", bar_name: "GY-GY بار" }
        };

        let state = { lang: 'en', id: null, photo: null, history: [1] };

        window.onload = () => {
            initLangs();
            const sys = navigator.language.split('-')[0];
            applyLang(langData[sys] ? sys : 'en');
            
            const saved = JSON.parse(localStorage.getItem('gy_v8_final'));
            if(saved) {
                state = saved;
                document.getElementById('btn-to-hall').classList.remove('btn-sleep');
                sync();
            }
        };

        function initLangs() {
            const list = document.getElementById('lang-list');
            Object.keys(langData).forEach(key => {
                const b = document.createElement('button');
                b.className = 'lang-item';
                b.innerHTML = `<img src="https://flagcdn.com/w20/${langData[key].f}.png"> ${langData[key].n}`;
                b.onclick = () => { applyLang(key); list.classList.remove('open'); };
                list.appendChild(b);
            });
            document.getElementById('lang-trigger').onclick = (e) => {
                e.stopPropagation();
                document.getElementById('lang-list').classList.toggle('open');
            };
        }

        function applyLang(l) {
            state.lang = l;
            const d = langData[l];
            document.getElementById('cur-flag').src = `https://flagcdn.com/w20/${d.f}.png`;
            document.getElementById('cur-name').innerText = d.n;
            document.body.dir = l === 'ae' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-key]').forEach(el => {
                const k = el.getAttribute('data-key');
                if(d[k]) el.innerText = d[k];
            });
        }

        function openDoor() {
            new Audio('door_open.mp3').play().catch(()=>{});
            document.getElementById('main-door').style.transform = "scale(5) rotate(10deg)";
            document.getElementById('main-door').style.opacity = "0";
            setTimeout(() => go(2), 1000);
        }

        function go(n) {
            state.history.push(n);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-' + n).classList.add('active');
            if(n === 3 && !state.id) {
                state.id = "GY-" + Math.floor(Math.random()*900+100);
                document.getElementById('label-id').innerText = state.id;
                new QRCode(document.getElementById("qr-reg"), { text: state.id, width: 110, height: 110 });
            }
        }

        function goBack() {
            if(state.history.length > 1) {
                state.history.pop();
                go(state.history.pop());
            }
        }

        function newAvatar() {
            state.photo = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
            const img = document.getElementById('temp-av');
            img.src = state.photo; img.style.display = "block";
            document.getElementById('av-label').style.display = "none";
        }

        function saveProfile() {
            if(!state.photo) return alert("Select Avatar!");
            localStorage.setItem('gy_v8_final', JSON.stringify(state));
            sync();
            go(4);
        }

        function sync() {
            document.getElementById('final-av').src = state.photo;
            document.getElementById('final-id').innerText = "#" + state.id;
            document.getElementById('final-flag').src = `https://flagcdn.com/w20/${langData[state.lang].f}.png`;
            const hqr = document.getElementById("qr-hall");
            hqr.innerHTML = "";
            new QRCode(hqr, { text: state.id, width: 80, height: 80 });
        }

        window.onclick = () => document.getElementById('lang-list').classList.remove('open');
    </script>
</body>
</html>
