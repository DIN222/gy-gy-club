<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.67 | STABLE (.)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; outline: none !important; }
        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }

        /* ВЕРХНЯЯ ПАНЕЛЬ: ГОРИЗОНТ И ШИРИНА (.) */
        .ui-top-bar { 
            position: fixed; top: 18px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; z-index: 1000000; box-sizing: border-box; 
        }
        
        /* Ширина 210px — эталон по уровню 'УКРАЇНСЬКА' (.) */
        .lang-container { position: relative; width: 210px; }
        
        .lang-current { 
            border: 1px solid var(--gold); padding: 0 12px; height: 36px; 
            display: flex; align-items: center; gap: 10px; cursor: pointer; 
            background: rgba(0,0,0,0.8); font-size: 13px; text-transform: uppercase;
        }
        
        .lang-dropdown { 
            display: none; position: absolute; top: 100%; left: 0; width: 100%; 
            background: #000; border: 1px solid var(--gold); border-top: none; 
            max-height: 60vh; overflow-y: auto; z-index: 1000002;
        }
        .lang-container:hover .lang-dropdown { display: block; }
        
        .lang-btn { 
            background: none; border: none; color: var(--gold); padding: 12px; 
            cursor: pointer; text-align: left; display: flex; align-items: center; 
            gap: 12px; font-family: 'Share Tech Mono'; width: 100%; font-size: 12px; 
            transition: 0.2s;
        }
        .lang-btn:hover { background: rgba(214, 175, 55, 0.2); }
        .lang-btn img { width: 20px; border-radius: 2px; }

        .ui-header-right { 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            pointer-events: none; font-family: 'Share Tech Mono'; 
        }

        /* КОНТЕНТ (.) */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }
        
        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }
        
        #main-door { width: 295px; cursor: pointer; transition: transform 2.5s, opacity 2s; z-index: 9999; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    </style>
</head>
<body>

    <div class="ui-top-bar">
        <div class="lang-container">
            <div class="lang-current" id="active-lang">
                <img src="https://flagcdn.com/w20/gb.png"> <span>ENGLISH</span>
            </div>
            <div class="lang-dropdown" id="lang-list">
                </div>
        </div>
        <div class="ui-header-right">GY-GY</div>
    </div>

    <audio id="snd-door"><source src="door_open.mp3"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; text-align: center; margin-bottom: 20px;" id="t-quote1">"In every joke there is a drop of whisky"</div>
        <img src="horse_welcome.png" style="max-height: 40vh; margin-bottom: 20px;">
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">Proceed to Hall</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">Get Club ID</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold);" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg"></div>
            <div class="box-final" onclick="document.getElementById('file-input').click()" style="cursor:pointer;">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="t-photo">PHOTO</span>
            </div>
            <div class="box-final" onclick="generateAvatar()" style="cursor:pointer;">
                <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="t-avatar">AVATAR</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">Save</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">Proceed</button>
    </div>

    <script>
        const languages = [
            {id:'en', n:'ENGLISH', f:'gb'}, {id:'ru', n:'РУССКИЙ', f:'ru'}, {id:'ua', n:'УКРАЇНСЬКА', f:'ua'},
            {id:'pl', n:'POLSKI', f:'pl'}, {id:'de', n:'DEUTSCH', f:'de'}, {id:'fr', n:'FRANÇAIS', f:'fr'},
            {id:'it', n:'ITALIANO', f:'it'}, {id:'es', n:'ESPAÑOL', f:'es'}, {id:'cn', n:'中文', f:'cn'},
            {id:'jp', n:'日本語', f:'jp'}, {id:'pt', n:'PORTUGUÊS', f:'pt'}, {id:'tr', n:'TÜRKÇE', f:'tr'}
        ];

        const list = document.getElementById('lang-list');
        languages.forEach(l => {
            const b = document.createElement('button');
            b.className = 'lang-btn';
            b.innerHTML = `<img src="https://flagcdn.com/w40/${l.f}.png"> ${l.n}`;
            b.onclick = () => {
                document.getElementById('active-lang').innerHTML = `<img src="https://flagcdn.com/w40/${l.f}.png"> <span>${l.n}</span>`;
                // Здесь можно добавить смену текстов через словарь dict
            };
            list.appendChild(b);
        });

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').style.transform = "scale(5)";
            document.getElementById('main-door').style.opacity = "0";
            let id = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = id;
            new QRCode(document.getElementById("qr-box-reg"), { text: id, width: 85, height: 85 });
            setTimeout(() => { portalTransition('block-welcome'); document.getElementById('snd-ambient').play(); }, 1800);
        }

        function portalTransition(id) {
            const cur = document.querySelector('.block.active');
            cur.style.opacity = "0";
            setTimeout(() => {
                cur.classList.remove('active'); cur.style.display = "none";
                const nxt = document.getElementById(id);
                nxt.style.display = "flex";
                setTimeout(() => { nxt.classList.add('active'); nxt.style.opacity = "1"; }, 50);
            }, 800);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; document.getElementById('pp').style.display="block";
                document.getElementById('t-photo').style.display="none";
            };
            r.readAsDataURL(i.files[0]);
        }

        function generateAvatar() {
            const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
            document.getElementById('avatar-img').src = url; document.getElementById('avatar-img').style.display="block";
            document.getElementById('t-avatar').style.display="none";
        }

        function swapButtons(a, s) { 
            document.getElementById(a).classList.add('btn-sleep'); 
            document.getElementById(s).classList.remove('btn-sleep'); 
        }
    </script>
</body>
</html>
