<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>GY-GY CLUB | ENTRANCE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="door-audio" src="door_open.mp3"></audio>
    <header class="fixed-header">
        <div class="lang-container">
            <button class="btn-gy" onclick="UI.toggle('lang-panel')">GAB / LANG</button>
            <div id="lang-panel" class="lang-panel">
                <button class="lang-btn" onclick="UI.setLang('en')">🇬🇧 ENGLISH</button>
                <button class="lang-btn" onclick="UI.setLang('ru')">🇷🇺 РУССКИЙ</button>
                <button class="lang-btn" onclick="UI.setLang('fr')">🇫🇷 FRANÇAIS</button>
                <button class="lang-btn" onclick="UI.setLang('de')">🇩🇪 DEUTSCH</button>
                <button class="lang-btn" onclick="UI.setLang('es')">🇪🇸 ESPAÑOL</button>
                <button class="lang-btn" onclick="UI.setLang('it')">🇮🇹 ITALIANO</button>
                <button class="lang-btn" onclick="UI.setLang('cn')">🇨🇳 中文</button>
                <button class="lang-btn" onclick="UI.setLang('jp')">🇯🇵 日本語</button>
                <button class="lang-btn" onclick="UI.setLang('ae')">🇦🇪 العربية</button>
                <button class="lang-btn" onclick="UI.setLang('tr')">🇹🇷 TÜRKЧE</button>
                <button class="lang-btn" onclick="UI.setLang('br')">🇧🇷 PORTUGUÊS</button>
            </div>
        </div>
        <div class="logo-text">GY-GY</div>
        <div></div> <!-- Пустое место вместо Назад -->
    </header>

    <main class="portal-zone" style="background-image: url('door_bg.jpg');">
        <img src="door_1.jpg" id="main-door" class="door-img" onclick="start()">
        <p class="humor-text">CLICK THE DOOR... ГЫ-ГЫ!</p>
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function start() {
            document.getElementById('door-audio').play().catch(()=>{});
            document.getElementById('main-door').classList.add('door-open-anim');
            Agent.gate('welcome.html'); // Плавный переход
        }
    </script>
</body>
</html>
