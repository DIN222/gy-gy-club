<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY CLUB | v9.0.1</title>
    <link rel="stylesheet" href="shared-core.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        .portal-zone {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
        }
        #main-door {
            width: 320px;
            max-width: 85%;
            cursor: pointer;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s;
        }
        .door-open {
            transform: scale(10) rotate(5deg);
            opacity: 0;
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <div class="logo-link"><img src="logo.png" alt="GY-GY"></div>
    </header>

    <main class="portal-zone">
        <img src="door_1.jpg" id="main-door" onclick="handleEntry()">
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function handleEntry() {
            const audio = new Audio('door_open.mp3');
            audio.play().catch(() => {});

            const door = document.getElementById('main-door');
            door.classList.add('door-open');

            setTimeout(() => {
                window.location.href = 'welcome.html';
            }, 1200);
        }
    </script>
</body>
</html>
