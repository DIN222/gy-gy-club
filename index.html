<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GY-GY Club | v.4.7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
    <!-- . ПОСТОЯННЫЕ АТРИБУТЫ -->
    <header class="ui-interface">
        <div class="lang-gateway">
            <button class="btn-main-lang" onclick="Agent.toggleLang()">
                <img id="cur-flag" src="https://flagcdn.com/w20/gb.png" class="flag-icon">
                <span id="cur-name">ENGLISH</span>
            </button>
            <div id="lang-list" class="lang-dropdown"></div>
        </div>
        <div class="ui-header-right">GY-GY</div>
        <button id="global-back" class="gy-back-btn" style="display:none;" onclick="Agent.goBack()">← BACK</button>
    </header>

    <!-- СЦЕНА ДЛЯ СБОРКИ БЛОКОВ -->
    <main id="app-stage"></main>

    <script src="core-agent.js"></script>
</body>
</html>
