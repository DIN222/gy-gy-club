<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB 005</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        .portal { display: flex; justify-content: center; align-items: center; height: 100vh; cursor: pointer; }
        #main-door { width: 350px; transition: 0.8s; }
        .door-open { transform: scale(1.1); opacity: 0; }
    </style>
</head>
<body>
    <audio id="door-audio" src="door_open.mp3"></audio>

    <main class="portal" onclick="enterClub()">
        <img src="door_1.jpg" id="main-door">
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function enterClub() {
            // Играем звук замка
            const da = document.getElementById('door-audio');
            if(da) da.play();

            // Активируем аудио-канал бара ПРЯМО ЗДЕСЬ (тихо)
            // Это критически важно для перехода на welcome.html
            if (typeof playZoneSound === 'function') {
                playZoneSound(0.2); 
            }

            document.getElementById('main-door').classList.add('door-open');

            setTimeout(() => {
                window.location.href = 'welcome.html';
            }, 1000);
        }
    </script>
</body>
</html>
