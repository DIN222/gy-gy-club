<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.1.97 | HYBRID TRANSLATION ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* ЯЗЫКОВАЯ ПАНЕЛЬ (Слева) */
        .lang-frame-locked {
            position: fixed; top: 15px; left: 15px; z-index: 9999999; 
            width: 180px; height: 40px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 12px;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 180px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 22px; margin-right: 12px; }

        /* ЛОГОТИП GY-GY (Справа) */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
        }
        
        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            z-index: 1000000; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        .ui-back-to-bar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005; background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold); padding: 12px 24px; cursor: pointer; display: none; opacity: 0; transition: opacity 0.5s; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .block.active { display: flex !important; opacity: 1 !important; z-index: 5000 !important; }

        #main-door { height: calc(50vh + 20px); width: auto; cursor: pointer; transition: transform 1.2s ease-in, opacity 1s; z-index: 9999999 !important; }
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; cursor: not-allowed; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        #block-tables { background: url('lounge.jpg') no-repeat center bottom / contain #000; }
        .lamp-zone { position: absolute; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; background: radial-gradient(circle, var(--neon-glow) 0%, transparent 75%); border: 1px solid var(--violet); box-shadow: 0 0 18px var(--neon-glow); transform: translate(-50%, -50%); }
        .bar-ui-container { position: absolute; bottom: 5vh; width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }

        body { top: 0 !important; }
        #block-welcome { justify-content: flex-start !important; padding-top: 12vh !important; }
        #block-welcome .quote-text { margin-bottom: 2vh !important; font-size: 24px; }
        #block-welcome img { max-height: 35vh !important; width: auto; object-fit: contain; margin-bottom: 2vh !important; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); }
        #block-welcome .btn-gy { margin: 4px 0 !important; padding: 12px !important; }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В УГЛУ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
            pointer-events: auto !important; user-select: none; display: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* ХОЛЛ И ИНТЕРАКТИВНЫЕ КАРТИНЫ */
        #block-hall { background: url('hall_bg_jpg.jpg') center/cover no-repeat #000; display: none; }
        .hall-interior { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
        .hall-interior .quote-text { position: absolute; top: 8vh; left: 50%; transform: translateX(-50%); width: 80%; margin: 0; text-align: center; }

        .hall-door-target {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24vw; height: 65vh; cursor: pointer; z-index: 5;
            background: transparent;
        }

        /* Интерактивные зоны стрелок в Холле */
        .painting-zone {
            position: absolute; 
            top: 25vh; 
            width: 6vw; 
            height: 12vh; 
            cursor: pointer; 
            z-index: 6; 
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .painting-left { left: 23vw; }
        .painting-right { right: 23vw; }

        .cue-arrow-hall { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s;
        }
        .painting-zone:hover .cue-arrow-hall { opacity: 0.8; }

        /* Выплывающие подменю для стрелок Холла */
        .manifest-btn-box { 
            position: absolute; 
            bottom: -50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 140px; 
            display: flex; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.4s, bottom 0.4s; 
            z-index: 10; 
        }
        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; margin: 0; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.9); }

        /* СЕРВЕРНАЯ */
        .server-leds { display: flex; gap: 8px; margin-top: 15px; }
        .led { width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; animation: blink 0.4s infinite alternate; }
        .led:nth-child(even) { animation-delay: 0.2s; background: #f00; box-shadow: 0 0 8px #f00; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        .corridor-door-btn { margin-top: 45px; min-width: 240px; padding: 20px; background: #111; border: 2px solid var(--violet); color: #fff; font-size: 16px; font-weight: 900; letter-spacing: 4px; box-shadow: 0 0 20px var(--neon-glow); cursor: pointer; text-transform: uppercase; text-align: center; transition: background 0.3s, transform 0.2s; }
        .corridor-door-btn:hover { background: #1a0033; transform: scale(1.02); }
        
        /* БЕЗОПАСНЫЙ СТАРТ: Убрали opacity:0, чтобы исключить черный экран при ошибках JS */
        body { 
            top: 0 !important; 
            background-color: #000 !important;
            animation: clubFadeIn 0.5s ease-in-out forwards;
        }
        @keyframes clubFadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Железная заглушка против мигания Гугл-переводчика */
        body:has(#block-welcome.active) #lang-switcher,
        body:has(#block-identity.active) #lang-switcher,
        body:has(#block-hall.active) #lang-switcher,
        body:has(#block-tables.active) #lang-switcher,
        body:has(#block-bar.active) #lang-switcher,
        body:has(#block-server.active) #lang-switcher {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* УЛЬТИМАТИВНЫЙ ТОТАЛЬНЫЙ ВЫЖИГАТЕЛЬ ЛЮБЫХ БЛИКОВ ГУГЛА (ВХОД/УХОД КУРСОРА) */
        .goog-text-highlight,
        font[style*="background-color"], 
        span[style*="background-color"],
        .block font,
        .block span,
        .lang-frame-locked font,
        .lang-frame-locked span,
        button font,
        button span {
            background-color: transparent !important; 
            background: transparent !important; 
            box-shadow: none !important; 
            text-shadow: none !important; 
            color: inherit !important;
        }

        /* ЖЕСТКИЙ ВОЗВРАТ ФИОЛЕТОВОГО НЕОНА ДЛЯ СТРЕЛОК И НАВИГАЦИИ ХОЛЛА */
        .painting-zone font, 
        .painting-zone span,
        .cue-arrow-hall,
        #nav-hall button,
        #nav-hall font,
        #nav-hall span {
            color: var(--violet) !important;
            border-color: var(--violet) !important;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet) !important;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3) !important;
        }
        
        /* Скрываем нативные системные окна и фреймы Гугла */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="google_translate_element" style="display:none !important;"></div>

    <div id="lang-switcher" class="lang-frame-locked notranslate" onclick="toggleLangList()">
        <div id="active-lang-display" style="display: flex; align-items: center; width: 100%;">
            <img src="https://flagcdn.com/w40/gb.png" class="flag-icon" id="header-active-flag"> 
            <span id="header-active-name">ENGLISH</span>
        </div>
        <div id="lang-list-container" class="lang-dropdown-adaptive"></div>
    </div>

    <div class="ui-header-right notranslate" onclick="portalTransition('block-entrance')" style="cursor:pointer;">GY-GY</div>

    <div id="global-user-badge" class="ui-user-badge notranslate" onclick="openPassport()">
        <img id="badge-avatar-img" class="badge-img" src="">
        <img id="badge-flag-img" class="badge-flag" src="https://flagcdn.com/w20/gb.png">
    </div>

    <div id="block-entrance" class="block">
        <img id="main-door" src="https://upload.wikimedia.org/wikipedia/commons/c/c6/Simple_gold_door.svg" alt="Door" onclick="handleDoor()">
        <div class="quote-text" style="margin-top: 20px;">GY-GY CLUB</div>
    </div>

    <div id="block-welcome" class="block">
        <div class="quote-text">"Рад видеть новые лица! Но без цифровой метки у нас нельзя."</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Equus_caballus_silhouette_01.svg" style="height:300px; width:auto; margin: 20px 0; filter: invert(1) sepia(1) saturate(5) hue-rotate(10deg);">
        <button class="btn-gy" onclick="portalTransition('block-identity')">Создать Личность</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-text">Ваш trace ID: <span id="id-label">...</span></div>
        <div class="box-final" style="margin-bottom: 20px; width: 120px; height: 120px; border: 2px dashed var(--gold); background:#111;">
            <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
            <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
            <div id="txt-avatar" style="font-size:11px; color:#555; text-align:center;">Нет аватара</div>
        </div>
        <button class="btn-gy" onclick="generateAvatar()">Сгенерировать Ключ</button>
        <label class="btn-gy" style="display: block; text-align:center; max-width:270px;">
            Загрузить фото <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
        </label>
        <button class="btn-gy" onclick="saveUserProfile()">Утвердить Личность</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="openPassport()">Показать Паспорт</button>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">Шагнуть в Холл</button>
    </div>

    <div id="block-hall" class="block">
        <div class="hall-interior">
            <div class="quote-text">ГЛАВНЫЙ ХОЛЛ КЛУБА</div>
            <div class="hall-door-target" onclick="portalTransition('block-bar')"></div>
            
            <div class="painting-zone painting-left" onclick="toggleManifest('m-box-left')">
                <span class="cue-arrow-hall">&lt;</span>
                <div id="m-box-left" class="manifest-btn-box" data-opened="false">
                    <button class="btn-gy btn-manifest" onclick="event.stopPropagation(); alert('Манифест Левой Картины');">Манифест</button>
                </div>
            </div>
            
            <div class="painting-zone painting-right" onclick="toggleManifest('m-box-right')">
                <span class="cue-arrow-hall">&gt;</span>
                <div id="m-box-right" class="manifest-btn-box" data-opened="false">
                    <button class="btn-gy btn-manifest" onclick="event.stopPropagation(); alert('Манифест Правой Картины');">Манифест</button>
                </div>
            </div>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="quote-text">Бар "Сонная Лошадь"</div>
        <p style="text-align:center; max-width:400px; font-style:italic;">За стойкой меланхолично протирает бокалы Бармен-Лошадь...</p>
        <div class="bar-ui-container">
            <button class="btn-gy" onclick="smoothTransitionToTables()">Выйти к столикам</button>
        </div>
    </div>

    <div id="nav-welcome" class="ui-nav-arrows" onclick="portalTransition('block-entrance')"><span class="arrow-item">↩</span></div>
    <div id="nav-identity" class="ui-nav-arrows" onclick="portalTransition('block-welcome')"><span class="arrow-item">↩</span></div>
    <div id="nav-hall" class="ui-nav-arrows" onclick="portalTransition('block-identity')"><span class="arrow-item">↩</span></div>
    <div id="nav-bar" class="ui-nav-arrows" onclick="portalTransition('block-hall')"><span class="arrow-item">↩</span></div>

    <div id="modal-passport" class="passport-overlay" onclick="closePassport()">
        <div class="passport-card" onclick="event.stopPropagation()">
            <div class="passport-close-btn" onclick="closePassport()">&times;</div>
            <h3 style="margin:0 0 10px 0; font-family:'Playfair Display'; font-weight:900;">GY-GY CLUB PASSPORT</h3>
            <div class="box-final">
                <img id="pass-avatar-img" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <p style="font-size:14px; margin: 5px 0; font-weight:bold;">ID: <span id="pass-id-val"></span></p>
            <div id="pass-qr-box" style="margin: 10px auto; display:inline-block; background:#fff; padding:5px;"></div>
        </div>
    </div>

    <audio id="snd-door" src="door_creak.mp3" preload="auto"></audio>
    <audio id="snd-ambient" src="entrance_ambient.mp3" preload="auto" loop></audio>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        let currentID = "";
        let currentActiveCode = localStorage.getItem('gy_lang') || 'en';
        let currentUserImage = "";
        let currentFlagCode = localStorage.getItem('gygy_flag') || 'gb';

        const allLangs = [
            {n:'ENGLISH', c:'gb', code:'en'}, 
            {n:'DEUTSCH', c:'de', code:'de'}, 
            {n:'ESPAÑOL', c:'es', code:'es'}, 
            {n:'FRANÇAIS', c:'fr', code:'fr'},
            {n:'ITALIANO', c:'it', code:'it'}, 
            {n:'POLSKI', c:'pl', code:'pl'}, 
            {n:'PORTUGUÊS .', c:'pt', code:'pt'}, 
            {n:'РУССКИЙ', c:'ru', code:'ru'}, 
            {n:'TÜRKЧЕ', c:'tr', code:'tr'}, 
            {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
            {n:'中文', c:'cn', code:'zh-CN'}, 
            {n:'日本語', c:'jp', code:'ja'}
        ];

        function renderLangList() {
            const container = document.getElementById('lang-list-container');
            if (!container) return;
            container.innerHTML = ''; 
            
            const currentLang = allLangs.find(l => l.code === currentActiveCode) || allLangs[0];
            const activeFlag = document.getElementById('header-active-flag');
            const activeName = document.getElementById('header-active-name');
            
            if (activeFlag) activeFlag.src = `https://flagcdn.com/w40/${currentLang.c}.png`;
            if (activeName) activeName.innerText = currentLang.n;

            allLangs.forEach(lang => {
                if(lang.code === currentActiveCode) return; 
                const div = document.createElement('div');
                div.className = 'lang-item notranslate'; 
                div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"><span>${lang.n}</span>`;
                div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
                container.appendChild(div);
            });
        }

        function applyLanguage(lang) {
            currentActiveCode = lang.code;
            currentFlagCode = lang.c; 
            try {
                localStorage.setItem('gygy_flag', lang.c);
                localStorage.setItem('gy_lang', lang.code);
                localStorage.setItem('googTrans', `/en/${lang.code}`);
            } catch(e) {}
            
            const cookieSecure = "; path=/; SameSite=Strict; Secure;";
            if (window.location.hostname && window.location.hostname !== 'localhost') {
                document.cookie = `googtrans=/en/${lang.code}; domain=${window.location.hostname}${cookieSecure}`;
            }
            document.cookie = `googtrans=/en/${lang.code}${cookieSecure}`;
            
            renderLangList();

            const selectTimer = setInterval(() => {
                try {
                    const selectEl = document.querySelector('.goog-te-combo');
                    if (selectEl) {
                        selectEl.value = lang.code;
                        selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                        clearInterval(selectTimer);
                    }
                } catch(err) {}
            }, 150);
        }

        function toggleLangList() {
            const list = document.getElementById('lang-list-container');
            if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
        }

        function toggleManifest(boxId) {
            const box = document.getElementById(boxId);
            if (!box) return;
            const isOpened = box.getAttribute('data-opened') === "true";
            box.style.opacity = isOpened ? "0" : "1";
            box.style.pointerEvents = isOpened ? "none" : "auto";
            box.setAttribute('data-opened', isOpened ? "false" : "true");
            box.style.bottom = isOpened ? "-50px" : "-35px";
        }

        function handleDoor() {
            const doorSound = document.getElementById('snd-door');
            if (doorSound) doorSound.play().catch(() => {});
            const d = document.getElementById('main-door');
            if (d) { d.style.transform = "scale(5)"; d.style.opacity = "0"; d.style.pointerEvents = "none"; }
            
            currentID = `GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            try { localStorage.setItem('gygy_id', currentID); } catch(e) {}
            renderUserPassports(currentID);
            
            setTimeout(() => { 
                portalTransition('block-welcome'); 
                const a = document.getElementById('snd-ambient'); 
                if (a) { a.volume = 1; a.play().catch(() => {}); }
            }, 1000);
        }

        function renderUserPassports(targetID) {
            const idLabel = document.getElementById('id-label');
            const passIdVal = document.getElementById('pass-id-val');
            const passQrBox = document.getElementById('pass-qr-box');

            if (idLabel) idLabel.innerText = targetID;
            if (passIdVal) passIdVal.innerText = targetID;
            if (passQrBox && typeof QRCode !== 'undefined') {
                passQrBox.innerHTML = "";
                new QRCode(passQrBox, { text: targetID, width: 100, height: 100 });
            }
        }

        function checkAndFillRegistrationForm() {
            let savedAvatar = null;
            try {
                savedAvatar = localStorage.getItem('gy_user_img') || localStorage.getItem('gygy_avatar');
                currentID = localStorage.getItem('gygy_id') || localStorage.getItem('gy_user_id');
            } catch(e) {}
            
            if (currentID) renderUserPassports(currentID);
            
            if (savedAvatar) {
                currentUserImage = savedAvatar;
                const avatarImg = document.getElementById('avatar-img');
                const ppImg = document.getElementById('pp');
                const txtAv = document.getElementById('txt-avatar');
                
                if (savedAvatar.startsWith('data:image/svg+xml')) {
                    if (avatarImg) { avatarImg.src = savedAvatar; avatarImg.style.display = "block"; }
                    if (ppImg) ppImg.style.display = "none";
                } else {
                    if (ppImg) { ppImg.src = savedAvatar; ppImg.style.display = "block"; }
                    if (avatarImg) avatarImg.style.display = "none";
                }
                if (txtAv) txtAv.style.display = "none";
                
                const btnWHall = document.getElementById('btn-w-hall');
                if(btnWHall) btnWHall.classList.remove('btn-sleep');
                const btnPass = document.getElementById('btn-pass');
                if(btnPass) btnPass.classList.remove('btn-sleep');
            }
        }

        function portalTransition(nextId) {
            if (nextId !== 'block-bar') {
                stopBarSound();
            }

            const current = document.querySelector('.block.active');
            const badge = document.getElementById('global-user-badge');
            
            if (current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }

            setTimeout(() => {
                if (current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                if (!next) return;
                
                next.style.display = "flex";
                const langPanel = document.getElementById('lang-switcher');
                const allArrows = document.querySelectorAll('.ui-nav-arrows');
                allArrows.forEach(arrow => arrow.style.display = 'none');

                if (nextId === 'block-entrance') {
                    const door = document.getElementById('main-door');
                    if (door) { door.style.transform = "scale(1)"; door.style.opacity = "1"; door.style.pointerEvents = "auto"; }
                    if (langPanel) { langPanel.style.display = 'flex'; langPanel.style.opacity = '1'; }
                    if (badge) badge.style.display = "none";
                } else {
                    if (langPanel) langPanel.style.display = 'none';
                    
                    if (nextId === 'block-welcome') document.getElementById('nav-welcome').style.display = "flex";
                    if (nextId === 'block-identity') { 
                        document.getElementById('nav-identity').style.display = "flex"; 
                        checkAndFillRegistrationForm();
                    }
                    if (nextId === 'block-hall') document.getElementById('nav-hall').style.display = "flex";
                    if (nextId === 'block-bar') document.getElementById('nav-bar').style.display = "flex";
                    
                    if(['block-hall', 'block-bar'].includes(nextId)) {
                        try { currentUserImage = localStorage.getItem('gy_user_img') || localStorage.getItem('gygy_avatar'); } catch(e) {}
                        if (currentUserImage && badge) {
                            document.getElementById('badge-avatar-img').src = currentUserImage;
                            document.getElementById('pass-avatar-img').src = currentUserImage;
                            badge.style.display = "block";
                        }
                    }
                }

                setTimeout(() => { 
                    next.classList.add('active'); next.style.pointerEvents = "auto";
                    if (nextId === 'block-bar') playBarSound();
                }, 50);
            }, 400); 
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('avatar-img').style.display = "none";
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('txt-avatar').style.display = "none";
                    currentUserImage = e.target.result;
                    try { localStorage.setItem('gygy_avatar', currentUserImage); } catch(err) {}
                    document.getElementById('btn-pass').classList.add('btn-sleep');
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function generateAvatar() {
            document.getElementById('pp').style.display = "none"; 
            const randomColor = Math.floor(Math.random()*16777215).toString(16);
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><rect width="100" height="100" fill="#${randomColor}"/><circle cx="50" cy="40" r="20" fill="#000"/><path d="M20,90 Q50,50 80,90 Z" fill="#000"/></svg>`;
            currentUserImage = 'data:image/svg+xml;utf8,' + encodeURIComponent(svgString);
            try { localStorage.setItem('gygy_avatar', currentUserImage); } catch(e) {}
            document.getElementById('avatar-img').src = currentUserImage; 
            document.getElementById('avatar-img').style.display = "block";
            document.getElementById('txt-avatar').style.display = "none";
            document.getElementById('btn-pass').classList.add('btn-sleep');
        }

        function saveUserProfile() {
            if(!currentUserImage) return; 
            try {
                localStorage.setItem('gy_user_id', currentID);
                localStorage.setItem('gy_user_img', currentUserImage);
            } catch(e) {}
            document.getElementById('btn-w-hall').classList.remove('btn-sleep');
            document.getElementById('btn-pass').classList.remove('btn-sleep');
        }

        function openPassport() { 
            document.getElementById('modal-passport').style.display = "flex"; 
            setTimeout(() => { document.getElementById('modal-passport').style.opacity = "1"; }, 10);
        }

        function closePassport() { 
            document.getElementById('modal-passport').style.opacity = "0";
            setTimeout(() => { document.getElementById('modal-passport').style.display = "none"; }, 300);
        }
        
        window.onload = () => { 
            let savedFlag = 'gb';
            try {
                savedFlag = localStorage.getItem('gygy_flag') || 'gb';
                currentID = localStorage.getItem('gygy_id') || localStorage.getItem('gy_user_id');
            } catch(e) {}

            const bFlag = document.getElementById('badge-flag-img');
            if (bFlag) bFlag.src = `https://flagcdn.com/w20/${savedFlag}.png`;

            renderLangList(); 
            
            const isReturning = sessionStorage.getItem('return_to_bar') || 'false';
            sessionStorage.removeItem('return_to_bar');

            if (isReturning === 'true' && currentID) {
                portalTransition('block-bar');
            } else {
                portalTransition('block-entrance');
                if (currentID) checkAndFillRegistrationForm();
            }
        };
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const barAmbient = new Audio('bar_ambient.mp3');   
        const horseCough = new Audio('charlie_bar_fx.mp3'); 

        barAmbient.loop = true;
        barAmbient.volume = 0.5;
        horseCough.volume = 0.7; 
        let coughInterval = null; 

        function playBarSound() {
            const barBlock = document.getElementById('block-bar');
            if (!barBlock || !barBlock.classList.contains('active')) {
                stopBarSound();
                return;
            }

            barAmbient.play().then(() => {
                if (!coughInterval) {
                    coughInterval = setInterval(() => {
                        const stillInBar = document.getElementById('block-bar')?.classList.contains('active');
                        if (stillInBar && !barAmbient.paused) {
                            horseCough.currentTime = 0; 
                            horseCough.play().catch(() => {});
                        } else {
                            stopBarSound(); 
                        }
                    }, 15000); 
                }
            }).catch(() => {});
        }

        function stopBarSound() {
            if (barAmbient) barAmbient.pause();
            if (horseCough) horseCough.pause();
            if (coughInterval) { clearInterval(coughInterval); coughInterval = null; }
        }

        function smoothTransitionToTables() {
            let vol = 10;
            const fadeInterval = setInterval(() => {
                vol--;
                if (barAmbient && barAmbient.volume > 0.05) barAmbient.volume = Math.max(0, Math.min(0.5, vol / 20));
                if (horseCough && horseCough.volume > 0.05) horseCough.volume = Math.max(0, Math.min(0.7, vol / 14));
                if (vol <= 0) { clearInterval(fadeInterval); stopBarSound(); }
            }, 30);

            document.body.style.transition = "opacity 0.6s ease-in-out";
            document.body.style.opacity = '0';
            setTimeout(() => { location.href = 'tables.html'; }, 600);
        }
    </script>
