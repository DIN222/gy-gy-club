<!DOCTYPE html>
<!-- PROJECT: GY-GY Club | VERSION: 2.8.0 | STATUS: Digital City Gateway -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | v.2.8.0</title>
    <link rel="stylesheet" href="style.css?v=2.8.0">
</head>
<body class="gate-keeper">
    <!-- MARKER: PERMANENT_ATTRIBUTES_START -->
    <audio id="snd-door" src="assets/sounds/doors_open.mp3" preload="auto"></audio>
    <audio id="snd-click" src="assets/sounds/click.mp3" preload="auto"></audio>

    <div id="portal-doors">
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <header class="permanent-header">
        <div id="logo-block">
            <!-- Постоянный атрибут: Логотип GY-GY -->
            <img src="logo_gygy.png" alt="GY-GY" id="main-logo">
            <div id="dynamic-slogan-box">
                <span id="slogan-text"></span>
            </div>
        </div>

        <div id="identity-node" class="hidden">
            <div class="avatar-wrapper" onclick="toggleFlagMenu()">
                <img id="user-avatar" src="default_avatar.png">
                <img id="user-flag" src="flags/en.png">
            </div>
        </div>
        <!-- Кнопка возврата на предыдущий уровень -->
        <button id="back-btn" class="gy-back-btn" onclick="history.back()">←</button>
    </header>
    <!-- MARKER: PERMANENT_ATTRIBUTES_END -->

    <main id="main-stage" class="content-blur">
        <div id="welcome-zone">
            <h1 id="ui-title" data-key="welcome_title"></h1>
            <button id="enter-btn" class="gy-btn" data-key="btn_enter" onclick="Agent.enterClub()"></button>
        </div>
    </main>

    <script src="core-agent.js?v=2.8.0"></script>
</body>
</html>
