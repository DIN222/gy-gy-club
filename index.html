<!DOCTYPE html>
<html lang="en"> <!-- По умолчанию английский -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY Club | v.3.9.0</title>
    <link rel="stylesheet" href="style.css?v=3.9.0">
</head>
<body>
    <!-- ПОСТОЯННЫЕ АТРИБУТЫ (v.3.9.0) -->
    <header class="permanent-header">
        <img src="logo_gygy.png" id="main-logo" alt="GY-GY"> <!-- Логотип GY-GY -->
        <div id="identity-node">
            <div class="avatar-wrapper" onclick="Agent.toggleFlags()">
                <img id="user-avatar" src="default_avatar.png"> <!-- Уникальный аватар -->
                <img id="user-flag" src="flags/en.png"> <!-- Языковая панель -->
            </div>
        </div>
        <button id="back-btn" onclick="Agent.goBack()">← BACK</button> <!-- Кнопка возврата -->
    </header>

    <!-- БЛОК: ВХОД С ДВЕРЯМИ -->
    <!-- Раздвижные двери с текстурой door_1.jpg и звуком door_open.mp3 -->
    <div id="portal-doors">
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <main id="app-stage">
        <!-- Сюда Агент инжектирует Приветствие, Регистрацию и Холл -->
    </main>

    <script src="core-agent.js?v=3.9.0"></script>
</body>
</html>
