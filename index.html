<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.567 | PASSPORT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; outline: none !important; }
        
        html, body { 
            width: 100vw; height: 100vh; height: 100dvh; 
            background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; 
            overflow: hidden !important; position: fixed !important; margin:0; padding:0; touch-action: none;
        }
        
        /* Глушилка мусора Google */
        #google_translate_element, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; visibility: hidden !important; }
        body { top: 0 !important; }

        /* Языковой шлюз (11+1) под размер PORTUGUÊS (.) */
        .lang-frame {
            position: fixed !important; top: 15px; left: 15px; 
            z-index: 2000000; width: 235px; height: 46px; 
            border: 2px solid var(--gold); background: #000; 
            cursor: pointer; pointer-events: auto !important;
        }
        .lang-current { width: 100%; height: 100%; display: flex; align-items: center; padding: 0 10px; font-size: 13px; font-weight: bold; }
        .lang-current img { width: 20px; margin-right: 10px; }
        .lang-dropdown {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 235px; background: #000; border: 2px solid var(--gold); border-top: none;
            max-height: 50vh; overflow-y: auto; z-index: 2000001;
        }
        .lang-frame:hover .lang-dropdown { display: block; }
        .lang-item { padding: 10px; display: flex; align-items: center; color: var(--gold); transition: 0.2s; }
        .lang-item:hover { background: rgba(212, 175, 55, 0.2); }
        .lang-item img { width: 18px; margin-right: 10px; }

        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000000; font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold); pointer-events: none; }
        
        .ui-back-to-bar { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005;
            background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; cursor: pointer; font-size: 14px; text-transform: uppercase; display: none; opacity: 0; transition: 0.5s;
        }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; color: var(--gold); text-align: center; max-width: 85%; line-height: 1.2; margin-bottom: 20px; }

        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        .id-card-hall { 
            position: absolute; top: 70%; left: 50%; transform: translate(-50%,-50%); 
            width: 230px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; 
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; 
        }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        #main-door { width: 280px; cursor: pointer; transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; }
        
        #block-bar img { height: 70vh !important; width: auto; max-width: 95vw; object-fit: contain; margin-bottom: -10px; }
        .bar-ui-container { position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%); width: 100%; max-width: 380px; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .bar-side-buttons { width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px; }
        
        .lamp-zone { position: absolute; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; z-index: 100; background: radial-gradient(circle, var(--neon-glow) 0%, transparent 75%); border: 1px solid var(--violet); box-shadow: 0 0 18px var(--neon-glow); transform: translate(-50%, -50%); }
    /* ГЕОМЕТРИЯ КОНСТАНТЫ v5.0 */
    .lang-frame-locked {
        position: fixed; top: 15px; left: 15px; z-index: 2000000;
        width: 210px; height: 46px; border: 2px solid var(--gold);
        background: #000; box-sizing: border-box; cursor: pointer;
    }
    .lang-active-zone { width: 100%; height: 100%; display: flex; align-items: center; padding: 0 12px; }
    .flag-icon { width: 22px; height: auto; margin-right: 12px; border: 1px solid rgba(214, 175, 55, 0.3); }
    .lang-text { font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--gold); }

    .lang-dropdown-adaptive {
        display: none; position: absolute; top: 46px; left: 0; width: 210px;
        background: rgba(0, 0, 0, 0.95); overflow-y: auto; border: 1px solid var(--gold); border-top: none;
    }
    .lang-item { display: flex; align-items: center; padding: 10px 12px; transition: 0.2s; border-left: 2px solid transparent; }
    .lang-item:hover { background: rgba(214, 175, 55, 0.15); border-left: 2px solid var(--gold); }
    
    /* Защита от скролла Google */
    .skiptranslate, #google_translate_element { display: none !important; }
    body { top: 0 !important; }
    
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lang-switcher" class="lang-frame-locked">
        <div class="lang-active-zone" id="active-lang-display" onclick="toggleLangList()">
            <img src="https://flagcdn.com/w40/gb.png" class="flag-icon">
            <span class="lang-text">ENGLISH</span>
        </div>
        <div id="lang-list-container" class="lang-dropdown-adaptive"></div>
    </div>
    
    <div id="google_translate_element" style="display:none;"></div>
    </div>

    <div class="ui-header-right">GY-GY</div>
    <button class="ui-back-to-bar" id="btn-global-back" onclick="portalTransition('block-bar')">Назад в бар</button>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1; display: flex; pointer-events: auto;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block" style="justify-content: flex-start; padding-top: 5vh;">
        <div class="quote-text">«В каждой шутке есть доля виски»</div>
        <img src="horse_welcome.png" style="max-height: 40vh; width: auto;">
        <div style="font-size: 38px; font-weight: 700; letter-spacing: 12px; color: var(--gold); font-style: italic;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПОЛУЧИТЬ ID</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-text">«Шампанского много не бывает»</div>
        <div style="display:flex; gap:10px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold); font-size:11px;" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg" style="border-color:var(--gold);"></div>
            <div class="box-final" style="border-color:var(--gold); cursor:pointer;" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="color:var(--gold); font-size:10px; font-weight:900;">ФОТО</span>
            </div>
            <div class="box-final" style="border-color:var(--gold); cursor:pointer;" onclick="generateAvatar()">
                <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-avatar" style="color:var(--gold); font-size:10px; font-weight:900; text-align:center;">GEN<br>AVATAR</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОЙТИ В ХОЛЛ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:15;"></div>
        <div style="position:absolute; top: 8%; width: 100%; text-align: center; color: var(--door-wood); font-size: 32px; font-weight: 900; font-family: 'Playfair Display'; z-index: 25;">«Всё будет GY-GY»</div>
        <div class="id-card-hall">
            <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                <div id="h-id" style="font-weight:900; font-size:12px;">#ID</div>
                <div id="user-flag-icon"></div>
            </div>
            <div style="display:flex; gap:15px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000; padding:10px;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000; padding:10px;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div class="quote-text" style="position:absolute; top:8vh; z-index:100;">«Игого, сейчас начнем!»</div>
        <div class="bar-ui-container">
            <div class="bar-side-buttons">
                <button class="btn-gy" style="font-size:12px; min-width:145px; background:rgba(0,0,0,0.6);" onclick="portalTransition('block-tables')">ЗА СТОЛИКИ</button>
                <button class="btn-gy" style="font-size:12px; min-width:145px; background:rgba(0,0,0,0.6);" onclick="deepDive()">В AI ROOM</button>
            </div>
            <button class="btn-gy" style="font-size:12px; min-width:145px; background:rgba(0,0,0,0.6);" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
        </div>
        <img src="horse_bar.png">
    </div>

    <div id="block-tables" class="block">
        <div id="table-1" class="lamp-zone" style="bottom: 49.2%; left: 49.9%;"></div>
        <div id="table-2" class="lamp-zone" style="bottom: 22.1%; left: 35.7%;"></div>
    </div>

    <script>
        let currentID = "";
        let selectedFlag = "gb";

        const clubLangs = [
            {n:'ENGLISH', c:'gb', code:'en'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
            {n:'UKRAINIAN', c:'ua', code:'uk'}, {n:'POLSKI', c:'pl', code:'pl'}, 
            {n:'DEUTSCH', c:'de', code:'de'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
            {n:'ITALIANO', c:'it', code:'it'}, {n:'ESPAÑOL', c:'es', code:'es'}, 
            {n:'TÜRKЧE', c:'tr', code:'tr'}, {n:'PORTUGUÊS', c:'pt', code:'pt'}, 
            {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
        ];

       const clubLangs = [
        {n:'ENGLISH', c:'gb', code:'en'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
        {n:'UKRAINIAN', c:'ua', code:'uk'}, {n:'POLSKI', c:'pl', code:'pl'}, 
        {n:'DEUTSCH', c:'de', code:'de'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
        {n:'ITALIANO', c:'it', code:'it'}, {n:'ESPAÑOL', c:'es', code:'es'}, 
        {n:'TÜRKÇE', c:'tr', code:'tr'}, {n:'PORTUGUÊS', c:'pt', code:'pt'}, 
        {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
    ];

    let selectedLangFlag = 'gb';

    function initLangEngine() {
        const container = document.getElementById('lang-list-container');
        if (!container) return;
        // Расчет высоты под экран, чтобы не было внешнего скролла
        container.style.maxHeight = (window.innerHeight - 80) + 'px';
        container.innerHTML = '';
        clubLangs.forEach(lang => {
            if(lang.code === 'en') return;
            const div = document.createElement('div');
            div.className = 'lang-item';
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> <span class="lang-text">${lang.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
            container.appendChild(div);
        });
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function applyLanguage(lang) {
        selectedLangFlag = lang.c;
        document.getElementById('active-lang-display').innerHTML = `
            <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon">
            <span class="lang-text">${lang.n}</span>
        `;
        const gtCombo = document.querySelector('.goog-te-combo');
        if (gtCombo) {
            gtCombo.value = lang.code;
            gtCombo.dispatchEvent(new Event('change', { bubbles: true }));
        }
        document.getElementById('lang-list-container').style.display = 'none';
    }

    // Запуск двигателя
    window.addEventListener('load', initLangEngine);
        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            const langS = document.getElementById('lang-switcher');
            if(current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }
            
            // Скрываем шлюз везде после двери
            langS.style.display = (nextId === 'block-entrance') ? 'block' : 'none';

            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { next.classList.add('active'); next.style.opacity = "1"; next.style.pointerEvents = "auto"; }, 50);
            }, 800);
        }

        function handleDoor() {
            document.getElementById('lang-switcher').style.display = 'none';
            const d = document.getElementById('main-door');
            document.getElementById('snd-door').play();
            d.style.transform = "scale(5)"; d.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            document.getElementById('user-flag-icon').innerHTML = `<img src="https://flagcdn.com/w40/${selectedFlag}.png" style="width:25px;">`;
            
            document.getElementById('qr-box-reg').innerHTML = "";
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            
            setTimeout(() => { portalTransition('block-welcome'); document.getElementById('snd-ambient').play(); }, 1800);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('avatar-img').style.display = "none";
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result; 
                    document.getElementById('txt-photo').style.display = "none";
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function generateAvatar() {
            document.getElementById('pp').style.display = "none";
            document.getElementById('txt-photo').style.display = "block";
            const seed = Math.random().toString(36).substring(7);
            const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${seed}`;
            document.getElementById('avatar-img').src = url;
            document.getElementById('avatar-img').style.display = "block";
            document.getElementById('h-photo').src = url;
        }

        function swapButtons(a, s) { 
            document.getElementById(a).classList.add('btn-sleep'); 
            document.getElementById(s).classList.remove('btn-sleep'); 
        }

        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element'); }
        function deepDive() { document.body.style.opacity = "0"; setTimeout(() => { window.location.href = 'bridge_protocol.html'; }, 1200); }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
