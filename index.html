<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --dark-gray: #1a1a1a;
            --light-gray: #2a2a2a;
            --text: #f0f0f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Общие стили для экранов-блоков */
        .block {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            background: var(--dark-gray);
            border: 2px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .block.active {
            display: flex;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Постоянные атрибуты клуба (Логотип GY-GY) */
        .club-logo {
            font-size: 3rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* Кнопки */
        .btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .btn-sleep {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Дверь */
        .door {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .door-exploded {
            transform: scale(0.8) rotateY(90deg);
            opacity: 0;
        }

        /* Юзер-Бейдж в Холле */
        #global-user-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--gold);
        }

        #badge-avatar-img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Специфические элементы регистрации */
        .avatar-preview-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .avatar-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        input[type="text"] {
            background: var(--light-gray);
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 10px;
            color: #white;
            font-family: inherit;
            border-radius: 6px;
            outline: none;
            text-align: center;
            width: 80%;
        }
    </style>
</head>
<body>

    <div id="global-user-badge" style="display: none;">
        <img id="badge-avatar-img" src="" alt="Avatar">
        <span id="badge-nickname" style="color: var(--gold); font-weight: bold;">@GUEST</span>
    </div>

    <div id="block-entrance" class="block active">
        <div class="club-logo">GY-GY</div>
        <p>Постучись в закрытую дверь...</p>
        <div id="main-door" class="door" onclick="handleDoor()">🚪</div>
    </div>

    <div id="block-welcome" class="block">
        <div class="club-logo">GY-GY</div>
        <h2>Приветствуем, Странник!</h2>
        <p>Ты стоишь на пороге обители юмора, кода и мемов. Чтобы продолжить, нам нужно зафиксировать твой цифровой след.</p>
        <button class="btn" onclick="portalTransition('block-identity')">Создать личность</button>
    </div>

    <div id="block-identity" class="block">
        <h2>Регистрация личности</h2>
        
        <div class="avatar-preview-box">
            <img id="avatar-img" style="display: none;">
            <img id="pp" style="display: none;">
            <div id="txt-avatar">НЕТ ФОТО</div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="btn" style="font-size:0.8rem; padding: 8px 15px;" onclick="generateAvatar()">GY-Генератор</button>
            <label class="btn" style="font-size:0.8rem; padding: 8px 15px; cursor: pointer;">
                Своё фото <input type="file" accept="image/*" onchange="preview(this)" style="display: none;">
            </label>
        </div>

        <input type="text" id="input-nickname" placeholder="Твой Клубный Никнейм" oninput="validateInput()">
        <input type="text" id="id-label" readonly style="color: var(--gold); border: none; font-weight: bold;" value="Генерация ID...">

        <button id="btn-w-hall" class="btn btn-sleep" onclick="saveUserProfileAndEnter()">Зайти в Холл ──►</button>
    </div>

    <div id="block-hall" class="block">
        <div class="club-logo">GY-GY HALL</div>
        <h2>Главный Зал Клуба</h2>
        <p>Чувствуй себя как дома. Ты официально в теме!</p>
        
        <div style="display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px;">
            <button class="btn" onclick="alert('Улетели на Версы!')">🖧 Серверная</button>
            <button class="btn" onclick="alert('Наливаем!')">🍺 Бар GY-GY</button>
        </div>
    </div>

    <audio id="snd-door" src="https://assets.mixkit.co/active_storage/sfx/2065/2065-84.wav" preload="auto"></audio>

    <script src="register.js"></script>
</body>
</html>
