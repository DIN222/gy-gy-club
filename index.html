<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | Global Tool</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="lang-gateway">
        <button class="btn-main-lang" id="lang-trigger">
            <img id="cur-flag" src="https://flagcdn.com/w20/gb.png" class="flag-icon">
            <span id="cur-name">ENGLISH</span>
        </button>
        <div id="lang-list" class="lang-dropdown">
            </div>
    </div>

    <section id="scr-entry" class="block active">
        <img src="door_1.jpg" id="main-door" alt="Door">
    </section>

    <section id="scr-welcome" class="block">
        <h2 id="quote" data-key="q_whiskey">...</h2>
        <button class="btn-gy" id="go-id" data-key="btn_get_id">GET ID</button>
        <button class="btn-gy btn-sleep" id="go-hall" data-key="btn_to_hall">TO HALL</button>
    </section>

    <section id="scr-id" class="block">
        <div class="id-creator">
            <div id="avatar-zone" class="box-final" onclick="generateAvatar()">
                <img id="user-photo" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="label-av" data-key="label_avatar">AVATAR</span>
            </div>
            <div id="qr-reg" class="box-final"></div>
        </div>
        <button class="btn-gy" id="save-btn" data-key="btn_save">SAVE</button>
        <button class="btn-gy btn-sleep" id="final-hall" data-key="btn_to_hall">GO TO HALL</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
