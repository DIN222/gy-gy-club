<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GY-GY Club v4.6.0 (.)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --frame-w: 210px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* HEADER (.) */
        .ui-header { 
            position: fixed; top: 25px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding: 0 30px; z-index: 1000; 
        }

        /* LANG BOX - FIXED & CLEAN (.) */
        .lang-wrapper { width: var(--frame-w); position: relative; }
        .lang-active { 
            border: 2px solid var(--gold); height: 48px; display: flex; 
            align-items: center; padding: 0 12px; background: var(--bg); 
            cursor: pointer; font-size: 16px; font-weight: bold;
        }
        .lang-active img { width: 24px; margin-right: 12px; border: 1px solid rgba(212,175,55,0.3); }

        .lang-dropdown { 
            display: none; position: absolute; top: 100%; left: 0; width: 100%; 
            background: var(--bg); border: 2px solid var(--gold); border-top: none; 
            max-height: 400px; overflow-y: auto; 
        }
        .lang-wrapper:hover .lang-dropdown { display: block; }
        .lang-item { 
            padding: 12px; display: flex; align-items: center; cursor: pointer; 
            transition: 0.2s; font-size: 14px; border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .lang-item:hover { background: rgba(212, 175, 55, 0.15); }
        .lang-item img { width: 20px; margin-right: 10px; }

        /* LOGO (.) */
        .logo { 
            font-size: 28px; font-weight: 900; letter-spacing: 6px; 
            line-height: 48px; /* Совпадает с высотой lang-active */
            height: 48px; display: flex; align-items: center;
        }

        /* SLOGAN (.) */
        #top-slogan { 
            position: fixed; top: 100px; width: 100%; text-align: center; 
            font-family: 'Playfair Display', serif; font-style: italic; 
            font-size: 20px; padding: 0 40px; opacity: 1; color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* ENTRANCE BLOCK (.) */
        .stage { 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .door-img { 
            width: 300px; max-width: 80vw; cursor: pointer; 
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.2));
        }
        .door-img:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="ui-header">
        <div class="lang-wrapper">
            <div class="lang-active" id="current-lang">
                <img src="https://flagcdn.com/w40/ua.png"> <span>UKRAINIAN</span>
            </div>
            <div class="lang-dropdown" id="lang-list">
                </div>
        </div>
        <div class="logo">GY-GY</div>
    </div>

    <div id="top-slogan">«Заходите, здесь вам так рады, что вы даже не представляете...»</div>

    <div class="stage" id="entrance">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="enterClub()">
    </div>

    <script>
        const languages = [
            { n: 'UKRAINIAN', c: 'ua' },
            { n: 'РУССКИЙ', c: 'ru' },
            { n: 'ENGLISH', c: 'gb' },
            { n: 'DEUTSCH', c: 'de' },
            { n: 'POLSKI', c: 'pl' },
            { n: 'FRANÇAIS', c: 'fr' },
            { n: 'ESPAÑOL', c: 'es' },
            { n: 'ITALIANO', c: 'it' },
            { n: 'TÜRKÇE', c: 'tr' },
            { n: '中文', c: 'cn' },
            { n: '日本語', c: 'jp' }
        ];

        const listDiv = document.getElementById('lang-list');
        languages.forEach(lang => {
            const div = document.createElement('div');
            div.className = 'lang-item';
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png"> <span>${lang.n}</span>`;
            div.onclick = () => {
                document.getElementById('current-lang').innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png"> <span>${lang.n}</span>`;
            };
            listDiv.appendChild(div);
        });

        function enterClub() {
            const door = document.getElementById('main-door');
            door.style.transform = "scale(8) translateZ(0)";
            door.style.opacity = "0";
            // Дальнейшая логика перехода...
        }
    </script>
</body>
</html>
