<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.59 | STABLE (.)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; outline: none !important; }
        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }

        /* ИСПРАВЛЕННАЯ ПАНЕЛЬ: ГОРИЗОНТ И ШРИФТ (.) */
        .lang-container { 
            position: fixed; top: 18px; left: 25px; z-index: 1000001; 
            display: flex !important; flex-direction: column !important; 
            width: 210px !important; /* Под "УКРАЇНСЬКА" (.) */
        }
        .lang-current {
            border: 1px solid var(--gold); padding: 0 12px; height: 38px; box-sizing: border-box;
            display: flex; align-items: center; gap: 10px; cursor: pointer; background: #000; 
            font-size: 14px; font-family: 'Share Tech Mono', monospace;
        }
        .lang-dropdown { 
            display: none; flex-direction: column !important; background: #000; 
            border: 1px solid var(--gold); border-top: none; width: 208px !important; 
        }
        .lang-container:hover .lang-dropdown { display: flex !important; }
        .lang-btn { 
            background: none; border: none; color: var(--gold); padding: 10px 12px; 
            cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px;
            font-family: 'Share Tech Mono', monospace; width: 100%; font-size: 12px;
        }

        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold); 
            pointer-events: none; height: 38px; display: flex; align-items: center;
            font-family: 'Share Tech Mono', monospace; /* ШРИФТ КАК У ЯЗЫКОВ (.) */
        }

        /* ДВЕРЬ +10px (44vh + 10px) (.) */
        #main-door { 
            height: calc(44vh + 10px) !important; width: auto !important;
            cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; 
            z-index: 9999; pointer-events: auto !important; 
        }

        /* БЛОКИ ИЗ ТВОЕГО v4.4.56 */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; color: var(--gold); text-align: center; max-width: 85%; line-height: 1.3; margin-bottom: 30px; letter-spacing: 1px; }
        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: 0.3s; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }
        .id-card-hall { position: absolute; top: 72%; left: 50%; transform: translate(-50%,-50%); width: 220px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="lang-container">
        <div class="lang-current" id="active-lang">
            <img src="https://flagcdn.com/w20/gb.png" id="main-flag"> <span>ENGLISH</span>
        </div>
        <div class="lang-dropdown" id="drop-menu">
            <button class="lang-btn" onclick="selectLang('en','ENGLISH','gb')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button class="lang-btn" onclick="selectLang('ua','УКРАЇНСЬКА','ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="selectLang('ru','РУССКИЙ','ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button class="lang-btn" onclick="selectLang('pl','POLSKI','pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button class="lang-btn" onclick="selectLang('de','DEUTSCH','de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
            <button class="lang-btn" onclick="selectLang('fr','FRANÇAIS','fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
            <button class="lang-btn" onclick="selectLang('it','ITALIANO','it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
            <button class="lang-btn" onclick="selectLang('es','ESPAÑOL','es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
            <button class="lang-btn" onclick="selectLang('cn','中文','cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
            <button class="lang-btn" onclick="selectLang('jp','日本語','jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
            <button class="lang-btn" onclick="selectLang('tr','TÜRKÇE','tr')"><img src="https://flagcdn.com/w20/tr.png"> TÜRKÇE</button>
        </div>
    </div>

    <div class="ui-header-right">GY-GY</div>

    <div id="block-entrance" class="block active" style="opacity: 1; display: flex; pointer-events: auto;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block" style="justify-content: flex-start; padding-top: 5vh;">
        <div class="quote-text" style="margin-bottom: 5px;">"In every joke there is a drop of whisky"</div>
        <img src="horse_welcome.png" style="max-height: 45vh; width: auto; margin-bottom: 0px;">
        <div style="font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; letter-spacing: 12px; margin-bottom: 15px; color: var(--gold); text-transform: uppercase; font-style: italic;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED TO HALL</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">GET CLUB ID</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-text">"You can never have too much champagne"</div>
        <div style="display:flex; gap:10px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold); font-size:11px;" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg"></div>
            <div class="box-final" style="cursor:pointer;" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="color:var(--gold); font-size:10px;">PHOTO</span>
            </div>
            <div class="box-final" style="cursor:pointer;" onclick="generateAvatar()">
                <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-avatar" style="color:var(--gold); font-size:10px; text-align:center;">GEN<br>AVATAR</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">SAVE</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:15;"></div>
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900; font-size:14px; margin-bottom:12px;">#ID</div>
            <div style="display:flex; gap:15px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; color:#000; border-color:#000;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">CONFIRM</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; color:#000; border-color:#000;" onclick="portalTransition('block-bar')">ENTER BAR</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <img src="horse_bar.png" style="height: 80vh; width: auto; object-fit: contain;">
        <div class="bar-ui-container">
            <button class="btn-gy" onclick="portalTransition('block-welcome')">BACK</button>
        </div>
    </div>

    <script>
        let currentID = "";

        function selectLang(code, name, flag) {
            document.querySelector('#active-lang span').innerText = name;
            document.getElementById('main-flag').src = `https://flagcdn.com/w20/${flag}.png`;
            const menu = document.getElementById('drop-menu');
            menu.style.display = 'none';
            setTimeout(() => { menu.style.removeProperty('display'); }, 300);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if(current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }
            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { next.classList.add('active'); next.style.opacity = "1"; next.style.pointerEvents = "auto"; }, 50);
            }, 800);
        }

        function handleDoor() {
            const d = document.getElementById('main-door');
            d.style.transform = "scale(1.2)"; d.style.opacity = "0";
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            setTimeout(() => { portalTransition('block-welcome'); }, 1500);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result;
                    document.getElementById('txt-photo').style.display = "none";
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function generateAvatar() {
            const seed = Math.random().toString(36).substring(7);
            const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${seed}`;
            document.getElementById('avatar-img').src = url;
            document.getElementById('avatar-img').style.display = "block";
            document.getElementById('h-photo').src = url;
            document.getElementById('txt-avatar').style.display = "none";
        }

        function swapButtons(a, s) {
            document.getElementById(a).classList.add('btn-sleep');
            document.getElementById(s).classList.remove('btn-sleep');
        }
    </script>
</body>
</html>
