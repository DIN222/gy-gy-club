<!DOCTYPE html>
<html lang="en">
<!-- GY-GY PROTOCOL v.5.3.6 (.) -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | v.5.3.6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg" style="background-image: url('entrance_bg.jpg');">
    <audio id="door-audio" src="door_open.mp3" preload="auto"></audio>

    <div class="lang-container">
        <!-- Языковой блок из вашего образца остается без изменений -->
        <div class="lang-trigger" onclick="UI.toggle('lang-panel')">
            <img src="https://flagcdn.com/w40/gb.png" id="current-lang-flag"> 
            <span id="current-lang-label">ENGLISH</span>
        </div>
        <!-- ... (весь список 11 языков) ... -->
    </div>

    <header class="fixed-header">
        <div class="logo-text">GY-GY</div> <!-- Лого в правом углу -->
    </header>

    <main class="portal-zone">
        <!-- Дверь 46vh (40vh + 15%) -->
        <img src="door_1.jpg" id="main-door" class="door-img-v536" onclick="enterClub()">
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function enterClub() {
            const doorSound = document.getElementById('door-audio');
            if (doorSound) doorSound.play().catch(() => {});
            
            // Логистика: Дверь -> Зона приветствия
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'welcome.html'; }, 1200);
        }
    </script>
</body>
</html>
