<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club 001</title>
    <style>
        /* ВИНТАЖНЫЙ ПРЕМИУМ СТИЛЬ GY-GY КЛУБА */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
        }

        /* ПОСТОЯННЫЕ АТРИБУТЫ СТРАНИЦЫ */
        .system-header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            pointer-events: none;
        }
        .logo-gy {
            font-size: 24px;
            font-weight: bold;
            color: #ffb700;
            letter-spacing: 2px;
            pointer-events: auto;
            cursor: pointer;
            user-select: none;
        }
        
        /* ДИНАМИЧЕСКАЯ ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-panel {
            position: relative;
            pointer-events: auto;
            background: rgba(17, 17, 17, 0.9);
            border: 1px solid #ffb700;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            color: #ffb700;
            user-select: none;
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;
            background: #0a0a0a;
            border: 1px solid #ffb700;
            width: 140px;
            border-radius: 4px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .lang-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s ease;
            color: #fff;
        }
        .lang-item:hover {
            background: #ffb700;
            color: #000;
        }
        .flag-icon {
            width: 20px;
            height: auto;
            display: block;
        }

        /* СИСТЕМА ЭКРАНОВ / КОМНАТ */
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .screen.active {
            display: flex;
        }

        /* ЭКРАН 1: ВХОД С ДВЕРЬЮ */
        #screen-entrance {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
        }
        .vintage-door {
            width: 200px;
            height: 350px;
            border: 3px solid #ffb700;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 183, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.5s ease;
            background: #0d0d0d;
        }
        .vintage-door:hover {
            box-shadow: 0 0 40px rgba(255, 183, 0, 0.6);
            transform: scale(1.02);
        }
        .door-handle {
            width: 20px;
            height: 20px;
            background: #ffb700;
            border-radius: 50%;
        }

        /* ЭКРАН 2: ПРИВЕТСТВИЕ С КОНЕМ */
        #screen-welcome {
            background: #0a0a0a;
        }
        .welcome-horse-img {
            max-width: 400px;
            width: 80%;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        /* ЭКРАН 3: РЕГИСТРАЦИЯ */
        #screen-register {
            background: #0d0d0d;
        }
        .reg-box {
            background: #111;
            border: 1px solid #ffb700;
            padding: 4px;
            width: 300px;
            text-align: center;
        }
        .reg-input {
            width: 80%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
            font-family: inherit;
        }
        .reg-input:focus {
            border-color: #ffb700;
            outline: none;
        }

        /* ЭКРАН 4: ХОЛЛ С ЧЕТЫРЬМЯ ПЕРЕХОДАМИ */
        #screen-hall {
            background: radial-gradient(circle, #111 0%, #000 100%);
        }
        .hall-title {
            font-size: 32px;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }
        .doors-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 600px;
            width: 90%;
        }

        /* УНИВЕРСАЛЬНЫЕ КНОПКИ КЛУБА */
        .club-btn {
            background: #000;
            color: #ffb700;
            border: 1px solid #ffb700;
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }
        .club-btn:hover {
            background: #ffb700;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 183, 0, 0.4);
        }

        /* ИФРЕЙМ ДЛЯ УДЛИНИТЕЛЯ БАРА */
        #module-router-frame {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="system-header">
        <div class="logo-gy" onclick="returnToEntrance()">GY-GY</div>
        
        <div class="lang-panel">
            <div id="active-lang-display" onclick="toggleLangList()" style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                <img src="https://flagcdn.com/w20/gb.png" id="badge-flag-img" class="flag-icon">
                <span>English</span>
            </div>
            <div id="lang-dropdown-list" class="lang-dropdown">
                </div>
        </div>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <div id="screen-entrance" class="screen active">
        <div class="vintage-door" onclick="navigateTo('screen-welcome')">
            <div class="door-handle"></div>
        </div>
    </div>

    <div id="screen-welcome" class="screen">
        <img src="horse_bar.png" class="welcome-horse-img" alt="Welcome Horse">
        <h2 style="color: #ffb700; margin-bottom: 20px;">Welcome to GY-GY Club</h2>
        <button class="club-btn" onclick="navigateTo('screen-register')">Proceed</button>
    </div>

    <div id="screen-register" class="screen">
        <div class="reg-box">
            <h3 style="color: #ffb700; margin-bottom: 20px;">Identity Secure Check</h3>
            <input type="text" id="user-nickname" class="reg-input" placeholder="Enter Nickname">
            <button class="club-btn" onclick="completeRegistration()">Generate ID & Enter</button>
        </div>
    </div>

    <div id="screen-hall" class="screen">
        <div class="hall-title">THE HALL</div>
        <div class="doors-grid">
            <a href="ai_room.html" class="club-btn">AI Room</a>
            <a href="studio.html" class="club-btn">Studio</a>
            <button class="club-btn" onclick="openExternalModule('bar.html')">Bar</button>
            <a href="office.html" class="club-btn">Office</a>
        </div>
    </div>

    <iframe id="module-router-frame" src="about:blank"></iframe>

    <script>
        // ГЛОБАЛЬНЫЙ ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
        let currentUser = { id: null, nickname: 'Guest' };

        // МАТРИЦА ИЗ 12 ЯЗЫКОВ
        const initialLanguages = [
            { code: 'en', flag: 'gb', name: 'English' },
            { code: 'ru', flag: 'ru', name: 'Русский' },
            { code: 'fr', flag: 'fr', name: 'Français' },
            { code: 'de', flag: 'de', name: 'Deutsch' },
            { code: 'es', flag: 'es', name: 'Español' },
            { code: 'it', flag: 'it', name: 'Italiano' },
            { code: 'zh', flag: 'cn', name: 'Chinesse' },
            { code: 'ja', flag: 'jp', name: 'Japanese' },
            { code: 'ar', flag: 'ae', name: 'Arabic' },
            { code: 'pt', flag: 'pt', name: 'Português' },
            { code: 'tr', flag: 'tr', name: 'Türkçe' },
            { code: 'pl', flag: 'pl', name: 'Polski' }
        ];

        // НАВИГАЦИОННЫЙ ДВИЖОК ЭКРАНОВ
        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            const targetScreen = document.getElementById(screenId);
            if (targetScreen) targetScreen.classList.add('active');
        }

        // РЕГИСТРАЦИЯ И ГЕНЕРАЦИЯ ЦИФРОВОГО СЛЕДА
        function completeRegistration() {
            const input = document.getElementById('user-nickname');
            if (input && input.value.trim() !== "") {
                currentUser.nickname = input.value.trim();
            } else {
                currentUser.nickname = "User_" + Math.floor(Math.random() * 9000 + 1000);
            }
            currentUser.id = 'GY-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            
            localStorage.setItem('gygy_user_id', currentUser.id);
            localStorage.setItem('gygy_user_name', currentUser.nickname);

            navigateTo('screen-hall');
        }

        // ПОДКЛЮЧЕНИЕ УДЛИНИТЕЛЯ БАРА
        function openExternalModule(url) {
            const frame = document.getElementById('module-router-frame');
            if (frame) {
                frame.src = url;
                frame.style.display = 'block';
            }
        }

        // КНОПКА ВОЗВРАТА (ЛОГОТИП GY-GY)
        function returnToEntrance() {
            const frame = document.getElementById('module-router-frame');
            if (frame && frame.style.display === 'block') {
                frame.style.display = 'none';
                frame.src = 'about:blank';
                return;
            }
            navigateTo('screen-entrance');
        }

        // ЛОГИКА СИСТЕМЫ ЯЗЫКОВЫХ ПАКЕТОВ
        function renderLangList() {
            const listContainer = document.getElementById('lang-dropdown-list');
            if (!listContainer) return;
            listContainer.innerHTML = initialLanguages.map(lang => `
                <div class="lang-item" onclick="selectLanguage('${lang.code}', '${lang.flag}', '${lang.name}')">
                    <img src="https://flagcdn.com/w20/${lang.flag}.png" class="flag-icon">
                    <span>${lang.name}</span>
                </div>
            `).join('');
        }

        function toggleLangList() {
            const list = document.getElementById('lang-dropdown-list');
            if (list) list.style.display = list.style.display === 'none' ? 'block' : 'none';
        }

        function selectLanguage(code, flag, name) {
            localStorage.setItem('gygy_lang_code', code);
            localStorage.setItem('gygy_flag', flag);
            
            document.getElementById('badge-flag-img').src = `https://flagcdn.com/w20/${flag}.png`;
            document.querySelector('#active-lang-display span').innerText = name;
            
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                selectEl.value = code;
                selectEl.dispatchEvent(new Event('change', { bubbles: true }));
            }
            toggleLangList();
        }

        // ИНИЦИАЛИЗАЦИЯ И ФИКСАЦИЯ СТРОГОГО EN ПО УМОЛЧАНИЮ
        document.addEventListener("DOMContentLoaded", () => {
            renderLangList();
            
            const currentLang = localStorage.getItem('gygy_lang_code') || 'en';
            const currentFlag = localStorage.getItem('gygy_flag') || 'gb';
            const currentName = initialLanguages.find(l => l.code === currentLang)?.name || 'English';
            
            document.getElementById('badge-flag-img').src = `https://flagcdn.com/w20/${currentFlag}.png`;
            document.querySelector('#active-lang-display span').innerText = currentName;
            
            setTimeout(() => {
                const selectEl = document.querySelector('.goog-te-combo');
                if (selectEl) {
                    selectEl.value = currentLang;
                    selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }, 1200);
        });

        // Интеграция шины Google Translate
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ru,fr,de,es,it,zh,ja,ar,pt,tr,pl',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
