<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.84 | FROZEN WITH CONTOUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
        }
        
        body, button, input, div, img, span { 
            pointer-events: auto !important; 
        }
        
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-frame-locked {
            position: fixed; top: 15px; left: 15px; z-index: 9999999; 
            width: 180px; height: 40px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 12px;
        }

        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 44px; left: -2px; 
            width: 180px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 70vh; overflow-y: auto;
        }

        .lang-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 22px; margin-right: 12px; }

        /* ЛОГОТИП GY-GY С ЧЕРНОЙ ОБВОДКОЙ В 1 ПИКСЕЛЬ ДЛЯ СВЕТЛОГО ХОЛЛА */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000; /* Контур 1px */
        }
        
        .ui-back-to-bar { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005;
            background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; cursor: pointer; display: none; opacity: 0; transition: opacity 0.5s;
        }

        .block { 
            position: fixed; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            z-index: 10; 
            opacity: 0; 
            transition: opacity 0.4s ease-in-out; 
        }
        
        .block.active { 
            display: flex !important; 
            opacity: 1 !important; 
            z-index: 5000 !important;
        }

        #main-door { 
            height: calc(50vh + 20px); 
            width: auto; 
            cursor: pointer; 
            transition: transform 0.5s ease-out, opacity 0.5s ease-out; 
            z-index: 9999999 !important; 
        }
        
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; }
        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; }
        
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        .id-card-hall { position: absolute; top: 72%; left: 50%; transform: translate(-50%,-50%); width: 220px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        #block-tables { background: url('lounge.jpg') no-repeat center bottom / contain #000; }
        .lamp-zone { position: absolute; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; background: radial-gradient(circle, var(--neon-glow) 0%, transparent 75%); border: 1px solid var(--violet); box-shadow: 0 0 18px var(--neon-glow); transform: translate(-50%, -50%); }
        .bar-ui-container { position: absolute; bottom: 5vh; width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }

        body { top: 0 !important; }

        #block-welcome {
            justify-content: flex-start !important; 
            padding-top: 12vh !important; 
        }

        #block-welcome .quote-text {
            margin-bottom: 2vh !important;
            font-size: 24px; 
        }

        #block-welcome img {
            max-height: 35vh !important; 
            width: auto;
            object-fit: contain;
            margin-bottom: 2vh !important;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        #block-welcome .btn-gy {
            margin: 4px 0 !important; 
            padding: 12px !important;
        }

        /* СТРЕЛКИ С ЧЕРНОЙ ОБВОДКОЙ В 1 ПИКСЕЛЬ ДЛЯ СВЕТЛОГО ХОЛЛА */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; 
            font-size: 26px; 
            font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; 
            cursor: pointer; 
            color: var(--gold); 
            line-height: 1; 
            letter-spacing: -2px; 
            /* Сверхчеткий черный контур 1px во все стороны */
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
            pointer-events: auto !important;
            user-select: none;
        }
        
        .arrow-item {
            transition: opacity 0.2s;
        }
        .arrow-item:hover {
            opacity: 0.8;
        }
    </style> 
</head>

<body oncontextmenu="return false;">

    <div id="lang-switcher" class="lang-frame-locked notranslate">
        <div id="active-lang-display" style="display:flex; align-items:center; width:100%;" onclick="toggleLangList()">
            <img src="https://flagcdn.com/w40/gb.png" class="flag-icon">
            <span>ENGLISH</span>
        </div>
        <div id="lang-list-container" class="lang-dropdown-adaptive notranslate"></div>
    </div>

    <div id="google_translate_element" style="position:fixed; bottom:0; left:0; opacity:0; z-index:-1;"></div>
    
    <div class="ui-header-right notranslate">GY-GY</div>
    <button class="ui-back-to-bar" id="btn-global-back" onclick="portalTransition('block-bar')">BACK TO BAR</button>

    <audio id="snd-door"><source src="door_open.mp3"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3"></audio>
    <audio id="snd-khe"><source src="charlie_bar_fx.mp3"></audio>
    <audio id="snd-pour"><source src="pour_whisky.mp3"></audio>

    <div id="block-entrance" class="block active" style="display: flex; opacity: 1;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div class="notranslate ui-nav-arrows">
            <div class="arrow-item" onclick="portalTransition('block-entrance')" style="padding: 15px; margin: -15px;" title="Назад к дверям">&lt;</div>
            <div class="arrow-item" onclick="portalTransition('block-entrance')" style="padding: 15px; margin: -15px;" title="В корень">&lt;&lt;</div>
        </div>

        <div class="quote-text">In every joke there is a share of whisky</div>
        <img src="horse_welcome.png">
        <div style="font-size: 34px; font-weight: 700; letter-spacing: 12px; font-style: italic; margin-bottom: 15px;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED TO HALL</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">GET ID</button>
    </div>  

    <div id="block-identity" class="block">
        <div class="notranslate ui-nav-arrows">
            <div class="arrow-item" onclick="portalTransition('block-welcome')" style="padding: 15px; margin: -15px;" title="Назад к приветствию">&lt;</div>
            <div class="arrow-item" onclick="portalTransition('block-entrance')" style="padding: 15px; margin: -15px;" title="В корень">&lt;&lt;</div>
        </div>

        <div class="quote-text">There is never too much champagne</div>
        <div style="display:flex; gap:10px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold); font-size:11px;" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg" style="border-color:var(--gold);"></div>
            
            <div class="box-final" style="border-color:var(--gold); cursor:pointer;" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="color:var(--gold); font-size:10px; font-weight:900;">PHOTO</span>
            </div>
            
            <div class="box-final" style="border-color:var(--gold); cursor:pointer;" onclick="generateAvatar()">
                <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-avatar" style="color:var(--gold); font-size:10px; font-weight:900; text-align:center;">GEN<br>AVATAR</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">SAVE</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED</button>
    </div>

    <div id="block-hall" class="block">
        <div class="notranslate ui-nav-arrows">
            <div class="arrow-item" onclick="portalTransition('block-identity')" style="padding: 15px; margin: -15px;" title="Назад к регистрации">&lt;</div>
            <div class="arrow-item" onclick="portalTransition('block-entrance')" style="padding: 15px; margin: -15px;" title="В корень">&lt;&lt;</div>
        </div>
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:1;"></div>
        <div class="id-card-hall" style="z-index:2;">
            <div id="h-id" style="font-weight:900; font-size:14px; margin-bottom:12px;">#ID</div>
            <div style="display:flex; gap:15px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">CONFIRM</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000;" onclick="portalTransition('block-bar')">ENTER BAR</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="justify-content: flex-end;">
        <div class="quote-text" style="position:absolute; top:8vh;">Igogo, let us start now!</div>
        <div class="bar-ui-container">
            <div style="display:flex; justify-content: space-between; width:100%; margin-bottom:12px;">
                <button class="btn-gy" style="min-width:145px; font-size:12px;" onclick="portalTransition('block-tables')">TABLES</button>
                <button class="btn-gy" style="min-width:145px; font-size:12px;" onclick="deepDive()">AI ROOM</button>
            </div>
            <button class="btn-gy" style="font-size:12px;" onclick="portalTransition('block-hall')">HALL</button>
        </div>
        <img src="horse_bar.png" style="height: 80vh; width: auto; object-fit: contain; margin-bottom: -10px;">
    </div>

    <div id="block-tables" class="block">
        <div class="notranslate ui-nav-arrows">
            <div class="arrow-item" onclick="portalTransition('block-bar')" style="padding: 15px; margin: -15px;" title="Назад к бару">&lt;</div>
            <div class="arrow-item" onclick="portalTransition('block-entrance')" style="padding: 15px; margin: -15px;" title="В корень">&lt;&lt;</div>
        </div>
        <div class="lamp-zone" style="bottom: 49.2%; left: 49.9%;"></div>
        <div class="lamp-zone" style="bottom: 22.1%; left: 35.7%;"></div>
    </div>

<script>
    let currentID = "";
    let currentActiveCode = 'en';

    const allLangs = [
        {n:'ENGLISH', c:'gb', code:'en'}, 
        {n:'DEUTSCH', c:'de', code:'de'}, 
        {n:'ESPAÑOL', c:'es', code:'es'}, 
        {n:'FRANÇAIS', c:'fr', code:'fr'},
        {n:'ITALIANO', c:'it', code:'it'}, 
        {n:'POLSKI', c:'pl', code:'pl'}, 
        {n:'PORTUGUÊС .', c:'pt', code:'pt'}, 
        {n:'РУССКИЙ', c:'ru', code:'ru'}, 
        {n:'TÜRKЧЕ', c:'tr', code:'tr'}, 
        {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
        {n:'中文', c:'cn', code:'zh-CN'}, 
        {n:'日本語', c:'jp', code:'ja'}
    ];

    function renderLangList() {
        const container = document.getElementById('lang-list-container');
        if (!container) return;
        container.innerHTML = ''; 
        allLangs.forEach(lang => {
            if(lang.code === currentActiveCode) return; 
            const div = document.createElement('div');
            div.className = 'lang-item notranslate'; 
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"><span>${lang.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
            container.appendChild(div);
        });
    }

    function applyLanguage(lang) {
        currentActiveCode = lang.code;
        document.getElementById('active-lang-display').innerHTML = `
            <img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon"> 
            <span>${lang.n}</span>
        `;
        const gtCombo = document.querySelector('.goog-te-combo');
        if (gtCombo) { 
            gtCombo.value = lang.code; 
            gtCombo.dispatchEvent(new Event('change', { bubbles: true })); 
        }
        document.getElementById('lang-list-container').style.display = 'none';
        renderLangList();
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function handleDoor() {
        document.getElementById('snd-door').play();
        const d = document.getElementById('main-door');
        
        d.style.transition = "transform 1.2s ease-in, opacity 1s";
        d.style.transform = "scale(5)"; 
        d.style.opacity = "0"; 
        d.style.pointerEvents = "none";
        
        document.getElementById('lang-switcher').style.opacity = "0";
        
        if (!currentID) {
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            
            document.getElementById('qr-box-reg').innerHTML = "";
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
        }
        
        setTimeout(() => { 
            portalTransition('block-welcome'); 
            const a = document.getElementById('snd-ambient'); a.volume = 0; a.play(); fadeAudio(a, 1, 2000); 
        }, 1000);
    }

    function portalTransition(nextId) {
        const current = document.querySelector('.block.active');
        const backBtn = document.getElementById('btn-global-back');
        const amb = document.getElementById('snd-ambient');
        
        if (nextId === 'block-entrance' && amb) {
            amb.pause();
            amb.currentTime = 0;
        }

        if (current) { 
            current.style.opacity = "0"; 
            current.style.pointerEvents = "none"; 
        }
        backBtn.style.opacity = "0";

        setTimeout(() => {
            if (current) { 
                current.classList.remove('active'); 
                current.style.display = "none"; 
            }
            
            const next = document.getElementById(nextId);
            if (!next) return;
            
            next.style.display = "flex";
            
            const langPanel = document.getElementById('lang-switcher');
            
            if (nextId === 'block-entrance') {
                const door = document.getElementById('main-door');
                door.style.transition = "none"; 
                door.style.transform = "scale(1)"; 
                door.style.opacity = "1"; 
                door.style.pointerEvents = "auto";
                
                if (langPanel) {
                    langPanel.style.display = 'flex';
                    langPanel.style.opacity = '1';
                }
            } else {
                if (langPanel) langPanel.style.display = 'none';
            }

            setTimeout(() => { 
                next.classList.add('active'); 
                next.style.pointerEvents = "auto";
                
                if (nextId === 'block-bar') { 
                    fadeAudio(amb, 1, 800); 
                    setTimeout(() => document.getElementById('snd-khe').play(), 800); 
                }
                
                if (nextId === 'block-tables') { 
                    backBtn.style.display = 'block'; 
                    setTimeout(() => backBtn.style.opacity = "1", 50); 
                    fadeAudio(amb, 0, 800); 
                } else { 
                    backBtn.style.display = 'none'; 
                }
                
                const gtCombo = document.querySelector('.goog-te-combo');
                if (gtCombo && currentActiveCode !== 'en') {
                    gtCombo.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }, 50);
        }, 400); 
    }

    function fadeAudio(audio, target, duration) {
        if (!audio) return;
        const start = audio.volume; const startTime = Date.now();
        const interval = setInterval(() => {
            const progress = Math.min((Date.now() - startTime) / duration, 1);
            audio.volume = start + (target - start) * progress;
            if (progress === 1) clearInterval(interval);
        }, 50);
    }

    function preview(i) {
        if(i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('avatar-img').style.display = "none";
                document.getElementById('txt-avatar').style.display = "block";
                
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('txt-photo').style.display = "none";
                
                document.getElementById('h-photo').src = e.target.result; 
            };
            r.readAsDataURL(i.files[0]);
        }
    }

    function generateAvatar() {
        document.getElementById('pp').style.display = "none"; 
        document.getElementById('txt-photo').style.display = "block";
        document.getElementById('file-input').value = ""; 
        
        const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
        const avImg = document.getElementById('avatar-img');
        avImg.src = url; 
        avImg.style.display = "block";
        document.getElementById('txt-avatar').style.display = "none";
        
        document.getElementById('h-photo').src = url;
    }

    function deepDive() {
        document.body.style.transition = "opacity 1.2s, filter 1.2s";
        document.body.style.opacity = "0"; document.body.style.filter = "blur(10px) brightness(0)";
        setTimeout(() => { window.location.href = 'bridge_protocol.html'; }, 1200);
    }

    function swapButtons(a, s) { document.getElementById(a).classList.add('btn-sleep'); document.getElementById(s).classList.remove('btn-sleep'); }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en', 
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
    }

    window.addEventListener('load', renderLangList);
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
