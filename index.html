<!-- 
  PROJECT: GY-GY Club
  FILE: index.html
  VERSION: 2.2.3
  STATUS: 11 языков с полными именами и флагами. Рамки унифицированы.
  MARKER: .
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { width: 100%; height: 100vh; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; }

        /* БЛОК ЯЗЫКА (11 ЯЗЫКОВ) */
        .lang-gateway { 
            position: fixed; top: 20px; left: 20px; z-index: 20000; 
            width: 200px; /* Фиксированная ширина для совпадения рамок */
        }
        
        .btn-main-lang, .lang-item { 
            width: 100%; height: 45px; background: #000; 
            border: 1.5px solid var(--gold); color: var(--gold); 
            font-weight: 900; cursor: pointer; display: flex; 
            align-items: center; gap: 12px; font-family: inherit;
            padding: 0 15px; text-transform: uppercase;
        }

        .lang-list { 
            display: none; position: absolute; top: 0; left: 0; 
            list-style: none; padding: 0; margin: 0; width: 100%;
            background: #000; z-index: 20001;
        }
        .lang-list.show { display: block; }
        
        .lang-item { border-top: none; transition: 0.3s; font-size: 13px; }
        .lang-item:hover { background: var(--gold); color: #000; }
        
        .flag-icon { width: 22px; height: 15px; object-fit: cover; border: 0.5px solid rgba(212, 175, 55, 0.5); }

        /* ПОСТОЯННЫЕ АТРИБУТЫ */
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 10001; font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 5px; cursor: pointer; color: var(--gold); }
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .block.active { display: flex; }
        #main-door { width: 280px; cursor: pointer; transition: 2s; z-index: 10; }
    </style>
</head>
<body onload="document.body.style.opacity=1">

    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>

    <!-- ЯЗЫКОВОЙ БЛОК (АТРИБУТ: ЛЕВЫЙ ВЕРХНИЙ УГОЛ) -->
    <div class="lang-gateway">
        <button class="btn-main-lang" onclick="toggleLangs()">
            <img id="current-flag" src="https://flagcdn.com/w20/gb.png" class="flag-icon">
            <span id="current-lang-name">ENGLISH</span>
        </button>
        <ul class="lang-list" id="lang-list">
            <li class="lang-item" onclick="setLang('РУССКИЙ', 'ru')"><img src="https://flagcdn.com/w20/ru.png" class="flag-icon"> РУССКИЙ</li>
            <li class="lang-item" onclick="setLang('ENGLISH', 'gb')"><img src="https://flagcdn.com/w20/gb.png" class="flag-icon"> ENGLISH</li>
            <li class="lang-item" onclick="setLang('DEUTSCH', 'de')"><img src="https://flagcdn.com/w20/de.png" class="flag-icon"> DEUTSCH</li>
            <li class="lang-item" onclick="setLang('FRANÇAIS', 'fr')"><img src="https://flagcdn.com/w20/fr.png" class="flag-icon"> FRANÇAIS</li>
            <li class="lang-item" onclick="setLang('ESPAÑOL', 'es')"><img src="https://flagcdn.com/w20/es.png" class="flag-icon"> ESPAÑOL</li>
            <li class="lang-item" onclick="setLang('ITALIANO', 'it')"><img src="https://flagcdn.com/w20/it.png" class="flag-icon"> ITALIANO</li>
            <li class="lang-item" onclick="setLang('中文', 'cn')"><img src="https://flagcdn.com/w20/cn.png" class="flag-icon"> 中文</li>
            <li class="lang-item" onclick="setLang('日本語', 'jp')"><img src="https://flagcdn.com/w20/jp.png" class="flag-icon"> 日本語</li>
            <li class="lang-item" onclick="setLang('한국어', 'kr')"><img src="https://flagcdn.com/w20/kr.png" class="flag-icon"> 한국어</li>
            <li class="lang-item" onclick="setLang('العربية', 'sa')"><img src="https://flagcdn.com/w20/sa.png" class="flag-icon"> العربية</li>
            <li class="lang-item" onclick="setLang('БЕЛАРУСКАЯ', 'by')"><img src="https://flagcdn.com/w20/by.png" class="flag-icon"> БЕЛАРУСКАЯ</li>
        </ul>
    </div>

    <!-- ЛОГОТИП (АТРИБУТ: ПРАВЫЙ ВЕРХНИЙ УГОЛ) -->
    <div class="ui-header-right" onclick="portalTransition('block-welcome')">GY-GY</div>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <button class="btn-gy" onclick="window.location.href='registration.html'">REGISTRATION</button>
    </div>

<script>
    function toggleLangs() {
        document.getElementById('lang-list').classList.toggle('show');
    }

    function setLang(name, flag) {
        document.getElementById('current-lang-name').innerText = name;
        document.getElementById('current-flag').src = `https://flagcdn.com/w20/${flag}.png`;
        toggleLangs();
        // Юмор — обязательный атрибут
        console.log(`Гы-гы! Мы теперь понимаем ${name}.`);
    }

    function handleDoor() {
        document.getElementById('snd-door').play();
        const door = document.getElementById('main-door');
        door.style.transform = "scale(4)";
        door.style.opacity = "0";
        setTimeout(() => {
            const ambient = document.getElementById('snd-ambient');
            ambient.play();
            portalTransition('block-welcome');
        }, 1200);
    }

    function portalTransition(nextId) {
        document.querySelectorAll('.block').forEach(b => {
            b.classList.remove('active');
            b.style.display = 'none';
        });
        const target = document.getElementById(nextId);
        target.style.display = 'flex';
        setTimeout(() => target.classList.add('active'), 50);
    }
</script>
</body>
</html>
