<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | v.5.1.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <!-- . ПОСТОЯННЫЕ АТРИБУТЫ -->
    <header class="ui-fixed">
        <div class="lang-gate">
            <button class="btn-gy" onclick="Agent.toggleLang()">LANG</button>
            <div id="lang-list" class="dropdown-content">
                <button onclick="Agent.setLang('RU')">RU</button>
                <button onclick="Agent.setLang('EN')">EN</button>
            </div>
        </div>
        <div class="gy-logo">GY-GY</div> <!-- -->
        <button id="nav-back" class="btn-gy" style="visibility:hidden;" onclick="Agent.goBack()">←</button>
    </header>

    <main id="app-stage"></main>

    <!-- АУДИО-СИСТЕМА -->
    <audio id="snd-bar-ambient" loop src="bar_2_0.mp3"></audio>
    <audio id="snd-server" loop src="server_noise.mp3"></audio>
    <audio id="snd-fx" src="horse_fx.mp3"></audio>

    <script src="core-agent.js"></script>
</body>
</html>
