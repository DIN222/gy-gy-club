<!-- GY-GY CLUB MONOLITH PROTOCOL v.5.2.5 (.) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY CLUB | v.5.2.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <header class="ui-fixed">
        <div class="lang-zone">
            <button class="btn-gy" onclick="UI.toggle('lang-list')">GAB / LANG</button>
            <div id="lang-list" class="drop-list">
                <!-- 11 languages placeholder -->
                <div class="drop-item" onclick="UI.setLang('EN')">English 🇬🇧</div>
                <div class="drop-item" onclick="UI.setLang('RU')">Russian 🇷🇺</div>
                <div class="drop-item" onclick="UI.setLang('FR')">French 🇫🇷</div>
                <div class="drop-item" onclick="UI.setLang('DE')">German 🇩🇪</div>
                <div class="drop-item" onclick="UI.setLang('ES')">Spanish 🇪🇸</div>
                <div class="drop-item" onclick="UI.setLang('IT')">Italian 🇮🇹</div>
                <div class="drop-item" onclick="UI.setLang('CN')">Chinese 🇨🇳</div>
                <div class="drop-item" onclick="UI.setLang('JP')">Japanese 🇯🇵</div>
                <div class="drop-item" onclick="UI.setLang('AR')">Arabic 🇦🇪</div>
                <div class="drop-item" onclick="UI.setLang('TR')">Turkish 🇹🇷</div>
                <div class="drop-item" onclick="UI.setLang('BR')">Brazil 🇧🇷</div>
            </div>
        </div>
        <div class="gy-logo">GY-GY</div> <!-- -->
        <button id="btn-back" class="btn-gy" style="display:none;" onclick="Agent.goBack()">← BACK</button>
    </header>

    <main id="app-stage" style="opacity:0;"></main>

    <script src="blocks.js"></script>
    <script src="script.js"></script>
</body>
</html>
