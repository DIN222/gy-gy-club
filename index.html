<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.31 CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }

        /* =========================================================================
           НОВЫЙ ЕДИНЫЙ СТАНДАРТ ПАНЕЛИ v5.0 — СТРОГО В ОДНУ ЛИНИЮ БЕЗ ПОДЧЕРКИВАНИЙ
           ========================================================================= */
        .gy-top-bar-v5 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 30px;
            background: transparent;
            z-index: 999999;
        }

        /* 1. Стрелки навигации — СЛЕВА (Появляются только внутри блоков, где нужны) */
        .ui-nav-arrows-v5 {
            display: flex;
            gap: 20px;
            justify-content: flex-start;
            visibility: hidden; /* Переключается через JS в зависимости от блока */
        }
        .arrow-item-v5 {
            color: var(--gold);
            text-decoration: none;
            font-size: 24px;
            font-weight: 900;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            transition: opacity 0.2s;
            line-height: 1;
            user-select: none;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .arrow-item-v5:hover { opacity: 0.7; }

        /* 2. Аватар Юзера с флагом EN — ПО ЦЕНТРУ (Бывший глобальный badge) */
        .user-center-profile-v5 {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(17, 17, 17, 0.85);
            padding: 5px 14px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            cursor: pointer;
            visibility: hidden; /* Показывается только после авторизации */
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
        }
        .user-avatar-mini-v5 {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background-color: #fff;
            object-fit: cover;
            display: block;
        }
        .user-id-text-v5 {
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
        }
        .lang-flag-v5 {
            width: 16px;
            height: 11px;
            object-fit: cover;
            border: 1px solid var(--gold);
        }

        /* 3. Постоянный бренд GY-GY CLUB — СПРАВА */
        .logo-group-v5 {
            display: flex;
            justify-content: flex-end;
        }
        .logo-box-v5 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--gold);
            text-decoration: none;
            cursor: pointer;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .logo-box-v5 span { color: #6e6e73; }

        /* ТАБЛИЧКА ПАСПОРТА */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        /* УНИВЕРСАЛЬНЫЙ КЛАСС ДЛЯ БЛОКОВ СТРАНИЦ */
        .block { 
            position: fixed; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            z-index: 10; 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
        }
        .block.active { 
            display: flex !important; 
            opacity: 1 !important; 
            z-index: 5000 !important; 
        }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; cursor: not-allowed; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        body { top: 0 !important; }
        #block-welcome { justify-content: flex-start !important; padding-top: 15vh !important; }
        #block-welcome .quote-text { margin-bottom: 2vh !important; font-size: 24px; }
        #block-welcome img { max-height: 35vh !important; width: auto; object-fit: contain; margin-bottom: 2vh !important; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); }
        #block-welcome .btn-gy { margin: 4px 0 !important; padding: 12px !important; }

        /* ХОЛЛ И ИНТЕРАКТИВНЫЕ КАРТИНЫ */
        #block-hall { background: url('hall_bg_jpg.jpg') center/cover no-repeat #000; }
        .hall-interior { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
        
        .hall-interior .quote-text { 
            position: absolute; 
            top: 12vh; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85%; 
            margin: 0; 
            text-align: center;
            padding: 0;
            background: transparent !important;
            color: var(--gold) !important;       
            font-size: 28px;
            font-weight: 700;
            text-shadow: 
                0 0 8px rgba(20, 20, 20, 1),
                0 0 15px rgba(15, 15, 15, 1),
                0 0 25px rgba(10, 10, 10, 1),
                0 0 35px rgba(5, 5, 5, 1),
                0 0 50px rgba(0, 0, 0, 1) !important;
        }

        .hall-door-target {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24vw; height: 65vh; cursor: pointer; z-index: 5;
            background: transparent;
        }

        /* Интерактивные зоны стрелок в Холле */
        .painting-zone {
            position: absolute; 
            top: 25vh; 
            width: 6vw; 
            height: 12vh; 
            cursor: pointer; 
            z-index: 6; 
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .painting-left { left: 23vw; }
        .painting-right { right: 23vw; }

        .cue-arrow-hall { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s;
        }
        .painting-zone:hover .cue-arrow-hall { opacity: 0.8; }

        /* Выплывающие подменю для стрелок Холла */
        .manifest-btn-box { 
            position: absolute; 
            bottom: -50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 140px; 
            display: flex; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.4s, bottom 0.4s; 
            z-index: 10; 
        }
        .btn-manifest { width: 100%; padding: 6px 0; font-size: 12px; margin: 0; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.9); }
        
        body { background-color: #000 !important; opacity: 0; transition: opacity 0.4s ease-in-out !important; }
        body.page-loaded { opacity: 1 !important; }
        
        #main-door {
            display: block;
            height: calc(50vh + 20px);
            width: auto;
            max-width: 100%;
            object-fit: contain;
            margin: 0 auto; 
            transform: scale(1);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease-out;
        }

        .door-exploded {
            transform: scale(3.5) !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="gy-top-bar-v5">
        <div class="ui-nav-arrows-v5" id="global-nav-arrows">
            <button class="arrow-item-v5" id="arrow-back-single">&lt;</button>
            <button class="arrow-item-v5" id="arrow-back-double">&lt;&lt;</button>
        </div>

        <div id="global-user-profile-center" class="user-center-profile-v5" onclick="openPassport()">
            <img id="badge-avatar-img" class="user-avatar-mini-v5" src="">
            <span id="badge-id-text" class="user-id-text-v5">GY-000-0000</span>
            <img id="badge-flag-img" class="lang-flag-v5" src="https://flagcdn.com/w20/gb.png">
        </div>

        <div class="logo-group-v5">
            <a href="#" onclick="portalTransition('block-entrance')" class="logo-box-v5">GY-GY <span>CLUB</span></a>
        </div>
    </div>

    <div id="modal-passport" class="passport-overlay" onclick="closePassport()">
        <div class="passport-card" onclick="event.stopPropagation()">
            <div class="passport-close-btn" onclick="closePassport()">&times;</div>
            <div id="pass-id-title" style="font-weight:900; font-size:16px; letter-spacing:1px;">GY-GY PASSPORT</div>
            <div id="pass-id-val" style="font-weight:700; font-size:13px; margin-top:5px; color:#555;">#ID</div>
            <div class="box-final" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--gold);"><img id="pass-avatar-img" style="width:100%; height:100%; object-fit:cover; border-radius:50%; background-color:#fff;"></div>
            <div class="box-final" id="pass-qr-box" style="width:110px; height:110px; padding:5px;"></div>
            <div style="font-size:10px; font-weight:900; color:#333; margin-top:5px; text-transform:uppercase;">Click &times; or outside to close</div>
        </div>
    </div>

    <audio id="snd-door" src="door_open.mp3" preload="auto"></audio>
    <audio id="snd-ambient" src="bar_ambient.mp3" loop preload="auto"></audio>
    <audio id="snd-pour" src="pour_drink.mp3" preload="auto"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" translate="no" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div class="quote-text">I'M CHARLIE</div>
        <div class="quote-text">In every joke there is a share of whisky</div>
        <img src="horse_welcome.png">
        <div style="font-size: 34px; font-weight: 700; letter-spacing: 12px; font-style: italic; margin-bottom: 15px;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED TO HALL</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">GET ID</button>
    </div>  

    <div id="block-identity" class="block">
        <div class="quote-text">There is never too much champagne</div>
        <div style="display:flex; gap:10px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:#fff; border-color:var(--gold); color:#000; font-size:11px; font-weight:900;" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg" style="border-color:var(--gold); background:#fff;"></div>
            
            <div class="box-final" style="border-color:var(--gold); background:#fff; cursor:pointer;" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="color:#000; font-size:10px; font-weight:900;">OR PHOTO</span>
            </div>
            
            <div class="box-final" style="border-color:var(--gold); background:#fff; cursor:pointer;" onclick="generateAvatar()">
                <img id="avatar-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-avatar" style="color:#000; font-size:10px; font-weight:900; text-align:center;">OR AVATAR</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveUserProfile()">SAVE</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">PROCEED</button>
    </div>

    <div id="block-hall" class="block">
        <div class="hall-interior" style="position: relative;">
            <div class="quote-text">In every joke there is a share of whisky</div>
            
            <div class="painting-zone painting-left" style="position: relative; min-height: 180px;">
                <div style="position: absolute; top: 0; left: 0; width: 100%;" onclick="toggleManifest('manifest-left')">
                    <span class="cue-arrow-hall">→</span>
                    <div id="manifest-left" class="manifest-btn-box" data-opened="false">
                        <button class="btn-gy btn-manifest notranslate" onclick="event.stopPropagation(); portalTransition('block-server')">AI ROOM</button>
                    </div>
                </div>

                <div style="position: absolute; bottom: 0; left: 0; width: 100%;" onclick="toggleManifest('manifest-office')">
                    <span class="cue-arrow-hall">→</span>
                    <div id="manifest-office" class="manifest-btn-box" data-opened="false">
                        <button class="btn-gy btn-manifest notranslate" onclick="event.stopPropagation(); portalTransition('block-office')">OFFICE</button>
                    </div>
                </div>
            </div>
                
            <div class="painting-zone painting-right" onclick="toggleManifest('manifest-right')">
                <span class="cue-arrow-hall">←</span>
                <div id="manifest-right" class="manifest-btn-box" data-opened="false">
                    <button class="btn-gy btn-manifest notranslate" onclick="event.stopPropagation(); enterStudio()">STUDIO</button>
                </div>
            </div>
        </div>
            
        <div class="hall-doors-container" style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 24vw; height: 65vh; z-index: 5;">
            <div id="hall-doors" class="hall-door-target" style="width: 100%; height: 100%; cursor: pointer; background: transparent;" onclick="portalTransition('block-bar')"></div>
            <div class="bar-entrance-marker" style="position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%); pointer-events: none; text-align: center;">
                <span class="cue-arrow-hall" style="font-size: 38px; line-height: 1; color: var(--violet); text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); font-weight: 900;">↑</span>
            </div>
        </div>
    </div>

<script type="text/javascript">
    let currentID = "";
    let currentUserImage = "";

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }
    function safeStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

    function toggleManifest(boxId) {
        document.querySelectorAll('.manifest-btn-box').forEach(box => {
            if(box.id === boxId) {
                const isOpened = box.getAttribute('data-opened') === "true";
                box.style.opacity = isOpened ? "0" : "1";
                box.style.pointerEvents = isOpened ? "none" : "auto";
                box.setAttribute('data-opened', isOpened ? "false" : "true");
                box.style.bottom = isOpened ? "-50px" : "-35px";
            } else {
                box.style.opacity = "0"; box.style.pointerEvents = "none"; box.setAttribute('data-opened', "false"); box.style.bottom = "-50px";
            }
        });
    }

    function renderUserPassports(targetID) {
        const idLabel = document.getElementById('id-label');
        const passIdVal = document.getElementById('pass-id-val');
        const badgeIdText = document.getElementById('badge-id-text');
        const qrBoxReg = document.getElementById('qr-box-reg');
        const passQrBox = document.getElementById('pass-qr-box');
        
        if (idLabel) idLabel.innerText = targetID;
        if (passIdVal) passIdVal.innerText = targetID;
        if (badgeIdText) badgeIdText.innerText = targetID;
        
        if (qrBoxReg && typeof QRCode !== 'undefined') { qrBoxReg.innerHTML = ""; new QRCode(qrBoxReg, { text: targetID, width: 85, height: 85 }); }
        if (passQrBox && typeof QRCode !== 'undefined') { passQrBox.innerHTML = ""; new QRCode(passQrBox, { text: targetID, width: 100, height: 100 }); }
    }

    function checkAndFillRegistrationForm() {
        const savedAvatar = safeStorageGet('gy_user_img') || safeStorageGet('gygy_avatar');
        currentID = safeStorageGet('gygy_id') || safeStorageGet('gy_user_id') || safeStorageGet('gy_trace');
        
        if (currentID) { renderUserPassports(currentID); }
        
        if (savedAvatar) {
            currentUserImage = savedAvatar;
            const badgeImg = document.getElementById('badge-avatar-img');
            const passImg = document.getElementById('pass-avatar-img');
            if (badgeImg) badgeImg.src = savedAvatar;
            if (passImg) passImg.src = savedAvatar;

            if (savedAvatar.startsWith('data:image/svg+xml')) {
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) { avatarImg.src = savedAvatar; avatarImg.style.display = "block"; }
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = "none";
            } else { 
                const ppImg = document.getElementById('pp'); if (ppImg) { ppImg.src = savedAvatar; ppImg.style.display = "block"; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = "none";
            }
            const btnWHall = document.getElementById('btn-w-hall'); if(btnWHall) btnWHall.classList.remove('btn-sleep');
            const btnPass = document.getElementById('btn-pass'); if(btnPass) btnPass.classList.remove('btn-sleep');

            const activeBlock = document.querySelector('.block.active');
            if (activeBlock && activeBlock.id !== 'block-entrance') {
                const profileCenter = document.getElementById('global-user-profile-center');
                if (profileCenter) profileCenter.style.visibility = 'visible';
            }
        }
    }

    function portalTransition(nextId) {
        if (nextId === 'block-server') { window.location.href = 'verses.html'; return; }
        if (nextId === 'block-bar') { window.location.href = 'bar.html'; return; }
        if (nextId === 'block-tables') { window.location.href = 'tables.html'; return; } 
        if (nextId === 'block-office') { alert('Office coming soon...'); return; }

        const targetBlock = document.getElementById(nextId);
        if (!targetBlock) { console.error(`Блок не найден: ${nextId}`); return; }

        const profileCenter = document.getElementById('global-user-profile-center');
        const navArrows = document.getElementById('global-nav-arrows');

        // Управляем видимостью элементов новой шапки v5.0 на разных экранах
        if (nextId === 'block-entrance') {
            const mainDoor = document.getElementById('main-door');
            if (mainDoor) mainDoor.classList.remove('door-exploded');
            if (navArrows) navArrows.style.visibility = 'hidden';
            if (profileCenter) profileCenter.style.visibility = 'hidden';
        } else {
            if (profileCenter && currentUserImage) profileCenter.style.visibility = 'visible';
            if (navArrows) {
                // Показываем стрелки навигации на внутренних страницах
                if (nextId === 'block-welcome' || nextId === 'block-identity' || nextId === 'block-hall') {
                    navArrows.style.visibility = 'visible';
                    setupNavArrowsLogic(nextId);
                } else {
                    navArrows.style.visibility = 'hidden';
                }
            }
        }

        document.querySelectorAll('.block').forEach(b => {
            b.classList.remove('active');
            b.style.display = 'none';
        });

        targetBlock.style.display = 'flex';
        
        setTimeout(() => {
            targetBlock.classList.add('active');
        }, 20);
    }

    function setupNavArrowsLogic(currentBlockId) {
        const singleBtn = document.getElementById('arrow-back-single');
        const doubleBtn = document.getElementById('arrow-back-double');
        
        if (currentBlockId === 'block-welcome') {
            singleBtn.onclick = () => portalTransition('block-entrance');
            doubleBtn.onclick = () => portalTransition('block-entrance');
        } else if (currentBlockId === 'block-identity') {
            singleBtn.onclick = () => portalTransition('block-welcome');
            doubleBtn.onclick = () => portalTransition('block-entrance');
        } else if (currentBlockId === 'block-hall') {
            singleBtn.onclick = () => portalTransition('block-identity');
            doubleBtn.onclick = () => portalTransition('block-entrance');
        }
    }

    function handleDoor() {
        const sndDoor = document.getElementById('snd-door');
        const sndAmbient = document.getElementById('snd-ambient');
        const mainDoor = document.getElementById('main-door');

        if (sndDoor) sndDoor.play();
        if (mainDoor) mainDoor.classList.add('door-exploded');

        setTimeout(() => {
            if (sndAmbient) {
                sndAmbient.volume = 0.5;
                sndAmbient.play().catch(e => console.log("Ambient blocked"));
            }
            portalTransition('block-welcome');
        }, 700);
    }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUserImage = e.target.result;
                const pp = document.getElementById('pp'); if (pp) { pp.src = currentUserImage; pp.style.display = 'block'; }
                const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = 'none';
                const avatarImg = document.getElementById('avatar-img'); if (avatarImg) avatarImg.style.display = 'none';
                const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function generateAvatar() {
        const hex = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><rect width="100" height="100" fill="#${hex}"/><circle cx="50" cy="40" r="20" fill="#000"/><path d="M20,90 C20,70 80,70 80,90" fill="#000"/></svg>`;
        currentUserImage = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
        const avatarImg = document.getElementById('avatar-img'); if (avatarImg) { avatarImg.src = currentUserImage; avatarImg.style.display = 'block'; }
        const txtAvatar = document.getElementById('txt-avatar'); if (txtAvatar) txtAvatar.style.display = 'none';
        const pp = document.getElementById('pp'); if (pp) pp.style.display = 'none';
        const txtPhoto = document.getElementById('txt-photo'); if (txtPhoto) txtPhoto.style.display = 'block';
    }

    function saveUserProfile() {
        if (!currentUserImage) return;
        
        // Генерация ID если его нет
        if (!currentID) {
            currentID = "GY-" + Math.floor(100 + Math.random() * 900) + "-" + Math.floor(1000 + Math.random() * 9000);
        }
        
        safeStorageSet('gygy_avatar', currentUserImage);
        safeStorageSet('gy_user_img', currentUserImage);
        safeStorageSet('gy_user_avatar', currentUserImage); 
        safeStorageSet('gy_user_id', currentID);
        safeStorageSet('gygy_id', currentID);

        renderUserPassports(currentID);

        const badgeImg = document.getElementById('badge-avatar-img');
        const passImg = document.getElementById('pass-avatar-img');
        if (badgeImg) badgeImg.src = currentUserImage;
        if (passImg) passImg.src = currentUserImage;

        const profileCenter = document.getElementById('global-user-profile-center');
        if (profileCenter) profileCenter.style.visibility = 'visible';

        const btnWHall = document.getElementById('btn-w-hall'); if(btnWHall) btnWHall.classList.remove('btn-sleep');
        const btnPass = document.getElementById('btn-pass'); if(btnPass) btnPass.classList.remove('btn-sleep');
        
        alert("Profile saved successfully!");
    }

    function openPassport() {
        const modal = document.getElementById('modal-passport');
        if (modal) { modal.style.display = 'flex'; setTimeout(() => modal.style.opacity = '1', 10); }
    }

    function closePassport() {
        const modal = document.getElementById('modal-passport');
        if (modal) { modal.style.opacity = '0'; setTimeout(() => modal.style.display = 'none', 300); }
    }

    function enterStudio() { alert('Studio coming soon...'); }

    document.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add('page-loaded');
        checkAndFillRegistrationForm();
    });
</script>
</body>
</html>
