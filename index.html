<!-- GY-GY CLUB MONOLITH v.5.2.5 (.) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | v.5.2.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="ui-fixed">
        <div class="lang-zone">
            <button class="btn-gy" onclick="UI.toggle('lang-list')">GAB / LANG (11)</button>
            <div id="lang-list" class="drop-list">
                <div onclick="UI.setLang('EN')">English 🇬🇧</div>
                <div onclick="UI.setLang('RU')">Russian 🇷🇺</div>
                <div onclick="UI.setLang('FR')">French 🇫🇷</div>
                <div onclick="UI.setLang('DE')">German 🇩🇪</div>
                <div onclick="UI.setLang('ES')">Spanish 🇪🇸</div>
                <div onclick="UI.setLang('IT')">Italian 🇮🇹</div>
                <div onclick="UI.setLang('CN')">Chinese 🇨🇳</div>
                <div onclick="UI.setLang('JP')">Japanese 🇯🇵</div>
                <div onclick="UI.setLang('AR')">Arabic 🇦🇪</div>
                <div onclick="UI.setLang('TR')">Turkish 🇹🇷</div>
                <div onclick="UI.setLang('BR')">Brazil 🇧🇷</div>
            </div>
        </div>
        <div class="gy-logo">GY-GY</div>
        <button id="btn-back" class="btn-gy" onclick="Agent.goBack()">← BACK (RUN AWAY)</button>
    </header>

    <main id="app-stage"></main>

    <script src="blocks.js"></script>
    <script src="script.js"></script>
</body>
</html>
