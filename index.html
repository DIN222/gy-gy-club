<!DOCTYPE html>
<html lang="en">
<!-- GY-GY PROTOCOL v.5.3.9 (.) -->
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | ENTRANCE5.3.9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg" style="background-image: url('entrance_bg.jpg');">

    <!-- Language panel: strictly 11 languages as per sample -->
    <div class="lang-container">
        <div class="lang-trigger" onclick="UI.toggle('lang-panel')">
            <img src="https://flagcdn.com/w40/gb.png" id="current-lang-flag"> 
            <span>ENGLISH</span>
        </div>
        <div id="lang-panel" class="lang-panel">
            <button onclick="setLang('ru')"><img src="https://flagcdn.com/w20/ru.png"> РУССКИЙ</button>
            <button onclick="setLang('en')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</button>
            <button onclick="setLang('ua')"><img src="https://flagcdn.com/w20/ua.png"> УКРАЇНСЬКА</button>
            <button onclick="setLang('pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</button>
            <button onclick="setLang('de')"><img src="https://flagcdn.com/w20/de.png"> DEUTSCH</button>
            <button onclick="setLang('fr')"><img src="https://flagcdn.com/w20/fr.png"> FRANÇAIS</button>
            <button onclick="setLang('it')"><img src="https://flagcdn.com/w20/it.png"> ITALIANO</button>
            <button onclick="setLang('es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</button>
            <button onclick="setLang('cn')"><img src="https://flagcdn.com/w20/cn.png"> 中文</button>
            <button onclick="setLang('jp')"><img src="https://flagcdn.com/w20/jp.png"> 日本語</button>
            <button onclick="setLang('ae')"><img src="https://flagcdn.com/w20/ae.png"> العربية</button>
            <button onclick="setLang('br')"><img src="https://flagcdn.com/w20/br.png"> PORTUGUÊS</button>
        </div>
    </div>

    <header class="fixed-header">
        <div class="logo-text">GY-GY</div> <!-- Logo strictly right -->
    </header>

    <main class="portal-zone">
        <!-- Door strictly 40vh as per README -->
        <img src="door_1.jpg" id="main-door" class="door-v539" onclick="enterClub()">
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function enterClub() {
            // Sound and transition logic
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'welcome.html'; }, 1200);
        }
    </script>
</body>
</html>
