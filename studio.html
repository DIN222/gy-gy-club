<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.32 - STUDIO 024</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* Фоновое изображение Студии — отодвинуто на 5% от зрителя */
        .studio-page {
            position: fixed;
            inset: 0;
            background: url('studio_bg.jpg') center/95% no-repeat #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* АКТИВНЫЕ ЛОКАЦИИ */
        .studio-zone {
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0); 
        }

        /* СТРЕЛКИ (↑) */
        .cue-arrow-studio { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s, transform 0.2s;
        }

        .studio-zone:hover .cue-arrow-studio { 
            opacity: 0.8; 
            transform: scale(1.05);
        }

        /* ТВОИ НАСТРОЕННЫЕ КООРДИНАТЫ */
        .zone-wear { top: 24vh; left: 29vw; width: 120px; height: 90px; }
        .zone-gifts { top: 11vh; left: 55vw; width: 120px; height: 90px; }
        .zone-vintage { top: 4vh; left: 78vw; width: 120px; height: 90px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="studio-page">
        <div id="zone-wear" class="studio-zone zone-wear" onclick="selectCategory('wear')">
            <span class="cue-arrow-studio">↑</span>
        </div>

        <div id="zone-gifts" class="studio-zone zone-gifts" onclick="selectCategory('gifts')">
            <span class="cue-arrow-studio">↑</span>
        </div>

        <div id="zone-vintage" class="studio-zone zone-vintage" onclick="selectCategory('vintage')">
            <span class="cue-arrow-studio">↑</span>
        </div>
    </div>

    <script>
        // Перенаправление по шагам локации Студии (на внешние страницы)
        function selectCategory(type) {
            if (type === 'wear') window.location.href = 'atelie.html';
            if (type === 'gifts') window.location.href = 'gifts.html';
            if (type === 'vintage') window.location.href = 'vintage.html';
        }
    </script>
</body>
</html>
