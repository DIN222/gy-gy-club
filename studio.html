<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.35 - STUDIO 024</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
            --super-neon: #bf00ff; 
        }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* Задний фон Студии */
        .studio-page {
            position: fixed;
            inset: 0;
            background: url('studio_bg.jpg') center/95% no-repeat #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* ТОЧНЫЙ СТАНДАРТ НАВИГАЦИИ ИЗ ОФИСА */
        .ui-nav-arrows {
            position: fixed; 
            top: 18px; 
            left: 20px; 
            z-index: 9999999; 
            display: flex; 
            gap: 20px; 
            font-size: 26px; 
            font-weight: 900 !important; 
            cursor: pointer; 
            color: var(--gold); 
            line-height: 1; 
            letter-spacing: -2px; 
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .arrow-item { transition: opacity 0.2s; text-decoration: none; color: inherit; }
        .arrow-item:hover { opacity: 0.8; }

        /* ВЫНОСНАЯ ШАПКА В САМЫЙ ВЕРХ ИЕРАРХИИ БРАУЗЕРА */
        .ui-header-center {
            position: fixed; 
            top: 12px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999999; /* Выше любого фона */
            display: flex; 
            align-items: center; 
            justify-content: center;
            user-select: none;
            width: 42px;
            height: 42px;
        }
        
        .badge-avatar-wrapper {
            position: relative;
            display: block;
            width: 42px;
            height: 42px;
        }
        
        .user-avatar {
            width: 42px !important;
            height: 42px !important;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
            background: #fff !important;
            display: block;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
        }
        
        /* АБСОЛЮТНЫЙ ОВЕРЛЕЙ ДЛЯ ФЛАГА НА ЭКРАНЕ */
        .badge-flag {
            position: fixed !important;
            /* Точнейшая привязка к правому нижнему углу аватара 42x42 от центра экрана */
            top: 12px;
            left: 50%;
            transform: translate(9px, 23px) !important; 
            font-size: 16px !important;
            background: #000 !important;
            border-radius: 50% !important;
            padding: 2px !important;
            line-height: 1 !important;
            z-index: 100000000 !important; /* Абсолютный топ */
            display: block !important;
            text-shadow: none !important;
        }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 9999999; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
            user-select: none;
        }

        /* ЗОНЫ СТУДИИ */
        .studio-zone {
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0,0,0,0);
        }

        .cue-arrow-studio { 
            color: var(--super-neon); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 5px #fff, 0 0 10px var(--super-neon), 0 0 20px var(--super-neon); 
            pointer-events: none; 
            user-select: none;
        }

        .zone-wear { top: 24vh; left: 29vw; width: 120px; height: 90px; }
        .zone-gifts { top: 11vh; left: 55vw; width: 120px; height: 90px; }
        .zone-vintage { top: 4vh; left: 78vw; width: 120px; height: 90px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="notranslate ui-nav-arrows">
        <a href="index.html#block-hall" class="arrow-item">&lt;</a>
        <a href="index.html" class="arrow-item">&lt;&lt;</a>
    </div>

    <div class="ui-header-center notranslate">
        <div class="badge-avatar-wrapper">
            <img id="header-avatar" class="user-avatar" src="" alt="Avatar" style="display:none;">
        </div>
    </div>
    <span class="badge-flag notranslate" id="current-flag">🇷🇺</span>

    <div class="ui-header-right notranslate">GY-GY</div>


    <div class="studio-page">
        <div id="zone-wear" class="studio-zone zone-wear" onclick="selectCategory('wear')">
            <span class="cue-arrow-studio">↑</span>
        </div>

        <div id="zone-gifts" class="studio-zone zone-gifts" onclick="selectCategory('gifts')">
            <span class="cue-arrow-studio">↑</span>
        </div>

        <div id="zone-vintage" class="studio-zone zone-vintage" onclick="selectCategory('vintage')">
            <span class="cue-arrow-studio">↑</span>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Загрузка аватара
            const savedAvatar = localStorage.getItem('gygy_avatar') || 
                                localStorage.getItem('gy_user_img') || 
                                localStorage.getItem('user_avatar');
            const avatarEl = document.getElementById('header-avatar');
            
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
                avatarEl.style.display = 'block';
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
                avatarEl.style.display = 'block';
            }

            // Тотальный поиск языка по хранилищу и системе
            const userLang = localStorage.getItem('gygy_lang') || 
                             localStorage.getItem('lang') || 
                             localStorage.getItem('user_lang') || 
                             localStorage.getItem('selected_lang') || 
                             localStorage.getItem('current_lang') || 
                             localStorage.getItem('registration_lang') || 
                             navigator.language || 'ru';

            const flagElement = document.getElementById('current-flag');
            if (flagElement) {
                const cleanLang = userLang.toLowerCase().trim();
                if (cleanLang.includes('fr')) {
                    flagElement.textContent = '🇫🇷';
                } else if (cleanLang.includes('en') || cleanLang.includes('us')) {
                    flagElement.textContent = '🇺🇸';
                } else {
                    flagElement.textContent = '🇷🇺';
                }
            }
        });

        function selectCategory(type) {
            alert(`Переход в рабочий шаг локации: ${type.toUpperCase()}`);
        }
    </script>
</body>
</html>
