<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.30.2 - STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* Фоновое изображение Студии с твоими вывесками */
        .studio-page {
            position: fixed;
            inset: 0;
            background: url('studio_bg.jpg') center/cover no-repeat #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* НАВИГАЦИОННЫЕ СТЕЛКИ ВОЗВРАТА (СЛЕВА) */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; text-decoration: none; color: var(--gold); }
        .arrow-item:hover { opacity: 0.8; }

        /* ЛОГОТИП GY-GY (СПРАВА — РЕВЕРСИРОВАН) */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* АКТИВНЫЕ ЗОНЫ ПОВЕРХ ТВОИХ ВЫВЕСОК */
        .studio-zone {
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            /* Сами зоны невидимы, они просто ловят клик */
            background: rgba(0, 0, 0, 0); 
        }

        /* ФИОЛЕТОВЫЕ СТРЕЛКИ УКАЗАТЕЛИ */
        .studio-arrow {
            font-size: 32px;
            color: var(--violet);
            font-weight: bold;
            text-shadow: 0 0 10px var(--violet), 0 0 3px #000;
            margin-bottom: 10px; /* Стрелка висит чуть выше вывески */
            animation: arrow-bounce 1.5s infinite ease-in-out;
            user-select: none;
            pointer-events: none; /* Чтобы стрелка не мешала клику по зоне */
        }

        /* Анимация мягкого покачивания стрелок вверх-вниз */
        @keyframes arrow-bounce {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 8px var(--violet)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 0 15px var(--violet)); }
        }

        /* При наведении на зону стрелка горит ярче */
        .studio-zone:hover .studio-arrow {
            color: #b066ff;
            text-shadow: 0 0 20px #b066ff, 0 0 5px #000;
        }

        /* Координаты зон и стрелок (подгони проценты под свои нарисованные вывески) */
        .zone-wear {
            top: 25vh;
            left: 5vw;
            width: 26vw;
            height: 55vh;
        }

        .zone-gifts {
            top: 20vh;
            left: 37vw;
            width: 26vw;
            height: 60vh;
        }

        .zone-vintage {
            top: 25vh;
            right: 5vw;
            width: 26vw;
            height: 55vh;
        }

        /* Защита от автопереводчика */
        font { background-color: transparent !important; color: inherit !important; text-shadow: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="studio-page">
        <div class="notranslate ui-nav-arrows">
            <a href="index.html" class="arrow-item">&lt;</a>
            <a href="index.html" class="arrow-item">&lt;&lt;</a>
        </div>

        <div class="ui-header-right notranslate">GY-GY</div>

        <div class="studio-zone zone-wear" onclick="selectCategory('wear')">
            <div class="studio-arrow">▼</div>
        </div>

        <div class="studio-zone zone-gifts" onclick="selectCategory('gifts')">
            <div class="studio-arrow">▼</div>
        </div>

        <div class="studio-zone zone-vintage" onclick="selectCategory('vintage')">
            <div class="studio-arrow">▼</div>
        </div>
    </div>

    <script>
        function selectCategory(type) {
            console.log(`[GY-GY STUDIO] Переход в раздел: ${type}`);
            if (type === 'wear') {
                alert('Запуск конструктора одежды GY-GY Wear...');
            } else if (type === 'gifts') {
                alert('Запуск кастомизатора подарков и гаджетов...');
            } else if (type === 'vintage') {
                alert('Вход на цифровой блошиный рынок...');
            }
        }
    </script>
</body>
</html>
