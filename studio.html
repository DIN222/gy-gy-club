<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.5.30 - STUDIO 024 </title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style id="dynamic-zones-css">
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* Фоновое изображение Студии — отодвинуто на 5% от зрителя */
        .studio-page {
            position: fixed;
            inset: 0;
            background: url('studio_bg.jpg') center/95% no-repeat #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* НАВИГАЦИЯ (СЛЕВА) */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
        }
        .back-arrow { transition: opacity 0.2s; text-decoration: none; color: var(--gold); }
        .back-arrow:hover { opacity: 0.8; }

        /* СКВОЗНОЙ РЕАЛЬНЫЙ АВАТАР (ФОН ТЕПЕРЬ БЕЛЫЙ) */
        .ui-header-center {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000000;
            display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
        .user-avatar {
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold);
            object-fit: cover; background: #fff !important; display: block;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
        }

        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
            user-select: none;
        }

        /* АКТИВНЫЕ ЛОКАЦИИ */
        .studio-zone {
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(214, 175, 55, 0.02);
        }

        /* СТРЕЛКИ ИЗ ХОЛЛА (↑) */
        .cue-arrow-studio { 
            color: var(--violet); 
            font-size: 38px; 
            font-weight: 900; 
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px var(--violet), 0 0 20px var(--violet); 
            pointer-events: none; 
            user-select: none;
            z-index: 10;
            transition: opacity 0.2s, transform 0.2s;
        }

        .studio-zone:hover .cue-arrow-studio, .studio-zone.active .cue-arrow-studio { 
            opacity: 0.8; 
            transform: scale(1.05);
        }

        /* ЗДЕСЬ БУДУТ ТВОИ НАСТРОЕННЫЕ КООРДИНАТЫ ИЗ ПУЛЬТА */
      .zone-wear { top: 24vh; left: 29vw; width: 120px; height: 90px; }
      .zone-gifts { top: 11vh; left: 55vw; width: 120px; height: 90px; }
      .zone-vintage { top: 4vh; left: 78vw; width: 120px; height: 90px; }
        /* ИНСТРУМЕНТ НАСТРОЙКИ */
        #calibrator-panel {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--gold);
            padding: 15px; z-index: 999999; display: flex; flex-direction: column;
            gap: 10px; border-radius: 5px; font-size: 12px; width: 360px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #calibrator-panel.hide-panel {
            display: none !important; /* Жесткое скрытие блока */
        }
        .cal-row { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .cal-btn { 
            background: #222; border: 1px solid var(--gold); color: var(--gold);
            padding: 3px 8px; cursor: pointer; font-family: monospace; font-size: 11px;
        }
        .cal-btn:hover { background: var(--gold); color: #000; }
        #css-output { 
            width: 100%; height: 60px; background: #111; color: #fff; 
            font-size: 10px; border: 1px solid #444; resize: none; margin-top: 5px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="studio-page">
        <div class="notranslate ui-nav-arrows">
            <a href="index.html" class="back-arrow">&lt;</a>
            <a href="index.html" class="back-arrow">&lt;&lt;</a>
        </div>

        <div class="ui-header-center notranslate">
            <img id="header-avatar" class="user-avatar" src="" alt="Avatar" style="display:none;">
        </div>

        <div class="ui-header-right notranslate">GY-GY</div>

        <div id="zone-wear" class="studio-zone zone-wear" onclick="handleZoneClick(event, 'wear')">
            <span class="cue-arrow-studio">↑</span>
        </div>

        <div id="zone-gifts" class="studio-zone zone-gifts" onclick="handleZoneClick(event, 'gifts')">
            <span class="cue-arrow-studio">↑</span>
        </div>

        <div id="zone-vintage" class="studio-zone zone-vintage" onclick="handleZoneClick(event, 'vintage')">
            <span class="cue-arrow-studio">↑</span>
        </div>
    </div>

    <div id="calibrator-panel" class="notranslate">
        <div class="cal-row">
            <strong>ЗОНА: <span id="current-target" style="color:#fff;">КЛИКНИ ПО СТРЕЛКЕ</span></strong>
            <button class="cal-btn" onclick="toggleEditMode()">Выйти из настройки</button>
        </div>
        <div class="cal-row">
            <span>Позиция (Y / X):</span>
            <div>
                <button class="cal-btn" onclick="moveZone('top', -1)">▲</button>
                <button class="cal-btn" onclick="moveZone('top', 1)">▼</button>
                <button class="cal-btn" onclick="moveZone('left', -1)">◀</button>
                <button class="cal-btn" onclick="moveZone('left', 1)">▶</button>
            </div>
        </div>
        <div class="cal-row">
            <span>Размер поля (W / H):</span>
            <div>
                <button class="cal-btn" onclick="moveZone('width', 5)">W+</button>
                <button class="cal-btn" onclick="moveZone('width', -5)">W-</button>
                <button class="cal-btn" onclick="moveZone('height', 5)">H+</button>
                <button class="cal-btn" onclick="moveZone('height', -5)">H-</button>
            </div>
        </div>
        <div>
            <span>Скопируй этот код в свой CSS:</span>
            <textarea id="css-output" readonly></textarea>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const savedAvatar = localStorage.getItem('gygy_avatar') || 
                                localStorage.getItem('gy_user_img') || 
                                localStorage.getItem('user_avatar');
                                
            const avatarEl = document.getElementById('header-avatar');
            
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
                avatarEl.style.display = 'block';
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
                avatarEl.style.display = 'block';
            }
            updateCSSOutput();
        });

        let activeZoneId = null;
        let isEditMode = true; 
        
        let coordinates = {
            wear: { top: 40, left: 15, width: 120, height: 90 },
            gifts: { top: 40, left: 45, width: 120, height: 90 },
            vintage: { top: 40, left: 75, width: 120, height: 90 }
        };

        function handleZoneClick(e, type) {
            if (!isEditMode) {
                selectCategory(type);
                return;
            }
            e.preventDefault();
            activeZoneId = type;
            document.querySelectorAll('.studio-zone').forEach(z => z.classList.remove('active'));
            document.getElementById(`zone-${type}`).classList.add('active');
            document.getElementById('current-target').innerText = type.toUpperCase();
        }

        function moveZone(prop, amount) {
            if (!activeZoneId) return;
            coordinates[activeZoneId][prop] += amount;
            
            const el = document.getElementById(`zone-${activeZoneId}`);
            const unit = (prop === 'width' || prop === 'height') ? 'px' : (prop === 'top' ? 'vh' : 'vw');
            el.style[prop] = coordinates[activeZoneId][prop] + unit;
            
            updateCSSOutput();
        }

        window.addEventListener('keydown', function(e) {
            if (!activeZoneId || !isEditMode) return;
            if (e.key === 'ArrowUp') { e.preventDefault(); moveZone('top', -1); }
            if (e.key === 'ArrowDown') { e.preventDefault(); moveZone('top', 1); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); moveZone('left', -1); }
            if (e.key === 'ArrowRight') { e.preventDefault(); moveZone('left', 1); }
        });

        function updateCSSOutput() {
            const cssText = `.zone-wear { top: ${coordinates.wear.top}vh; left: ${coordinates.wear.left}vw; width: ${coordinates.wear.width}px; height: ${coordinates.wear.height}px; }\n` +
                            `.zone-gifts { top: ${coordinates.gifts.top}vh; left: ${coordinates.gifts.left}vw; width: ${coordinates.gifts.width}px; height: ${coordinates.gifts.height}px; }\n` +
                            `.zone-vintage { top: ${coordinates.vintage.top}vh; left: ${coordinates.vintage.left}vw; width: ${coordinates.vintage.width}px; height: ${coordinates.vintage.height}px; }`;
            document.getElementById('css-output').value = cssText;
        }

        function toggleEditMode() {
            isEditMode = false;
            // Принудительно прячем пульт с экрана с помощью специального CSS-класса
            document.getElementById('calibrator-panel').classList.add('hide-panel');
            document.querySelectorAll('.studio-zone').forEach(z => {
                z.style.background = 'rgba(0,0,0,0)'; 
                z.classList.remove('active');
            });
        }

        function selectCategory(type) {
            alert(`Переход в рабочий шаг локации: ${type.toUpperCase()}`);
        }
    </script>
</body>
</html>
