<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | Studio 4.5.32 </title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        
        html, body { 
            width: 100%; height: 100%; 
            background: #000; color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow-x: hidden; margin:0; 
        }

        /* ==========================================================================
           ВЕРХНЯЯ ПАНЕЛЬ СТУДИО (TOP BAR)
           ========================================================================== */
        .studio-top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; border-bottom: 1px solid rgba(214, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 9999999;
        }

        .top-bar-left { display: flex; align-items: center; gap: 20px; }

        /* СТРЕЛКИ НАВИГАЦИИ */
        .ui-nav-arrows {
            display: flex; gap: 20px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-frame-locked {
            width: 150px; height: 36px; border: 2px solid var(--gold); 
            background: #000; cursor: pointer; display: flex; align-items: center; padding: 0 10px;
            font-size: 13px; position: relative;
        }
        .lang-dropdown-adaptive {
            display: none; position: absolute; top: 38px; left: -2px; 
            width: 150px; background: #000; border: 1px solid var(--gold) !important; z-index: 10000;
            max-height: 50vh; overflow-y: auto;
        }
        .lang-item { display: flex; align-items: center; padding: 8px 10px; cursor: pointer; line-height: 1; }
        .lang-item:hover { background: rgba(214, 175, 55, 0.1); }
        .flag-icon { width: 20px; margin-right: 10px; }

        /* ЛОГОТИП СПРАВА */
        .ui-logo-right { 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold);
            text-shadow: 0 0 8px rgba(214, 175, 55, 0.3);
        }

        /* ЧИСТКА GOOGLE TRANSLATE */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        body { top: 0 !important; background-color: #000 !important; opacity: 0; transition: opacity 0.4s ease-in-out !important; }
        body.page-loaded { opacity: 1 !important; }
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
        .goog-text-highlight { background-color: transparent !important; background: transparent !important; box-shadow: none !important; color: inherit !important; }
        
        /* ==========================================================================
           РАБОЧАЯ ЗОНА СТУДИИ (Контент под шапкой)
           ========================================================================== */
        .studio-workspace {
            padding-top: 80px; /* Отступ под фиксированную шапку (60px + 20px запас) */
            padding-bottom: 20px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .studio-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .studio-placeholder {
            width: 90%;
            max-width: 600px;
            height: 400px;
            border: 2px dashed var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(214, 175, 55, 0.5);
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- ЕДИНАЯ ВЕРХНЯЯ ПАНЕЛЬ СТУДИО -->
    <div class="studio-top-bar notranslate">
        
        <div class="top-bar-left">
            <!-- Стрелки навигации -->
            <div class="ui-nav-arrows">
                <div class="arrow-item" onclick="backToHall()">&lt;</div>
                <div class="arrow-item" onclick="backToEntrance()">&lt;&lt;</div>
            </div>

            <!-- Селектор языков -->
            <div id="lang-switcher" class="lang-frame-locked" translate="no" onclick="toggleLangList()">
                <div id="active-lang-display" style="display:flex; align-items:center; width:100%;">
                    <img src="https://flagcdn.com/w40/gb.png" class="flag-icon" id="current-flag">
                    <span id="current-lang-name">ENGLISH</span>
                </div>
                <div id="lang-list-container" class="lang-dropdown-adaptive"></div>
            </div>
        </div>

        <!-- Логотип GY-GY -->
        <div class="ui-logo-right">GY-GY</div>
    </div>

    <!-- ДЛЯ СМЕНЫ ЯЗЫКА (СКРЫТЫЙ КОМБОБОКС) -->
    <div id="google_translate_element" style="position:fixed; bottom:0; left:0; opacity:0; z-index:-1;"></div>

    <!-- РАБОЧАЯ ЗОНА СТУДИИ -->
    <div class="studio-workspace">
        <div class="studio-title">Creative Studio</div>
        
        <!-- Сюда вставляй свой функционал Студии (холст, загрузку фото, инструменты) -->
        <div class="studio-placeholder">
            [ STUDIO TOOLS & CANVAS GO HERE ]<br><br>
            Вставь сюда элементы управления студией
        </div>
    </div>

<script type="text/javascript">
    // --- НАВИГАЦИЯ ---
    function backToHall() {
        window.location.href = 'index.html?go=hall';
    }

    function backToEntrance() {
        window.location.href = 'index.html';
    }

    // --- ЛОГИКА МУЛЬТИЯЗЫЧНОСТИ ---
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }

    let currentActiveCode = 'en';

    const allLangs = [
        {n:'ENGLISH', c:'gb', code:'en'}, {n:'DEUTSCH', c:'de', code:'de'}, 
        {n:'ESPAÑOL', c:'es', code:'es'}, {n:'FRANÇAIS', c:'fr', code:'fr'},
        {n:'ITALIANO', c:'it', code:'it'}, {n:'POLSKI', c:'pl', code:'pl'}, 
        {n:'PORTUGUÊС', c:'pt', code:'pt'}, {n:'РУССКИЙ', c:'ru', code:'ru'}, 
        {n:'TÜRKЧЕ', c:'tr', code:'tr'}, {n:'УКРАЇНСЬКА', c:'ua', code:'uk'}, 
        {n:'中文', c:'cn', code:'zh-CN'}, {n:'日本語', c:'jp', code:'ja'}
    ];

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }
    function safeStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

    function renderLangList() {
        const container = document.getElementById('lang-list-container');
        if (!container) return;
        container.innerHTML = ''; 
        allLangs.forEach(lang => {
            if(lang.code === currentActiveCode) return; 
            const div = document.createElement('div');
            div.className = 'lang-item notranslate';
            div.setAttribute('translate', 'no');
            div.innerHTML = `<img src="https://flagcdn.com/w40/${lang.c}.png" class="flag-icon notranslate" translate="no"><span class="notranslate" translate="no">${lang.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); applyLanguage(lang); };
            container.appendChild(div);
        });
    }

    function applyLanguage(lang) {
        currentActiveCode = lang.code;
        safeStorageSet('gygy_flag', lang.c);
        safeStorageSet('gy_user_flag', lang.c);
        safeStorageSet('gy_lang', lang.code);
        safeStorageSet('gygy_lang', lang.code);
        
        const flagImg = document.getElementById('current-flag');
        const langName = document.getElementById('current-lang-name');
        if (flagImg) flagImg.src = `https://flagcdn.com/w40/${lang.c}.png`;
        if (langName) langName.innerText = lang.n;
        
        const langListContainer = document.getElementById('lang-list-container');
        if (langListContainer) langListContainer.style.display = 'none';
        renderLangList();
        
        forceTriggerGoogleTranslate(lang.code);
    }

    function forceTriggerGoogleTranslate(langCode) {
        if (window.langTimer) clearInterval(window.langTimer);
        let attempts = 0;
        window.langTimer = setInterval(() => {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                clearInterval(window.langTimer);
                if (selectEl.value === langCode) return;
                selectEl.value = langCode;
                selectEl.dispatchEvent(new Event('change', { bubbles: true }));
            }
            if (++attempts > 100) clearInterval(window.langTimer);
        }, 100);
    }

    function toggleLangList() {
        const list = document.getElementById('lang-list-container');
        if (list) list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    function loadSavedLanguage() {
        let savedLangCode = safeStorageGet('gy_lang') || safeStorageGet('gygy_lang');
        const savedFlag = safeStorageGet('gygy_flag') || safeStorageGet('gy_user_flag');
        
        if (savedLangCode) {
            savedLangCode = savedLangCode.toLowerCase();
            if (savedLangCode === 'ua') savedLangCode = 'uk';
        }

        let matchedLang = null;
        if (savedFlag) {
            matchedLang = allLangs.find(l => l.c.toLowerCase() === savedFlag.toLowerCase());
        } else if (savedLangCode) {
            matchedLang = allLangs.find(l => l.code === savedLangCode);
        }

        if (matchedLang) {
            currentActiveCode = matchedLang.code;
            const flagImg = document.getElementById('current-flag');
            const langName = document.getElementById('current-lang-name');
            if (flagImg) flagImg.src = `https://flagcdn.com/w40/${matchedLang.c}.png`;
            if (langName) langName.innerText = matchedLang.n;
            forceTriggerGoogleTranslate(matchedLang.code);
        }
    }

    // --- ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ ---
    window.onload = () => {
        let savedLangCode = safeStorageGet('gy_lang') || safeStorageGet('gygy_lang') || 'en';
        savedLangCode = savedLangCode.toLowerCase();
        if (savedLangCode === 'ua') savedLangCode = 'uk';

        document.cookie = "googtrans=/en/" + savedLangCode + "; path=/";
        document.cookie = "googtrans=/en/" + savedLangCode + "; domain=" + window.location.hostname + "; path=/";

        loadSavedLanguage();
        renderLangList();

        setTimeout(() => { document.body.classList.add('page-loaded'); }, 200);
    };
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
