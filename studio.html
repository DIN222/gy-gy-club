<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GY-GY Studio | Выбор Локации</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ==========================================
       ГЛОБАЛЬНЫЕ СТИЛИ
       ========================================== */
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --panel-border: #221c08;
      
      --gold-primary: #d4af37; 
      --gold-light: #f5d77f;
      --gold-dark: #3a2e0a;
      
      --purple-accent: #8a2be2;
      --purple-glow: rgba(138, 43, 226, 0.5);
      
      --text: #ffffff;
      --text-muted: #8a806b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ==========================================
       ШАПКА (HEADER)
       ========================================== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
    }

    .nav-arrows {
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      background: #121212;
      border: 1px solid var(--gold-dark);
      color: var(--gold-primary);
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      font-weight: 700;
      transition: all 0.25s ease;
      text-decoration: none;
      line-height: 1;
    }

    .nav-btn:hover {
      border-color: var(--gold-light);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
    }

    .brand-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--gold-primary);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.35);
    }

    /* ==========================================
       КОНТЕНТ СТУДИИ
       ========================================== */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 40px;
      text-align: center;
    }

    .grid {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1000px;
    }

    /* Карточки локаций */
    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 30px;
      width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--gold-primary);
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold-primary);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 25px;
      line-height: 1.5;
    }

    /* ФИОЛЕТОВАЯ КНОПКА WEAR */
    .btn-purple {
      background: #8a2be2;
      border: 1px solid #a040ff;
      color: #ffffff;
      width: 100%;
      padding: 14px;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px var(--purple-glow);
      text-decoration: none;
      display: inline-block;
    }

    .btn-purple:hover {
      background: #9d38f5;
      box-shadow: 0 0 25px var(--purple-glow);
      transform: scale(1.02);
    }

    /* Заглушка для неактивных кнопок */
    .btn-disabled {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #555;
      width: 100%;
      padding: 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="header">
    <div class="nav-arrows">
      <!-- Одинарная стрелка: В Холл -->
      <a href="hall.html" class="nav-btn" title="Перейти в Холл">‹</a>
      <!-- Двойная стрелка: Ко входу в клуб -->
      <a href="index.html" class="nav-btn" title="Ко входу в клуб (Index)">«</a>
    </div>
    <div class="brand-logo">GY-GY STUDIO</div>
  </header>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <div class="container">
    <h1 class="title">Рабочие Локации</h1>
    <p class="subtitle">Выберите модуль для перехода к проектированию</p>

    <div class="grid">
      
      <!-- ЛОКАЦИЯ WEAR (АТЕЛЬЕ) -->
      <div class="card">
        <div class="card-icon">👕</div>
        <div class="card-title">Модуль WEAR</div>
        <div class="card-desc">Конструктор одежды, выбор тканей, мерки и нанесение кастомных принтов.</div>
        
        <!-- Фиолетовая кнопка WEAR с прямым переходом -->
        <a href="atelier_v1.1.1.html" class="btn-purple" id="btn-wear">
          Открыть Ателье
        </a>
      </div>

      <!-- ДОПОЛНИТЕЛЬНАЯ ЛОКАЦИЯ -->
      <div class="card">
        <div class="card-icon">👟</div>
        <div class="card-title">Модуль SHOES</div>
        <div class="card-desc">Кастомизация обуви, материалов подошвы и аксессуаров.</div>
        <button class="btn-disabled" disabled>В разработке</button>
      </div>

    </div>
  </div>

  <script>
    // Дополнительный обработчик для перестраховки навигации
    document.getElementById('btn-wear').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'atelier_v1.1.1.html';
    });
  </script>
</body>
</html>
