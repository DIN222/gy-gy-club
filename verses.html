<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY CLUB | VERSES v.3.5.7/title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffd700; --black: #000; --h-unit: 55px; }
        body { background: var(--black); color: var(--gold); font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* ШАПКА */
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 15px; border-bottom: 2px solid var(--gold); background: #000; z-index: 10; }
        .header-left { display: flex; gap: 10px; align-items: center; }
        .header-right { display: flex; justify-content: flex-end; }
        .ui-box { height: var(--h-unit); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; padding: 0 15px; background: transparent; color: var(--gold); cursor: pointer; box-sizing: border-box; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .ui-box:hover { background: rgba(255,215,0,0.1); box-shadow: 0 0 15px var(--gold); }
        .arrow { font-size: 32px; width: 60px; font-family: sans-serif; }
        .logo { font-size: 30px; font-weight: bold; letter-spacing: 6px; padding: 0 10px; text-shadow: 0 0 10px var(--gold); }

        /* СТЕНА */
        #wall { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; position: relative; }
        #wall-placeholder { padding: 40px; text-align: center; color: rgba(255,215,0,0.4); font-size: 18px; line-height: 1.6; border: 1px dashed rgba(255,215,0,0.2); margin: 20px; border-radius: 15px; }
        
        /* КАРТОЧКИ */
        .card { border: 1px solid #333; padding: 20px; background: #050505; max-width: 800px; margin: 0 auto; width: 95%; transition: 0.4s; position: relative; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .card.loading { border-color: var(--gold); opacity: 0.7; border-style: dashed; }
        .content { color: #fff; min-height: 80px; outline: none; margin-bottom: 15px; white-space: pre-line; font-size: 20px; line-height: 1.4; }
        
        /* УПРАВЛЕНИЕ КАРТОЧКОЙ */
        .remote { display: flex; gap: 20px; border-top: 1px solid #222; padding-top: 15px; font-size: 13px; }
        .remote-btn { cursor: pointer; color: #777; text-transform: uppercase; font-weight: bold; }
        .remote-btn:hover { color: var(--gold); }

        /* ПОДВАЛ */
        footer { padding: 15px; border-top: 2px solid var(--gold); background: #000; }
        .input-row { display: flex; gap: 10px; width: 100%; height: var(--h-unit); }
        input, select { background: #000; border: 1px solid var(--gold); color: #fff; padding: 0 15px; font-family: inherit; font-size: 18px; outline: none; }
        input { flex: 1; }
        input::placeholder { color: rgba(255,215,0,0.3); }
        select { width: 150px; cursor: pointer; }
        .btn-ok { width: 80px; font-size: 20px; background: rgba(255,215,0,0.1); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="ui-box arrow" onclick="location.href='index_FIX.html'">«</button>
        <div class="ui-box" style="border:none">RU</div>
        <button class="ui-box" style="width: auto; padding: 0 20px;" onclick="quickGen()">ГЕНЕРАТОР</button>
    </div>
    <div class="logo">GY-GY</div>
    <div class="header-right">
        <button class="ui-box arrow" onclick="location.href='clip.html'">»</button>
    </div>
</header>

<main id="wall">
    <div id="wall-placeholder">
        Выберите тему (кнопка внизу), <br>
        напишите 4 любых слова, нажмите <b>ОК</b> и кнопку <b>ГЕНЕРАТОР</b>, <br>
        или после выбора темы сразу нажмите <b>ГЕНЕРАТОР</b>. <br><br>
        <span style="color: var(--gold); opacity: 0.8;">Далее ориентируйтесь по навигации на странице.</span>
    </div>
</main>

<footer>
    <div class="input-row">
        <select id="style">
            <option value="absurd">АБСУРД</option>
            <option value="cyber">КИБЕР-КОНЬ</option>
            <option value="luxury">ЗОЛОТО</option>
            <option value="hardcore">ХАРДКОР</option>
            <option value="minimal">МИНИМАЛ</option>
        </select>
        <input type="text" id="words" placeholder="Напиши любые 4 слова...">
        <button class="ui-box btn-ok" id="run-btn" onclick="quickGen()">OK</button>
    </div>
</footer>

        if (cards.length > 0) {
            if (placeholder) placeholder.style.display = 'none';
        } else {
            if (placeholder) placeholder.style.display = 'block';
        }
    }

        if (cardEl) {
            cardEl.classList.remove('loading');

        }
    }
}

    // --- МАГИЯ ОБЛАЧНОГО ПОШИВА ---
    try {
        const response = await fetch('/api/chat', { // Стучимся в наш новый шлюз
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                prompt: finalTopic,

                mode: style.toUpperCase()
            })
        });

        const data = await response.json();
        
        // Нитки подобрались — выводим настоящий куплет!
        finalizeCard(id, data.text || "🎷 Облако выдало тишину... Попробуй еще раз!");

    } catch (err) {
        finalizeCard(id, "🧨 Ошибка связи! Проверь шлюз api/chat.js или настройки Vercel.");

}

        const card = document.createElement('div');
        card.className = 'card loading';
        card.id = id;
        card.innerHTML = `<div class="content">[${mode}] СИНТЕЗ В СТИЛЕ ${style.toUpperCase()}... \n Тема: ${finalTopic}</div>`;
        
        // Вставляем новую карточку перед остальными (в начало списка)

        wall.insertBefore(card, wall.firstChild);

        // Имитация ответа от облака
        setTimeout(() => {

    function finalizeCard(id, text) {

<script>
    // 1. Проверка стены (показывает/скрывает инструкцию)
    function checkWall() {
        const wall = document.getElementById('wall');
        const placeholder = document.getElementById('wall-placeholder');
        const cards = wall.querySelectorAll('.card');
        if (placeholder) {
            placeholder.style.display = (cards.length > 0) ? 'none' : 'block';
        }
    }

    // 2. ГЕНЕРАТОР (Тот самый, что идет в Облако)
    async function quickGen() {
        const input = document.getElementById('words');
        const style = document.getElementById('style').value;
        const wall = document.getElementById('wall');
        
        let userWords = input.value.trim();
        let finalTopic = userWords || ({
            absurd: "Пьяный кактус поет караоке в открытом космосе",
            cyber: "Нейро-конь взламывает терминал за порцию овса",
            luxury: "Алмазные слезы на золотом капоте лимузина",
            hardcore: "Разрыв шаблона в ритме отбойного молотка",
            minimal: "Точка. Тишина. Взрыв."
        }[style] || "Случайный драйв системы");

        const id = 'v' + Date.now();
        const card = document.createElement('div');
        card.className = 'card loading';
        card.id = id;
        card.innerHTML = `<div class="content">[ОЖИДАНИЕ] ✂️ Ткань режется... \n Тема: ${finalTopic}</div>`;
        
        wall.insertBefore(card, wall.firstChild);
        input.value = '';
        checkWall();

        try {
            const response = await fetch('/api/chat.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: finalTopic, 
                    user_id: 'GY-' + id,
                    mode: style.toUpperCase()
                })
            });

            if (!response.ok) throw new Error(`Шлюз ответил: ${response.status}`);

            const data = await response.json();
            finalizeCard(id, data.text || "🎷 Облако выдало тишину...");

        } catch (err) {
            console.error("ОШИБКА:", err);
            finalizeCard(id, `🧨 [ОШИБКА СВЯЗИ]\n${err.message}`);
        }
    }

    // 3. Завершение карточки (убирает loading и ставит кнопки)
    function finalizeCard(id, text) {
        const card = document.getElementById(id);
        if (!card) return;
        card.classList.remove('loading');
        card.innerHTML = `
            <div class="content" contenteditable="true">${text}</div>
            <div class="remote">
                <span class="remote-btn" onclick="bridge('CLIP', '${id}')">🎬 CLIP</span>
                <span class="remote-btn" onclick="bridge('TG', '${id}')">✉ TG</span>
                <span class="remote-btn" onclick="deleteCard('${id}')" style="color:#aa0000">❌ DEL</span>
            </div>`;
    }

    // 4. Удаление
    function deleteCard(id) {
        const card = document.getElementById(id);
        if (card) card.remove();
        checkWall();
    }

    // 5. Мост (Логика кнопок)
    function bridge(action, id) {
        const text = document.querySelector(`#${id} .content`).innerText;
        if(action === 'CLIP') { 
            localStorage.setItem('currentVerse', text); 
            location.href = 'clip.html'; 
        }
        if(action === 'TG') alert("Отправка в Telegram...");
    }

    // 6. Опрос сервера (api/pull) — если он тебе всё еще нужен
    setInterval(async () => {
        try {
            const response = await fetch('/api/pull');
            if (response.ok) {
                const data = await response.json();
                if (data && data.text) {
                    // Используем finalizeCard для вставки внешних данных
                    const id = 'cloud-' + Date.now();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = id;
                    wall.prepend(card);
                    finalizeCard(id, `[ОБЛАКО ПРИСЛАЛО]\n\n${data.text}`);
                }
            }
        } catch (e) {}
    }, 5000); // 5 секунд, чтобы не перегружать сеть

    // Старт
    checkWall();
</script>
