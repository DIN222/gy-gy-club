<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROOM CORE | v8.1.18 (Internal 4.4)</title>
    <style>
        :root {
            --orange-neon: #ff8c00;
            --neon-glow: 0 0 20px rgba(255, 140, 0, 0.9), 0 0 40px rgba(255, 140, 0, 0.4);
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР: Фиксирует пропорции кадра и не дает зонам съезжать */
        .viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; /* Идеальные 16:9 */
            max-height: 56.25vw;
            overflow: hidden;
        }

        /* ФОНОВАЯ КАРТИНКА КАК ОБЪЕКТ */
        .bg-room {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            pointer-events: none;
            z-index: 1;
        }

        /* ИНТЕРФЕЙС ПОВЕРХ КАДРА */
        .ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }
        
        .interactive {
            pointer-events: auto !important;
        }

        .top-bar {
            position: absolute;
            top: 25px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .brand-logo {
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 8px;
            font-family: monospace;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            text-transform: uppercase;
        }

        .screen-label {
            position: absolute;
            color: var(--orange-neon);
            text-shadow: var(--neon-glow);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-transform: lowercase;
            text-align: center;
            transform: translate(-50%, -50%); /* Центрирование по координатам */
        }

        /* АБСОЛЮТНЫЕ ТЕЛЕВИЗИОННЫЕ ЗОНЫ (ПРИВЯЗАНЫ К ЦЕНТРАМ СВОИХ ЭКРАНОВ) */
        #studio-zone {
            top: 30%; 
            left: 27.5%; 
            width: 25%;
            height: 20%;
            font-size: clamp(30px, 4.0vw, 50px); 
        }

        #universe-zone {
            top: 30%; 
            left: 72.5%;
            width: 30%;
            height: 20%;
            font-size: clamp(20px, 3.5vw, 45px);
        }

        #techpark-zone {
            top: 51%; 
            left: 50%;
            width: 15%;
            height: 12%;
            font-size: clamp(14px, 2.5vw, 40px);
        }

        .screen-label:hover {
            filter: brightness(1.5);
            transform: translate(-50%, -50%) scale(1.05);
            text-shadow: 0 0 30px var(--orange-neon);
        }

        .bottom-nav {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            align-items: flex-end;
        }

        .btn-back {
            background: none;
            border: 1px solid rgba(255,255,255,0.6);
            color: #fff;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .meta-data {
            text-align: right;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
        }

        #digital-trace { color: var(--orange-neon); }
        
        /* Скрытие контейнера гугла, чтобы не портил винтаж */
        #google_translate_element { display: none; }
    </style>
</head>
<body>

<div class="viewport">
    <img src="OIG2_vintage_tv_room_v2.png" class="bg-room">

    <div class="ui-layer">
        <div class="top-bar interactive">
            <div id="google_translate_element"></div>
            <div class="brand-logo notranslate">GY-GY</div>
        </div>

        <a href="studio.html" class="screen-label interactive" id="studio-zone">studio</a>
        <a href="techpark.html" class="screen-label interactive" id="techpark-zone">techpark</a>
        <a href="universe.html" class="screen-label interactive" id="universe-zone">Hello Universe</a>

        <div class="bottom-nav interactive">
            <button class="btn-back" onclick="location.href='index.html'">← RETURN</button>
            <div class="meta-data">
                CORE_VER: 4.4 (Build 8.1.18)<br>
                TRACE_ID: <span id="digital-trace">...</span>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        // Установили базовый английский по умолчанию, как в главном меню клуба
        new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    (function() {
        // Уникальный цифровой след скрытый в браузере
        let id = localStorage.getItem('gy_trace') || 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('gy_trace', id);
        document.getElementById('digital-trace').innerText = id;
    })();
</script>

</body>
</html>
