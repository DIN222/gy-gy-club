<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY CLUB | AI ROOM CORE v8.1.24</title>
    <style>
        :root {
            --orange-neon: #ff8c00;
            --neon-glow: 0 0 20px rgba(255, 140, 0, 0.9), 0 0 40px rgba(255, 140, 0, 0.4);
            --gold: #ffd700;
            --black: #000;
            --h-unit: 55px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            color: var(--gold);
            font-family: monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* КОНСТАНТА: МОНОЛИТНАЯ ВЕРХНЯЯ ПАНЕЛЬ КЛУБА */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Лево | Центр | Право */
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--gold);
            background: var(--black);
            z-index: 100;
            box-sizing: border-box;
            height: 75px;
            width: 100%;
        }

        /* Слева: Одиночная и Двойная стрелки */
        .header-left {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            align-items: center;
        }

        /* По центру: Аватар */
        .header-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Справа: Логотип */
        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        /* Кнопки-стрелки */
        .nav-btn {
            height: var(--h-unit);
            width: var(--h-unit);
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            box-sizing: border-box;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            user-select: none;
        }

        .nav-btn:hover {
            background: rgba(255,215,0,0.1);
            box-shadow: 0 0 15px var(--gold);
        }

        /* Логотип */
        .logo-gy {
            color: var(--gold);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--gold);
            user-select: none;
            text-transform: uppercase;
        }

        /* Аватар */
        .user-avatar {
            width: var(--h-unit);
            height: var(--h-unit);
            border: 1px solid var(--gold);
            box-sizing: border-box;
            background: #222;
            object-fit: cover;
        }

        /* РАБОЧАЯ ОБЛАСТЬ С ТРЕМЯ ЭКРАНАМИ */
        main {
            flex: 1;
            position: relative;
            width: 100%;
            height: calc(100% - 75px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }

        /* Контейнер 16:9 без деформаций */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; 
            max-height: 56.25vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-room {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Неоновые метки на кинескопах */
        .screen-label {
            position: absolute;
            color: var(--orange-neon);
            text-shadow: var(--neon-glow);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-transform: lowercase;
            text-align: center;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        #studio-zone {
            top: 30%; 
            left: 27.5%; 
            width: 25%;
            height: 20%;
            font-size: clamp(24px, 3.5vw, 45px); 
        }

        #universe-zone {
            top: 30%; 
            left: 72.5%;
            width: 30%;
            height: 20%;
            font-size: clamp(18px, 3.0vw, 40px);
        }

        #techpark-zone {
            top: 51%; 
            left: 50%;
            width: 15%;
            height: 12%;
            font-size: clamp(12px, 2.0vw, 30px);
        }

        .screen-label:hover {
            filter: brightness(1.5);
            transform: translate(-50%, -50%) scale(1.05);
            text-shadow: 0 0 30px var(--orange-neon);
        }

        footer {
            padding: 5px 20px;
            background: var(--black);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            box-sizing: border-box;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            height: 30px;
            border-top: 1px solid #111;
        }

        #digital-trace { color: var(--orange-neon); margin-left: 5px; }
    </style>
</head>
<body>

<!-- КОНСТАНТНАЯ ШАПКА КЛУБА -->
<header>
    <!-- Лево: Одиночная и Двойная стрелки -->
    <div class="header-left">
        <div class="nav-btn" onclick="location.href='index.html'">&#10094;</div> <!-- Одиночная ❮ -->
        <div class="nav-btn" onclick="location.href='index.html'">«</div>       <!-- Двойная « -->
    </div>
    
    <!-- Центр: Аватар пользователя -->
    <div class="header-center">
        <img src="about:blank" id="user-header-avatar" class="user-avatar" alt="Avatar" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'55\' height=\'55\' viewBox=\'0 0 55 55\'><rect width=\'55\' height=\'55\' fill=\'%23333\'/><text x=\'50%\' y=\'55%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23ffd700\' font-family=\'monospace\' font-size=\'18\'>GY</text></svg>';">
    </div>
    
    <!-- Право: Название Клуба -->
    <div class="header-right">
        <div class="logo-gy notranslate">GY-GY CLUB</div>
    </div>
</header>

<main>
    <div class="viewport">
        <!-- Картинка с тремя экранами -->
        <img src="OIG2_vintage_tv_room_v2 (1).png" class="bg-room" alt="Three Screens Hub">

        <!-- Точки переходов -->
        <a href="studio.html" class="screen-label" id="studio-zone">studio</a>
        <a href="techpark.html" class="screen-label" id="techpark-zone">techpark</a>
        <a href="universe.html" class="screen-label" id="universe-zone">Hello Universe</a>
    </div>
</main>

<footer>
    <div>CORE_VER: 4.4 (Build 8.1.23) | TRACE_ID: <span id="digital-trace">...</span></div>
</footer>

<!-- АУДИОКОМПОНЕНТ СЕРВЕРНОЙ -->
<audio id="snd-server-isolated" src="server_room.mp3" loop preload="auto"></audio>

<script>
    (function() {
        // Установка цифрового следа
        let id = localStorage.getItem('gy_trace') || 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('gy_trace', id);
        const traceEl = document.getElementById('digital-trace');
        if (traceEl) traceEl.innerText = id;

        // Инициализация аватара
        const savedAvatar = localStorage.getItem('gy_user_avatar');
        if (savedAvatar) {
            document.getElementById('user-header-avatar').src = savedAvatar;
        }

        // Запуск фонового гула серверной по первому клику
        const launchAudio = () => {
            const audio = document.getElementById('snd-server-isolated');
            if (audio && audio.paused) {
                audio.volume = 0.25;
                audio.play().catch(e => console.log("Audio target context lock..."));
            }
        };

        document.addEventListener('click', launchAudio, { once: true });
        document.addEventListener('touchstart', launchAudio, { once: true });
    })();
</script>

</body>
</html>
