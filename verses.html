<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club - AI Room (Verses)</title>
    <style>
        /* === ПЕРЕМЕННЫЕ И БАЗОВЫЕ СТИЛИ КЛУБА === */
        :root {
            --gold: #d6af37;
            --purple: #1a0f2e;
            --dark-bg: #0a0a0a;
            --neon-glow: 0 0 10px rgba(214, 175, 55, 0.8);
            --neon-purple: 0 0 15px rgba(147, 51, 234, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* ПОСТОЯННЫЕ АТРИБУТЫ ЛЕЙАУТА */
        .ui-header-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ui-header-right {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999;
            font-weight: 900;
            font-size: 24px;
            color: var(--gold);
            text-shadow: var(--neon-glow);
            cursor: default;
            user-select: none;
        }

        /* КЛУБНЫЕ КНОПКИ */
        .btn-gy {
            background: rgba(26, 15, 46, 0.8);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: var(--neon-glow);
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
        }

        .btn-gy:hover {
            background: var(--gold);
            color: var(--purple);
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.05);
        }

        /* ИНТЕРФЕЙС AI ROOM (МАТРИЦА) */
        .ai-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 100px 20px 40px 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #150b24 0%, #050308 100%);
        }

        /* ЭКРАН СТИХОВ / ОТВЕТОВ ИИ */
        .terminal-screen {
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            background: rgba(10, 5, 20, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.4);
            box-shadow: var(--neon-purple);
            border-radius: 8px;
            padding: 25px;
            box-sizing: border-box;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .ai-speech-bubble {
            color: var(--gold);
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            text-shadow: 0 0 5px rgba(214, 175, 55, 0.3);
        }

        /* СЕТКА СИСТЕМЫ ВВОДА (ДЛЯ ОБЩЕНИЯ С НЕЙРОСЕТЬЮ) */
        .input-area {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 15px;
        }

        .ai-input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(147, 51, 234, 0.6);
            padding: 15px;
            color: #ffffff;
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .ai-input:focus {
            border-color: var(--gold);
            box-shadow: var(--neon-glow);
        }

        /* КЛУБНЫЙ АНТИВИРУС ПРОТИВ ПОДСВЕТКИ ГУГЛА */
        font {
            background-color: transparent !important;
            background: transparent !important;
            color: inherit !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }

        .goog-text-highlight {
            background-color: transparent !important;
            background: transparent !important;
            box-shadow: none !important;
            color: inherit !important;
        }

        .btn-gy font, .ai-speech-bubble font, .ui-header-right font {
            color: inherit !important;
        }
    </style>
</head>
<body>

    <audio id="snd-server-echo" src="sbridge_ambient.mp3" loop prefetch></audio>

    <div class="ui-header-left">
        <button class="btn-gy" style="border-color: #9333ea; box-shadow: var(--neon-purple);" onclick="leaveAIRoom()">
            🔮 Назад в Серверную
        </button>
        
        <div id="lang-switcher">
            <button class="btn-gy" style="padding: 5px 10px; font-size:12px;">RU/FR</button>
        </div>
    </div>
    
    <div class="ui-header-right">GY-GY CLUB</div>

    <div class="ai-container">
        
        <div class="terminal-screen">
            <div class="ai-speech-bubble" id="ai-output">Приветствуем тебя, путник цифрового города. Из зазоров серверных стоек сочится чистый смысл. О чем спросишь Великий Вычислитель GY-GY Клуба сегодня?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-msg" class="ai-input" placeholder="Напиши что-нибудь гениальное или глупое..." onkeydown="if(event.key === 'Enter') sendToAI()">
            <button class="btn-gy" onclick="sendToAI()">Спросить</button>
        </div>

    </div>

    <script>
        const srvEcho = document.getElementById('snd-server-echo');

        // Автоматический запуск звука при загрузке страницы ИИ-комнаты
        window.addEventListener('DOMContentLoaded', () => {
            if (srvEcho) {
                srvEcho.volume = 0.2; // Эхо серверов за стеной играет негромко
                srvEcho.play().catch(e => console.log("Аудио ждет фокуса пользователя."));
            }
        });

        // Функция плавного ухода из AI-комнаты назад в основной интерфейс (индексный файл)
        function leaveAIRoom() {
            if (srvEcho) {
                // Плавно глушим звук перед уходом
                let currentVol = srvEcho.volume;
                const fadeTimer = setInterval(() => {
                    currentVol -= 0.02;
                    if (currentVol <= 0) {
                        srvEcho.volume = 0;
                        srvEcho.pause();
                        clearInterval(fadeTimer);
                        // Редирект обратно на главную страницу с параметром, чтобы сразу открыть серверную
                        window.location.href = 'index.html?room=server';
                    } else {
                        srvEcho.volume = currentVol;
                    }
                }, 30);
            } else {
                window.location.href = 'index.html?room=server';
            }
        }

        // ШЛЮЗ ДЛЯ ОБЩЕНИЯ С НЕЙРОСЕТЬЮ (Твоя заготовка под n8n / Vercel Edge API)
        function sendToAI() {
            const input = document.getElementById('user-msg');
            const output = document.getElementById('ai-output');
            const userText = input.value.trim();

            if (!userText) return;

            // Локальный юмор для пустых или тестовых запросов
            if(userText.toLowerCase() === 'тест') {
                output.innerText = "Тест пройден. Нейроны Чарли сыты и довольны.";
                input.value = "";
                return;
            }

            output.innerText = "Думаю... (Провода серверной банановой комнаты накаляются)...";
            input.value = "";

            /* ПРИМЕР ПОДКЛЮЧЕНИЯ ТВОЕГО РАБОЧЕГО СКРИПТА ПРОКСИ:
               
               fetch('/api/vercel-edge-proxy', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({ message: userText })
               })
               .then(res => res.json())
               .then(data => {
