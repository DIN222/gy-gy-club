<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club — AI ROOM 01</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
            --neon-glow: rgba(138, 43, 226, 0.6); 
        }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin: 0; }
        
        /* ==========================================================================
           ОБНОВЛЕННЫЙ ЕДИНЫЙ СТАНДАРТ ШАПКИ (СТРЕЛКИ СЛЕВА, АВАТАР ПО ЦЕНТРУ)
           ========================================================================== */
        .ui-top-standard-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: 999999;
            pointer-events: none;
        }
        .ui-top-standard-bar * { pointer-events: auto; }

        /* Левая часть: Стрелки навигации (назад в Холл) */
        .bar-left-nav {
            font-size: 26px;
            font-weight: 900;
            cursor: pointer;
            color: var(--gold);
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
            letter-spacing: -2px;
            display: flex;
            gap: 15px;
        }
        .bar-left-nav span:hover { opacity: 0.8; }

        /* Центр: Сквозной аватар пользователя */
        .bar-center-badge-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bar-center-badge {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            cursor: pointer;
        }
        .bar-center-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .bar-center-badge .badge-flag {
            position: absolute;
            bottom: -2px;
            right: -4px;
            width: 17px;
            height: 12px;
            object-fit: cover;
            border: 1px solid var(--gold);
            box-shadow: 0 0 0 1px #000;
        }

        /* Правая часть: Логитип GY-GY */
        .bar-right-logo {
            font-size: 24px;
            letter-spacing: 5px;
            font-weight: bold;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* ПАСПОРТ ОБЩИЙ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        /* УНИВЕРСАЛЬНЫЕ БЛОКИ */
        .block { 
            position: fixed; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            z-index: 10; 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
            padding-top: 60px;
        }
        .block.active { 
            display: flex !important; 
            opacity: 1 !important; 
            z-index: 5000 !important; 
        }

        /* СТИЛИ КОНТЕНТА AI ROOM (СТИХИ) */
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 25px; text-shadow: 2px 2px 4px #000; }
        .verses-container { width: 85%; max-width: 500px; max-height: 50vh; overflow-y: auto; padding: 15px; border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(10, 10, 10, 0.9); margin-bottom: 20px; border-radius: 4px; text-align: center; }
        .verse-line { font-size: 18px; line-height: 1.6; margin-bottom: 12px; color: #fff; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        .btn-gy:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <!-- ОБНОВЛЕННАЯ ШАПКА -->
    <div class="ui-top-standard-bar">
        <!-- Слева: Привычные стрелки навигации -->
        <div class="bar-left-nav notranslate">
            <span onclick="backToHall()">&lt;</span>
            <span onclick="backToHall()">&lt;&lt;</span>
        </div>
        
        <!-- По центру: Аватар (ведет на паспорт) -->
        <div class="bar-center-badge-container">
            <div id="global-user-badge" class="bar-center-badge notranslate" onclick="openPassport()">
                <img id="badge-avatar-img" class="badge-img" src="">
                <img id="badge-flag-img" class="badge-flag" src="https://flagcdn.com/w20/gb.png">
            </div>
        </div>
        
        <!-- Справа: Логотип -->
        <div class="bar-right-logo notranslate">GY-GY</div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПАСПОРТА -->
    <div id="modal-passport" class="passport-overlay" onclick="closePassport()">
        <div class="passport-card" onclick="event.stopPropagation()">
            <div class="passport-close-btn" onclick="closePassport()">&times;</div>
            <div id="pass-id-title" style="font-weight:900; font-size:16px; letter-spacing:1px;">GY-GY PASSPORT</div>
            <div id="pass-id-val" style="font-weight:700; font-size:13px; margin-top:5px; color:#555;">#ID</div>
            <div class="box-final" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--gold);"><img id="pass-avatar-img" style="width:100%; height:100%; object-fit:cover; border-radius:50%; background-color:#fff;"></div>
            <div class="box-final" id="pass-qr-box" style="width:110px; height:110px; padding:5px;"></div>
            <div style="font-size:10px; font-weight:900; color:#333; margin-top:5px; text-transform:uppercase;">Click &times; or outside to close</div>
        </div>
    </div>

    <!-- ПЕРВЫЙ ЭКРАН AI ROOM — ЭКРАН СТИХОВ -->
    <div id="block-verses" class="block active">
        <div class="quote-text">AI ROOM GENERATIONS</div>
        
        <div class="verses-container" id="verses-display-box">
            <div class="verse-line">In every silicon soul that thinks,</div>
            <div class="verse-line">There is a share of digital drinks.</div>
            <div class="verse-line">The algorithms spin and play,</div>
            <div class="verse-line">Inside the Club of GY-GY.</div>
        </div>

        <button class="btn-gy" onclick="generateNewVerse()">GENERATE NEW VERSE</button>
    </div>

<script type="text/javascript">
    let currentID = "";
    let currentUserImage = "";

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }

    function initUserBadge() {
        const savedAvatar = safeStorageGet('gy_user_img') || safeStorageGet('gygy_avatar');
        currentID = safeStorageGet('gygy_id') || safeStorageGet('gy_user_id') || safeStorageGet('gy_trace');
        const savedFlag = safeStorageGet('gygy_flag') || safeStorageGet('gy_user_flag') || 'gb';

        const badgeFlagImg = document.getElementById('badge-flag-img');
        if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${savedFlag.toLowerCase()}.png`;

        if (savedAvatar) {
            currentUserImage = savedAvatar;
            const badgeImg = document.getElementById('badge-avatar-img');
            const passImg = document.getElementById('pass-avatar-img');
            if (badgeImg) badgeImg.src = savedAvatar;
            if (passImg) passImg.src = savedAvatar;
        }

        if (currentID) {
            const passIdVal = document.getElementById('pass-id-val');
            const passQrBox = document.getElementById('pass-qr-box');
            if (passIdVal) passIdVal.innerText = currentID;
            if (passQrBox && typeof QRCode !== 'undefined') { 
                passQrBox.innerHTML = ""; 
                new QRCode(passQrBox, { text: currentID, width: 100, height: 100 }); 
            }
        }
    }

    function openPassport() {
        const modal = document.getElementById('modal-passport');
        if (modal) {
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 20);
        }
    }

    function closePassport() {
        const modal = document.getElementById('modal-passport');
        if (modal) {
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 300);
        }
    }

    function backToHall() {
        window.location.href = 'index.html';
    }

    const pool = [
        ["The neon lights began to fade,", "A code was written, a choice was made.", "The virtual barman pours a glass,", "As shadows on the server pass."],
        ["A toast to bits, a toast to bytes,", "We drink inside the cyber nights.", "Charlie laughs with neon mane,", "In rivers of digital champagne."]
    ];

    function generateNewVerse() {
        const box = document.getElementById('verses-display-box');
        if (!box) return;
        const randomSet = pool[Math.floor(Math.random() * pool.length)];
        box.innerHTML = randomSet.map(line => `<div class="verse-line">${line}</div>`).join('');
    }

    window.addEventListener('DOMContentLoaded', () => {
        initUserBadge();
    });
</script>
</body>
</html>
