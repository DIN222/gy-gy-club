<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY CLUB | AI ROOM CORE v8.4.0</title>
    <style>
        :root {
            --orange-neon: #ff8c00;
            --neon-glow: 0 0 20px rgba(255, 140, 0, 0.9), 0 0 40px rgba(255, 140, 0, 0.4);
            --gold: #ffd700;
            --black: #000;
            --h-unit: 55px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            color: var(--gold);
            font-family: monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* КЛУБНЫЙ СТАНДАРТ: ВЕРХНЯЯ ПАНЕЛЬ С ОБЯЗАТЕЛЬНЫМИ АТРИБУТАМИ */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Лево (Кнопка возврата) | Центр (Аватар) | Право (Язык + Лого) */
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--gold);
            background: var(--black);
            z-index: 100;
            box-sizing: border-box;
            height: 75px;
            width: 100%;
        }

        /* Левая часть: Кнопка возврата на предыдущий уровень */
        .header-left {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        /* Центр: Идентификация (Аватар) */
        .header-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Правая часть: Системные атрибуты (Языковая панель + Логотип GY-GY) */
        .header-right {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
            align-items: center;
        }

        /* Стандартная кнопка возврата (Квадрат) */
        .nav-btn {
            height: var(--h-unit);
            width: var(--h-unit);
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            user-select: none;
        }

        .nav-btn:hover {
            background: rgba(255,215,0,0.1);
            box-shadow: 0 0 15px var(--gold);
        }

        /* Постоянный атрибут: Языковая панель */
        .lang-panel {
            display: flex;
            gap: 5px;
            border: 1px solid var(--gold);
            padding: 2px;
            box-sizing: border-box;
            height: 35px;
            align-items: center;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: rgba(255, 215, 0, 0.4);
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 8px;
            height: 100%;
            transition: 0.2s;
        }

        .lang-btn.active, .lang-btn:hover {
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
        }

        /* Постоянный атрибут: Логотип GY-GY */
        .logo-gy {
            color: var(--gold);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--gold);
            user-select: none;
            text-transform: uppercase;
        }

        /* Аватар пользователя */
        .user-avatar {
            width: var(--h-unit);
            height: var(--h-unit);
            border: 1px solid var(--gold);
            box-sizing: border-box;
            background: #222;
            object-fit: cover;
        }

        /* РАБОЧАЯ ОБЛАСТЬ (ЭКРАНЫ ТЕЛЕВИЗОРОВ) */
        main {
            flex: 1;
            position: relative;
            width: 100%;
            height: calc(100% - 75px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }

        /* Контейнер 16:9 без деформаций */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; 
            max-height: 56.25vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-room {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Интерактивные зоны */
        .screen-label {
            position: absolute;
            color: var(--orange-neon);
            text-shadow: var(--neon-glow);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-transform: lowercase;
            text-align: center;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        #studio-zone {
            top: 30%; 
            left: 27.5%; 
            width: 25%;
            height: 20%;
            font-size: clamp(24px, 3.5vw, 45px); 
        }

        #universe-zone {
            top: 30%; 
            left: 72.5%;
            width: 30%;
            height: 20%;
            font-size: clamp(18px, 3.0vw, 40px);
        }

        #techpark-zone {
            top: 51%; 
            left: 50%;
            width: 15%;
            height: 12%;
            font-size: clamp(12px, 2.0vw, 30px);
        }

        .screen-label:hover {
            filter: brightness(1.5);
            transform: translate(-50%, -50%) scale(1.05);
            text-shadow: 0 0 30px var(--orange-neon);
        }

        footer {
            padding: 5px 20px;
            background: var(--black);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            box-sizing: border-box;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            height: 30px;
            border-top: 1px solid #111;
        }

        #digital-trace { color: var(--orange-neon); margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="nav-btn" onclick="location.href='index.html'">&#10094;</div>
    </div>
    
    <div class="header-center">
        <img src="about:blank" id="user-header-avatar" class="user-avatar" alt="Avatar" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'55\' height=\'55\' viewBox=\'0 0 55 55\'><rect width=\'55\' height=\'55\' fill=\'%23333\'/><text x=\'50%\' y=\'55%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23ffd700\' font-family=\'monospace\' font-size=\'18\'>GY</text></svg>';">
    </div>
    
    <div class="header-right">
        <div class="lang-panel" id="lang-switcher">
            <button class="lang-btn active" onclick="setLang('EN')">EN</button>
            <button class="lang-btn" onclick="setLang('FR')">FR</button>
            <button class="lang-btn" onclick="setLang('UA')">UA</button>
        </div>
        <div class="logo-gy notranslate">GY-GY CLUB</div>
    </div>
</header>

<main>
    <div class="viewport">
        <img src="OIG2_vintage_tv_room_v2 (1).png" class="bg-room" alt="Three Screens Hub">

        <a href="studio.html" class="screen-label" id="studio-zone">studio</a>
        <a href="techpark.html" class="screen-label" id="techpark-zone">techpark</a>
        <a href="universe.html" class="screen-label" id="universe-zone">Hello Universe</a>
    </div>
</main>

<footer>
    <div>CORE_VER: 8.4.0 | TRACE_ID: <span id="digital-trace">...</span></div>
</footer>

<audio id="snd-server-isolated" src="sbridge_ambient.mp3" loop preload="auto"></audio>

<script>
    // Переключение языков (заготовка под логику)
    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText === lang) btn.classList.add('active');
        });
        localStorage.setItem('gy_lang', lang);
        console.log("Language switched to: " + lang);
    }

    (function() {
        // Установка ID сессии
        let id = localStorage.getItem('gy_trace') || 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('gy_trace', id);
        const traceEl = document.getElementById('digital-trace');
        if (traceEl) traceEl.innerText = id;

        // Синхронизация аватара
        const savedAvatar = localStorage.getItem('gy_user_avatar') || localStorage.getItem('gygy_avatar');
        if (savedAvatar) {
            document.getElementById('user-header-avatar').src = savedAvatar;
        }

        // Синхронизация сохраненного языка
        const savedLang = localStorage.getItem('gy_lang') || 'EN';
        setLang(savedLang);

        // БЕСШОВНЫЙ ФОЛЛБЕК ЗВУКА ПРИ ПРЯМОМ ЗАХОДЕ НЕ ИЗ ХОЛЛА
        const audio = document.getElementById('snd-server-isolated');
        
        const launchAudioFallback = () => {
            if (audio && audio.paused) {
                audio.volume = 0;
                audio.play().then(() => {
                    let vol = 0;
                    const fadeIn = setInterval(() => {
                        if (vol < 0.3) {
                            vol += 0.02;
                            audio.volume = Math.min(vol, 0.3);
                        } else {
                            clearInterval(fadeIn);
                        }
                    }, 40);
                }).catch(e => console.log("Audio fallback context locked. Waiting user interaction..."));
            }
        };

        // Если Холл уже запустил звук — изолированный тег молчит.
        // Если зашли напрямую — вешаем старт на первое взаимодействие.
        if (audio && audio.paused) {
            document.addEventListener('click', launchAudioFallback, { once: true });
            document.addEventListener('touchstart', launchAudioFallback, { once: true });
        }
    })();
</script>

</body>
</html>
