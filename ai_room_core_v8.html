<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club — AI Room Core v8.4</title>
    <style>
        /* --- БАЗОВАЯ СТРОГАЯ СЕТКА КЛУБА (NOIR MINIMALISM) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f11;
            color: #f5f5f7;
            font-family: monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ПОСТОЯННЫЕ РЕКВИЗИТЫ: ВЕРХНЯЯ ПАНЕЛЬ */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #2c2c35;
            background-color: #0f0f11;
            z-index: 10;
        }

        .logo-box {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: default;
        }
        .logo-box span { color: #6e6e73; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #6e6e73;
            border: 1px solid #2c2c35;
            padding: 5px 10px;
        }
        .user-badge img {
            width: 20px;
            height: 20px;
            border-radius: 2px;
            background-color: #2c2c35;
        }

        .lang-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2c2c35;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            color: #f5f5f7;
            background: #121215;
        }
        .lang-panel:hover { border-color: #6e6e73; }
        .lang-flag { width: 16px; height: 11px; object-fit: cover; }

        .btn-back {
            background: none;
            border: 1px solid #f5f5f7;
            color: #f5f5f7;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        .btn-back:hover {
            background-color: #f5f5f7;
            color: #0f0f11;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ ИИ-КОМНАТЫ --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: row;
            padding: 40px;
            gap: 40px;
            position: relative;
        }

        /* СТАНДАРТНЫЕ СТРЕЛКИ НАВИГАЦИИ (Strict 2cm / 80px Offset Zone) */
        .ui-nav-arrows {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            width: calc(100% - 160px);
            left: 80px;
            pointer-events: none;
            z-index: 5;
        }
        .nav-arrow {
            pointer-events: auto;
            background: none;
            border: 1px dashed #6e6e73;
            color: #6e6e73;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .nav-arrow:hover { 
            border-style: solid; 
            color: #f5f5f7; 
            border-color: #f5f5f7; 
            background-color: #121215;
        }

        /* Терминал */
        .terminal-container {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            border: 1px solid #2c2c35;
            background-color: #121215;
            z-index: 2;
        }
        .terminal-header {
            padding: 12px 20px;
            border-bottom: 1px solid #2c2c35;
            font-size: 11px;
            color: #6e6e73;
            text-transform: uppercase;
        }
        .chat-output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 13px;
        }
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai { align-self: flex-start; align-items: flex-start; }
        .msg-meta { font-size: 10px; color: #6e6e73; margin-bottom: 4px; }
        .msg-text { padding: 12px 16px; border-radius: 2px; background-color: #16161a; border: 1px solid #2c2c35; }
        .message.user .msg-text { background-color: #2c2c35; border-color: #3a3a44; }

        .terminal-input-zone { display: flex; border-top: 1px solid #2c2c35; }
        .terminal-input { flex: 1; background: none; border: none; color: #f5f5f7; padding: 20px; font-family: monospace; outline: none; }
        .btn-send { background: none; border: none; border-left: 1px solid #2c2c35; color: #f5f5f7; padding: 0 30px; cursor: pointer; font-family: monospace; text-transform: uppercase; }
        .btn-send:hover { background-color: #2c2c35; }

        /* Правая панель */
        .control-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; z-index: 2; }
        .panel-block { border: 1px solid #2c2c35; background-color: #121215; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .panel-title { font-size: 12px; color: #6e6e73; text-transform: uppercase; border-bottom: 1px dashed #2c2c35; padding-bottom: 8px; }
        .rhyme-selector { display: flex; gap: 10px; }
        .rhyme-btn { flex: 1; background: none; border: 1px solid #2c2c35; color: #6e6e73; padding: 8px; cursor: pointer; font-family: monospace; }
        .rhyme-btn.active { border-color: #f5f5f7; color: #f5f5f7; background-color: #1c1c22; }
        .server-log-box { flex: 1; background-color: #0b0b0d; border: 1px solid #1c1c22; padding: 15px; font-size: 11px; color: #6e6e73; overflow-y: auto; }
        .typing-indicator { display: none; font-size: 11px; color: #6e6e73; padding: 5px 20px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">GY-GY <span>CLUB</span></div>
        <div class="header-controls">
            <div class="user-badge">
                <img id="core-avatar-img" src="" alt="Avatar">
                <span id="core-id-label">GY-000-0000</span>
            </div>
            <div class="lang-panel" id="gy-lang-switcher">
                <img src="https://flagcdn.com/w20/gb.png" class="lang-flag" id="core-flag-img">
                <span id="core-lang-val">EN</span>
            </div>
            <button class="btn-back" onclick="exitRoom()">Retour</button>
        </div>
    </header>

    <main>
        <div class="ui-nav-arrows">
            <button class="nav-arrow" onclick="navRoom('block-bar')">&lt;</button>
            <button class="nav-arrow" onclick="navRoom('block-tables')">&gt;</button>
        </div>

        <section class="terminal-container">
            <div class="terminal-header">AI_ROOM_CORE_v8.4 // SECURE_SESSION // SERVER_AMBIENT_ON</div>
            <div class="chat-output" id="chat-output">
                <div class="message ai">
                    <div class="msg-meta">Charlie</div>
                    <div class="msg-text">Звуковые контуры серверной замкнуты на ИИ-комнату. Эмбиент активен. Стрелки подключены к сетке Клуба. Задавай параметры.</div>
                </div>
            </div>
            <div class="typing-indicator" id="typing-indicator">Чарли подбирает рифму...</div>
            <div class="terminal-input-zone">
                <input type="text" class="terminal-input" id="terminal-input" placeholder="Введите текст..." onkeydown="if(event.key === 'Enter') sendToAgent()">
                <button class="btn-send" onclick="sendToAgent()">Send</button>
            </div>
        </section>

        <section class="control-panel">
            <div class="panel-block">
                <div class="panel-title">GY-GY Verses</div>
                <div class="rhyme-selector">
                    <button class="rhyme-btn active" id="scheme-aabb" onclick="setRhymeScheme('AABB')">AABB</button>
                    <button class="rhyme-btn" id="scheme-abab" onclick="setRhymeScheme('ABAB')">ABAB</button>
                </div>
            </div>
            <div class="panel-block" style="flex: 1;">
                <div class="panel-title">Server Traffic Logs</div>
                <div class="server-log-box" id="log-box"></div>
            </div>
        </section>
    </main>

    <script type="text/javascript">
        const AI_CORE_CONFIG = {
            VERSION: "8.4",
            STRICT_MODE: true,
            MAX_CONTEXT_TURNS: 12,       
            TYPING_SPEED_MIN: 15,        
            TYPING_SPEED_MAX: 45,
            PROXY_ENDPOINT: "/api/ai-room/v1/chat"
        };

        const GY_STORAGE_KEYS = {
            USER_TRACE: "gy_trace",       
            USER_AVATAR: "gy_user_avatar", 
            USER_LANG: "gy_lang",         
            PASSPORT_DATA: "gygy_id"      
        };

        let AI_ROOM_STATE = {
            isAgentTyping: false,
            currentRhymeScheme: "AABB"
        };

        function safeGet(key, fallback = "") {
            try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; }
        }

        function pushLog(text) {
            const logBox = document.getElementById('log-box');
            if (!logBox) return;
            logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function initServerAudio() {
            let sndServer = document.getElementById('snd-server') || window.parent.document.getElementById('snd-server');
            let sndAmbient = document.getElementById('snd-ambient') || window.parent.document.getElementById('snd-ambient');

            if (sndAmbient) {
                try { sndAmbient.volume = 0.02; } catch(e){}
            }

            if (sndServer) {
                try {
                    sndServer.src = 'sbridge_ambient.mp3';
                    sndServer.volume = 0.35;
                    sndServer.loop = true;
                    sndServer.play().catch(err => {
                        pushLog("Audio autoplay blocked. Click anywhere to activate stream.");
                        document.body.addEventListener('click', () => { sndServer.play().catch(()=>{}); }, { once: true });
                    });
                    pushLog("Server ambient stream pulled and locked.");
                } catch(audioErr) {
                    console.error("Audio engine routing error:", audioErr);
                }
            } else {
                pushLog("[WARN]: Audio stream 'snd-server' not found in DOM.");
            }
        }

        function initUserProfile() {
            const traceId = safeGet(GY_STORAGE_KEYS.USER_TRACE) || safeGet(GY_STORAGE_KEYS.PASSPORT_DATA) || "GY-TRACE-EMPTY";
            const avatarData = safeGet(GY_STORAGE_KEYS.USER_AVATAR) || safeGet('gygy_avatar');
            const langData = safeGet(GY_STORAGE_KEYS.USER_LANG) || "EN";
            const flagData = safeGet('gygy_flag') || "gb";

            document.getElementById('core-id-label').innerText = traceId;
            document.getElementById('core-lang-val').innerText = langData.toUpperCase();
            document.getElementById('core-flag-img').src = `https://flagcdn.com/w20/${flagData.toLowerCase()}.png`;

            const avatarImg = document.getElementById('core-avatar-img');
            if (avatarImg && avatarData) {
                avatarImg.src = avatarData;
            } else if (avatarImg) {
                avatarImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="20" height="20"><rect width="100" height="100" fill="%232c2c35"/></svg>';
            }
        }

        function setRhymeScheme(scheme) {
            AI_ROOM_STATE.currentRhymeScheme = scheme;
            document.querySelectorAll('.rhyme-btn').forEach(btn => btn.classList.remove('active'));
            if (scheme === 'AABB') document.getElementById('scheme-aabb').classList.add('active');
            if (scheme === 'ABAB') document.getElementById('scheme-abab').classList.add('active');
            pushLog(`Rhyme matrix: ${scheme}`);
        }

        function sendToAgent() {
            if (AI_ROOM_STATE.isAgentTyping) return;
            const inputEl = document.getElementById('terminal-input');
            if (!inputEl || !inputEl.value.trim()) return;

            const userText = inputEl.value.trim();
            inputEl.value = ""; 

            renderMessage(userText, "user", "You");
            AI_ROOM_STATE.isAgentTyping = true;
            document.getElementById('typing-indicator').style.display = "block";

            setTimeout(() => {
                document.getElementById('typing-indicator').style.display = "none";
                const response = `[Charlie v8.4]: Рифма сгенерирована. Потоки данных под защитой серверного гула.`;
                renderMessageWithTyping(response, "ai", "Charlie");
            }, 800);
        }

        function renderMessage(text, side, author) {
            const output = document.getElementById('chat-output');
            const msg = document.createElement('div');
            msg.className = `message ${side}`;
            msg.innerHTML = `<div class="msg-meta">${author}</div><div class="msg-text">${text}</div>`;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function renderMessageWithTyping(fullText, side, author) {
            const output = document.getElementById('chat-output');
            const msg = document.createElement('div');
            msg.className = `message ${side}`;
            msg.innerHTML = `<div class="msg-meta">${author}</div><div class="msg-text"></div>`;
            output.appendChild(msg);
            
            const textDiv = msg.querySelector('.msg-text');
            let index = 0;
            
            function type() {
                if (index < fullText.length) {
                    textDiv.innerText += fullText.charAt(index);
                    index++;
                    output.scrollTop = output.scrollHeight;
                    setTimeout(type, Math.random() * (AI_CORE_CONFIG.TYPING_SPEED_MAX - AI_CORE_CONFIG.TYPING_SPEED_MIN) + AI_CORE_CONFIG.TYPING_SPEED_MIN);
                } else {
                    AI_ROOM_STATE.isAgentTyping = false;
                }
            }
            type();
        }

        function navRoom(targetBlockId) {
            pushLog(`Executing spatial transition to: ${targetBlockId}`);
            
            let sndServer = document.getElementById('snd-server') || window.parent.document.getElementById('snd-server');
            if (sndServer) { try { sndServer.pause(); sndServer.currentTime = 0; } catch(e){} }

            if (typeof window.portalTransition === 'function') {
                window.portalTransition(targetBlockId);
            } else if (typeof window.parent.portalTransition === 'function') {
                window.parent.portalTransition(targetBlockId);
            } else {
                window.location.href = "index.html"; 
            }
        }

        function exitRoom() {
            navRoom('block-hall');
        }

        document.addEventListener("DOMContentLoaded", () => {
            initUserProfile();
            initServerAudio();
        });
    </script>
</body>
</html>
