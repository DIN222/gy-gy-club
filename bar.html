<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club - BAR & TABLES 006 </title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        body, button, input, div, img, span { pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* ЛОГОТИП GY-GY */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
        }
        
        /* СКВОЗНОЙ АВАТАР */
        .ui-user-badge {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
            z-index: 1000000; cursor: pointer; display: none;
        }
        .ui-user-badge .badge-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background-color: #fff; }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -4px;
            width: 17px; height: 12px; object-fit: cover;
            border: 1px solid var(--gold); box-shadow: 0 0 0 1px #000;
        }

        /* ПАСПОРТ */
        .passport-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .passport-card { background: #F5F5DC; border: 3px solid var(--gold); border-radius: 16px; padding: 25px; width: 280px; color: #000; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.5); position: relative; }
        .passport-card .box-final { margin: 15px auto; border-color: #000; }
        .passport-close-btn { position: absolute; top: 10px; right: 14px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; user-select: none; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .block.active { display: flex !important; opacity: 1 !important; z-index: 5000 !important; }

        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; text-align: center; max-width: 85%; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        .btn-gy { min-width: 270px; padding: 14px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: all 0.3s; }
        
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        /* НАВИГАЦИОННЫЕ СТРЕЛКИ В УГЛУ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 20px; z-index: 9999999; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            font-family: 'Share Tech Mono', monospace; cursor: pointer; color: var(--gold); 
            line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
            pointer-events: auto !important; user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.8; }

        /* БАР И СТОЛИКИ СТИЛИФИКАЦИЯ */
        #block-bar { background: url('bar_bg_jpg.jpg') center/cover no-repeat #000; }
        #block-tables { background: url('tables_bg_jpg.jpg') center/cover no-repeat #000; }

        .bar-grid { display: grid; grid-template-columns: repeat(3, 110px); gap: 20px; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid var(--gold); }
        .drink-card { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        .drink-icon-frame { width: 85px; height: 85px; border: 1px solid var(--gold); background: #111; overflow: hidden; }
        .drink-icon-frame img { width: 100%; height: 100%; object-fit: cover; }
        .drink-name { font-size: 11px; font-weight: 900; margin-top: 6px; letter-spacing: 0.5px; line-height: 1.1; color: var(--gold); text-shadow: 1px 1px 2px #000; }

        .tables-layout { display: flex; flex-direction: column; gap: 25px; margin-top: 20px; width: 85%; max-width: 450px; }
        .table-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); border: 1px solid var(--gold); padding: 12px 20px; }
        .table-info { display: flex; flex-direction: column; align-items: flex-start; }
        .table-num { font-size: 16px; font-weight: 900; color: var(--gold); }
        .table-status { font-size: 12px; font-weight: 700; margin-top: 2px; }
        .table-status.free { color: #00FF00; text-shadow: 0 0 5px rgba(0,255,0,0.4); }
        .table-status.busy { color: #FF0000; text-shadow: 0 0 5px rgba(255,0,0,0.4); }
        .btn-table-action { padding: 6px 14px; background: #000; border: 1px solid var(--gold); color: var(--gold); font-family: 'Share Tech Mono'; font-size: 12px; font-weight: 900; cursor: pointer; transition: all 0.2s; }
        .btn-table-action:hover { background: var(--gold); color: #000; }

        /* Поддержка Google Translate */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        body { top: 0 !important; background-color: #000 !important; opacity: 0; transition: opacity 0.4s ease-in-out !important; }
        body.page-loaded { opacity: 1 !important; }
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
        .goog-text-highlight { background-color: transparent !important; background: transparent !important; box-shadow: none !important; color: inherit !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- НАВИГАЦИЯ ВЫХОДА НА СТРАНИЦУ INDEX -->
    <div class="notranslate ui-nav-arrows" id="global-nav">
        <div class="arrow-item" onclick="leaveToEntrance()">&lt;</div>
        <div class="arrow-item" onclick="leaveToEntrance()">&lt;&lt;</div>
    </div>

    <!-- СИСТЕМА СКВОЗНОГО АВАТАРА И ПАСПОРТА -->
    <div id="global-user-badge" class="ui-user-badge notranslate" onclick="openPassport()">
        <img id="badge-avatar-img" class="badge-img" src="">
        <img id="badge-flag-img" class="badge-flag" src="https://flagcdn.com/w20/gb.png">
    </div>

    <div id="modal-passport" class="passport-overlay" onclick="closePassport()">
        <div class="passport-card" onclick="event.stopPropagation()">
            <div class="passport-close-btn" onclick="closePassport()">&times;</div>
            <div id="pass-id-title" style="font-weight:900; font-size:16px; letter-spacing:1px;">GY-GY PASSPORT</div>
            <div id="pass-id-val" style="font-weight:700; font-size:13px; margin-top:5px; color:#555;">#ID</div>
            <div class="box-final" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--gold);"><img id="pass-avatar-img" style="width:100%; height:100%; object-fit:cover; border-radius:50%; background-color:#fff;"></div>
            <div class="box-final" id="pass-qr-box" style="width:110px; height:110px; padding:5px;"></div>
            <div style="font-size:10px; font-weight:900; color:#333; margin-top:5px; text-transform:uppercase;">Click &times; or outside to close</div>
        </div>
    </div>
    
    <div id="google_translate_element" style="position:fixed; bottom:0; left:0; opacity:0; z-index:-1;"></div>
    <div class="ui-header-right notranslate">GY-GY</div>

    <!-- ЗВУКОВЫЕ РЕСУРСЫ СТРАНИЦЫ БАРА -->
    <audio id="snd-ambient" src="bar_ambient.mp3" loop preload="auto"></audio>
    <audio id="snd-pour" src="pour_drink.mp3" preload="auto"></audio>

    <!-- БЛОК: БАР -->
    <div id="block-bar" class="block">
        <div class="quote-text">In every joke there is a share of whisky</div>
        
        <div class="bar-grid">
            <div class="drink-card" onclick="orderDrink('Whisky')">
                <div class="drink-icon-frame"><img src="drink_whisky.jpg"></div>
                <div class="drink-name">WHISKY</div>
            </div>
            <div class="drink-card" onclick="orderDrink('Champagne')">
                <div class="drink-icon-frame"><img src="drink_champagne.jpg"></div>
                <div class="drink-name">CHAMPAGNE</div>
            </div>
            <div class="drink-card" onclick="orderDrink('Cocktail')">
                <div class="drink-icon-frame"><img src="drink_cocktail.jpg"></div>
                <div class="drink-name">COCKTAIL</div>
            </div>
        </div>
        
        <button class="btn-gy" style="margin-top:25px;" onclick="switchLocalBlock('block-tables')">TABLES ZONE</button>
    </div>

    <!-- БЛОК: СТОЛИКИ -->
    <div id="block-tables" class="block">
        <div class="quote-text">Reserve a place for thoughts</div>
        
        <div class="tables-layout">
            <div class="table-row">
                <div class="table-info">
                    <span class="table-num">TABLE #1</span>
                    <span class="table-status free" id="t1-status">FREE</span>
                </div>
                <button class="btn-table-action" id="t1-btn" onclick="toggleTable(1)">BOOK</button>
            </div>
            <div class="table-row">
                <div class="table-info">
                    <span class="table-num">TABLE #2</span>
                    <span class="table-status busy" id="t2-status">OCCUPIED</span>
                </div>
                <button class="btn-table-action" id="t2-btn" onclick="toggleTable(2)">CALL WAIT</button>
            </div>
        </div>

        <button class="btn-gy" style="margin-top:25px;" onclick="switchLocalBlock('block-bar')">RETURN TO BAR</button>
    </div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,de,es,fr,it,pl,pt,ru,tr,uk,zh-CN,ja',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }

    let currentID = "";
    let currentUserImage = "";

    function safeStorageGet(key, fallback = "") { try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; } }

    function syncUserBadge() {
        currentUserImage = safeStorageGet('gygy_avatar') || safeStorageGet('gy_user_img') || safeStorageGet('gy_user_avatar');
        currentID = safeStorageGet('gygy_id') || safeStorageGet('gy_user_id') || safeStorageGet('gy_trace');
        const savedFlag = safeStorageGet('gygy_flag', 'gb');

        if (currentUserImage) {
            const badge = document.getElementById('global-user-badge');
            const badgeImg = document.getElementById('badge-avatar-img');
            const passImg = document.getElementById('pass-avatar-img');
            const badgeFlagImg = document.getElementById('badge-flag-img');
            
            if (badge) badge.style.display = 'block';
            if (badgeImg) badgeImg.src = currentUserImage;
            if (passImg) passImg.src = currentUserImage;
            if (badgeFlagImg) badgeFlagImg.src = `https://flagcdn.com/w20/${savedFlag}.png`;
        }

        if (currentID) {
            const passIdVal = document.getElementById('pass-id-val');
            const passQrBox = document.getElementById('pass-qr-box');
            if (passIdVal) passIdVal.innerText = currentID;
            if (passQrBox && typeof QRCode !== 'undefined') {
                passQrBox.innerHTML = ""; 
                new QRCode(passQrBox, { text: currentID, width: 100, height: 100 });
            }
        }
    }

    // ЛОКАЛЬНОЕ ПЕРЕКЛЮЧЕНИЕ МЕЖДУ СТОЛАМИ И БАРОМ ВНУТРИ СТРАНИЦЫ
    function switchLocalBlock(blockId) {
        document.querySelectorAll('.block').forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
        const target = document.getElementById(blockId);
        if (target) {
            target.style.display = 'flex';
            setTimeout(() => { target.classList.add('active'); }, 20);
        }
    }

    // ФИЗИЧЕСКИЙ ВОЗВРАТ В ХОЛЛ (INDEX)
    function leaveToEntrance() {
        window.location.href = 'index.html';
    }

    function orderDrink(drinkName) {
        const audio = document.getElementById('snd-pour');
        if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
        alert(`Ordering ${drinkName}... Processing through GY-GY Bar-Matrix.`);
    }

    function toggleTable(id) {
        const statusEl = document.getElementById(`t${id}-status`);
        const btnEl = document.getElementById(`t${id}-btn`);
        if (!statusEl || !btnEl) return;

        if (statusEl.classList.contains('free')) {
            statusEl.classList.remove('free'); statusEl.classList.add('busy');
            statusEl.innerText = "OCCUPIED"; btnEl.innerText = "CALL WAIT";
        } else {
            if (confirm("Do you want to release this table?")) {
                statusEl.classList.remove('busy'); statusEl.classList.add('free');
                statusEl.innerText = "FREE"; btnEl.innerText = "BOOK";
            }
        }
    }

    function openPassport() { const modal = document.getElementById('modal-passport'); if (modal) { modal.style.display = 'flex'; setTimeout(() => modal.style.opacity = '1', 10); } }
    function closePassport() { const modal = document.getElementById('modal-passport'); if (modal) { modal.style.opacity = '0'; setTimeout(() => modal.style.display = 'none', 300); } }

    document.addEventListener("DOMContentLoaded", () => {
        syncUserBadge();

        // Авто-инициализация перевода под сохраненный в Холле язык
        const savedLangCode = safeStorageGet('gy_lang', 'EN').toLowerCase();
        setTimeout(() => {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) { 
                selectEl.value = savedLangCode === 'ua' ? 'uk' : savedLangCode; 
                selectEl.dispatchEvent(new Event('change', { bubbles: true })); 
            }
        }, 800);

        // Запуск эмбиента бара
        const ambient = document.getElementById('snd-ambient');
        if (ambient) { ambient.volume = 0.55; ambient.play().catch(() => {
            document.body.addEventListener('click', () => { ambient.play().catch(()=>{}); }, { once: true });
        }); }

        switchLocalBlock('block-bar');

        const script = document.createElement('script'); script.type = 'text/javascript';
        script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        document.head.appendChild(script);
        document.body.classList.add('page-loaded');
    });
</script>
</body>
</html>
