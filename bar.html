<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Bar 003 </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bar-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 20px;
        }

        .bar-title {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        .bar-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border: 2px solid #333;
            margin-bottom: 30px;
            background: #222;
        }

        .bar-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .bar-image-wrapper:hover img {
            transform: scale(1.02);
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .nav-btn {
            flex: 1;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn-tables {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border-bottom: 4px solid #2980b9;
        }
        .btn-tables:hover {
            background: linear-gradient(135deg, #34495e, #2980b9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .btn-complaints {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border-bottom: 4px solid #962d22;
        }
        .btn-complaints:hover {
            background: linear-gradient(135deg, #962d22, #c0392b);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }

        .nav-btn:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-top: 4px;
        }

        .btn-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="bar-container">
        
        <div class="bar-title">GY-GY Bar Entrance</div>

        <div class="bar-image-wrapper">
            <img src="horse_bar.png" alt="Horse in the GY-GY Bar">
        </div>

        <div class="nav-menu">
            <a href="tables.html" class="nav-btn btn-tables">
                <span class="btn-icon">🪑</span>
                <span>Столики</span>
            </a>

            <a href="complaints.html" class="nav-btn btn-complaints">
                <span class="btn-icon">📖</span>
                <span>Книга Обид</span>
            </a>
        </div>

    </div>

</body>
</html>
