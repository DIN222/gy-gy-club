<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club | Bar Room 001 </title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.3);
        }

        * {
            -webkit-tap-highlight-color: transparent !important;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            position: fixed;
        }

        /* ПОСТОЯННЫЕ АТРИБУТЫ ЛОКАЦИИ */
        .ui-nav-arrows {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 5000;
            display: flex;
            gap: 25px;
            font-size: 26px;
            font-weight: 900;
            cursor: pointer;
            color: var(--gold);
            user-select: none;
            line-height: 1;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .arrow-item {
            transition: opacity 0.2s;
        }
        .arrow-item:hover {
            opacity: 0.7;
        }

        /* ЛОГОТИП СТРОГО СПРАВА */
        .ui-header-right {
            position: fixed;
            top: 15px;
            right: 25px;
            color: var(--gold);
            font-size: 24px;
            font-weight: bold;
            z-index: 5000;
            letter-spacing: 5px;
            user-select: none;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР БАРА */
        .bar-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* СЦЕНА С БАРМЕНОМ-КОНЕМ (МАСШТАБИРУЕМАЯ МАТРИЦА) */
        .bar-scene {
            position: relative;
            width: 1000px;
            height: 562.5px;
            background: url('bar_interior.jpg') no-repeat center center / contain;
            z-index: 10;
            flex-shrink: 0;
            transform: scale(min(100vw / 1000, 100vh / 562.5));
            transform-origin: center center;
        }

        /* КЛУБНЫЕ КНОПКИ (ПРОЗРАЧНЫЙ СТИЛЬ) */
        .btn-gy {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 24px;
            font-size: 14px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* СТРОГАЯ ОТМЕНА ЗОЛОТОГО ФОНА ПРИ НАВЕДЕНИИ */
        .btn-gy:hover {
            background: transparent !important;
            color: var(--gold) !important;
            border-color: var(--gold) !important;
            box-shadow: 0 0 10px var(--gold-dim);
        }

        /* НИЖНЯЯ ПАНЕЛЬ С КНОПКАМИ (ИДЕАЛЬНОЕ ПОЗИЦИОНИРОВАНИЕ) */
        .bar-bottom-panel {
            position: fixed;
            bottom: 5vh; /* Приподняли, чтобы не вылетало за рамки экрана */
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
            width: auto;
            justify-content: center;
            pointer-events: auto !important;
        }

        /* ДИАЛОГ С БАРМЕНОМ */
        .bartender-speech {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 25px;
            font-size: 16px;
            text-align: center;
            max-width: 400px;
            display: none;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="notranslate ui-nav-arrows" id="bar-nav">
        <div class="arrow-item" onclick="goBackToHall()">&lt;</div>
    </div>

    <div class="ui-header-right notranslate">GY-GY</div>

    <div id="speech-bubble" class="bartender-speech"></div>

    <div class="bar-container">
        <div class="bar-scene">
            <div id="horse-click" style="position: absolute; top: 180px; left: 420px; width: 160px; height: 200px; cursor: pointer; z-index: 15;" onclick="talkToBartender()"></div>
        </div>
    </div>

    <div class="bar-bottom-panel">
        <button class="btn-gy notranslate" onclick="event.stopPropagation(); window.top.location.href='tables.html';">TABLES ZONE</button>
        <button class="btn-gy notranslate" onclick="openSarcasmBook()">SARCASM BOOK</button>
    </div>

    <script>
        // Фразы Бармена-Коня
        const horseQuotes = [
            "What can I get you? A shot of sarcasm or pure logic?",
            "In every joke there is a share of whisky. What's your share today?",
            "Charlie? No, he's at the entrance. I just keep the code clean here.",
            "Looking for meaning? Look into your glass, it's safer."
        ];

        function talkToBartender() {
            const bubble = document.getElementById('speech-bubble');
            const randomQuote = horseQuotes[Math.floor(Math.random() * horseQuotes.length)];
            bubble.innerText = randomQuote;
            bubble.style.display = 'block';
            
            // Прячем фразу через 4 секунды
            setTimeout(() => { bubble.style.display = 'none'; }, 4000);
        }

        // Возврат в Холл
        function goBackToHall() {
            // Передаем маркер, чтобы Холл сразу открыл нужную комнату, если необходимо
            sessionStorage.setItem('return_from_bar', 'true');
            window.location.href = 'index.html';
        }

        function openSarcasmBook() {
            alert("The Sarcasm Book is currently being proofread by the Author.");
        }

        // Автоматически проверяем при загрузке, стерта ли старая сессия
        window.onload = () => {
            console.log("Bar Room v2.0 initialized. Ground connection established.");
        };
    </script>
</body>
</html>
