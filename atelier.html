<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уличная одежда 004 </title>
  <style>
    :root {
      --bg: #0d0f12;
      --panel: rgba(22, 25, 32, 0.9);
      --panel-border: rgba(255, 255, 255, 0.1);
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    #canvas-container {
      flex: 1;
      height: 100%;
      position: relative;
      background-image: url('astudio_bg.jpg');
      background-size: cover;
      background-position: center;
    }

    #canvas-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(13, 15, 18, 0.3) 0%, rgba(13, 15, 18, 0.85) 100%);
      backdrop-filter: blur(4px);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 2;
    }

    .panel {
      width: 420px;
      height: 100%;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-left: 1px solid var(--panel-border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }

    .panel-header {
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 16px;
    }

    .panel-header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--text);
      text-transform: uppercase;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 8px;
    }

    .btn-option {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .btn-option:hover {
      border-color: var(--accent);
    }

    .btn-option.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .color-swatches {
      display: flex;
      gap: 12px;
    }

    .swatch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .swatch-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .swatch-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .swatch-circle.white { background-color: #ffffff; }
    .swatch-circle.black { background-color: #111111; }

    .file-upload {
      position: relative;
      border: 2px dashed var(--panel-border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      background: rgba(0, 0, 0, 0.3);
    }

    .file-upload:hover { border-color: var(--accent); }

    .file-upload input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload span {
      font-size: 13px;
      color: var(--text-muted);
      display: block;
    }

    .summary-card {
      margin-top: auto;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .summary-row.total {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      border-top: 1px solid var(--panel-border);
      padding-top: 10px;
      margin-bottom: 0;
    }

    .badge {
      font-size: 10px;
      background: rgba(59, 130, 246, 0.2);
      color: var(--accent-hover);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-submit:hover { background: var(--accent-hover); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <div class="panel">
    <div class="panel-header">
      <h1>Уличная одежда</h1>
    </div>

    <!-- Тип изделия -->
    <div class="group">
      <div class="section-title">Тип изделия</div>
      <div class="btn-group">
        <button class="btn-option active">Футболка</button>
        <button class="btn-option" style="opacity: 0.4; cursor: not-allowed;">Худи (Скоро)</button>
      </div>
    </div>

    <!-- Манекен из файлов -->
    <div class="group">
      <div class="section-title">Тип Манекена</div>
      <div class="btn-group" id="group-gender">
        <button class="btn-option active" data-file="man.png" data-val="male">Мужской</button>
        <button class="btn-option" data-file="wom.png" data-val="female">Женский</button>
        <button class="btn-option" data-file="Chil.png" data-val="child">Детский</button>
      </div>
    </div>

    <!-- Посадка -->
    <div class="group">
      <div class="section-title">Силуэт Модели</div>
      <div class="btn-group" id="group-fit">
        <button class="btn-option active" data-val="standard">Стандарт</button>
        <button class="btn-option" data-val="oversize">Оверсайз</button>
      </div>
    </div>

    <!-- Ткань -->
    <div class="group">
      <div class="section-title">Состав Ткани</div>
      <div class="btn-group" id="group-fabric">
        <button class="btn-option active" data-val="cotton" data-price="1200">100% Хлопок (Пенье)</button>
        <button class="btn-option" data-val="stretch" data-price="1400">Стрейч (95/5)</button>
      </div>
    </div>

    <!-- Горловина -->
    <div class="group">
      <div class="section-title">Вырез Горловины</div>
      <div class="btn-group" id="group-neck">
        <button class="btn-option active" data-val="round" data-extra="0">Круглый</button>
        <button class="btn-option" data-val="vneck" data-extra="0.15">V-Образный <span class="badge">+15%</span></button>
      </div>
    </div>

    <!-- Цвет -->
    <div class="group">
      <div class="section-title">Цвет Ткани</div>
      <div class="color-swatches">
        <button class="swatch-btn active" data-color="white">
          <span class="swatch-circle white"></span> Белый
        </button>
        <button class="swatch-btn" data-color="black">
          <span class="swatch-circle black"></span> Черный
        </button>
      </div>
    </div>

    <!-- Принт -->
    <div class="group">
      <div class="section-title">Принт на груди</div>
      <div class="file-upload">
        <input type="file" id="print-input" accept="image/*">
        <span id="upload-label">📁 Загрузить изображение принта</span>
      </div>
    </div>

    <!-- Смета -->
    <div class="summary-card">
      <div class="summary-row">
        <span>Базовая ткань:</span>
        <span id="price-fabric">1 200 ₽</span>
      </div>
      <div class="summary-row">
        <span>Крой / Вырез:</span>
        <span id="price-neck">+0 ₽</span>
      </div>
      <div class="summary-row total">
        <span>Итого:</span>
        <span id="price-total">1 200 ₽</span>
      </div>
    </div>

    <button class="btn-submit" onclick="alert('Заказ сформирован!')">Оформить Заказ</button>
  </div>
<script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0.2, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const state = {
      mannequinFile: 'man.png',
      gender: 'male',
      fit: 'standard',
      fabric: 'cotton',
      neck: 'round',
      color: 'white',
      basePrice: 1200,
      neckModifier: 0
    };

    const textureLoader = new THREE.TextureLoader();
    const atelierGroup = new THREE.Group();
    scene.add(atelierGroup);

    // Материал футболки с полупрозрачностью, чтобы манекен просматривался под ней
    const tshirtMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xffffff, 
      roughness: 0.6,
      transparent: true,
      opacity: 0.75  // Подбирайте прозрачность: от 0.1 до 1.0
    });

    const printMaterial = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.95 });

    function buildModel() {
      while(atelierGroup.children.length > 0){ 
        atelierGroup.remove(atelierGroup.children[0]); 
      }

      let scale = state.gender === 'child' ? 0.75 : (state.gender === 'female' ? 0.9 : 1.0);

      // 1. Слои: Манекен (Сзади, Z = 0)
      textureLoader.load(state.mannequinFile, (texture) => {
        const manMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
        const manGeo = new THREE.PlaneGeometry(1.2 * scale, 2.0 * scale);
        const mannequinMesh = new THREE.Mesh(manGeo, manMat);
        mannequinMesh.position.set(0, 0, 0);
        atelierGroup.add(mannequinMesh);
      });

      // 2. Слои: 3D-Футболка (Посередине, Z = 0.05)
      let fitMult = (state.fit === 'oversize') ? 1.2 : 1.0;
      let tRadiusTop = 0.32 * scale * fitMult;
      let tRadiusBot = 0.28 * scale * fitMult;
      let tHeight = 0.72 * scale;

      const tshirtGeo = new THREE.CylinderGeometry(tRadiusTop, tRadiusBot, tHeight, 32);
      const tshirtMesh = new THREE.Mesh(tshirtGeo, tshirtMaterial);
      tshirtMesh.position.set(0, -0.05 * scale, 0.05);
      atelierGroup.add(tshirtMesh);

      // 3. Слои: Принт (Спереди, Z = tRadiusTop + 0.06)
      const printWidth = 0.28 * scale * fitMult;
      const printGeo = new THREE.PlaneGeometry(printWidth, printWidth);
      const printMesh = new THREE.Mesh(printGeo, printMaterial);
      printMesh.position.set(0, 0.02 * scale, 0.05 + tRadiusTop + 0.01);
      atelierGroup.add(printMesh);

      updateShirtColor();
    }

    function updateShirtColor() {
      tshirtMaterial.color.setHex(state.color === 'white' ? 0xfcfcfc : 0x181818);
    }

    function updatePricing() {
      let base = state.basePrice;
      let neckExtra = base * state.neckModifier;
      let total = base + neckExtra;

      document.getElementById('price-fabric').innerText = base.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-neck').innerText = '+' + Math.round(neckExtra).toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-total').innerText = Math.round(total).toLocaleString('ru-RU') + ' ₽';
    }

    document.querySelectorAll('#group-gender .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-gender .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.gender = e.target.dataset.val;
        state.mannequinFile = e.target.dataset.file;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fit .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fit .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.fit = e.target.dataset.val;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fabric .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fabric .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.fabric = e.target.dataset.val;
        state.basePrice = parseInt(e.target.dataset.price);
        updatePricing();
      });
    });

    document.querySelectorAll('#group-neck .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-neck .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.neck = e.target.dataset.val;
        state.neckModifier = parseFloat(e.target.dataset.extra);
        buildModel();
        updatePricing();
      });
    });

    document.querySelectorAll('.swatch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.color = e.currentTarget.dataset.color;
        updateShirtColor();
      });
    });

    document.getElementById('print-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('upload-label').innerText = '✓ ' + file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const texture = new THREE.Texture(img);
            texture.needsUpdate = true;
            printMaterial.map = texture;
            printMaterial.needsUpdate = true;
          };
        };
        reader.readAsDataURL(file);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    buildModel();
    updatePricing();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
