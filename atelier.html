<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифровое Ателье: Конструктор Футболок 02 </title>
  <style>
    :root {
      --bg: #0d0f12;
      --panel: #161920;
      --panel-border: #262c38;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --white: #ffffff;
      --black: #111111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    /* 3D Canvas Area */
    #canvas-container {
      flex: 1;
      height: 100%;
      position: relative;
      background: radial-gradient(circle at center, #1e2430 0%, #0d0f12 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Control Panel */
    .panel {
      width: 420px;
      height: 100%;
      background: var(--panel);
      border-left: 1px solid var(--panel-border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }

    .panel-header {
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 16px;
    }

    .panel-header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .panel-header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Segmented Button Selectors */
    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 8px;
    }

    .btn-option {
      background: var(--bg);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .btn-option:hover {
      border-color: var(--accent);
    }

    .btn-option.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Color Swatches */
    .color-swatches {
      display: flex;
      gap: 12px;
    }

    .swatch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .swatch-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .swatch-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .swatch-circle.white { background-color: #ffffff; }
    .swatch-circle.black { background-color: #111111; }

    /* File Input / Print Upload */
    .file-upload {
      position: relative;
      border: 2px dashed var(--panel-border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      background: var(--bg);
    }

    .file-upload:hover {
      border-color: var(--accent);
    }

    .file-upload input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload span {
      font-size: 13px;
      color: var(--text-muted);
      display: block;
    }

    /* Price Summary Box */
    .summary-card {
      margin-top: auto;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .summary-row.total {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      border-top: 1px solid var(--panel-border);
      padding-top: 10px;
      margin-bottom: 0;
    }

    .badge {
      font-size: 10px;
      background: rgba(59, 130, 246, 0.2);
      color: var(--accent-hover);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
    }

    /* Custom Scrollbar */
    .panel::-webkit-scrollbar {
      width: 6px;
    }
    .panel::-webkit-scrollbar-thumb {
      background: var(--panel-border);
      border-radius: 3px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <div class="panel">
    <div class="panel-header">
      <h1>Ателье Футболок</h1>
      <p>Конструктор индивидуального пошива</p>
    </div>

    <!-- 1. Модель манекена -->
    <div class="group">
      <div class="section-title">Тип Манекена</div>
      <div class="btn-group" id="group-gender">
        <button class="btn-option active" data-val="male">Мужской</button>
        <button class="btn-option" data-val="female">Женский</button>
        <button class="btn-option" data-val="child">Детский</button>
      </div>
    </div>

    <!-- 2. Силуэт / Посадка -->
    <div class="group">
      <div class="section-title">Силуэт Модели</div>
      <div class="btn-group" id="group-fit">
        <button class="btn-option active" data-val="standard">Стандарт</button>
        <button class="btn-option" data-val="oversize">Оверсайз</button>
      </div>
    </div>

    <!-- 3. Материал / Ткань -->
    <div class="group">
      <div class="section-title">Состав Ткани</div>
      <div class="btn-group" id="group-fabric">
        <button class="btn-option active" data-val="cotton" data-price="1200">100% Хлопок (Пенье)</button>
        <button class="btn-option" data-val="stretch" data-price="1400">Стрейч (95/5)</button>
      </div>
    </div>

    <!-- 4. Форма горловины -->
    <div class="group">
      <div class="section-title">Вырез Горловины</div>
      <div class="btn-group" id="group-neck">
        <button class="btn-option active" data-val="round" data-extra="0">Круглый</button>
        <button class="btn-option" data-val="vneck" data-extra="0.15">V-Образный <span class="badge">+15%</span></button>
      </div>
    </div>

    <!-- 5. Цвет полотна -->
    <div class="group">
      <div class="section-title">Цвет Ткани</div>
      <div class="color-swatches">
        <button class="swatch-btn active" data-color="white">
          <span class="swatch-circle white"></span> Белый
        </button>
        <button class="swatch-btn" data-color="black">
          <span class="swatch-circle black"></span> Черный
        </button>
      </div>
    </div>

    <!-- 6. Принт / Загрузка -->
    <div class="group">
      <div class="section-title">Принт на груди</div>
      <div class="file-upload">
        <input type="file" id="print-input" accept="image/*">
        <span id="upload-label">📁 Загрузить изображение принта</span>
      </div>
    </div>

    <!-- Итоговая Смета -->
    <div class="summary-card">
      <div class="summary-row">
        <span>Базовая ткань:</span>
        <span id="price-fabric">1 200 ₽</span>
      </div>
      <div class="summary-row">
        <span>Крой / Вырез:</span>
        <span id="price-neck">+0 ₽</span>
      </div>
      <div class="summary-row total">
        <span>Итого:</span>
        <span id="price-total">1 200 ₽</span>
      </div>
    </div>

    <button class="btn-submit" onclick="alert('Заказ сформирован и отправлен в производство!')">Оформить Заказ</button>
  </div>

  <script>
    // --- ИНИЦИАЛИЗАЦИЯ THREE.JS ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0.4, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 + 0.1;
    controls.minDistance = 1.8;
    controls.maxDistance = 5.0;

    // --- ОСВЕЩЕНИЕ ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(2, 4, 3);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0x90b0ff, 0.4);
    fillLight.position.set(-2, 2, -2);
    scene.add(fillLight);

    // --- ПОДИУМ ---
    const floorGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.05, 64);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1f2c, roughness: 0.6, metalness: 0.2 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.y = -1.05;
    floor.receiveShadow = true;
    scene.add(floor);

    // --- СОСТОЯНИЕ КОНСТРУКТОРА ---
    const state = {
      gender: 'male',      // male, female, child
      fit: 'standard',     // standard, oversize
      fabric: 'cotton',    // cotton, stretch
      neck: 'round',       // round, vneck
      color: 'white',      // white, black
      basePrice: 1200,
      neckModifier: 0,
      printTexture: null
    };

    // --- ТЕКСТУРА ПО УМОЛЧАНИЮ (ПРИНТ ЗАГЛУШКА) ---
    function createDefaultPrintTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 512, 512);

      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 12;
      ctx.strokeRect(40, 40, 432, 432);

      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('ВАШ ПРИНТ', 256, 240);
      ctx.font = '20px sans-serif';
      ctx.fillStyle = '#64748b';
      ctx.fillText('Загрузите файл', 256, 280);

      const texture = new THREE.CanvasTexture(canvas);
      return texture;
    }

    let defaultPrint = createDefaultPrintTexture();

    // --- МАТЕРИАЛЫ ---
    const tshirtMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.85,
      metalness: 0.05
    });

    const printMaterial = new THREE.MeshBasicMaterial({
      map: defaultPrint,
      transparent: true,
      opacity: 0.95
    });

    const mannequinMaterial = new THREE.MeshStandardMaterial({
      color: 0x334155,
      roughness: 0.5,
      metalness: 0.1
    });

    // --- ГРУППА 3D ОБЪЕКТОВ ---
    const atelierGroup = new THREE.Group();
    scene.add(atelierGroup);

    let mannequinMesh, tshirtMesh, neckMesh, printMesh;

    // --- ПОСТРОЕНИЕ ГЕОМЕТРИИ МАНЕКЕНА И ФУТБОЛКИ ---
    function buildModel() {
      // Очистка старых объектов
      while(atelierGroup.children.length > 0){ 
        atelierGroup.remove(atelierGroup.children[0]); 
      }

      // Масштаб под манекен
      let scaleY = 1.0;
      let scaleXZ = 1.0;
      let isChild = state.gender === 'child';

      if (state.gender === 'female') {
        scaleXZ = 0.88;
      } else if (isChild) {
        scaleY = 0.7;
        scaleXZ = 0.75;
      }

      // 1. Построение манекена (Торс)
      const bodyGeo = new THREE.CylinderGeometry(0.28 * scaleXZ, 0.22 * scaleXZ, 0.9 * scaleY, 32);
      mannequinMesh = new THREE.Mesh(bodyGeo, mannequinMaterial);
      mannequinMesh.position.y = -0.1 * scaleY;
      mannequinMesh.castShadow = true;
      atelierGroup.add(mannequinMesh);

      // Голова манекена
      const headGeo = new THREE.SphereGeometry(0.14 * scaleXZ, 32, 32);
      const headMesh = new THREE.Mesh(headGeo, mannequinMaterial);
      headMesh.position.y = 0.48 * scaleY;
      atelierGroup.add(headMesh);

      // Стойка манекена
      const poleGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.2, 16);
      const poleMesh = new THREE.Mesh(poleGeo, mannequinMaterial);
      poleMesh.position.y = -0.6;
      atelierGroup.add(poleMesh);

      // 2. Построение Футболки (Тело)
      let fitMult = (state.fit === 'oversize') ? 1.22 : 1.04;
      let tRadiusTop = 0.30 * scaleXZ * fitMult;
      let tRadiusBot = 0.28 * scaleXZ * fitMult;
      let tHeight = 0.75 * scaleY * (state.fit === 'oversize' ? 1.08 : 1.0);

      const tshirtGeo = new THREE.CylinderGeometry(tRadiusTop, tRadiusBot, tHeight, 32);
      tshirtMesh = new THREE.Mesh(tshirtGeo, tshirtMaterial);
      tshirtMesh.position.y = -0.12 * scaleY;
      tshirtMesh.castShadow = true;
      atelierGroup.add(tshirtMesh);

      // 3. Рукава
      const sleeveRadius = 0.1 * scaleXZ * fitMult;
      const sleeveLen = (state.fit === 'oversize' ? 0.35 : 0.26) * scaleY;
      const sleeveGeo = new THREE.CylinderGeometry(sleeveRadius * 1.1, sleeveRadius, sleeveLen, 24);

      // Левый рукав
      const leftSleeve = new THREE.Mesh(sleeveGeo, tshirtMaterial);
      leftSleeve.position.set(-tRadiusTop * 0.95, 0.18 * scaleY, 0);
      leftSleeve.rotation.z = Math.PI / 3.5;
      leftSleeve.castShadow = true;
      atelierGroup.add(leftSleeve);

      // Правый рукав
      const rightSleeve = new THREE.Mesh(sleeveGeo, tshirtMaterial);
      rightSleeve.position.set(tRadiusTop * 0.95, 0.18 * scaleY, 0);
      rightSleeve.rotation.z = -Math.PI / 3.5;
      rightSleeve.castShadow = true;
      atelierGroup.add(rightSleeve);

      // 4. Горловина (Круглая или V-образная)
      if (state.neck === 'round') {
        const neckGeo = new THREE.TorusGeometry(tRadiusTop * 0.55, 0.025, 16, 32);
        neckMesh = new THREE.Mesh(neckGeo, tshirtMaterial);
        neckMesh.rotation.x = Math.PI / 2;
        neckMesh.position.set(0, 0.25 * scaleY, 0);
      } else {
        // V-образная горловина
        const vShapeGeo = new THREE.ConeGeometry(tRadiusTop * 0.65, 0.2 * scaleY, 4);
        neckMesh = new THREE.Mesh(vShapeGeo, tshirtMaterial);
        neckMesh.rotation.y = Math.PI / 4;
        neckMesh.position.set(0, 0.2 * scaleY, tRadiusTop * 0.4);
      }
      atelierGroup.add(neckMesh);

      // 5. Плоскость для Нанесения Принта
      const printWidth = 0.26 * scaleXZ * (state.fit === 'oversize' ? 1.15 : 1.0);
      const printHeight = 0.26 * scaleXZ * (state.fit === 'oversize' ? 1.15 : 1.0);
      const printGeo = new THREE.PlaneGeometry(printWidth, printHeight);

      printMesh = new THREE.Mesh(printGeo, printMaterial);
      // Смещение вперед для исключения Z-fighting
      printMesh.position.set(0, 0.02 * scaleY, tRadiusTop + 0.005);
      atelierGroup.add(printMesh);

      // Обновляем цвет материалу
      updateShirtColor();
    }

    function updateShirtColor() {
      if (state.color === 'white') {
        tshirtMaterial.color.setHex(0xfcfcfc);
      } else {
        tshirtMaterial.color.setHex(0x181818);
      }
    }

    // --- РАСЧЕТ СТОИМОСТИ ---
    function updatePricing() {
      let base = state.basePrice;
      let neckExtra = base * state.neckModifier;
      let total = base + neckExtra;

      document.getElementById('price-fabric').innerText = base.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-neck').innerText = '+' + Math.round(neckExtra).toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-total').innerText = Math.round(total).toLocaleString('ru-RU') + ' ₽';
    }

    // --- ОБРАБОТЧИКИ СОБЫТИЙ ИНТЕРФЕЙСА ---

    // Пол / Возраст
    document.querySelectorAll('#group-gender .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-gender .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.gender = e.target.dataset.val;
        buildModel();
      });
    });

    // Посадка / Оверсайз
    document.querySelectorAll('#group-fit .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fit .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.fit = e.target.dataset.val;
        buildModel();
      });
    });

    // Состав Ткани
    document.querySelectorAll('#group-fabric .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fabric .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.fabric = e.target.dataset.val;
        state.basePrice = parseInt(e.target.dataset.price);
        updatePricing();
      });
    });

    // Горловина (+15%)
    document.querySelectorAll('#group-neck .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-neck .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.neck = e.target.dataset.val;
        state.neckModifier = parseFloat(e.target.dataset.extra);
        buildModel();
        updatePricing();
      });
    });

    // Выбор цвета (Белый/Черный)
    document.querySelectorAll('.swatch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
        const target = e.currentTarget;
        target.classList.add('active');
        state.color = target.dataset.color;
        updateShirtColor();
      });
    });

    // Загрузка файла принта
    const printInput = document.getElementById('print-input');
    printInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('upload-label').innerText = '✓ ' + file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const texture = new THREE.Texture(img);
            texture.needsUpdate = true;
            printMaterial.map = texture;
            printMaterial.needsUpdate = true;
          };
        };
        reader.readAsDataURL(file);
      }
    });

    // --- РЕСАЙЗ ОКНА ---
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // --- ИНИЦИАЛИЗАЦИЯ И РЕНДЕР-ПЕТЛЯ ---
    buildModel();
    updatePricing();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      // Медленное вращение подиума для презентации
      atelierGroup.rotation.y += 0.003;

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
