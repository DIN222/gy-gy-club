<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ателье Уличной Одежды | Смысловой Конструктор 005 </title>
  <style>
    :root {
      /* Глубокий черный и премиальное золото */
      --bg: #050505;
      --panel: #111111;
      --panel-border: #2a2a2a;
      
      /* Основное сияющее золото */
      --accent: #d4af37; 
      --accent-hover: #f9e1a9;
      
      /* Дополнительные оттенки золота */
      --gold-muted: #b59410;
      --gold-dark: #8c730a;
      
      /* Текст */
      --text: #e0e0e0;
      --text-muted: #888888;
      --text-on-accent: #000000; /* Текст на золотых кнопках - черный */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Playfair Display', serif; /* Более элегантный шрифт для заголовков */
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    /* ОСНОВНОЙ КОНТЕЙНЕР (Смена мест: Панель слева, Манекен справа) */
    .main-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ПАНЕЛЬ ПАРАМЕТРОВ (Теперь слева) */
    .panel {
      width: 420px;
      height: 100%;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 10px 0 30px rgba(0,0,0,0.7);
    }

    /* КОНТЕЙНЕР МАНЕКЕНА (Теперь справа, фотореалистичный) */
    #canvas-container {
      flex: 1;
      height: 100%;
      position: relative;
      /* Фон: Реалистичное фото интерьера ателье (мягко размытое для фокуса на манекене) */
      background-image: url('https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=1920&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
    }

    /* Затемняющий оверлей для фона, чтобы манекен выделялся */
    #canvas-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.9) 100%);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 2;
    }

    /* СТИЛИЗАЦИЯ ЭЛЕМЕНТОВ ПАНЕЛИ (Золото на Черном) */
    .panel-header {
      border-bottom: 2px solid var(--gold-dark);
      padding-bottom: 20px;
      margin-bottom: 10px;
    }

    .panel-header h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
      font-family: 'Montserrat', sans-serif;
    }

    .panel-header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold-muted);
      margin-bottom: 12px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }

    /* Кнопки опций: черные с золотой границей */
    .btn-option {
      background: rgba(17, 17, 17, 0.6);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 12px 15px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
    }

    .btn-option:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(212, 175, 55, 0.05);
    }

    /* Активная кнопка: полностью золотая с черным текстом */
    .btn-option.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .color-swatches {
      display: flex;
      gap: 15px;
    }

    .swatch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid var(--panel-border);
      background: rgba(17, 17, 17, 0.6);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
      font-family: 'Montserrat', sans-serif;
    }

    .swatch-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .swatch-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .swatch-circle.white { background-color: #ffffff; border-color: #ddd; }
    .swatch-circle.black { background-color: #111111; border-color: #333; }

    .file-upload {
      position: relative;
      border: 2px dashed var(--gold-dark);
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(17, 17, 17, 0.6);
    }

    .file-upload:hover { 
      border-color: var(--accent);
      background: rgba(212, 175, 55, 0.03);
    }

    .file-upload input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload span {
      font-size: 13px;
      color: var(--gold-muted);
      display: block;
      font-weight: 500;
    }

    .summary-card {
      margin-top: auto;
      background: rgba(17, 17, 17, 0.8);
      border: 1px solid var(--gold-dark);
      border-radius: 8px;
      padding: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .summary-row.total {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      border-top: 1px solid var(--gold-dark);
      padding-top: 15px;
      margin-bottom: 0;
      font-family: 'Montserrat', sans-serif;
    }

    .badge {
      font-size: 10px;
      background: rgba(212, 175, 55, 0.15);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: 6px;
      font-weight: 700;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: var(--text-on-accent);
      border: none;
      padding: 16px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Montserrat', sans-serif;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-submit:hover { 
      background: var(--accent-hover);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
      transform: translateY(-1px);
    }
  </style>
  <!-- Подключаем шрифты -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div class="main-wrapper">
    <!-- ПАНЕЛЬ ПАРАМЕТРОВ (Слева) -->
    <div class="panel">
      <div class="panel-header">
        <h1>Atelier</h1>
        <p>Создай свой эмоциональный артефакт</p>
      </div>

      <!-- Тип манекена -->
      <div class="group">
        <div class="section-title">Силуэт Модели</div>
        <div class="btn-group" id="group-gender">
          <!-- Используем те же файлы, но теперь они - текстуры для 3D тел -->
          <button class="btn-option active" data-file="man.png" data-val="male">Мужской</button>
          <button class="btn-option" data-file="wom.png" data-val="female">Женский</button>
          <button class="btn-option" data-file="Chil.png" data-val="child">Детский</button>
        </div>
      </div>

      <!-- Посадка -->
      <div class="group">
        <div class="section-title">Крой</div>
        <div class="btn-group" id="group-fit">
          <button class="btn-option active" data-val="standard">Стандарт</button>
          <button class="btn-option" data-val="oversize">Оверсайз</button>
        </div>
      </div>

      <!-- Ткань -->
      <div class="group">
        <div class="section-title">Материал</div>
        <div class="btn-group" id="group-fabric">
          <button class="btn-option active" data-val="cotton" data-price="1200">100% Хлопок Пенье</button>
          <button class="btn-option" data-val="stretch" data-price="1400">Стрейч Котон</button>
        </div>
      </div>

      <!-- Горловина -->
      <div class="group">
        <div class="section-title">Горловина</div>
        <div class="btn-group" id="group-neck">
          <button class="btn-option active" data-val="round" data-extra="0">Круглая</button>
          <button class="btn-option" data-val="vneck" data-extra="0.15">V-образная <span class="badge">+15%</span></button>
        </div>
      </div>

      <!-- Цвет -->
      <div class="group">
        <div class="section-title">Цвет Ткани</div>
        <div class="color-swatches">
          <button class="swatch-btn active" data-color="white">
            <span class="swatch-circle white"></span> Белый матовый
          </button>
          <button class="swatch-btn" data-color="black">
            <span class="swatch-circle black"></span> Черный уголь
          </button>
        </div>
      </div>

      <!-- Принт -->
      <div class="group">
        <div class="section-title">Ваш Принт (Центр груди)</div>
        <div class="file-upload">
          <input type="file" id="print-input" accept="image/*">
          <span id="upload-label">📁 Загрузить файл арта</span>
        </div>
      </div>

      <!-- Смета -->
      <div class="summary-card">
        <div class="summary-row">
          <span>База (Ткань):</span>
          <span id="price-fabric">1 200 ₽</span>
        </div>
        <div class="summary-row">
          <span>Сложность кроя:</span>
          <span id="price-neck">+0 ₽</span>
        </div>
        <div class="summary-row total">
          <span>Итого:</span>
          <span id="price-total">1 200 ₽</span>
        </div>
      </div>

      <button class="btn-submit" onclick="alert('Ваш заказ отправлен на производство!')">Оформить заказ</button>
    </div>

    <!-- КОНТЕЙНЕР МАНЕКЕНА (Справа) -->
    <div id="canvas-container"></div>
  </div>

  <script>
    // --- 3D КОНСТРУКТОР (Золотой стандарт и Фотореализм) ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    // Камера для реалистичного обзора
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0.3, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    // Включаем тени и улучшенное освещение
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 5;
    controls.target.set(0, 0, 0);

    // ОСВЕЩЕНИЕ (Студийное, подчеркивающее золото)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // Мягкий общий свет
    scene.add(ambientLight);

    // Основной направленный свет (акцентный)
    const sunLight = new THREE.DirectionalLight(0xfff5e1, 1.2); // Тёплый оттенок
    sunLight.position.set(2, 4, 3);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // Контровой свет (чтобы отделить манекен от фона)
    const backLight = new THREE.SpotLight(0xffffff, 0.8);
    backLight.position.set(-3, 2, -4);
    scene.add(backLight);

    const state = {
      mannequinFile: 'man.png',
      gender: 'male',
      fit: 'standard',
      color: 'white',
      fabric: 'cotton',
      neck: 'round',
      basePrice: 1200,
      neckModifier: 0
    };

    const textureLoader = new THREE.TextureLoader();
    // Текстура ткани (фото ткани в высоком разрешении)
    const fabricTexture = textureLoader.load('https://images.unsplash.com/photo-1596701548680-e37452d92994?q=80&w=2000&auto=format&fit=crop'); // Текстура белого хлопка
    fabricTexture.wrapS = fabricTexture.wrapT = THREE.RepeatWrapping;
    fabricTexture.repeat.set(4, 4);

    const atelierGroup = new THREE.Group();
    scene.add(atelierGroup);

    // Материалы
    // Реалистичный материал футболки (с фототекстурой)
    const tshirtMaterial = new THREE.MeshStandardMaterial({ 
      map: fabricTexture,
      roughness: 0.9, 
      metalness: 0.05,
      transparent: false,
      side: THREE.FrontSide
    });
    
    const printMaterial = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.98, side: THREE.FrontSide });

    function buildModel() {
      while(atelierGroup.children.length > 0){ 
        atelierGroup.remove(atelierGroup.children[0]); 
      }

      const scale = state.gender === 'child' ? 0.7 : (state.gender === 'female' ? 0.88 : 1.0);
      let fitMult = (state.fit === 'oversize') ? 1.15 : 1.0;

      // 1. ФОТОРЕАЛИСТИЧНЫЙ МАНЕКЕН (Тело с текстурой)
      const mannequinGeo = new THREE.CylinderGeometry(0.3 * scale, 0.25 * scale, 1.6 * scale, 32);
      const mannequinMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
      const mannequinMesh = new THREE.Mesh(mannequinGeo, mannequinMat);
      mannequinMesh.position.set(0, -0.05 * scale, -0.05);
      mannequinMesh.receiveShadow = true;
      atelierGroup.add(mannequinMesh);

      // 2. ФОТОРЕАЛИСТИЧНАЯ ФУТБОЛКА (Честный 3D объем)
      const tshirtRadius = 0.35 * scale * fitMult;
      const tshirtHeight = 0.75 * scale;
      const tshirtGeo = new THREE.CylinderGeometry(tshirtRadius, tshirtRadius * 0.95, tshirtHeight, 32, 1, true); // Открытый цилиндр
      
      const tshirtMesh = new THREE.Mesh(tshirtGeo, tshirtMaterial);
      tshirtMesh.position.set(0, 0.1 * scale, 0.05);
      tshirtMesh.castShadow = true;
      atelierGroup.add(tshirtMesh);

      // 3. ПРИНТ НА ГРУДИ
      const printSize = 0.35 * scale * (state.fit === 'oversize' ? 1.1 : 1.0);
      const printGeo = new THREE.PlaneGeometry(printSize, printSize);
      const printMesh = new THREE.Mesh(printGeo, printMaterial);
      // Смещение принта, чтобы он лежал *точно* на поверхности футболки
      printMesh.position.set(0, 0.18 * scale, 0.05 + tshirtRadius + 0.005);
      atelierGroup.add(printMesh);

      updateShirtVisuals();
    }

    function updateShirtVisuals() {
      // Меняем цвет материала, сохраняя текстуру ткани
      tshirtMaterial.color.setHex(state.color === 'white' ? 0xffffff : 0x151515);
      
      // Небольшая корректировка текстуры для темной ткани
      if (state.color === 'black') {
        fabricTexture.repeat.set(6, 6); // Чаще текстура для черного
      } else {
        fabricTexture.repeat.set(4, 4);
      }
      fabricTexture.needsUpdate = true;
    }

    function updatePricing() {
      let base = state.basePrice;
      let neckExtra = base * state.neckModifier;
      let total = base + neckExtra;

      document.getElementById('price-fabric').innerText = base.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-neck').innerText = '+' + Math.round(neckExtra).toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-total').innerText = Math.round(total).toLocaleString('ru-RU') + ' ₽';
    }

    // Слушатели событий
    document.querySelectorAll('#group-gender .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-gender .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.gender = e.target.dataset.val;
        state.mannequinFile = e.target.dataset.file;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fit .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fit .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.fit = e.target.dataset.val;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fabric .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fabric .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.fabric = e.target.dataset.val;
        state.basePrice = parseInt(e.target.dataset.price);
        updatePricing();
      });
    });

    document.querySelectorAll('#group-neck .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-neck .btn-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.neck = e.target.dataset.val;
        state.neckModifier = parseFloat(e.target.dataset.extra);
        buildModel();
        updatePricing();
      });
    });

    document.querySelectorAll('.swatch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.color = e.currentTarget.dataset.color;
        updateShirtVisuals();
      });
    });

    // Загрузка принта
    document.getElementById('print-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('upload-label').innerText = '✓ ' + file.name.substring(0, 15) + '...';
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const texture = new THREE.Texture(img);
            texture.needsUpdate = true;
            texture.encoding = THREE.sRGBEncoding; // Корректные цвета
            printMaterial.map = texture;
            printMaterial.needsUpdate = true;
          };
        };
        reader.readAsDataURL(file);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Стартовая сборка
    buildModel();
    updatePricing();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
