<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GY-GY Atelier | Ателье «Уличная одежда» v1.1.4 </title>
  
  <!-- ШРИФТЫ: Montserrat (для интерфейса) + UnifrakturMaguntia (Креативный стритвир акцент) -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=UnifrakturMaguntia&family=Russo+One&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <style>
    /* ==========================================
       ГЛОБАЛЬНЫЕ СТИЛИ И ПЕРЕМЕННЫЕ
       ========================================== */
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --panel-border: #221c08;
      
      --gold-primary: #d4af37; 
      --gold-light: #f5d77f;
      --gold-dark: #3a2e0a;
      --gold-glow: rgba(212, 175, 55, 0.35);
      
      --text: #ffffff;
      --text-muted: #8a806b;
      --text-dark: #000000;
      
      /* Переменные шрифтов */
      --font-main: 'Montserrat', sans-serif;
      --font-streetwear: 'UnifrakturMaguntia', cursive; /* Попробуйте также 'Russo One', sans-serif */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .main-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ==========================================
       ПАНЕЛЬ УПРАВЛЕНИЯ
       ========================================== */
    .panel {
      width: 420px;
      height: 100%;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 10px 0 35px rgba(0,0,0,0.85);
    }

    .panel::-webkit-scrollbar {
      width: 6px;
    }
    .panel::-webkit-scrollbar-track {
      background: #080808;
    }
    .panel::-webkit-scrollbar-thumb {
      background: var(--gold-dark);
      border-radius: 3px;
    }

    /* Шапка */
    .panel-header {
      border-bottom: 2px solid var(--gold-dark);
      padding-bottom: 12px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-arrows {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      background: #121212;
      border: 1px solid var(--gold-dark);
      color: var(--gold-primary);
      width: 36px;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      transition: all 0.25s ease;
      line-height: 1;
    }

    .nav-btn:hover {
      border-color: var(--gold-light);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
    }

    .brand-box {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .brand-logo {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--gold-primary);
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--gold-glow);
    }

    .version-tag {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--gold-primary);
      margin-bottom: 4px;
      font-weight: 700;
    }

    /* КРЕАТИВНАЯ ПЛАШКА НАЗВАНИЯ АТЕЛЬЕ */
    .atelier-title-badge {
      background: linear-gradient(180deg, rgba(212, 175, 55, 0.12) 0%, rgba(13, 13, 13, 0.8) 100%);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      padding: 12px 14px;
      border-radius: 6px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: inset 0 0 12px rgba(212, 175, 55, 0.08), 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .atelier-title-badge .title-text {
      font-family: var(--font-streetwear);
      font-size: 20px;
      letter-spacing: 1px;
      text-transform: none;
      color: var(--gold-light);
      text-shadow: 0 0 10px var(--gold-glow);
      line-height: 1.1;
    }

    .atelier-title-badge .icon {
      font-size: 18px;
      filter: drop-shadow(0 0 4px var(--gold-glow));
    }

    .apparel-selector {
      width: 100%;
      padding: 12px;
      background: #121212;
      border: 1px solid var(--gold-dark);
      border-radius: 4px;
      color: var(--gold-primary);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
      text-shadow: 0 0 4px rgba(212, 175, 55, 0.3);
    }

    .apparel-selector:hover {
      border-color: var(--gold-primary);
    }

    .apparel-selector option {
      background: #0d0d0d;
      color: var(--gold-primary);
      padding: 10px;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
    }

    .btn-group.size-grid {
      grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
    }

    /* СТИЛИ КНОПОК */
    .btn-option, .swatch-btn, .btn-submit {
      background-color: #121212;
      border: 1px solid var(--gold-dark);
      color: var(--gold-primary);
      padding: 10px 4px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 3px rgba(212, 175, 55, 0.25);
    }

    .btn-option:hover, .swatch-btn:hover, .btn-submit:hover {
      border-color: rgba(212, 175, 55, 0.6);
      box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
    }

    .btn-option.active, .swatch-btn.active {
      background-color: #121212 !important;
      border: 1.5px solid var(--gold-light) !important;
      color: var(--gold-primary) !important;
      box-shadow: 
        0 0 12px rgba(245, 215, 127, 0.6),
        inset 0 0 6px rgba(212, 175, 55, 0.3) !important;
    }

    .color-swatches {
      display: flex;
      gap: 8px;
    }

    .swatch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
    }

    .swatch-circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid var(--gold-primary);
    }
    .swatch-circle.white { background-color: #ffffff; }
    .swatch-circle.black { background-color: #111111; }

    .file-upload {
      position: relative;
      border: 1px dashed var(--gold-primary);
      border-radius: 4px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: rgba(212, 175, 55, 0.02);
      transition: all 0.3s ease;
    }

    .file-upload:hover {
      background: rgba(212, 175, 55, 0.06);
      border-color: var(--gold-light);
    }

    .file-upload input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload span {
      font-size: 11px;
      color: var(--gold-primary);
      font-weight: 700;
      text-transform: uppercase;
    }

    .print-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #080808;
      border: 1px solid var(--gold-dark);
      padding: 10px;
      border-radius: 4px;
      margin-top: 4px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--gold-primary);
      font-weight: 700;
    }

    .control-row input[type="range"] {
      width: 60%;
      accent-color: var(--gold-primary);
      cursor: pointer;
    }

    .summary-card {
      margin-top: auto;
      background: #080808;
      border: 1px solid var(--gold-dark);
      border-radius: 6px;
      padding: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .summary-row.total {
      font-size: 15px;
      font-weight: 900;
      color: var(--gold-primary);
      border-top: 1px solid var(--gold-dark);
      padding-top: 6px;
      margin-bottom: 0;
      text-shadow: 0 0 6px rgba(212, 175, 55, 0.4);
    }

    .badge {
      font-size: 8px;
      background: rgba(212, 175, 55, 0.2);
      color: var(--gold-light);
      padding: 2px 4px;
      border-radius: 3px;
      margin-left: 3px;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    #canvas-container {
      flex: 1;
      height: 100%;
      position: relative;
      background-image: url('astudio_bg.jpg');
      background-size: cover;
      background-position: center;
    }

    #canvas-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(5, 5, 5, 0.1) 0%, rgba(5, 5, 5, 0.8) 100%);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="panel">
      <!-- Шапка -->
      <div class="panel-header">
        <div class="nav-arrows">
          <button class="nav-btn" id="btn-nav-back" title="Вернуться в Студио">‹</button>
          <button class="nav-btn" id="btn-nav-door" title="Перейти в Index">«</button>
        </div>
        <div class="brand-box">
          <div class="brand-logo">GY-GY</div>
          <span class="version-tag">v1.1.3</span>
        </div>
      </div>

      <!-- Обновленная креативная плашка названия -->
      <div class="atelier-title-badge">
        <span class="icon">🛹</span>
        <span class="title-text">Ателье «Уличная Одежда»</span>
      </div>

      <!-- Выбор изделия -->
      <div class="group">
        <select class="apparel-selector" id="apparel-type">
          <option value="tshirt">👕 Футболка </option>
          <option value="hoodie">🧥 Худи с капюшоном </option>
          <option value="sweatshirt">👔 Свитшот </option>
        </select>
      </div>

      <!-- Пол манекена -->
      <div class="group">
        <div class="btn-group" id="group-gender">
          <button class="btn-option active" data-file="man.png" data-val="male">Мужской</button>
          <button class="btn-option" data-file="wom.png" data-val="female">Женский</button>
          <button class="btn-option" data-file="Chil.png" data-val="child">Детский</button>
        </div>
      </div>

      <!-- Размеры -->
      <div class="group">
        <div class="btn-group size-grid" id="group-size"></div>
      </div>

      <!-- Силуэт -->
      <div class="group">
        <div class="btn-group" id="group-fit">
          <button class="btn-option active" data-val="standard">Стандарт</button>
          <button class="btn-option" data-val="oversize">Оверсайз</button>
        </div>
      </div>

      <!-- Динамические параметры -->
      <div id="dynamic-params"></div>

      <!-- Цвет -->
      <div class="group">
        <div class="color-swatches" id="group-color">
          <button class="swatch-btn active" data-color="white">
            <span class="swatch-circle white"></span> Белый
          </button>
          <button class="swatch-btn" data-color="black">
            <span class="swatch-circle black"></span> Черный
          </button>
        </div>
      </div>

      <!-- Ракурс -->
      <div class="group">
        <div class="btn-group" id="group-view">
          <button class="btn-option active" data-view="front">Спереди (Грудь)</button>
          <button class="btn-option" data-view="back">Сзади (Спина)</button>
        </div>
      </div>

      <!-- Нанесение принта -->
      <div class="group">
        <div class="section-title">Технология и Принт</div>
        <div class="btn-group" id="group-tech" style="margin-bottom: 6px;">
          <button class="btn-option active" data-tech-price="0">DTF-Печать</button>
          <button class="btn-option" data-tech-price="350">Вышивка <span class="badge">+350₽</span></button>
        </div>

        <div class="file-upload">
          <input type="file" id="print-input" accept="image/*">
          <span id="upload-label">📁 Загрузить файл (PNG)</span>
        </div>

        <div class="print-controls" id="print-controls">
          <div class="control-row">
            <span>Масштаб:</span>
            <input type="range" id="scale-slider" min="0.1" max="0.6" step="0.02" value="0.32">
          </div>
          <div class="control-row">
            <span>Высота:</span>
            <input type="range" id="posY-slider" min="-0.2" max="0.4" step="0.02" value="0.12">
          </div>
        </div>
      </div>

      <!-- Смета -->
      <div class="summary-card">
        <div class="summary-row">
          <span>Основа и Ткань:</span>
          <span id="price-fabric">1 200 ₽</span>
        </div>
        <div class="summary-row">
          <span>Модификация и Нанесение:</span>
          <span id="price-extra">+0 ₽</span>
        </div>
        <div class="summary-row total">
          <span>Итого:</span>
          <span id="price-total">1 200 ₽</span>
        </div>
      </div>

      <button class="btn-submit" onclick="alert('Заказ успешно сформирован!')">Оформить Заказ</button>
    </div>

    <!-- 3D КАНВАС -->
    <div id="canvas-container"></div>
  </div>

  <script>
    document.getElementById('btn-nav-back').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'studio.html';
      }
    });

    document.getElementById('btn-nav-door').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const adultSizes = ['XS', 'S', 'M', 'L', 'XL', '2XL'];
    const childSizes = ['104', '116', '128', '140', '152'];

    const state = {
      apparelType: 'tshirt',
      mannequinFile: 'man.png',
      gender: 'male',
      fit: 'standard',
      size: 'M',
      color: 'white',
      view: 'front',
      
      basePrice: 1200,
      extraPrice: 0,
      techPrice: 0,
      
      frontPrint: { scale: 0.32, posY: 0.12, texture: null },
      backPrint: { scale: 0.32, posY: 0.12, texture: null }
    };

    const textureLoader = new THREE.TextureLoader();
    const atelierGroup = new THREE.Group();
    scene.add(atelierGroup);

    const printMaterial = new THREE.MeshBasicMaterial({ 
      transparent: true, 
      opacity: 0, 
      alphaTest: 0.02,
      depthWrite: false
    });

    const apparelConfigs = {
      tshirt: {
        basePrice: 1200,
        html: `
          <div class="group">
            <div class="btn-group" id="group-fabric">
              <button class="btn-option active" data-price="1200">Хлопок 100%</button>
              <button class="btn-option" data-price="1400">Стрейч</button>
            </div>
          </div>
          <div class="group">
            <div class="btn-group" id="group-extra">
              <button class="btn-option active" data-extra="0">Горловина О</button>
              <button class="btn-option" data-extra="200">Горловина V <span class="badge">+200₽</span></button>
            </div>
          </div>
        `
      },
      hoodie: {
        basePrice: 3200,
        html: `
          <div class="group">
            <div class="btn-group" id="group-fabric">
              <button class="btn-option active" data-price="3200">Без начеса</button>
              <button class="btn-option" data-price="3600">С начесом <span class="badge">+400₽</span></button>
            </div>
          </div>
          <div class="group">
            <div class="btn-group" id="group-extra">
              <button class="btn-option active" data-extra="0">Капюшон Стандарт</button>
              <button class="btn-option" data-extra="300">Капюшон Оверсайз <span class="badge">+300₽</span></button>
            </div>
          </div>
        `
      },
      sweatshirt: {
        basePrice: 2500,
        html: `
          <div class="group">
            <div class="btn-group" id="group-fabric">
              <button class="btn-option active" data-price="2500">320 г/м²</button>
              <button class="btn-option" data-price="2900">400 г/м² (Плотный)</button>
            </div>
          </div>
          <div class="group">
            <div class="btn-group" id="group-extra">
              <button class="btn-option active" data-extra="0">Рукав Втачной</button>
              <button class="btn-option" data-extra="250">Рукав Реглан <span class="badge">+250₽</span></button>
            </div>
          </div>
        `
      }
    };

    function updateSizeButtons() {
      const sizeContainer = document.getElementById('group-size');
      const sizes = (state.gender === 'child') ? childSizes : adultSizes;
      
      sizeContainer.innerHTML = sizes.map((sz, index) => {
        const isActive = (state.size === sz) || (index === 2 && !sizes.includes(state.size));
        if (isActive) state.size = sz;
        return `<button class="btn-option ${isActive ? 'active' : ''}" data-val="${sz}">${sz}</button>`;
      }).join('');

      sizeContainer.querySelectorAll('.btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          sizeContainer.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          state.size = e.currentTarget.dataset.val;
        });
      });
    }

    function renderDynamicParams() {
      const config = apparelConfigs[state.apparelType];
      document.getElementById('dynamic-params').innerHTML = config.html;
      state.basePrice = config.basePrice;
      state.extraPrice = 0;

      document.querySelectorAll('#group-fabric .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('#group-fabric .btn-option').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          state.basePrice = parseInt(e.currentTarget.dataset.price);
          updatePricing();
        });
      });

      document.querySelectorAll('#group-extra .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('#group-extra .btn-option').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          state.extraPrice = parseInt(e.currentTarget.dataset.extra);
          updatePricing();
        });
      });

      updatePricing();
    }

    function buildModel() {
      while(atelierGroup.children.length > 0){ 
        const obj = atelierGroup.children[0];
        if (obj.geometry) obj.geometry.dispose();
        atelierGroup.remove(obj); 
      }

      const genderMult = (state.gender === 'child' ? 0.75 : (state.gender === 'female' ? 0.88 : 1.0));
      const fitMult = (state.fit === 'oversize' ? 1.12 : 1.0);

      const width = 1.2 * genderMult * fitMult;
      const height = 1.8 * genderMult; 

      atelierGroup.rotation.y = (state.view === 'back') ? Math.PI : 0;

      textureLoader.load(state.mannequinFile, (texture) => {
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        
        const manMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
        const manGeo = new THREE.PlaneGeometry(width, height);
        const mannequinMesh = new THREE.Mesh(manGeo, manMat);
        mannequinMesh.position.set(0, 0, 0);
        atelierGroup.add(mannequinMesh);
      });

      const currentPrintData = (state.view === 'front') ? state.frontPrint : state.backPrint;
      
      if (currentPrintData.texture) {
        printMaterial.map = currentPrintData.texture;
        printMaterial.opacity = 0.98;
      } else {
        printMaterial.opacity = 0;
      }
      printMaterial.needsUpdate = true;

      document.getElementById('scale-slider').value = currentPrintData.scale;
      document.getElementById('posY-slider').value = currentPrintData.posY;

      const baseChestY = (state.gender === 'child' ? 0.08 : (state.gender === 'female' ? 0.10 : 0.12));
      const printSize = currentPrintData.scale * genderMult;

      const printGeo = new THREE.PlaneGeometry(printSize, printSize);
      const printMesh = new THREE.Mesh(printGeo, printMaterial);
      
      const zOffset = (state.view === 'front') ? 0.01 : -0.01;
      printMesh.position.set(0, (baseChestY + currentPrintData.posY) * genderMult, zOffset);
      
      if (state.view === 'back') {
        printMesh.rotation.y = Math.PI;
      }

      atelierGroup.add(printMesh);
    }

    function updatePricing() {
      let extraTotal = state.extraPrice + state.techPrice;
      let total = state.basePrice + extraTotal;
      
      document.getElementById('price-fabric').innerText = state.basePrice.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-extra').innerText = '+' + extraTotal.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-total').innerText = total.toLocaleString('ru-RU') + ' ₽';
    }

    document.getElementById('apparel-type').addEventListener('change', (e) => {
      state.apparelType = e.target.value;
      renderDynamicParams();
      buildModel();
    });

    document.querySelectorAll('#group-gender .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-gender .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.gender = e.currentTarget.dataset.val;
        state.mannequinFile = e.currentTarget.dataset.file;
        updateSizeButtons();
        buildModel();
      });
    });

    document.querySelectorAll('#group-fit .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fit .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.fit = e.currentTarget.dataset.val;
        buildModel();
      });
    });

    document.querySelectorAll('#group-color .swatch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-color .swatch-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.color = e.currentTarget.dataset.color;
      });
    });

    document.querySelectorAll('#group-view .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-view .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.view = e.currentTarget.dataset.view;
        buildModel();
      });
    });

    document.querySelectorAll('#group-tech .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-tech .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.techPrice = parseInt(e.currentTarget.dataset.techPrice);
        updatePricing();
      });
    });

    document.getElementById('scale-slider').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      if (state.view === 'front') state.frontPrint.scale = val;
      else state.backPrint.scale = val;
      buildModel();
    });

    document.getElementById('posY-slider').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      if (state.view === 'front') state.frontPrint.posY = val;
      else state.backPrint.posY = val;
      buildModel();
    });

    document.getElementById('print-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('upload-label').innerText = '✓ ' + file.name.substring(0, 14) + '...';
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const texture = new THREE.Texture(img);
            texture.generateMipmaps = true;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.needsUpdate = true;
            
            if (state.view === 'front') state.frontPrint.texture = texture;
            else state.backPrint.texture = texture;

            buildModel();
          };
        };
        reader.readAsDataURL(file);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    updateSizeButtons();
    renderDynamicParams();
    buildModel();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
