<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ателье Уличной Одежды | Конструктор [v1.0.X]</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --panel-border: #221c08;
      
      --gold-primary: #d4af37; 
      --gold-light: #f5d77f;
      --gold-dark: #6e5812;
      --gold-glow: rgba(212, 175, 55, 0.3);
      
      --text: #ffffff;
      --text-muted: #8a806b;
      --text-dark: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .main-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ПАНЕЛЬ УПРАВЛЕНИЯ */
    .panel {
      width: 420px;
      height: 100%;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 10px 0 35px rgba(0,0,0,0.85);
    }

    #canvas-container {
      flex: 1;
      height: 100%;
      position: relative;
      background-image: url('astudio_bg.jpg');
      background-size: cover;
      background-position: center;
    }

    #canvas-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(5, 5, 5, 0.1) 0%, rgba(5, 5, 5, 0.8) 100%);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 2;
    }

    .panel-header {
      border-bottom: 2px solid var(--gold-dark);
      padding-bottom: 10px;
    }

    .panel-header h1 {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--gold-primary);
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--gold-glow);
    }

    .panel-header p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--gold-primary);
      margin-bottom: 6px;
      font-weight: 700;
    }

    /* ВЫПАДАЮЩИЙ СПИСОК ИЗДЕЛИЙ (Как выбор языка) */
    .apparel-selector {
      width: 100%;
      padding: 12px;
      background: #121212;
      border: 1px solid var(--gold-dark);
      border-radius: 4px;
      color: var(--gold-primary);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
      text-shadow: 0 0 4px rgba(212, 175, 55, 0.2);
    }

    .apparel-selector:hover {
      border-color: var(--gold-primary);
      color: var(--gold-light);
      text-shadow: 0 0 8px rgba(245, 215, 127, 0.5);
    }

    .apparel-selector option {
      background: #0d0d0d;
      color: var(--gold-primary);
      padding: 10px;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 8px;
    }

    /* СТИЛЬ КНОПОК: ВСЕГДА ЧЕРНЫЙ ФОН И ЗОЛОТОЙ ТЕКСТ */
    .btn-option {
      background-color: #121212 !important;
      border: 1px solid var(--gold-dark);
      color: var(--gold-primary);
      padding: 9px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 2px rgba(212, 175, 55, 0.2);
    }

    .btn-option:hover {
      border-color: var(--gold-primary);
      color: var(--gold-light);
      text-shadow: 0 0 8px rgba(245, 215, 127, 0.6);
    }

    /* АКТИВНОЕ СОСТОЯНИЕ: УВЕЛИЧЕННАЯ ИНТЕНСИВНОСТЬ СВЕЧЕНИЯ */
    .btn-option.active {
      background-color: #121212 !important;
      border-color: var(--gold-light) !important;
      color: #ffffff !important;
      font-weight: 900 !important;
      text-shadow: 0 0 6px #f5d77f, 0 0 12px #d4af37, 0 0 18px #d4af37 !important;
      box-shadow: 0 0 12px var(--gold-glow), inset 0 0 6px var(--gold-glow) !important;
    }

    .color-swatches {
      display: flex;
      gap: 8px;
    }

    .swatch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px;
      border-radius: 4px;
      border: 1px solid var(--gold-dark);
      background-color: #121212;
      color: var(--gold-primary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      transition: all 0.25s;
      text-shadow: 0 0 2px rgba(212, 175, 55, 0.2);
    }

    .swatch-btn:hover {
      border-color: var(--gold-primary);
      color: var(--gold-light);
      text-shadow: 0 0 8px rgba(245, 215, 127, 0.6);
    }

    .swatch-btn.active {
      border-color: var(--gold-light) !important;
      color: #ffffff !important;
      font-weight: 900 !important;
      text-shadow: 0 0 6px #f5d77f, 0 0 12px #d4af37 !important;
      box-shadow: 0 0 12px var(--gold-glow), inset 0 0 6px var(--gold-glow) !important;
    }

    .swatch-circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid var(--gold-primary);
    }
    .swatch-circle.white { background-color: #ffffff; }
    .swatch-circle.black { background-color: #111111; }

    .file-upload {
      position: relative;
      border: 1px dashed var(--gold-primary);
      border-radius: 4px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: rgba(212, 175, 55, 0.02);
    }

    .file-upload input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload span {
      font-size: 11px;
      color: var(--gold-primary);
      font-weight: 700;
      text-transform: uppercase;
    }

    .print-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #080808;
      border: 1px solid var(--gold-dark);
      padding: 10px;
      border-radius: 4px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--gold-primary);
      font-weight: 700;
    }

    .control-row input[type="range"] {
      width: 60%;
      accent-color: var(--gold-primary);
      cursor: pointer;
    }

    .summary-card {
      margin-top: auto;
      background: #080808;
      border: 1px solid var(--gold-dark);
      border-radius: 6px;
      padding: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .summary-row.total {
      font-size: 15px;
      font-weight: 900;
      color: var(--gold-primary);
      border-top: 1px solid var(--gold-dark);
      padding-top: 6px;
      margin-bottom: 0;
      text-shadow: 0 0 6px rgba(212, 175, 55, 0.4);
    }

    .badge {
      font-size: 8px;
      background: rgba(212, 175, 55, 0.2);
      color: var(--gold-light);
      padding: 2px 4px;
      border-radius: 3px;
      margin-left: 3px;
    }

    .btn-submit {
      width: 100%;
      background: #121212;
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      text-shadow: 0 0 4px rgba(212, 175, 55, 0.3);
    }

    .btn-submit:hover {
      border-color: var(--gold-light);
      color: #ffffff;
      text-shadow: 0 0 8px #f5d77f, 0 0 14px #d4af37;
      box-shadow: 0 0 14px var(--gold-glow);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div class="main-wrapper">
    <div class="panel">
      <div class="panel-header">
        <h1>Ателье Уличной Одежды</h1>
        <p>Конструктор и примерка изделий</p>
      </div>

      <!-- ВЫБОРОЧНЫЙ СПИСОК ИЗДЕЛИЯ (DROPDOWN) -->
      <div class="group">
        <div class="section-title">Выбор Изделия</div>
        <select class="apparel-selector" id="apparel-type">
          <option value="tshirt">👕 Футболка</option>
          <option value="hoodie">🧥 Худи с капюшоном</option>
          <option value="sweatshirt">👔 Свитшот</option>
        </select>
      </div>

      <!-- Манекен -->
      <div class="group">
        <div class="section-title">Тип Манекена</div>
        <div class="btn-group" id="group-gender">
          <button class="btn-option active" data-file="man.png" data-val="male">Мужской</button>
          <button class="btn-option" data-file="wom.png" data-val="female">Женский</button>
          <button class="btn-option" data-file="Chil.png" data-val="child">Детский</button>
        </div>
      </div>

      <!-- Посадка -->
      <div class="group">
        <div class="section-title">Силуэт</div>
        <div class="btn-group" id="group-fit">
          <button class="btn-option active" data-val="standard">Стандарт</button>
          <button class="btn-option" data-val="oversize">Оверсайз</button>
        </div>
      </div>

      <!-- ДИНАМИЧЕСКИЕ ПАРАМЕТРЫ (Меняются при выборе типа изделия) -->
      <div id="dynamic-params"></div>

      <!-- Цвет -->
      <div class="group">
        <div class="section-title">Цвет Изделия</div>
        <div class="color-swatches" id="group-color">
          <button class="swatch-btn active" data-color="white">
            <span class="swatch-circle white"></span> Белый
          </button>
          <button class="swatch-btn" data-color="black">
            <span class="swatch-circle black"></span> Черный
          </button>
        </div>
      </div>

      <!-- Принт -->
      <div class="group">
        <div class="section-title">Ваш Принт</div>
        <div class="file-upload">
          <input type="file" id="print-input" accept="image/*">
          <span id="upload-label">📁 Загрузить файл (PNG)</span>
        </div>

        <div class="print-controls" id="print-controls">
          <div class="control-row">
            <span>Размер лого:</span>
            <input type="range" id="scale-slider" min="0.1" max="0.6" step="0.02" value="0.32">
          </div>
          <div class="control-row">
            <span>Высота на груди:</span>
            <input type="range" id="posY-slider" min="-0.2" max="0.4" step="0.02" value="0.12">
          </div>
        </div>
      </div>

      <!-- Смета -->
      <div class="summary-card">
        <div class="summary-row">
          <span>Изделие и Ткань:</span>
          <span id="price-fabric">1 200 ₽</span>
        </div>
        <div class="summary-row">
          <span>Модификация кроя:</span>
          <span id="price-extra">+0 ₽</span>
        </div>
        <div class="summary-row total">
          <span>Итого:</span>
          <span id="price-total">1 200 ₽</span>
        </div>
      </div>

      <button class="btn-submit" onclick="alert('Заказ успешно сформирован!')">Оформить Заказ</button>
    </div>

    <div id="canvas-container"></div>
  </div>

  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const state = {
      apparelType: 'tshirt',
      mannequinFile: 'man.png',
      gender: 'male',
      fit: 'standard',
      color: 'white',
      basePrice: 1200,
      extraPrice: 0,
      
      printScale: 0.32,
      printOffsetY: 0.12,
      hasPrint: false
    };

    const textureLoader = new THREE.TextureLoader();
    const atelierGroup = new THREE.Group();
    scene.add(atelierGroup);

    // Прозрачный материал принта по умолчанию
    const printMaterial = new THREE.MeshBasicMaterial({ 
      transparent: true, 
      opacity: 0, 
      alphaTest: 0.02,
      depthWrite: false
    });

    // Уникальные параметры под каждое изделие
    const apparelConfigs = {
      tshirt: {
        basePrice: 1200,
        html: `
          <div class="group">
            <div class="section-title">Состав Ткани</div>
            <div class="btn-group" id="group-fabric">
              <button class="btn-option active" data-price="1200">Хлопок 100%</button>
              <button class="btn-option" data-price="1400">Стрейч</button>
            </div>
          </div>
          <div class="group">
            <div class="section-title">Вырез Горловины</div>
            <div class="btn-group" id="group-extra">
              <button class="btn-option active" data-extra="0">Круглый</button>
              <button class="btn-option" data-extra="200">V-Вырез <span class="badge">+200₽</span></button>
            </div>
          </div>
        `
      },
      hoodie: {
        basePrice: 3200,
        html: `
          <div class="group">
            <div class="section-title">Утепление</div>
            <div class="btn-group" id="group-fabric">
              <button class="btn-option active" data-price="3200">Без начеса</button>
              <button class="btn-option" data-price="3600">С начесом <span class="badge">+400₽</span></button>
            </div>
          </div>
          <div class="group">
            <div class="section-title">Тип Капюшона</div>
            <div class="btn-group" id="group-extra">
              <button class="btn-option active" data-extra="0">Стандарт</button>
              <button class="btn-option" data-extra="300">Двойной Оверсайз <span class="badge">+300₽</span></button>
            </div>
          </div>
        `
      },
      sweatshirt: {
        basePrice: 2500,
        html: `
          <div class="group">
            <div class="section-title">Плотность Ткани</div>
            <div class="btn-group" id="group-fabric">
              <button class="btn-option active" data-price="2500">320 г/м²</button>
              <button class="btn-option" data-price="2900">400 г/м² (Плотный)</button>
            </div>
          </div>
          <div class="group">
            <div class="section-title">Крой Рукава</div>
            <div class="btn-group" id="group-extra">
              <button class="btn-option active" data-extra="0">Втачной</button>
              <button class="btn-option" data-extra="250">Реглан <span class="badge">+250₽</span></button>
            </div>
          </div>
        `
      }
    };

    function renderDynamicParams() {
      const config = apparelConfigs[state.apparelType];
      document.getElementById('dynamic-params').innerHTML = config.html;
      state.basePrice = config.basePrice;
      state.extraPrice = 0;

      document.querySelectorAll('#group-fabric .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('#group-fabric .btn-option').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          state.basePrice = parseInt(e.currentTarget.dataset.price);
          updatePricing();
        });
      });

      document.querySelectorAll('#group-extra .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('#group-extra .btn-option').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          state.extraPrice = parseInt(e.currentTarget.dataset.extra);
          updatePricing();
        });
      });

      updatePricing();
    }

    function buildModel() {
      while(atelierGroup.children.length > 0){ 
        const obj = atelierGroup.children[0];
        if (obj.geometry) obj.geometry.dispose();
        atelierGroup.remove(obj); 
      }

      const genderMult = (state.gender === 'child' ? 0.75 : (state.gender === 'female' ? 0.88 : 1.0));
      const fitMult = (state.fit === 'oversize' ? 1.12 : 1.0);

      const width = 1.2 * genderMult * fitMult;
      const height = 1.8 * genderMult; 

      textureLoader.load(state.mannequinFile, (texture) => {
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        
        const manMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
        const manGeo = new THREE.PlaneGeometry(width, height);
        const mannequinMesh = new THREE.Mesh(manGeo, manMat);
        mannequinMesh.position.set(0, 0, 0);
        atelierGroup.add(mannequinMesh);
      });

      const baseChestY = (state.gender === 'child' ? 0.08 : (state.gender === 'female' ? 0.10 : 0.12));
      const printSize = state.printScale * genderMult;

      const printGeo = new THREE.PlaneGeometry(printSize, printSize);
      const printMesh = new THREE.Mesh(printGeo, printMaterial);
      printMesh.position.set(0, (baseChestY + state.printOffsetY) * genderMult, 0.01);
      atelierGroup.add(printMesh);
    }

    function updatePricing() {
      let total = state.basePrice + state.extraPrice;
      document.getElementById('price-fabric').innerText = state.basePrice.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-extra').innerText = '+' + state.extraPrice.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-total').innerText = total.toLocaleString('ru-RU') + ' ₽';
    }

    // События
    document.getElementById('apparel-type').addEventListener('change', (e) => {
      state.apparelType = e.target.value;
      renderDynamicParams();
      buildModel();
    });

    document.querySelectorAll('#group-gender .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-gender .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.gender = e.currentTarget.dataset.val;
        state.mannequinFile = e.currentTarget.dataset.file;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fit .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fit .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.fit = e.currentTarget.dataset.val;
        buildModel();
      });
    });

    document.querySelectorAll('#group-color .swatch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-color .swatch-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.color = e.currentTarget.dataset.color;
      });
    });

    document.getElementById('scale-slider').addEventListener('input', (e) => {
      state.printScale = parseFloat(e.target.value);
      buildModel();
    });

    document.getElementById('posY-slider').addEventListener('input', (e) => {
      state.printOffsetY = parseFloat(e.target.value);
      buildModel();
    });

    document.getElementById('print-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('upload-label').innerText = '✓ ' + file.name.substring(0, 14) + '...';
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const texture = new THREE.Texture(img);
            texture.generateMipmaps = true;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.needsUpdate = true;
            
            printMaterial.map = texture;
            printMaterial.opacity = 0.98;
            printMaterial.needsUpdate = true;
            state.hasPrint = true;
          };
        };
        reader.readAsDataURL(file);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Инициализация
    renderDynamicParams();
    buildModel();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
