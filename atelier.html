<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Studio | 3D-Ателье001</title>
    <!-- Подключаем библиотеку Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --dark-bg: #0d0d0d;
            --card-bg: #141414;
            --neon-green: #00ff66;
            --gold: #ffb700;
            --gray-text: #888888;
            --light-border: #222222;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--light-border);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--neon-green);
        }

        h1 span {
            color: #fff;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        @media(min-width: 768px) {
            .main-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 3D-ОКНО НАСТРОЙКИ */
        .preview-box {
            background-color: var(--card-bg);
            border: 1px solid var(--light-border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            height: 400px;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* КЛИЕНТСКИЙ ИНТЕРФЕЙС / НАСТРОЙКИ РАЗМЕРОВ */
        .controls-box {
            background-color: var(--card-bg);
            border: 1px solid var(--light-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-text);
            border-left: 3px solid var(--neon-green);
            padding-left: 8px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--gray-text);
            margin-bottom: 5px;
        }

        select, input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 10px;
            background-color: #0d0d0d;
            border: 1px solid var(--light-border);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--neon-green);
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--neon-green);
        }

        .val-display {
            font-size: 0.9rem;
            min-width: 45px;
            text-align: right;
            font-weight: bold;
        }

        .btn {
            background-color: var(--neon-green);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
            transform: translateY(-1px);
        }

        /* ТАБЛИЦА С ИНФОРМАЦИЕЙ О ПРИНТАХ */
        .prints-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .print-btn {
            background: #0d0d0d;
            border: 1px solid var(--light-border);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            text-align: center;
        }

        .print-btn.active {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ ПОДРЯДЧИКА (ЗАВОДА) */
        .factory-panel {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px 15px;
            border-top: 2px dashed var(--light-border);
        }

        .orders-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        @media(min-width: 768px) {
            .orders-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .order-card {
            background-color: var(--card-bg);
            border: 1px solid var(--light-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--light-border);
            padding-bottom: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .status-pending { background-color: rgba(255, 183, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        .status-processing { background-color: rgba(0, 153, 255, 0.1); color: #0099ff; border: 1px solid #0099ff; }
        .status-shipped { background-color: rgba(0, 255, 102, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }

        .order-specs {
            font-size: 0.8rem;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 15px;
        }

        .order-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mini-btn {
            background: transparent;
            border: 1px solid var(--light-border);
            color: #fff;
            padding: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
        }

        .mini-btn:hover {
            border-color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>GY-GY <span>Studio // 3D-Ателье</span></h1>
    </header>

    <div class="main-container">
        <!-- Левая колонка: 3D-Окно -->
        <div class="preview-box">
            <div id="canvas-container"></div>
        </div>

        <!-- Правая колонка: Форма Настроек заказа -->
        <div class="controls-box">
            <div>
                <div class="section-title">Конфигуратор лекал</div>
                
                <div class="control-group">
                    <label>Базовый манекен</label>
                    <select id="gender-select" onchange="changeGender()">
                        <option value="male">Мужской силуэт</option>
                        <option value="female">Женский силуэт</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Рост (Высота манекена)</label>
                    <div class="slider-row">
                        <input type="range" id="height-slider" min="150" max="210" value="180" oninput="updateMannequinScale()">
                        <div class="val-display" id="height-val">180 см</div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Ширина плеч</label>
                    <div class="slider-row">
                        <input type="range" id="width-slider" min="40" max="65" value="50" oninput="updateMannequinScale()">
                        <div class="val-display" id="width-val">50 см</div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Объем торса</label>
                    <div class="slider-row">
                        <input type="range" id="depth-slider" min="30" max="60" value="45" oninput="updateMannequinScale()">
                        <div class="val-display" id="depth-val">45 см</div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Фирменный принт</label>
                    <div class="prints-grid">
                        <div class="print-btn active" onclick="selectPrint(this, 'Без принта')">Без принта</div>
                        <div class="print-btn" onclick="selectPrint(this, 'Лого GY-GY')">Лого GY-GY</div>
                        <div class="print-btn" onclick="selectPrint(this, 'Cyber Neon')">Cyber Neon</div>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 25px;">Данные получателя</div>
                <div class="control-group">
                    <input type="text" id="customer-name" placeholder="ФИО резидента Клуба" style="margin-bottom: 10px;">
                    <input type="tel" id="customer-phone" placeholder="Телефон" style="margin-bottom: 10px;">
                    <input type="text" id="customer-address" placeholder="Адрес доставки">
                </div>
            </div>

            <button class="btn" onclick="placeOrder()" style="margin-top: 15px;">Отправить в Сейф Клуба (Заказать)</button>
        </div>
    </div>

    <!-- Раздел для Подрядчика (Завода) -->
    <div class="factory-panel">
        <div class="section-title">Панель завода-изготовителя (Contractor)</div>
        <div class="orders-grid" id="factory-orders-list">
            <!-- Сюда будут рендериться карточки заказов -->
        </div>
    </div>

    <script>
        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ THREE.JS ---
        let scene, camera, renderer, mannequin, baseMaterial;
        let selectedPrintName = "Без принта";

        // Старт сцены при загрузке страницы
        init3D();
        renderFactoryOrders();

        // --- ИНИЦИАЛИЗАЦИЯ 3D-СЦЕНЫ ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            
            // Создаем сцену
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x141414);

            // Камера
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 1.5, 4);

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0x00ff66, 0.8);
            dirLight1.position.set(2, 4, 3);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffb700, 0.6);
            dirLight2.position.set(-2, 2, -3);
            scene.add(dirLight2);

            // Материал манекена
            baseMaterial = new THREE.MeshStandardMaterial({
                color: 0x222222,
                roughness: 0.3,
                metalness: 0.1,
                flatShading: false
            });

            // Строим манекен по умолчанию
            createMannequinModel('male');

            // Настраиваем вращение и запускаем цикл анимации
            setupControls(container);
            animate();

            // Автоподстройка размера при изменении экрана
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        // --- ГЕНЕРАЦИЯ ГЕОМЕТРИИ МАНЕКЕНА ---
        function createMannequinModel(gender) {
            if (mannequin) scene.remove(mannequin);

            mannequin = new THREE.Group();

            // Создаем стилизованные геометрические части тела
            const headGeo = new THREE.SphereGeometry(0.2, 32, 32);
            const head = new THREE.Mesh(headGeo, baseMaterial);
            head.position.y = 1.9;
            mannequin.add(head);

            const neckGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.2, 16);
            const neck = new THREE.Mesh(neckGeo, baseMaterial);
            neck.position.y = 1.7;
            mannequin.add(neck);

            // Разделение силуэтов
            let torsoGeo;
            if (gender === 'male') {
                torsoGeo = new THREE.CylinderGeometry(0.35, 0.22, 0.8, 32);
            } else {
                torsoGeo = new THREE.CylinderGeometry(0.28, 0.18, 0.75, 32);
                // Делаем талию и бедра
                const hipsGeo = new THREE.CylinderGeometry(0.18, 0.32, 0.3, 32);
                const hips = new THREE.Mesh(hipsGeo, baseMaterial);
                hips.position.y = 1.05;
                mannequin.add(hips);
            }
            const torso = new THREE.Mesh(torsoGeo, baseMaterial);
            torso.position.y = 1.4;
            mannequin.add(torso);

            // Стойка-ножка для ателье
            const standGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.8, 16);
            const stand = new THREE.Mesh(standGeo, new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.9 }));
            stand.position.y = 0.4;
            mannequin.add(stand);

            const baseGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.05, 32);
            const base = new THREE.Mesh(baseGeo, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 }));
            base.position.y = 0.025;
            mannequin.add(base);

            // Размещаем манекен в центре сцены
            scene.add(mannequin);
            updateMannequinScale(); // сразу применяем текущие размеры из слайдеров
        }

        // --- ИЗМЕНЕНИЕ ПОЛА ---
        function changeGender() {
            const gender = document.getElementById('gender-select').value;
            createMannequinModel(gender);
        }

        // --- МАСШТАБИРОВАНИЕ НА ОСНОВЕ СЛАЙДЕРОВ ---
        function updateMannequinScale() {
            if (!mannequin) return;

            const heightVal = parseFloat(document.getElementById('height-slider').value);
            const widthVal = parseFloat(document.getElementById('width-slider').value);
            const depthVal = parseFloat(document.getElementById('depth-slider').value);

            // Обновляем текстовое отображение параметров в меню
            document.getElementById('height-val').textContent = heightVal + ' см';
            document.getElementById('width-val').textContent = widthVal + ' см';
            document.getElementById('depth-val').textContent = depthVal + ' см';

            // Применяем коэффициенты масштабирования к 3D-модели
            const scaleY = heightVal / 180;
            const scaleX = widthVal / 50;
            const scaleZ = depthVal / 45;

            // Масштабируем всю группу
            mannequin.scale.set(scaleX, scaleY, scaleZ);
        }

        // --- ВЫБОР ПРИНТА ---
        function selectPrint(btn, printName) {
            document.querySelectorAll('.print-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedPrintName = printName;

            // В демо-режиме меняем подсветку манекена в зависимости от выбранного принта
            if (printName === 'Cyber Neon') {
                baseMaterial.color.setHex(0x00ff66);
                baseMaterial.emissive.setHex(0x003311);
            } else if (printName === 'Лого GY-GY') {
                baseMaterial.color.setHex(0xffb700);
                baseMaterial.emissive.setHex(0x332200);
            } else {
                baseMaterial.color.setHex(0x222222);
                baseMaterial.emissive.setHex(0x000000);
            }
        }

        // --- ОФОРМЛЕНИЕ ЗАКАЗА (ОТПРАВИТЬ В СЕЙФ КЛУБА) ---
        function placeOrder() {
            const name = document.getElementById('customer-name').value.trim();
            const phone = document.getElementById('customer-phone').value.trim();
            const address = document.getElementById('customer-address').value.trim();

            if (!name || !phone || !address) {
                alert("⚠️ Заполните все поля доставки: ФИО резидента, телефон и адрес!");
                return;
            }

            const gender = document.getElementById('gender-select').value;
            const height = document.getElementById('height-slider').value;
            const width = document.getElementById('width-slider').value;
            const depth = document.getElementById('depth-slider').value;

            // Генерируем стоимость по выдуманной формуле
            const calculatedPrice = Math.round(150 + (height * 0.1) + (width * 0.5));

            const newOrder = {
                id: Math.floor(100000 + Math.random() * 900000),
                customer: name,
                phone: phone,
                address: address,
                gender: gender === 'male' ? 'Мужская' : 'Женская',
                specs: { height, width, depth },
                print: selectedPrintName,
                price: calculatedPrice,
                status: 'pending' // Изначально 'В сейфе (Ожидание)'
            };

            const orders = JSON.parse(localStorage.getItem('gygy_studio_orders')) || [];
            orders.push(newOrder);
            localStorage.setItem('gygy_studio_orders', JSON.stringify(orders));

            alert(`🎉 Заказ #${newOrder.id} оформлен успешно!\nСумма ${calculatedPrice} GY-Coins заблокирована в Сейфе Клуба GY-GY до момента отправки готового изделия подрядчиком.`);
            
            // Сбрасываем поля получателя
            document.getElementById('customer-name').value = '';
            document.getElementById('customer-phone').value = '';
            document.getElementById('customer-address').value = '';

            renderFactoryOrders();
        }

        // --- ПАНЕЛЬ ПОДРЯДЧИКА: ОТОБРАЖЕНИЕ И УПРАВЛЕНИЕ ЗАКАЗАМИ ---
        function renderFactoryOrders() {
            const listContainer = document.getElementById('factory-orders-list');
            const orders = JSON.parse(localStorage.getItem('gygy_studio_orders')) || [];

            if (orders.length === 0) {
                listContainer.innerHTML = `<p style="font-size: 0.85rem; color: #666; text-align: center;">Пока нет активных заказов.</p>`;
                return;
            }

            listContainer.innerHTML = '';
            orders.forEach((order, index) => {
                const card = document.createElement('div');
                card.className = `order-card ${order.status}`;
                
                let statusLabel = 'В Сейфе (Ожидание)';
                let actionBtnHTML = `<button class="mini-btn" onclick="updateOrderStatus(${index}, 'processing')">В пошив</button>`;
                
                if (order.status === 'processing') {
                    statusLabel = 'В пошиве';
                    actionBtnHTML = `<button class="mini-btn" style="border-color: var(--neon-green); color: var(--neon-green)" onclick="updateOrderStatus(${index}, 'shipped')">Отправить</button>`;
                } else if (order.status === 'shipped') {
                    statusLabel = 'Отправлено';
                    actionBtnHTML = `<span style="font-size: 0.75rem; color: var(--neon-green);">Доставка...</span>`;
                }

                card.innerHTML = `
                    <div class="order-card-header">
                        <span>ЗАКАЗ #${order.id}</span>
                        <span class="status-badge status-${order.status}">${statusLabel}</span>
                    </div>
                    <div class="order-specs">
                        <strong>Получатель:</strong> ${order.customer} (${order.phone})<br>
                        <strong>Куда:</strong> ${order.address}<br>
                        <strong>База:</strong> ${order.gender} (Р: ${order.specs.height}см, П: ${order.specs.width}см, Т: ${order.specs.depth}см)<br>
                        <strong>Принт:</strong> ${order.print}<br>
                        <strong style="color: var(--gold)">Стоимость:</strong> ${order.price} GY-Coins
                    </div>
                    <div class="order-buttons">
                        ${actionBtnHTML}
                        <button class="mini-btn" style="border-color: #ff3333; color: #ff3333;" onclick="deleteOrder(${index})">Отмена</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function updateOrderStatus(index, newStatus) {
            let orders = JSON.parse(localStorage.getItem('gygy_studio_orders')) || [];
            orders[index].status = newStatus;
            
            if (newStatus === 'shipped') {
                alert(`📦 Заказ #${orders[index].id} передан в службу доставки!\n\nДеньги из Сейфа Клуба GY-GY разблокированы и автоматически начислены на баланс Подрядчика (за вычетом 10% комиссии Клуба).`);
            } else {
                alert(`✂️ Заказ #${orders[index].id} принят в работу. Швеи приступили к раскрою лекал!`);
            }

            localStorage.setItem('gygy_studio_orders', JSON.stringify(orders));
            renderFactoryOrders();
        }

        function deleteOrder(index) {
            if (confirm("Вы уверены, что хотите отменить и удалить этот заказ? Деньги вернутся на счет резидента.")) {
                let orders = JSON.parse(localStorage.getItem('gygy_studio_orders')) || [];
                orders.splice(index, 1);
                localStorage.setItem('gygy_studio_orders', JSON.stringify(orders));
                renderFactoryOrders();
            }
        }

        // --- УПРАВЛЕНИЕ КАМЕРОЙ (Вращение) ---
        let isDragging = false;
        let prevMousePos = { x: 0, y: 0 };

        function setupControls(element) {
            element.addEventListener('mousedown', () => isDragging = true);
            element.addEventListener('mousemove', (e) => {
                const delta = { x: e.offsetX - prevMousePos.x, y: e.offsetY - prevMousePos.y };
                if (isDragging && mannequin) {
                    mannequin.rotation.y += delta.x * 0.007;
                    mannequin.rotation.x += delta.y * 0.005;
                }
                prevMousePos = { x: e.offsetX, y: e.offsetY };
            });
            window.addEventListener('mouseup', () => isDragging = false);

            // Тач-события
            element.addEventListener('touchstart', (e) => {
                isDragging = true;
                prevMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });
            element.addEventListener('touchmove', (e) => {
                if (!isDragging || !mannequin) return;
                const delta = { x: e.touches[0].clientX - prevMousePos.x, y: e.touches[0].clientY - prevMousePos.y };
                mannequin.rotation.y += delta.x * 0.008;
                mannequin.rotation.x += delta.y * 0.006;
                prevMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });
            window.addEventListener('touchend', () => isDragging = false);
        }

        // --- РЕНДЕР ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging && mannequin) {
                mannequin.rotation.y += 0.0015;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
