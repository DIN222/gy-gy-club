<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ателье Уличной Одежды | Золотой Стандарт008</title>
  <style>
    :root {
      /* Темная база */
      --bg: #050505;
      --panel: #0d0d0d;
      --panel-border: #221c08;
      
      /* Благородное золото */
      --gold-primary: #d4af37; 
      --gold-light: #f5d77f;
      --gold-dark: #6e5812;
      --gold-glow: rgba(212, 175, 55, 0.2);
      
      /* Текст */
      --text: #ffffff;
      --text-muted: #8a806b;
      --text-dark: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .main-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ПАНЕЛЬ ПАРАМЕТРОВ (Слева) */
    .panel {
      width: 420px;
      height: 100%;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 10px 0 35px rgba(0,0,0,0.85);
    }

    /* ФОН ПРИМЕРОЧНОЙ (Справа) */
    #canvas-container {
      flex: 1;
      height: 100%;
      position: relative;
      background-image: url('astudio_bg.jpg');
      background-size: cover;
      background-position: center;
    }

    /* Затемнение фона */
    #canvas-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(5, 5, 5, 0.1) 0%, rgba(5, 5, 5, 0.8) 100%);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 2;
    }

    /* ЗАГОЛОВОК */
    .panel-header {
      border-bottom: 2px solid var(--gold-dark);
      padding-bottom: 12px;
    }

    .panel-header h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1.2px;
      color: var(--gold-primary);
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--gold-glow);
      line-height: 1.2;
    }

    .panel-header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--gold-primary);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
      gap: 8px;
    }

    /* КНОПКИ ПАРАМЕТРОВ: Строгий черный фон с золотым контуром (БЕЗ ЖЕЛТОЙ ЗАЛИВКИ) */
    .btn-option {
      background-color: #121212 !important;
      border: 1px solid var(--gold-dark) !important;
      color: var(--gold-primary) !important;
      padding: 10px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-option:hover {
      border-color: var(--gold-primary) !important;
      color: var(--gold-light) !important;
      background-color: #1a1a1a !important;
    }

    /* АКТИВНАЯ КНОПКА (Сияющее золото с черным текстом) */
    .btn-option.active {
      background: linear-gradient(135deg, #d4af37 0%, #f5d77f 100%) !important;
      border-color: #f5d77f !important;
      color: #000000 !important;
      font-weight: 900;
      box-shadow: 0 0 12px var(--gold-glow);
    }

    /* КНОПКА В РАЗРАБОТКЕ */
    .btn-option.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-style: dashed !important;
      pointer-events: none;
    }

    .color-swatches {
      display: flex;
      gap: 8px;
    }

    .swatch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid var(--gold-dark);
      background-color: #121212;
      color: var(--gold-primary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .swatch-btn.active {
      border-color: var(--gold-light);
      background-color: rgba(212, 175, 55, 0.15);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    .swatch-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--gold-primary);
    }

    .swatch-circle.white { background-color: #ffffff; }
    .swatch-circle.black { background-color: #111111; }

    .file-upload {
      position: relative;
      border: 1px dashed var(--gold-primary);
      border-radius: 4px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(212, 175, 55, 0.02);
    }

    .file-upload:hover { 
      border-color: var(--gold-light);
      background: rgba(212, 175, 55, 0.06);
    }

    .file-upload input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload span {
      font-size: 11px;
      color: var(--gold-primary);
      display: block;
      font-weight: 700;
      text-transform: uppercase;
    }

    .summary-card {
      margin-top: auto;
      background: #080808;
      border: 1px solid var(--gold-dark);
      border-radius: 6px;
      padding: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .summary-row.total {
      font-size: 16px;
      font-weight: 900;
      color: var(--gold-primary);
      border-top: 1px solid var(--gold-dark);
      padding-top: 8px;
      margin-bottom: 0;
    }

    .badge {
      font-size: 8px;
      background: rgba(212, 175, 55, 0.2);
      color: var(--gold-light);
      padding: 2px 4px;
      border-radius: 3px;
      margin-left: 3px;
      border: 1px solid var(--gold-dark);
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-light) 100%);
      color: var(--text-dark);
      border: none;
      padding: 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px var(--gold-glow);
    }

    .btn-submit:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div class="main-wrapper">
    <!-- ПАНЕЛЬ ПАРАМЕТРОВ -->
    <div class="panel">
      <div class="panel-header">
        <h1>Ателье Уличной Одежды</h1>
        <p>3D-Конструктор и примерка изделий</p>
      </div>

      <!-- Тип Изделия -->
      <div class="group">
        <div class="section-title">Тип Изделия</div>
        <div class="btn-group" id="group-apparel">
          <button class="btn-option active">Футболка</button>
          <button class="btn-option disabled">Худи <span class="badge">В разработке</span></button>
        </div>
      </div>

      <!-- Манекен -->
      <div class="group">
        <div class="section-title">Тип Манекена</div>
        <div class="btn-group" id="group-gender">
          <button class="btn-option active" data-file="man.png" data-val="male">Мужской</button>
          <button class="btn-option" data-file="wom.png" data-val="female">Женский</button>
          <button class="btn-option" data-file="Chil.png" data-val="child">Детский</button>
        </div>
      </div>

      <!-- Посадка -->
      <div class="group">
        <div class="section-title">Силуэт Модели</div>
        <div class="btn-group" id="group-fit">
          <button class="btn-option active" data-val="standard">Стандарт</button>
          <button class="btn-option" data-val="oversize">Оверсайз</button>
        </div>
      </div>

      <!-- Ткань -->
      <div class="group">
        <div class="section-title">Состав Ткани</div>
        <div class="btn-group" id="group-fabric">
          <button class="btn-option active" data-val="cotton" data-price="1200">Хлопок 100%</button>
          <button class="btn-option" data-val="stretch" data-price="1400">Стрейч</button>
        </div>
      </div>

      <!-- Горловина -->
      <div class="group">
        <div class="section-title">Вырез Горловины</div>
        <div class="btn-group" id="group-neck">
          <button class="btn-option active" data-val="round" data-extra="0">Круглый</button>
          <button class="btn-option" data-val="vneck" data-extra="0.15">V-Вырез <span class="badge">+15%</span></button>
        </div>
      </div>

      <!-- Цвет -->
      <div class="group">
        <div class="section-title">Цвет Изделия</div>
        <div class="color-swatches">
          <button class="swatch-btn active" data-color="white">
            <span class="swatch-circle white"></span> Белый
          </button>
          <button class="swatch-btn" data-color="black">
            <span class="swatch-circle black"></span> Черный
          </button>
        </div>
      </div>

      <!-- Принт -->
      <div class="group">
        <div class="section-title">Ваш Принт / Аватар</div>
        <div class="file-upload">
          <input type="file" id="print-input" accept="image/*">
          <span id="upload-label">📁 Загрузить файл (PNG)</span>
        </div>
      </div>

      <!-- Смета -->
      <div class="summary-card">
        <div class="summary-row">
          <span>Базовое изделие:</span>
          <span id="price-fabric">1 200 ₽</span>
        </div>
        <div class="summary-row">
          <span>Модификация кроя:</span>
          <span id="price-neck">+0 ₽</span>
        </div>
        <div class="summary-row total">
          <span>Итого:</span>
          <span id="price-total">1 200 ₽</span>
        </div>
      </div>

      <button class="btn-submit" onclick="alert('Заказ успешно сформирован!')">Оформить Заказ</button>
    </div>

    <!-- МАНЕКЕН СПРАВА -->
    <div id="canvas-container"></div>
  </div>

  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const state = {
      mannequinFile: 'man.png',
      gender: 'male',
      fit: 'standard',
      color: 'white',
      fabric: 'cotton',
      neck: 'round',
      basePrice: 1200,
      neckModifier: 0
    };

    const textureLoader = new THREE.TextureLoader();
    const atelierGroup = new THREE.Group();
    scene.add(atelierGroup);

    // Материал принта (без рваных граней)
    const printMaterial = new THREE.MeshBasicMaterial({ 
      transparent: true, 
      opacity: 0.98,
      alphaTest: 0.15,
      depthWrite: false
    });

    function buildModel() {
      // Полная очистка группы от старых объектов
      while(atelierGroup.children.length > 0){ 
        const obj = atelierGroup.children[0];
        if (obj.geometry) obj.geometry.dispose();
        atelierGroup.remove(obj); 
      }

      // Базовые коэффициенты
      const genderMult = (state.gender === 'child' ? 0.75 : (state.gender === 'female' ? 0.88 : 1.0));
      const fitMult = (state.fit === 'oversize' ? 1.12 : 1.0);

      // Высота жестко уменьшена на 10% (1.8 вместо 2.0)
      const width = 1.2 * genderMult * fitMult;
      const height = 1.8 * genderMult; 

      // Отображаем ТОЛЬКО ЧИСТЫЙ МАНЕКЕН (никаких 3D-цилиндров/простыней)
      textureLoader.load(state.mannequinFile, (texture) => {
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        
        const manMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
        const manGeo = new THREE.PlaneGeometry(width, height);
        const mannequinMesh = new THREE.Mesh(manGeo, manMat);
        mannequinMesh.position.set(0, 0, 0);
        atelierGroup.add(mannequinMesh);
      });

      // Нанесение слоя принта прямо на манекен
      const printSize = 0.38 * genderMult * fitMult;
      const printGeo = new THREE.PlaneGeometry(printSize, printSize);
      const printMesh = new THREE.Mesh(printGeo, printMaterial);
      printMesh.position.set(0, 0.05 * genderMult, 0.01);
      atelierGroup.add(printMesh);
    }

    function updatePricing() {
      let base = state.basePrice;
      let neckExtra = base * state.neckModifier;
      let total = base + neckExtra;

      document.getElementById('price-fabric').innerText = base.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-neck').innerText = '+' + Math.round(neckExtra).toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-total').innerText = Math.round(total).toLocaleString('ru-RU') + ' ₽';
    }

    // Слушатели кнопок
    document.querySelectorAll('#group-gender .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-gender .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.gender = e.currentTarget.dataset.val;
        state.mannequinFile = e.currentTarget.dataset.file;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fit .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fit .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.fit = e.currentTarget.dataset.val;
        buildModel();
      });
    });

    document.querySelectorAll('#group-fabric .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-fabric .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.fabric = e.currentTarget.dataset.val;
        state.basePrice = parseInt(e.currentTarget.dataset.price);
        updatePricing();
      });
    });

    document.querySelectorAll('#group-neck .btn-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#group-neck .btn-option').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.neck = e.currentTarget.dataset.val;
        state.neckModifier = parseFloat(e.currentTarget.dataset.extra);
        buildModel();
        updatePricing();
      });
    });

    document.querySelectorAll('.swatch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        state.color = e.currentTarget.dataset.color;
      });
    });

    // Загрузка принта
    document.getElementById('print-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('upload-label').innerText = '✓ ' + file.name.substring(0, 14) + '...';
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const texture = new THREE.Texture(img);
            texture.generateMipmaps = true;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.needsUpdate = true;
            
            printMaterial.map = texture;
            printMaterial.needsUpdate = true;
          };
        };
        reader.readAsDataURL(file);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    buildModel();
    updatePricing();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
