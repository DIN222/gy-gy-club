<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY | WELCOME</title>
    <link rel="stylesheet" href="shared-core.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        .welcome-zone { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #horse { width: 320px; max-width: 80%; filter: drop-shadow(0 0 15px var(--gold)); margin-bottom: 20px; animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.02); opacity: 1; } }
        .quote-box { font-size: 1.1rem; min-height: 2.5em; margin-bottom: 30px; max-width: 500px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .back-link { cursor: pointer; color: var(--gold); opacity: 0.7; text-decoration: none; }
    </style>
</head>
<body>
    <header class="fixed-header">
        <a onclick="location.href='index.html'" class="back-link" data-key="btn_back">← BACK</a>
        <div class="logo-link"><img src="logo.png"></div>
    </header>

    <main class="welcome-zone">
        <img src="horse_welcome.png" id="horse">
        <div class="quote-box" data-key="quote">...</div>
        <div class="btn-container">
            <button class="btn-gy" data-key="btn_reg" onclick="location.href='reg.html'">ПРОЙДИТЕ НА РЕГИСТРАЦИЮ</button>
            <button class="btn-gy btn-sleep" data-key="btn_hall" onclick="location.href='hall.html'">ПРОЙДИТЕ В ХОЛЛ</button>
        </div>

        <div class="lang-panel">
            <button class="lang-btn" onclick="setLanguage('en')"><img src="https://flagcdn.com/w20/gb.png"> EN</button>
            <button class="lang-btn" onclick="setLanguage('ru')"><img src="https://flagcdn.com/w20/ru.png"> RU</button>
            <button class="lang-btn" onclick="setLanguage('ua')"><img src="https://flagcdn.com/w20/ua.png"> UA</button>
            <button class="lang-btn" onclick="setLanguage('pl')"><img src="https://flagcdn.com/w20/pl.png"> PL</button>
            <button class="lang-btn" onclick="setLanguage('de')"><img src="https://flagcdn.com/w20/de.png"> DE</button>
            <button class="lang-btn" onclick="setLanguage('fr')"><img src="https://flagcdn.com/w20/fr.png"> FR</button>
            <button class="lang-btn" onclick="setLanguage('it')"><img src="https://flagcdn.com/w20/it.png"> IT</button>
            <button class="lang-btn" onclick="setLanguage('es')"><img src="https://flagcdn.com/w20/es.png"> ES</button>
            <button class="lang-btn" onclick="setLanguage('cn')"><img src="https://flagcdn.com/w20/cn.png"> CN</button>
            <button class="lang-btn" onclick="setLanguage('jp')"><img src="https://flagcdn.com/w20/jp.png"> JP</button>
            <button class="lang-btn" onclick="setLanguage('ae')"><img src="https://flagcdn.com/w20/ae.png"> AE</button>
            <button class="lang-btn" onclick="setLanguage('br')"><img src="https://flagcdn.com/w20/br.png"> BR</button>
        </div>
    </main>
    <script src="shared-logic.js"></script>
</body>
</html>
