<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>GY-GY | WELCOME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg" style="background-image: url('scan_bg.jpg');">
    <header class="fixed-header">
        <div class="logo-text">GY-GY</div>
    </header>

    <main class="portal-zone">
        <div class="overlay">
            <h1>WELCOME ZONE</h1>
            <p>Гы-гы! Identifying your digital trace...</p>
            <!-- Логистика: Генерация ID -> Плавный переход в Холл -->
            <button class="btn-gy" onclick="generateID()">GENERATE ID</button>
        </div>
    </main>

    <script src="shared-logic.js"></script>
    <script>
        function generateID() {
            // ID: Порядковый номер + случайное 4-значное число
            const id = "255-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('gy_trace', JSON.stringify({numCode: id, avatar: "AVATAR.png", flag: "🏴‍☠️"}));
            
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'hall.html'; }, 1200);
        }
    </script>
</body>
</html>
