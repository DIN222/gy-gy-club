<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to GY-GY 006</title>
    <style>
        body { background: #000; margin: 0; color: gold; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        .main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
            /* ВАЖНО: Освобождаем место под шапку скрипта */
            padding-top: 80px; 
            box-sizing: border-box;
        }

        .horse-container { position: relative; margin-bottom: 10px; }
        .horse-img { width: 180px; filter: drop-shadow(0 0 15px gold); }
        .slogan { font-size: 1rem; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; }
        .welcome-title { font-size: 4.5rem; margin: 0; line-height: 1; }
        
        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        .gy-btn {
            padding: 12px 35px; border: 2px solid gold; background: transparent;
            color: gold; font-weight: 900; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.9rem;
        }
        .gy-btn:hover { background: gold; color: black; box-shadow: 0 0 20px gold; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="slogan">THE BEST CLUB IN THE WORLD</div>
        <div class="horse-container">
            <img src="horse.png" class="horse-img" alt="Horse">
        </div>
        <h1 class="welcome-title">WELCOME</h1>
        <div class="btn-group">
            <button class="gy-btn">ENTER ROOM</button>
            <button class="gy-btn">ABOUT US</button>
        </div>
    </div>

    <script src="shared-logic.js"></script>
</body>
</html>
