<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GY-GY Welcome</title>
    <link rel="stylesheet" href="shared-core.css">
    <style>
        body { background: #000; margin: 0; overflow: hidden; color: gold; }
        
        /* Контейнер шапки один к одному с первой страницы */
        .header-mirror {
            position: fixed; top: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 30px; box-sizing: border-box; z-index: 9999;
        }

        /* Блок навигации и языка слева */
        .left-controls {
            display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
        }

        /* Стрелка возврата на освободившемся месте (сверху) */
        .back-arrow {
            cursor: pointer; color: gold; font-size: 50px; font-weight: 900; 
            line-height: 0.5; user-select: none; margin-left: 5px;
        }

        /* Язык смещен на 10% вниз (примерно 15-20px) */
        #gy-lang-wrapper {
            margin-top: 15px; /* Смещение вниз */
            position: relative; width: 150px; border: 1px solid gold; background: rgba(0,0,0,0.9);
            pointer-events: auto;
        }

        /* Логотип (35px как договорились) */
        .logo-mirror {
            font-size: 35px; font-weight: 900; color: gold; 
            letter-spacing: 4px; line-height: 1; text-shadow: 2px 2px 5px black;
        }

        .content {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-size: 2rem; text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-mirror">
        <div class="left-controls">
            <div class="back-arrow" onclick="location.href='index.html'">«</div>
            
            <div id="gy-lang-wrapper">
                <div onclick="toggleGyLang()" style="cursor:pointer; display:flex; align-items:center; justify-content: space-between; color:gold; padding: 8px 10px;">
                    <div id="current-lang-view" style="display:flex; align-items:center; gap:8px;">
                        <span id="lang-code-text">EN</span>
                    </div>
                    <span>▼</span>
                </div>
                <div id="gy-lang-list" style="display:none; position:absolute; top:100%; left:-1px; width:calc(100% + 2px); max-height:250px; overflow-y:auto; background:black; border: 1px solid gold; border-top:none;">
                    </div>
            </div>
        </div>

        <div class="logo-mirror">GY-GY</div>
    </div>

    <main class="content">
        <h1>ДОБРО ПОЖАЛОВАТЬ В КЛУБ</h1>
    </main>

    <script src="shared-logic.js"></script>
    <script>
        // Принудительно запускаем звук и обновляем язык ПРИ ЗАГРУЗКЕ
        window.onload = function() {
            // 1. Запуск музыки (0.5 громкость)
            if (typeof playZoneSound === 'function') {
                playZoneSound(0.5);
            }

            // 2. Синхронизация отображения языка
            const saved = localStorage.getItem('gy_lang_code') || 'en';
            document.getElementById('lang-code-text').innerText = saved.toUpperCase();
            
            // Если в shared-logic есть функция отрисовки списка, она сработает сама,
            // но мы подстрахуемся и вызовем инициализацию атрибутов
            if (typeof injectPermanentAttributes === 'function') {
                // Мы не вызываем её здесь, чтобы не плодить вторую шапку, 
                // так как в welcome.html мы её уже прописали вручную для точности.
            }
        };
    </script>
</body>
</html>
