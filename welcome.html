<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-core.css">
    
    <style>
        .welcome-zone {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            padding-top: 8vh;
            background: #000;
        }

        .quote-text { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 28px; 
            color: var(--gold); 
            max-width: 85%; 
            margin-bottom: 5px;
        }

        .horse-container { position: relative; margin: 0; }
        #welcome-horse {
            max-height: 45vh;
            width: auto;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            transition: 0.5s ease;
        }

        .welcome-title {
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            font-weight: 700; 
            letter-spacing: 12px; 
            margin: 5px 0 25px 0; 
            color: var(--gold); 
            text-transform: uppercase; 
            font-style: italic;
        }

        /* Кнопки в ряд, ширина 224px, БЕЗ ПОДСВЕТКИ */
        .btn-group { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            justify-content: center;
            width: 100%;
        }

        .btn-gy {
            min-width: 224px;
            padding: 15px 10px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
            font-family: 'Share Tech Mono', monospace;
            transition: 0.3s;
            font-size: 13px;
        }

        /* Только смена цвета, без теней и свечения */
        .btn-gy:hover { 
            background: var(--gold); 
            color: #000; 
            box-shadow: none !important; 
        }

        .btn-sleep { opacity: 0.2; pointer-events: none; }

        /* Навигация */
        .back-nav { position: fixed; top: 25px; left: 25px; z-index: 10001; }
        .lang-container { position: fixed; top: 80px; left: 25px; z-index: 10000; }
        .btn-back-nav { min-width: auto; padding: 10px 20px; font-size: 14px; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="fixed-header"><div class="logo-text">GY-GY</div></header>

    <nav class="back-nav">
        <button class="btn-gy btn-back-nav" onclick="window.history.back()">← Назад</button>
    </nav>

    <div class="lang-container">
        <div class="lang-trigger">
            <img src="https://flagcdn.com/w40/ru.png" id="current-lang-flag"> 
            <span id="current-lang-label">РУССКИЙ</span>
        </div>
        <div id="lang-list-full" class="lang-panel"></div>
    </div>

    <main class="welcome-zone">
        <div class="quote-text">«В каждой шутке есть доля виски»</div>
        <div class="horse-container"><img src="horse_welcome.png" id="welcome-horse"></div>
        <h1 class="welcome-title">WELCOME</h1>
        <div class="btn-group">
            <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="location.href='hall.html'">В ХОЛЛ</button>
            <button class="btn-gy" onclick="location.href='registration.html'">РЕГИСТРАЦИЯ</button>
        </div>
    </main>

    <script src="shared-logic.js"></script>
    <script>
        const langs = [
            {c:'ru', n:'РУССКИЙ', f:'ru'}, {c:'en', n:'ENGLISH', f:'gb'},
            {c:'ua', n:'УКРАЇНСЬКА', f:'ua'}, {c:'pl', n:'POLSKI', f:'pl'},
            {c:'de', n:'DEUTSCH', f:'de'}, {c:'fr', n:'FRANÇAIS', f:'fr'},
            {c:'it', n:'ITALIANO', f:'it'}, {c:'es', n:'ЕSPAÑOL', f:'es'},
            {c:'cn', n:'中文', f:'cn'}, {c:'jp', n:'日本語', f:'jp'},
            {c:'ae', n:'العربية', f:'ae'}, {c:'br', n:'PORTUGUÊS', f:'br'}
        ];

        document.getElementById('lang-list-full').innerHTML = langs.map(l => `
            <button class="lang-btn" onclick="setLanguage('${l.c}')">
                <img src="https://flagcdn.com/w20/${l.f}.png"> ${l.n}
            </button>`).join('');

        if(localStorage.getItem('gy_user_id')) {
            document.getElementById('btn-w-hall').classList.remove('btn-sleep');
        }
    </script>
</body>
</html>
