
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY CLUB — AI ROOM 008</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-black: #050505; 
            --violet: #8A2BE2; 
            --gold: #f59e0b; 
            --text-gray: #9ca3af; 
        }
        body { 
            margin: 0; 
            padding: 0; 
            background: url('banana_server_room.jpg') center/cover no-repeat #050505; 
            color: #fff; 
            font-family: 'Share Tech Mono', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
            opacity: 0; /* Для плавного старта из скрипта */
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ (КАНОН) */
        .global-top-bar { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 80px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 40px; 
            box-sizing: border-box; 
            z-index: 100; 
        }
        .bar-left-zone { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            font-weight: 900; 
            user-select: none; 
        }
        .arrow-item-nav { 
            font-size: 24px; 
            color: var(--text-gray); 
            cursor: pointer; 
            transition: color 0.2s; 
        }
        .arrow-item-nav:hover { 
            color: var(--violet); 
            text-shadow: 0 0 12px var(--violet); 
        }
        .bar-center-zone { 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
        }
        .user-avatar-circle { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            border: 2px solid var(--violet); 
            background: #111 center/cover no-repeat; 
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5); 
            cursor: pointer; 
        }
        .bar-right-zone { 
            font-size: 26px; 
            font-weight: 900; 
            color: #fff; 
            letter-spacing: 3px; 
        }
    </style>
</head>
<body>

    <div class="global-top-bar notranslate">
        <div class="bar-left-zone">
            <div class="arrow-item-nav" onclick="goBackToHall()" title="Back to Hall">&lt;</div>
            <div class="arrow-item-nav" onclick="goToWelcome()" title="To Welcome Screen">&lt;&lt;</div>
        </div>
        <div class="bar-center-zone">
            <div class="user-avatar-circle" id="user-avatar"></div>
        </div>
        <div class="bar-right-zone">GY-GY</div>
    </div>

    <div id="server-exit-door" onclick="goBackToHall()" style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 25vw; height: 70vh; cursor: pointer; z-index: 5;" title="Exit AI Room"></div>

    <audio id="serverSound" src="sbridge_ambient.mp3" loop preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Плавное появление комнаты при входе
            document.body.style.transition = "opacity 0.5s ease-in-out";
            setTimeout(() => { document.body.style.opacity = '1'; }, 50);

            // 2. Автоматически цепляем аватар юзера по его цифровому следу
            const currentAvatar = localStorage.getItem('user_avatar_id'); 
            const avatarContainer = document.getElementById('user-avatar');
            if (currentAvatar && avatarContainer) {
                avatarContainer.style.backgroundImage = `url('${currentAvatar}')`;
            }

            // 3. Активация звука по первому клику в пространстве серверной
            document.addEventListener('click', () => {
                const audio = document.getElementById('serverSound');
                if (audio && audio.paused) {
                    audio.play().catch(err => console.log("Audio play blocked:", err));
                }
            }, { once: true });
        });

        // Функции возврата обратно в модульный index.html
        function goBackToHall() {
            document.body.style.transition = "opacity 0.4s";
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'index.html'; }, 400); 
        }

        function goToWelcome() {
            document.body.style.transition = "opacity 0.4s";
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'index.html'; }, 400); 
        }
    </script>
</body>
</html>
