<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club - OFFICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bg: rgba(212, 175, 55, 0.08);
            --gold-border: rgba(212, 175, 55, 0.3);
        }

        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
        }

        .office-page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #0a0a12 0%, #000 100%);
            position: relative;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .header-bar {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold-border);
            background: #000;
            z-index: 100;
            flex-shrink: 0;
        }

        .ui-nav-arrows {
            display: flex; 
            gap: 20px; 
            font-size: 26px; 
            font-weight: 900 !important; 
            cursor: pointer; 
            color: var(--gold); 
            line-height: 1; 
            user-select: none;
        }
        
        .back-arrow { 
            transition: opacity 0.2s, transform 0.2s; 
            text-decoration: none; 
            color: var(--gold); 
            display: inline-block;
        }
        
        .back-arrow:hover { 
            opacity: 0.8; 
            transform: scale(1.1);
        }

        .ui-header-center {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            user-select: none;
        }

        .user-avatar {
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            object-fit: cover; 
            background: transparent; 
            display: block;
        }

        .lang-flag {
            font-size: 22px;
            line-height: 1;
            display: inline-block;
        }

        .ui-header-right { 
            font-size: 22px; 
            letter-spacing: 4px; 
            font-weight: bold; 
            user-select: none;
        }

        /* ОСНОВНАЯ СЕТКА ИЗ 6 ПРЯМОУГОЛЬНИКОВ */
        .office-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            height: 45vh;
            flex-shrink: 0;
        }

        .office-card {
            background: var(--gold-bg);
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--gold);
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
            text-align: center;
        }

        .office-card:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        .card-num {
            font-size: 13px;
            opacity: 0.5;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* ЧАТ В НИЖНЕЙ ЧАСТИ */
        .office-chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--gold-border);
            background: rgba(5, 5, 10, 0.8);
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-incoming {
            align-self: flex-start;
            background: var(--gold-bg);
            border: 1px solid var(--gold-border);
            color: var(--gold);
        }

        .msg-outgoing {
            align-self: flex-end;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold);
            color: #fff;
        }

        .msg-time {
            font-size: 9px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-bar {
            padding: 10px 15px;
            background: #000;
            border-top: 1px solid var(--gold-border);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #0a0a0f;
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--gold);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--gold);
        }

        .send-btn {
            background: var(--gold-bg);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0 16px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* Адаптив для мобильных экранов */
        @media (max-width: 768px) {
            .office-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
                gap: 10px;
                padding: 10px;
                height: 40vh;
            }
            .card-title {
                font-size: 13px;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="office-page">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="header-bar">
            <div class="notranslate ui-nav-arrows">
                <a href="index.html" class="back-arrow" title="Ко входу">&lt;&lt;</a>
            </div>

            <div class="ui-header-center notranslate">
                <img id="header-avatar" class="user-avatar" src="" alt="Avatar" style="display:none;">
                <span id="header-lang-flag" class="lang-flag"></span>
            </div>

            <div class="ui-header-right notranslate">GY-GY</div>
        </div>

        <!-- 6 ПРЯМОУГОЛЬНИКОВ ОФИСА -->
        <div class="office-grid">
            <!-- 1. РАБОЧИЙ СТОЛ -->
            <a href="#" class="office-card" onclick="alert('Модуль 1 в разработке')">
                <div class="card-num">[ 01 ]</div>
                <div class="card-title">РАБОЧИЙ СТОЛ</div>
            </a>

            <!-- 2. ДОКУМЕНТЫ -->
            <a href="#" class="office-card" onclick="alert('Модуль 2 в разработке')">
                <div class="card-num">[ 02 ]</div>
                <div class="card-title">ДОКУМЕНТЫ</div>
            </a>

            <!-- 3. ПЕРЕГОВОРНАЯ -->
            <a href="#" class="office-card" onclick="alert('Модуль 3 в разработке')">
                <div class="card-num">[ 03 ]</div>
                <div class="card-title">ПЕРЕГОВОРНАЯ</div>
            </a>

            <!-- 4. АНАЛИТИКА -->
            <a href="#" class="office-card" onclick="alert('Модуль 4 в разработке')">
                <div class="card-num">[ 04 ]</div>
                <div class="card-title">АНАЛИТИКА</div>
            </a>

            <!-- 5. АРХИВ -->
            <a href="#" class="office-card" onclick="alert('Модуль 5 в разработке')">
                <div class="card-num">[ 05 ]</div>
                <div class="card-title">АРХИВ</div>
            </a>

            <!-- 6. НАСТРОЙКИ -->
            <a href="#" class="office-card" onclick="alert('Модуль 6 в разработке')">
                <div class="card-num">[ 06 ]</div>
                <div class="card-title">НАСТРОЙКИ</div>
            </a>
        </div>

        <!-- НИЖНИЙ ЧАТ ОФИСА -->
        <div class="office-chat-section">
            <div id="chat-messages" class="chat-messages">
                <div class="msg msg-incoming">
                    Добро пожаловать в Офис GY-GY Club!
                    <div class="msg-time">System</div>
                </div>
            </div>
            
            <div class="chat-input-bar">
                <input type="text" id="chat-input" class="chat-input" placeholder="Напишите сообщение..." autocomplete="off" onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Подгрузка аватара
            const savedAvatar = localStorage.getItem('gygy_avatar') || 
                                localStorage.getItem('gy_user_img') || 
                                localStorage.getItem('user_avatar');
                                
            const avatarEl = document.getElementById('header-avatar');
            
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
                avatarEl.style.display = 'block';
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
                avatarEl.style.display = 'block';
            }

            // Флаг языка
            const langFlags = {
                'ru': '🇷🇺',
                'en': '🇬🇧',
                'zh': '🇨🇳',
                'es': '🇪🇸',
                'de': '🇩🇪'
            };
            
            const savedLang = localStorage.getItem('gygy_lang') || 
                              localStorage.getItem('gy_lang') || 
                              localStorage.getItem('user_lang') || 'ru';
                              
            const flagEl = document.getElementById('header-lang-flag');
            if (flagEl) {
                flagEl.textContent = langFlags[savedLang.toLowerCase()] || '🌐';
            }
        });

        // Функция отправки сообщений
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const chatMessages = document.getElementById('chat-messages');
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg msg-outgoing';
            msgDiv.innerHTML = `${escapeHtml(text)}<div class="msg-time">${timeStr}</div>`;

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            input.value = '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
