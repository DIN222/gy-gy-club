<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v5.2.1 - MODERMECH TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
            --bg-dark: #000;
            --card-bg: rgba(15, 15, 15, 0.98);
            --border-color: #333;
        }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        
        html, body { 
            width: 100%; height: 100%; background: var(--bg-dark); color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin: 0; 
        }

        .office-page {
            position: fixed; inset: 0;
            background: url('office_bg.jpg') center/95% no-repeat #000;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 80px; z-index: 10;
        }

        /* НАВИГАЦИЯ */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 10px !important; z-index: 1000000; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            cursor: pointer; color: var(--gold); line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
        }
        .ui-nav-arrows a { text-decoration: none; color: var(--gold); }
        
        .ui-header-center {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000000;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        
        .avatar-wrapper { position: relative; display: inline-block; flex-shrink: 0; }
        .user-avatar {
            border-radius: 50%; border: 2px solid var(--violet);
            object-fit: cover; display: block;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }
        
        .flag-badge { 
            position: absolute; bottom: -2px; right: -2px; font-size: 11px; 
            background: #000; border-radius: 50%; width: 16px; height: 16px; 
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold); 
            z-index: 10; line-height: 1; pointer-events: none;
        }

        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
        }

        .workspace-container { 
            display: flex; flex-direction: column; gap: 12px; 
            width: 96%; max-width: 1400px; height: calc(100vh - 110px); 
            padding: 10px; margin-top: 5px; overflow-y: auto;
        }

        /* СТРУКТУРА КЛУБА */
        .structure-section {
            background: rgba(10, 10, 10, 0.95); border: 1px solid var(--gold); border-radius: 6px; padding: 12px; display: flex; flex-direction: column; gap: 10px;
        }
        .structure-title {
            font-size: 13px; font-weight: bold; color: #fff; letter-spacing: 1px; border-bottom: 1px dashed var(--gold); padding-bottom: 4px; display: flex; justify-content: space-between;
        }
        .tree-root { display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 12px; }
        .tree-branches { display: flex; justify-content: center; gap: 15px; width: 100%; flex-wrap: wrap; }
        .tree-node { background: #111; border: 1px solid #444; padding: 8px 12px; border-radius: 4px; text-align: center; min-width: 160px; cursor: pointer; transition: all 0.2s; }
        .tree-node.boss-node { border-color: var(--violet); cursor: default; background: rgba(138, 43, 226, 0.05); }
        .tree-node.active-node { border-color: var(--gold); background: rgba(214,175,55,0.05); }
        .node-role { font-size: 9px; color: #888; letter-spacing: 1px; }
        .node-name { font-size: 12px; font-weight: bold; color: #fff; margin: 2px 0; }
        .node-status { font-size: 9px; color: var(--gold); }

        /* РАБОЧИЕ ПАНЕЛИ */
        .bottom-panels { display: flex; gap: 12px; min-height: 300px; width: 100%; }
        .trello-column { flex: 1; background: rgba(10, 10, 10, 0.95); border: 1px solid var(--border-color); border-top: 3px solid var(--gold); border-radius: 4px; display: flex; flex-direction: column; padding: 10px; }
        .column-header { font-weight: bold; font-size: 12px; color: #fff; padding-bottom: 6px; border-bottom: 1px solid #222; margin-bottom: 8px; }
        .cards-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; min-height: 100px; }
        .trello-card { background: #161616; border: 1px solid #333; padding: 8px; border-radius: 3px; font-size: 11px; color: #ccc; }

        .global-chat-panel { flex: 1.2; background: rgba(15, 15, 15, 0.95); border: 1px solid var(--border-color); border-top: 3px solid var(--violet); border-radius: 4px; display: flex; flex-direction: column; padding: 10px; }
        .chat-history { flex: 1; overflow-y: auto; border: 1px solid #222; background: #000; padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 150px; }
        
        .msg-container { display: flex; gap: 8px; align-items: flex-start; max-width: 90%; }
        .msg-container.my-side { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 6px 10px; border-radius: 4px; font-size: 11px; color: #fff; line-height: 1.3; }
        .my-side .msg-bubble { background: rgba(138, 43, 226, 0.15); border: 1px solid var(--violet); }
        .foreign-side .msg-bubble { background: rgba(214, 175, 55, 0.08); border: 1px solid var(--gold); }
        
        .office-input { background: #000; border: 1px solid #444; color: #fff; padding: 6px; font-family: inherit; font-size: 11px; width: 100%; margin-bottom: 4px; }
        .office-input:focus { border-color: var(--gold); outline: none; }
        .btn-office { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.2s; white-space: nowrap; }
        .btn-office:hover { background: var(--gold); color: #000; }

        .client-box { width: 90%; max-width: 500px; background: var(--card-bg); border: 2px solid var(--gold); padding: 25px; border-radius: 4px; text-align: center; margin: 40px auto 0 auto; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="office-page">
        <div class="notranslate ui-nav-arrows">
            <a href="index.html">&lt;</a>
            <a href="index.html">&lt;&lt;</a>
        </div>
        
        <div class="ui-header-center notranslate">
            <div class="avatar-wrapper" style="width: 46px; height: 46px;">
                <img id="header-avatar" class="user-avatar" src="avatar.jpg" alt="МодерМех" style="width: 100%; height: 100%; onerror: this.style.display='none';">
                <div class="flag-badge" id="main-header-flag">⚓</div>
            </div>
        </div>
        
        <div class="ui-header-right notranslate">GY-GY</div>
        <div id="office-dynamic-root" style="width: 100%; display: flex; justify-content: center;"></div>
    </div>

    <script>
        let myPhone = '+12025550144'; 
        let useAvatarInChat = true; 
        let myLang = localStorage.getItem('gygy_user_lang') || 'ru';
        let myBossFlag = localStorage.getItem('gygy_user_flag') || '⚓'; 
        let myNickname = localStorage.getItem('gygy_nickname') || 'МодерМех';

        const futureStatuses = [
            "● Калибровка сингулярности",
            "● Модуляция хаоса: 94%",
            "● Правлю таймлайн проекта",
            "● Пересборка ядер системы",
            "● Внутри Матрицы (Не будить)"
        ];
        let currentStatusIndex = 0;

        const staffRegistry = {
            "+3361234567": { name: "Jean (Production)", role: "Factory Manager", lang: "fr", flag: "🇫🇷" },
            "+1202555014": { name: "John (Tech)", role: "Lead Developer", lang: "en", flag: "🇺🇸" }
        };

        let activeStaffPhone = "+3361234567"; 
        let chatMessages = [
            { id: 1, phone: "+3361234567", text: "Bonjour ModMech! Станки готовы.", trans: "Hello ModMech! Machines are ready." },
            { id: 2, phone: "+12025550144", text: "Отлично. Начинаем прогрев.", trans: "Excellent. Starting warm-up." }
        ];

        let tasks = JSON.parse(localStorage.getItem('gygy_trello_tasks')) || [
            { id: 1, text: 'Проверить калибровку DTF-принтера', status: 'todo' },
            { id: 2, text: 'Прокинуть n8n вебхуки', status: 'todo' }
        ];

        document.addEventListener("DOMContentLoaded", function() {
            // Обновляем иконку в шапке, если она записана
            const savedAvatar = localStorage.getItem('gygy_avatar') || 'avatar.jpg';
            const imgEl = document.getElementById('header-avatar');
            if (imgEl) imgEl.src = savedAvatar;

            const flagEl = document.getElementById('main-header-flag');
            if (flagEl) flagEl.innerText = myBossFlag;

            renderOffice();
        });

        function cycleStatus() {
            currentStatusIndex = (currentStatusIndex + 1) % futureStatuses.length;
            const statusEl = document.getElementById('moder-status');
            if (statusEl) statusEl.innerText = futureStatuses[currentStatusIndex];
        }

        function selectStaff(phone) { 
            activeStaffPhone = phone; 
            renderOffice(); 
        }

        function renderOffice() {
            const root = document.getElementById('office-dynamic-root');
            if (!root) return;
            
            const hasAccess = localStorage.getItem('gygy_is_boss') === 'true';

            if (hasAccess) {
                let currentStaff = staffRegistry[activeStaffPhone] || { name: "Offline", lang: "en", flag: "🏴‍☠️" };
                
                root.innerHTML = `
                    <div class="workspace-container notranslate">
                        
                        <div class="structure-section">
                            <div class="structure-title">
                                <div>CORE ARCHITECTURE // SYSTEM CONTROL</div>
                                <div style="color: var(--violet); font-size:11px;">MODERMECH TERMINAL v5.2.1</div>
                            </div>
                            <div class="tree-root">
                                <div class="tree-node boss-node" onclick="cycleStatus()">
                                    <div class="node-role">Главный Инженер Гавани</div>
                                    <div class="node-name" style="color:var(--violet); font-size: 14px;">${myNickname.toUpperCase()}</div>
                                    <div class="node-status" id="moder-status" style="color:#00ff00; font-weight: bold; cursor:pointer;">${futureStatuses[currentStatusIndex]}</div>
                                </div>
                                <div class="tree-branches">
                                    <div class="tree-node ${activeStaffPhone==='+3361234567'?'active-node':''}" onclick="selectStaff('+3361234567')">
                                        <div class="node-role">Production (FR)</div><div class="node-name">Jean</div><div class="node-status" style="color:#00ff00">● Online</div>
                                    </div>
                                    <div class="tree-node ${activeStaffPhone==='+1202555014'?'active-node':''}" onclick="selectStaff('+1202555014')">
                                        <div class="node-role">Tech Dev (US)</div><div class="node-name">John</div><div class="node-status" style="color:var(--gold)">● In Code</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bottom-panels">
                            <div class="trello-column">
                                <div class="column-header">PROJECT TASKS</div>
                                <div class="cards-container" id="col-todo"></div>
                                <div style="margin-top:auto; padding-top:10px;">
                                    <input type="text" id="input-todo" class="office-input" placeholder="New task...">
                                    <button class="btn-office" style="width:100%" onclick="addTask()">Добавить</button>
                                </div>
                                <button class="btn-office" style="border-color:#ff3333; color:#ff3333; margin-top:10px; font-size:10px;" onclick="exitBossMode()">Log Out</button>
                            </div>

                            <div class="global-chat-panel">
                                <div class="column-header" style="display:flex; justify-content:space-between; align-items:center;">
                                    <div>ШЛЮЗ: <strong style="color:var(--gold)">${currentStaff.name}</strong></div>
                                    <div style="font-size:10px;">Канал: ${currentStaff.flag}</div>
                                </div>
                                <div class="chat-history" id="chat-box"></div>
                                <div style="display:flex; gap:4px; margin-top:10px;">
                                    <input type="text" id="chat-input" class="office-input" placeholder="Encrypt message...">
                                    <button class="btn-office" onclick="sendChatMessage()">SEND</button>
                                </div>
                            </div>
                        </div>

                    </div>
                `;
                renderCards();
                renderChat();
            } else {
                const nickname = localStorage.getItem('gygy_nickname') || 'Club Resident';
                root.innerHTML = `
                    <div class="client-box notranslate">
                        <div style="font-size: 18px; color: #fff; margin-bottom: 15px; letter-spacing: 2px;">GY-GY INFORMATOR</div>
                        <p style="font-size: 13px; color: #aaa;">Terminal is restricted.</p>
                        <div style="background:#111; padding: 12px; border: 1px dashed var(--gold); margin: 15px 0; text-align: left;">
                            <div>• ID Trace: <span style="color:var(--violet)">${nickname}</span></div>
                            <div>• Status: <span style="color:#ff3333">Access Denied</span></div>
                        </div>
                        <button class="btn-office" onclick="triggerBossAuth()">Enter Key</button>
                    </div>
                `;
            }
        }

        function renderChat() {
            const box = document.getElementById('chat-box'); if (!box) return; box.innerHTML = '';
            let currentStaff = staffRegistry[activeStaffPhone] || { name: "Staff", lang: "en", flag: "🏴‍☠️" };

            chatMessages.forEach(m => {
                const isMe = m.phone === myPhone;
                const textToShow = isMe ? m.text : (currentStaff.lang === myLang ? m.text : m.trans);
                const msgContainer = document.createElement('div');
                msgContainer.className = `msg-container ${isMe ? 'my-side' : 'foreign-side'}`;
                msgContainer.innerHTML = `
                    <div class="msg-bubble">
                        <div style="font-weight:bold; font-size:9px; color:var(--gold);">${isMe ? myNickname : currentStaff.name}</div>
                        <div>${textToShow}</div>
                    </div>
                `;
                box.appendChild(msgContainer);
            });
            box.scrollTop = box.scrollHeight;
        }

        function sendChatMessage() {
            const inp = document.getElementById('chat-input'); if (!inp || !inp.value.trim()) return;
            chatMessages.push({ id: Date.now(), phone: myPhone, text: inp.value.trim(), trans: inp.value.trim() });
            inp.value = ''; renderChat();
        }

        function renderCards() {
            const col = document.getElementById('col-todo'); if (!col) return; col.innerHTML = '';
            tasks.forEach(t => {
                const card = document.createElement('div'); card.className = 'trello-card';
                card.innerHTML = `<div>${t.text}</div>`; col.appendChild(card);
            });
        }

        function addTask() {
            const txt = document.getElementById('input-todo').value; if (!txt.trim()) return;
            tasks.push({ id: Date.now(), text: txt, status: 'todo' });
            localStorage.setItem('gygy_trello_tasks', JSON.stringify(tasks));
            renderCards(); document.getElementById('input-todo').value = '';
        }

        function triggerBossAuth() {
            const pass = prompt("Key:");
            if (pass === "GYGY2026" || pass === "gygy2026") { 
                localStorage.setItem('gygy_is_boss', 'true'); 
                renderOffice(); 
            }
        }
        function exitBossMode() { localStorage.setItem('gygy_is_boss', 'false'); renderOffice(); }
    </script>
</body>
</html>
