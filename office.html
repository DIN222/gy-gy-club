<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club — Офис Шефа v4.5.43</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --dark-gray: #141414;
            --light-gray: #222222;
            --text: #f0f0f0;
            --glow: 0 0 10px rgba(212, 175, 55, 0.4);
        }
        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .fixed-header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .gy-logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: var(--glow);
            text-decoration: none;
            letter-spacing: 3px;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .office-container {
            background: var(--dark-gray);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
            width: 80%;
            margin-top: 15px;
            box-shadow: var(--glow);
        }
        .btn:hover {
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <a href="index.html" class="gy-logo">GY-GY</a>
        <a href="index.html" class="back-btn">← В ХОЛЛ</a>
    </header>

    <div class="office-container">
        <h2 style="color: var(--gold); margin-bottom: 10px;">💼 КАБИНЕТ ШЕФА</h2>
        <p>Кабинет МодерМеха. Здесь пахнет дорогим машинным маслом и отборными шутками.</p>
        
        <a href="meeting.html" class="btn">🤝 Комната переговоров ──►</a>
        
        <div style="margin-top: 30px; border-top: 1.5px dashed #333; padding-top: 20px;">
            <p style="font-size: 0.85rem; color: #666;">Текущая версия локации: v4.5.43</p>
        </div>
    </div>

</body>
</html>
