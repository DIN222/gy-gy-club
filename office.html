<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYGY Office v1.0</title>
    <!-- Библиотека QR-кодов для паспорта -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: #0d0e12;
            --accent-gold: #d4af37;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Стандартная верхняя панель (золото на черном) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-gold);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        header h2 {
            color: var(--accent-gold);
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        #header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            object-fit: cover;
        }

        #current-flag {
            width: 24px;
            border-radius: 2px;
        }

        /* Две большие кнопки на весь экран */
        .fullscreen-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: var(--panel-bg);
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-btn.active {
            background: var(--accent-gold);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .nav-btn:hover {
            opacity: 0.9;
        }

        /* Схема офиса: аккуратные 6 прямоугольников */
        .office-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .office-room {
            background: var(--panel-bg);
            border: 1px solid #333;
            border-radius: 8px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: #888;
            transition: border-color 0.2s;
        }

        .office-room:hover {
            border-color: var(--accent-gold);
            color: var(--text-color);
        }

        /* 3-й прямоугольник — Комната переговоров */
        .office-room.meeting-room {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: #14120a;
        }

        /* МОДАЛЬНОЕ ОКНО ПАСПОРТА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .passport-card {
            background: var(--panel-bg);
            border: 2px solid var(--accent-gold);
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            position: relative;
            color: var(--text-color);
        }

        .passport-card img.avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            object-fit: cover;
            margin-bottom: 10px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            color: var(--accent-gold);
            cursor: pointer;
            font-size: 22px;
        }

        #pass-qr-box {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Стандартная панель сверху (золото на черном) -->
    <header>
        <h2>GYGY OFFICE (v1.0)</h2>
        <div class="user-profile" onclick="openPassport()">
            <img id="current-flag" src="https://flagcdn.com/w20/gb.png" alt="Flag">
            <img id="header-avatar" src="" alt="Avatar" style="display:none;">
        </div>
    </header>

    <!-- Две большие кнопки на весь экран -->
    <div class="fullscreen-nav">
        <button class="nav-btn active">1. Схема офиса</button>
        <a href="club-map.html" class="nav-btn">2. Схема клуба</a>
    </div>

    <!-- Схема офиса (6 компактных прямоугольников) -->
    <div class="office-grid">
        <div class="office-room">01</div>
        <div class="office-room">02</div>
        <div class="office-room meeting-room">Комната переговоров</div>
        <div class="office-room">04</div>
        <div class="office-room">05</div>
        <div class="office-room">06</div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПАСПОРТА -->
    <div id="modal-passport" class="modal">
        <div class="passport-card">
            <span class="close-btn" onclick="closePassport()">&times;</span>
            <img id="pass-avatar-img" class="avatar" src="" alt="Avatar">
            <h3 id="pass-nickname" style="margin: 5px 0; color: var(--accent-gold);">@User</h3>
            <p id="pass-email" style="font-size: 13px; color: #aaa; margin-bottom: 15px;">user@example.com</p>
            <p style="font-size: 14px; margin: 5px 0;"><strong>ID:</strong> <span id="pass-id-val">GY-000000</span></p>
            <div id="pass-qr-box"></div>
        </div>
    </div>

    <script>
        function openPassport() {
            const modal = document.getElementById('modal-passport');
            if (modal) { 
                modal.style.display = 'flex'; 
                requestAnimationFrame(() => { modal.style.opacity = '1'; });
            }
        }

        function closePassport() {
            const modal = document.getElementById('modal-passport');
            if (modal) {
                modal.style.opacity = '0';
                setTimeout(() => { modal.style.display = 'none'; }, 300);
            }
        }

        function renderUserPassport(targetID) {
            const passIdVal = document.getElementById('pass-id-val');
            const passQrBox = document.getElementById('pass-qr-box');
            if (passIdVal) passIdVal.innerText = targetID;
            if (passQrBox && typeof QRCode !== 'undefined') { 
                passQrBox.innerHTML = ""; 
                new QRCode(passQrBox, { text: targetID, width: 90, height: 90 }); 
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const savedAvatar = localStorage.getItem('gygy_avatar') || localStorage.getItem('gy_user_img') || localStorage.getItem('user_avatar');
            const avatarEl = document.getElementById('header-avatar');
            const passAvatarEl = document.getElementById('pass-avatar-img');
            
            const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23000'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
            const currentAvatar = savedAvatar || defaultAvatar;

            if (avatarEl) { avatarEl.src = currentAvatar; avatarEl.style.display = 'block'; }
            if (passAvatarEl) { passAvatarEl.src = currentAvatar; }

            const savedNickname = localStorage.getItem('gygy_nickname');
            if (savedNickname) document.getElementById('pass-nickname').innerText = '@' + savedNickname;

            const savedEmail = localStorage.getItem('gygy_email');
            if (savedEmail) document.getElementById('pass-email').innerText = savedEmail;

            let currentID = localStorage.getItem('gygy_id') || localStorage.getItem('gy_user_id') || "GY-" + Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('gygy_id', currentID);
            renderUserPassport(currentID);

            const savedFlag = localStorage.getItem('gygy_flag') || localStorage.getItem('gy_user_flag') || 'gb';
            const flagElement = document.getElementById('current-flag');
            if (flagElement) {
                flagElement.src = `https://flagcdn.com/w20/${savedFlag.toLowerCase()}.png`;
            }
        });
    </script>
</body>
</html>
