<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.9.0 - REAL FLAG OFFICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
            --bg-dark: #000;
            --card-bg: rgba(20, 20, 20, 0.95);
        }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; }
        
        html, body { 
            width: 100%; height: 100%; background: var(--bg-dark); color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin: 0; 
        }

        .office-page {
            position: fixed; inset: 0;
            background: url('office_bg.jpg') center/95% no-repeat #000;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 90px; z-index: 10;
        }

        /* ==========================================================================
           ЭТАЛОННАЯ ВЕРХНЯЯ ПАНЕЛЬ С СИНХРОНИЗАЦИЕЙ ФЛАГА ИЗ РЕГИСТРАЦИИ
           ========================================================================== */
        .ui-nav-arrows {
            position: fixed; top: 18px; left: 10px !important; z-index: 1000000; 
            display: flex; gap: 25px; font-size: 26px; font-weight: 900 !important; 
            cursor: pointer; color: var(--gold); line-height: 1; letter-spacing: -2px; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
        }
        .ui-nav-arrows a { text-decoration: none; color: var(--gold); }
        
        .ui-header-center {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000000;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        
        /* ОБЕРТКА АВАТАРА ДЛЯ ТОЧНОГО ПОЗИЦИОНИРОВАНИЯ ФЛАГА */
        .avatar-wrapper { position: relative; display: inline-block; flex-shrink: 0; }
        .user-avatar {
            border-radius: 50%; border: 2px solid var(--gold);
            object-fit: cover; background: #fff !important; display: block;
            box-shadow: 0 0 0 1px #000, inset 0 0 5px rgba(0,0,0,0.8);
        }
        
        /* Тот самый маркер-флаг из первой страницы */
        .flag-badge { 
            position: absolute; bottom: -2px; right: -2px; font-size: 11px; 
            background: #000; border-radius: 50%; width: 16px; height: 16px; 
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold); 
            z-index: 10; line-height: 1; pointer-events: none;
        }

        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-size: 24px; letter-spacing: 5px; font-weight: bold; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            user-select: none;
        }

        /* ИНТЕРФЕЙС ШЕФА */
        .workspace-container { display: flex; gap: 20px; width: 98%; max-width: 1400px; height: calc(100vh - 130px); padding: 10px; margin-top: 10px; }
        .trello-board { flex: 1.5; display: flex; gap: 15px; overflow-x: auto; }
        .trello-column { flex: 0 0 240px; background: rgba(10, 10, 10, 0.95); border: 1px solid #333; border-top: 3px solid var(--gold); border-radius: 4px; display: flex; flex-direction: column; padding: 10px; }
        .column-header { font-weight: bold; font-size: 13px; color: #fff; padding-bottom: 8px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .cards-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .trello-card { background: #161616; border: 1px solid var(--gold); padding: 8px; border-radius: 3px; font-size: 11px; color: #ccc; }
        
        .global-chat-panel { flex: 1.2; min-width: 350px; background: rgba(15, 15, 15, 0.95); border: 1px solid var(--gold); border-radius: 4px; display: flex; flex-direction: column; padding: 15px; }
        .chat-history { flex: 1; overflow-y: auto; border: 1px solid #222; background: #000; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-container { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
        .msg-container.my-side { align-self: flex-end; flex-direction: row-reverse; }
        .msg-container.foreign-side { align-self: flex-start; }

        .msg-bubble { padding: 8px 12px; border-radius: 4px; font-size: 12px; color: #fff; line-height: 1.4; }
        .my-side .msg-bubble { background: rgba(138, 43, 226, 0.2); border: 1px solid var(--violet); }
        .foreign-side .msg-bubble { background: rgba(214, 175, 55, 0.1); border: 1px solid var(--gold); }
        
        .chat-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        .input-row { display: flex; gap: 5px; }
        .office-input { background: #000; border: 1px solid var(--gold); color: #fff; padding: 8px; font-family: inherit; font-size: 12px; width: 100%; }
        .btn-office { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.2s; white-space: nowrap; }
        .btn-office:hover { background: var(--gold); color: #000; }
        .btn-mic { background: #222; color: #ff3333; border: 1px solid #ff3333; }
        .btn-mic.recording { background: #ff3333; color: #000; animation: blink 1s infinite; }

        .client-box { width: 90%; max-width: 500px; background: var(--card-bg); border: 2px solid var(--gold); padding: 25px; border-radius: 4px; text-align: center; margin-top: 40px; }
        .secret-trigger { position: fixed; bottom: 5px; right: 5px; width: 15px; height: 15px; cursor: pointer; opacity: 0.05; z-index: 999999; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="office-page">
        <div class="notranslate ui-nav-arrows">
            <a href="index.html">&lt;</a>
            <a href="index.html">&lt;&lt;</a>
        </div>
        
        <div class="ui-header-center notranslate">
            <div class="avatar-wrapper" style="width: 42px; height: 42px;">
                <img id="header-avatar" class="user-avatar" src="" alt="Avatar" style="display:none; width: 100%; height: 100%;">
                <div class="flag-badge" id="main-header-flag">🇷🇺</div>
            </div>
        </div>
        <div class="ui-header-right notranslate">GY-GY</div>

        <div id="office-dynamic-root" style="width: 100%; display: flex; justify-content: center;"></div>
    </div>

    <div class="secret-trigger" onclick="triggerBossAuth()"></div>

    <script>
        // ДАННЫЕ ВЛАДЕЛЬЦА
        let myPhone = '+79991112233';
        let useAvatarInChat = true; 

        // Считываем флаг и язык, которые были выбраны на первой странице регистрации
        // Если в системе ничего нет — по умолчанию ставим Шефу Россию и русский язык
        let myBossFlag = localStorage.getItem('gygy_user_flag') || '🇷🇺';
        let myLang = localStorage.getItem('gygy_user_lang') || 'ru';

        // КЛУБНЫЙ РЕЕСТР СОТРУДНИКОВ
        const staffRegistry = {
            "+3361234567": { name: "Jean (Fabrique)", lang: "fr", flag: "🇫🇷", avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100" },
            "+1202555014": { name: "John (Developer)", lang: "en", flag: "🇺🇸", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100" },
            "+7999000000": { name: "Алексей (Склад)", lang: "ru", flag: "🇷🇺", avatar: "" }
        };

        let activeStaffPhone = "+3361234567"; 

        let chatMessages = [
            { id: 1, phone: "+3361234567", text: "Bonjour Patron! У нас готовы новые лекала для худи.", trans: "Привет Шеф! У нас готовы новые лекала для худи." },
            { id: 2, phone: "+79991112233", text: "Отлично, Жан. Проверил плотность ткани?", trans: "Excellent, Jean. Avez-vous vérifié la densité du tissu?" }
        ];

        const defaultTasks = [
            { id: 1, status: 'todo', text: 'Связать вебхуки n8n с таблицей заказов', access: '+3361234567' },
            { id: 2, status: 'progress', text: 'Откалибровать модуль Studio', access: '+7999000000' }
        ];
        let tasks = JSON.parse(localStorage.getItem('gygy_trello_tasks')) || defaultTasks;

        document.addEventListener("DOMContentLoaded", function() {
            // Загрузка главной аватарки
            const savedAvatar = localStorage.getItem('gygy_avatar') || localStorage.getItem('gy_user_img');
            const avatarEl = document.getElementById('header-avatar');
            if (savedAvatar && avatarEl) {
                avatarEl.src = savedAvatar;
                avatarEl.style.display = 'block';
            } else if (avatarEl) {
                avatarEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23fff'/><circle cx='16' cy='12' r='5' fill='%23d4af37'/><path d='M6 28 c0-6 5-10 10-10 s10 4 10 10' fill='%23d4af37'/></svg>";
                avatarEl.style.display = 'block';
            }

            // РЕНДЕР НАСТОЯЩЕГО ФЛАГА В ХЕДЕРЕ
            syncHeaderFlagDisplay();
            renderOffice();
        });

        // Функция берет именно графический флаг и вставляет в элемент над аватаром
        function syncHeaderFlagDisplay() {
            const flagEl = document.getElementById('main-header-flag');
            if (flagEl) {
                flagEl.innerText = myBossFlag; 
            }
        }

        function renderOffice() {
            const root = document.getElementById('office-dynamic-root');
            const isBoss = localStorage.getItem('gygy_is_boss') === 'true';

            if (isBoss) {
                let currentStaff = staffRegistry[activeStaffPhone] || { name: "Вне сети", lang: "ru", flag: "🏴‍☠️", avatar: "" };

                root.innerHTML = `
                    <div class="workspace-container notranslate">
                        <div class="trello-board">
                            <div class="trello-column">
                                <div class="column-header">БЭКЛОГ И ПОРУЧЕНИЯ</div>
                                <div class="cards-container" id="col-todo"></div>
                                <input type="text" id="input-todo" class="office-input" placeholder="Задача...">
                                <input type="text" id="access-todo" class="office-input" placeholder="Тел: +33...">
                                <button class="btn-office" onclick="addTask('todo')">Поручить</button>
                            </div>
                            <div class="trello-column"><div class="column-header">В ПРОЦЕССЕ</div><div class="cards-container" id="col-progress"></div></div>
                            <div class="trello-column">
                                <div class="column-header">ГОТОВО</div>
                                <div class="cards-container" id="col-done"></div>
                                <button class="btn-office" style="border-color:#ff3333; color:#ff3333; margin-top:auto;" onclick="exitBossMode()">Закрыть пульт</button>
                            </div>
                        </div>

                        <div class="global-chat-panel">
                            <div class="column-header" style="border-bottom: 1px solid var(--violet); padding-bottom:5px; flex-direction: column; gap: 8px;">
                                <div style="display:flex; width:100%; gap:5px;">
                                    <input type="text" id="phone-search-input" class="office-input" value="${activeStaffPhone}" placeholder="Вызвать номер: +33...">
                                    <button class="btn-office" onclick="callStaffByPhone()">ВЫЗВАТЬ</button>
                                </div>
                                <div style="font-size:11px; color:#fff; display:flex; justify-content:space-between; width:100%; align-items:center;">
                                    <div>Канал: <strong style="color:var(--gold)">${currentStaff.name}</strong></div>
                                    
                                    <select onchange="changeMyFlagAndLang(this.value)" style="background:#000; color:var(--gold); border:1px solid var(--gold); font-size:10px; font-family:inherit;">
                                        <option value="ru|🇷🇺" ${myLang==='ru'?'selected':''}>Я из РФ 🇷🇺</option>
                                        <option value="fr|🇫🇷" ${myLang==='fr'?'selected':''}>Я из Франции 🇫🇷</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="chat-history" id="chat-box"></div>
                            
                            <div class="chat-controls">
                                <label style="font-size: 10px; color: #aaa; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; margin-bottom: 2px;">
                                    <input type="checkbox" id="toggle-avatar-chat" ${useAvatarInChat ? 'checked' : ''} onchange="toggleAvatarUsage(this.checked)">
                                    Отображать аватары и цифровые паспорта (флаги)
                                </label>
                                <div class="input-row">
                                    <button id="mic-btn" class="btn-office btn-mic" onclick="toggleVoiceInput()">🎤</button>
                                    <input type="text" id="chat-input" class="office-input" placeholder="Говорите или пишите сообщение...">
                                    <button class="btn-office" onclick="sendChatMessage()">ОТПРАВИТЬ</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                renderCards();
                renderChat();
            } else {
                const nickname = localStorage.getItem('gygy_nickname') || 'Резидент Клуба';
                const uid = localStorage.getItem('gygy_digital_id') || 'Trace-ID-Not-Found';
                root.innerHTML = `
                    <div class="client-box">
                        <div style="font-size: 18px; color: #fff; margin-bottom: 15px; letter-spacing: 2px;">ОФИЦИАЛЬНЫЙ ИНФОРМАТОР GY-GY</div>
                        <p style="font-size: 13px; color: #aaa;">Служебный бот собирает официальные данные по вашей активности в клубе.</p>
                        <div style="background:#111; padding: 12px; border: 1px dashed var(--gold); margin: 15px 0; text-align: left; font-size: 12px;">
                            <div>• Сеть: Авторизован</div>
                            <div>• Профиль: <span style="color:var(--violet)">${nickname}</span></div>
                            <div>• Твой ID: <span style="color:#fff">${uid}</span></div>
                        </div>
                        <button class="btn-office" onclick="alert('Заказы формируются...')">Статус моих принтов</button>
                    </div>
                `;
            }
        }

        function renderChat() {
            const box = document.getElementById('chat-box');
            if (!box) return;
            box.innerHTML = '';

            let currentStaff = staffRegistry[activeStaffPhone] || { name: "Аноним", lang: "ru", flag: "🏴‍☠️", avatar: "" };

            chatMessages.forEach(m => {
                const isMe = m.phone === myPhone;
                const sideClass = isMe ? 'my-side' : 'foreign-side';
                
                const textToShow = isMe ? m.text : (currentStaff.lang === myLang ? m.text : m.trans);
                const subText = isMe ? '' : (currentStaff.lang === myLang ? '' : `[${currentStaff.lang.toUpperCase()}]: ${m.text}`);

                // Настройка паспорта сообщения: подтягиваем аватарки и флаги стран
                let avatarSrc = isMe ? (localStorage.getItem('gygy_avatar') || localStorage.getItem('gy_user_img')) : currentStaff.avatar;
                let flagSymbol = isMe ? myBossFlag : currentStaff.flag;

                let avatarHTML = '';
                if (useAvatarInChat) {
                    avatarHTML = `
                        <div class="avatar-wrapper" style="width: 32px; height: 32px;">
                            <img src="${avatarSrc || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'32\' height=\'32\'><circle cx=\'16\' cy=\'16\' r=\'16\' fill=\'%23fff\'/></svg>'}" class="user-avatar" style="width:100%; height:100%;">
                            <div class="flag-badge">${flagSymbol}</div>
                        </div>
                    `;
                }

                const msgContainer = document.createElement('div');
                msgContainer.className = `msg-container ${sideClass}`;
                msgContainer.innerHTML = `
                    ${avatarHTML}
                    <div class="msg-bubble">
                        <div style="font-weight:bold; font-size:10px; color:var(--gold); margin-bottom:2px;">${isMe ? 'Ты (Шеф)' : currentStaff.name}</div>
                        <div>${textToShow}</div>
                        <div style="font-size:9px; color:#888; font-style:italic; margin-top:2px;">${subText}</div>
                        <div style="font-size:8px; color:var(--gold); text-align:right; margin-top:4px; cursor:pointer; user-select:none;" onclick="speakText('${textToShow}', '${myLang}')">🔊 Слушать</div>
                    </div>
                `;
                box.appendChild(msgContainer);
            });
            box.scrollTop = box.scrollHeight;
        }

        function callStaffByPhone() {
            const phoneInput = document.getElementById('phone-search-input').value.trim();
            if (!phoneInput) return;
            activeStaffPhone = phoneInput;
            chatMessages = [{ id: Date.now(), phone: activeStaffPhone, text: "Защищенный мост связи активирован.", trans: "Pont de communication activé." }];
            renderOffice();
        }

        function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            if (!inp.value.trim()) return;

            const text = inp.value.trim();
            let currentStaff = staffRegistry[activeStaffPhone] || { lang: 'en' };

            let translation = text;
            if (myLang === 'ru') {
                translation = "[FR перевод]: " + text + " (s'il vous plaît)";
            } else {
                translation = "[RU перевод]: " + text + " (пожалуйста)";
            }

            chatMessages.push({ id: Date.now(), phone: myPhone, text: text, trans: translation });
            inp.value = '';
            renderChat();
        }

        // Динамическая смена паспорта (и флага, и языка одновременно)
        function changeMyFlagAndLang(combinedValue) {
            const parts = combinedValue.split('|');
            myLang = parts[0];
            myBossFlag = parts[1];
            
            // Сохраняем в память, как будто выбор сделан на первой странице
            localStorage.setItem('gygy_user_lang', myLang);
            localStorage.setItem('gygy_user_flag', myBossFlag);

            syncHeaderFlagDisplay(); // Обновляем визуальный флаг вверху экрана
            renderOffice();
        }

        function toggleAvatarUsage(isChecked) {
            useAvatarInChat = isChecked;
            renderChat();
        }

        /* МИКРОФОН С УЧЕТОМ ЯЗЫКА */
        let recognition;
        let isRecording = false;

        function toggleVoiceInput() {
            const micBtn = document.getElementById('mic-btn');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Web Speech не поддерживается."); return; }

            if (!recognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.onstart = () => { isRecording = true; micBtn.classList.add('recording'); };
                recognition.onresult = (e) => { document.getElementById('chat-input').value = e.results[0][0].transcript; };
                recognition.onerror = () => { stopRecording(); };
                recognition.onend = () => { stopRecording(); };
            }

            if (!isRecording) {
                recognition.lang = myLang === 'ru' ? 'ru-RU' : 'fr-FR';
                recognition.start();
            } else {
                recognition.stop();
            }
        }
        function stopRecording() { isRecording = false; const micBtn = document.getElementById('mic-btn'); if (micBtn) micBtn.classList.remove('recording'); }
        function speakText(text, lang) { if (!window.speechSynthesis) return; const u = new SpeechSynthesisUtterance(text); u.lang = lang === 'ru' ? 'ru-RU' : 'fr-FR'; window.speechSynthesis.speak(u); }

        /* TRELLO */
        function renderCards() {
            ['todo', 'progress', 'done'].forEach(s => document.getElementById(`col-${s}`).innerHTML = '');
            tasks.forEach(t => {
                const card = document.createElement('div'); card.className = 'trello-card';
                card.innerHTML = `<div>${t.text}</div><div style="color:var(--violet); font-size:9px; margin-top:4px;">Исполнитель: ${t.access}</div>`;
                const col = document.getElementById(`col-${t.status}`); if (col) col.appendChild(card);
            });
        }
        function addTask(status) {
            const txt = document.getElementById(`input-${status}`).value;
            const acc = document.getElementById(`access-${status}`).value || 'Все';
            if (!txt.trim()) return;
            tasks.push({ id: Date.now(), status: status, text: txt, access: acc });
            localStorage.setItem('gygy_trello_tasks', JSON.stringify(tasks));
            renderCards();
            document.getElementById(`input-${status}`).value = '';
            document.getElementById(`access-${status}`).value = '';
        }

        function triggerBossAuth() {
            const pass = prompt("Ключ:");
            if (pass === "gygy2026") { localStorage.setItem('gygy_is_boss', 'true'); renderOffice(); }
        }
        function exitBossMode() { localStorage.setItem('gygy_is_boss', 'false'); renderOffice(); }
    </script>
</body>
</html>
