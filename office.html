<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY Club - Office v9.9.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
        }
        body, button, input, div, span { pointer-events: auto !important; }

        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* ==================================================== */
        /* STANDARD TOP BAR                                     */
        /* ==================================================== */
        .office-top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: #000; z-index: 1000000;
        }

        .ui-nav-arrows {
            display: flex; gap: 20px; font-size: 26px; font-weight: 900; cursor: pointer; user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.7; text-shadow: 0 0 8px var(--gold); }

        /* РОДНОЙ СТИЛЬ БАДЖА ИЗ СТУДИИ */
        .ui-user-badge {
            position: fixed !important; top: 12px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 50px !important; height: 50px !important; border-radius: 50% !important;
            border: 2px solid var(--gold) !important; background: #111 !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.35) !important; z-index: 1000000 !important; 
            cursor: pointer; display: flex !important; align-items: center !important; justify-content: center !important;
            overflow: hidden !important; opacity: 1 !important; visibility: visible !important;
        }
        .ui-user-badge:hover { transform: translateX(-50%) scale(1.05) !important; box-shadow: 0 0 20px var(--gold) !important; }
        
        .ui-user-badge svg, .ui-user-badge img { 
            width: 100% !important; height: 100% !important; 
            display: block !important; object-fit: cover !important;
        }

        /* Панель быстрого выбора аватара */
        .top-avatar-selector {
            display: none; position: absolute; top: 65px; left: 50%; transform: translateX(-50%);
            background: #000; border: 2px solid var(--gold); padding: 8px; gap: 8px;
            grid-template-columns: repeat(4, 40px); z-index: 2000000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .top-avatar-selector.active { display: grid; }
        
        .popup-avatar-option { 
            width: 40px; height: 40px; border: 1px solid rgba(214, 175, 55, 0.4); 
            border-radius: 50%; cursor: pointer; background: #222;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        .ui-header-right { display: flex; flex-direction: column; align-items: flex-end; user-select: none; }
        .logo-text { font-size: 24px; letter-spacing: 3px; font-weight: bold; line-height: 1; }
        .version-text { font-size: 10px; color: rgba(214, 175, 55, 0.5); letter-spacing: 1px; margin-top: 2px; }

        /* ==================================================== */
        /* MAIN WORKSPACE                                       */
        /* ==================================================== */
        .office-chats-container { 
            width: 90vw; max-width: 500px; height: 82vh; 
            border: 2px solid var(--gold); background: rgba(0, 0, 0, 0.9); 
            margin: 90px auto 0 auto; position: relative; box-shadow: 0 0 20px rgba(214, 175, 55, 0.15); 
            display: flex; flex-direction: column; padding: 15px;
        }

        .office-internal-tabs {
            display: flex; justify-content: space-between; gap: 6px; margin-bottom: 15px; border-bottom: 1px solid rgba(214, 175, 55, 0.3); padding-bottom: 12px;
        }
        .tab-num {
            flex-grow: 1; height: 36px; border: 1px solid var(--gold); background: #000; color: var(--gold);
            font-family: 'Share Tech Mono', monospace; font-size: 16px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        .tab-num:hover, .tab-num.active {
            background: #000 !important; color: var(--gold) !important; border-color: var(--gold) !important;
            text-shadow: 0 0 10px var(--gold) !important; box-shadow: 0 0 12px rgba(214, 175, 55, 0.6) !important;
        }
        
        .office-chat-page { display: none; flex-direction: column; flex-grow: 1; }
        .office-chat-page.active { display: flex !important; }

        .room-title-container { margin-bottom: 10px; min-height: 28px; display: flex; align-items: center; }
        .room-title { font-size: 18px; font-weight: bold; cursor: pointer; border-bottom: 1px dashed transparent; }

        .chat-history { flex-grow: 1; overflow-y: auto; border: 1px solid rgba(214, 175, 55, 0.3); padding: 10px; margin-bottom: 12px; background: #000; }
        .chat-message { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
        .msg-avatar-holder { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-username { font-size: 11px; color: rgba(214, 175, 55, 0.6); margin-bottom: 2px; font-weight: bold; }
        .msg-text { font-size: 14px; color: #fff; word-break: break-all; }

        .chat-input-zone { display: flex; gap: 6px; }
        .chat-input-zone input { flex-grow: 1; background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 0 12px; font-family: 'Share Tech Mono'; outline: none; font-size: 14px; height: 40px; }
        .btn-action { height: 40px; padding: 0 12px; background: #000; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; font-weight: 900; font-size: 12px; text-transform: uppercase; }
        
        .notranslate goog-te-banner-frame, .skiptranslate { display: none !important; }
    </style>
</head>
<body class="notranslate">

    <div class="office-top-bar">
        <div class="ui-nav-arrows">
            <span class="arrow-item" onclick="goBack()">&lt;</span>
            <span class="arrow-item" onclick="goToStart()">&lt;&lt;</span>
        </div>
        
        <div class="ui-user-badge" onclick="toggleTopAvatarSelector()"></div>

        <div class="top-avatar-selector" id="top-avatar-popup">
            <div class="popup-avatar-option" onclick="changeGlobalAvatar(1)"><svg viewBox="0 0 100 100" style="width:100%;height:100%;"><circle cx="50" cy="35" r="20" fill="#d4af37"/><path d="M20 85 C20 60, 80 60, 80 85" fill="#d4af37"/></svg></div>
            <div class="popup-avatar-option" onclick="changeGlobalAvatar(2)"><svg viewBox="0 0 100 100" style="width:100%;height:100%;"><circle cx="50" cy="35" r="18" fill="#8A2BE2"/><path d="M15 85 Q50 50 85 85" fill="#8A2BE2"/></svg></div>
            <div class="popup-avatar-option" onclick="changeGlobalAvatar(3)"><svg viewBox="0 0 100 100" style="width:100%;height:100%;"><rect x="30" y="20" width="40" height="40" fill="#d4af37"/><path d="M10 90 L30 65 L70 65 L90 90 Z" fill="#d4af37"/></svg></div>
            <div class="popup-avatar-option" onclick="changeGlobalAvatar(4)"><svg viewBox="0 0 100 100" style="width:100%;height:100%;"><circle cx="50" cy="50" r="30" fill="none" stroke="#d4af37" stroke-width="6"/><circle cx="50" cy="50" r="10" fill="#8A2BE2"/></svg></div>
        </div>

        <div class="ui-header-right">
            <span class="logo-text">GY-GY</span>
            <span class="version-text">v9.9.2</span>
        </div>
    </div>

    <div class="office-chats-container">
        <div class="office-internal-tabs">
            <div class="tab-num active" id="tab-btn-1" onclick="switchOfficePage(1)">1</div>
            <div class="tab-num" id="tab-btn-2" onclick="switchOfficePage(2)">2</div>
            <div class="tab-num" id="tab-btn-3" onclick="switchOfficePage(3)">3</div>
            <div class="tab-num" id="tab-btn-4" onclick="switchOfficePage(4)">4</div>
            <div class="tab-num" id="tab-btn-5" onclick="switchOfficePage(5)">5</div>
            <div class="tab-num" id="tab-btn-6" onclick="switchOfficePage(6)">6</div>
        </div>

        <div id="office-page-1" class="office-chat-page active">
            <div class="room-title-container">
                <div class="room-title" id="title-text-1" onclick="editRoomTitle(1)">ROOM 01 | AI CORE</div>
            </div>
            <div class="chat-history" id="chat-history-1">
                <div class="chat-message">
                    <div class="msg-avatar-holder">
                        <svg viewBox="0 0 100 100" style="width:100%;height:100%;"><rect x="25" y="25" width="50" height="50" fill="none" stroke="#8A2BE2" stroke-width="4"/><circle cx="40" cy="45" r="6" fill="#8A2BE2"/><circle cx="60" cy="45" r="6" fill="#8A2BE2"/><path d="M35 65 L65 65" stroke="#8A2BE2" stroke-width="4"/></svg>
                    </div>
                    <div class="msg-content">
                        <span class="msg-username">SYSTEM ASSISTANT</span>
                        <span class="msg-text">Внутренний шлюз Офиса v9.9.2 активирован. Аватар импортирован по методу Студии.</span>
                    </div>
                </div>
            </div>
            <div class="chat-input-zone">
                <input type="text" id="chat-input-1" placeholder="Задать вопрос ИИ-Ядру..." onkeydown="if(event.key==='Enter') sendMessage(1)">
                <button class="btn-action" onclick="consultStaff(1)">КОНСУЛЬТАЦИЯ</button>
                <button class="btn-action" onclick="sendMessage(1)">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const avatarCodes = {
            1: `<svg viewBox="0 0 100 100"><circle cx="50" cy="35" r="20" fill="#d4af37"/><path d="M20 85 C20 60, 80 60, 80 85" fill="#d4af37"/></svg>`,
            2: `<svg viewBox="0 0 100 100"><circle cx="50" cy="35" r="18" fill="#8A2BE2"/><path d="M15 85 Q50 50 85 85" fill="#8A2BE2"/></svg>`,
            3: `<svg viewBox="0 0 100 100"><rect x="30" y="20" width="40" height="40" fill="#d4af37"/><path d="M10 90 L30 65 L70 65 L90 90 Z" fill="#d4af37"/></svg>`,
            4: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="#d4af37" stroke-width="6"/><circle cx="50" cy="50" r="10" fill="#8A2BE2"/></svg>`
        };

        function getTargetAvatar() {
            let keys = ['userAvatarID', 'avatarID', 'savedAvatar', 'avatar', 'user_avatar', 'userAvatar', 'currentAvatar'];
            for (let key of keys) {
                let data = localStorage.getItem(key);
                if (data) {
                    data = data.trim();
                    if (data.includes('<svg') || data.includes('viewBox')) return data;
                    if (data.includes('data:image') || data.includes('http')) return `<img src="${data}">`;
                    let num = parseInt(data.replace(/[^0-9]/g, ''));
                    if (num >= 1 && num <= 4) return avatarCodes[num];
                }
            }
            return avatarCodes[1]; // Премиальный дефолт
        }

        function applyCorrectAvatar() {
            let activeAvatarHTML = getTargetAvatar();
            let badges = document.querySelectorAll('.ui-user-badge');
            badges.forEach(badge => {
                if (badge.innerHTML.trim() !== activeAvatarHTML.trim()) {
                    badge.innerHTML = activeAvatarHTML;
                }
            });
        }

        // Чистый вызов сразу при чтении скрипта и дубли на загрузку
        applyCorrectAvatar();
        document.addEventListener('DOMContentLoaded', applyCorrectAvatar);
        window.addEventListener('load', applyCorrectAvatar);

        function toggleTopAvatarSelector() { document.getElementById('top-avatar-popup').classList.toggle('active'); }

        function changeGlobalAvatar(id) {
            let code = avatarCodes[id];
            localStorage.setItem('userAvatarID', id);
            localStorage.setItem('avatarID', id);
            localStorage.setItem('avatar', code);
            localStorage.setItem('userAvatar', code);
            applyCorrectAvatar();
            document.getElementById('top-avatar-popup').classList.remove('active');
        }

        function switchOfficePage(num) { 
            if (num !== 1) alert(`Переключение на ROOM 0${num}. Функция в разработке согласно архитектурному плану!`);
        }

        function editRoomTitle(num) {
            const titleText = document.getElementById(`title-text-${num}`);
            const currentName = titleText.innerText;
            const container = titleText.parentElement;
            const input = document.createElement('input');
            input.type = 'text'; input.className = 'room-title-input'; input.value = currentName;
            container.innerHTML = ''; container.appendChild(input); input.focus();
            function save() { container.innerHTML = `<div class="room-title" id="title-text-${num}" onclick="editRoomTitle(${num})">${input.value.trim() || 'ROOM 01'}</div>`; }
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if(e.key === 'Enter') save(); });
        }

        function sendMessage(num) {
            const input = document.getElementById(`chat-input-${num}`);
            if (!input.value.trim()) return;
            const history = document.getElementById(`chat-history-${num}`);
            const msg = document.createElement('div');
            msg.className = 'chat-message';
            msg.innerHTML = `<div class="msg-avatar-holder">${getTargetAvatar()}</div><div class="msg-content"><span class="msg-username">You</span><span class="msg-text">${input.value.trim()}</span></div>`;
            history.appendChild(msg); input.value = ''; history.scrollTop = history.scrollHeight;
        }

        function consultStaff(num) {
            const history = document.getElementById(`chat-history-${num}`);
            const msg = document.createElement('div');
            msg.className = 'chat-message';
            msg.innerHTML = `<div class="msg-avatar-holder"><svg viewBox="0 0 100 100" style="width:100%;height:100%;"><rect x="25" y="25" width="50" height="50" fill="none" stroke="#8A2BE2" stroke-width="4"/><circle cx="40" cy="45" r="6" fill="#8A2BE2"/><circle cx="60" cy="45" r="6" fill="#8A2BE2"/><path d="M35 65 L65 65" stroke="#8A2BE2" stroke-width="4"/></svg></div><div class="msg-content"><span class="msg-username" style="color:var(--violet);">SYSTEM</span><span class="msg-text" style="color:var(--gold);font-style:italic;">Запрос обрабатывается AI-Ядром Офиса...</span></div>`;
            history.appendChild(msg); history.scrollTop = history.scrollHeight;
        }

        function goBack() { window.location.href = 'index.html'; }
        function goToStart() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
