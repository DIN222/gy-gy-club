<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY Club - Office  002 </title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
        }
        body, button, input, div, img, span { pointer-events: auto !important; }

        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* ПОСТОЯННЫЕ АТРИБУТЫ СТРАНИЦЫ (БРЕНДИНГ GY-GY) */
        .ui-header-right { 
            position: fixed !important; top: 18px !important; right: 25px !important; z-index: 1000000 !important; 
            font-size: 24px !important; letter-spacing: 3px !important; font-weight: bold !important; user-select: none !important;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            cursor: pointer;
        }

        /* ПОСТОЯННАЯ КНОПКА ВОЗВРАТА */
        .ui-back-btn {
            position: fixed !important; top: 18px !important; left: 25px !important; z-index: 1000000 !important;
            font-size: 24px !important; font-weight: bold !important; cursor: pointer; user-select: none !important;
            transition: all 0.3s;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .ui-back-btn:hover {
            text-shadow: 0 0 8px var(--gold), 0 0 15px var(--gold) !important;
        }

        /* СТИЛЬ ЗАГОЛОВКА */
        .quote-text { 
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; 
            text-align: center !important; width: 100% !important; max-width: 90vw !important; margin: 10px auto 30px auto !important; 
            text-shadow: 2px 2px 4px #000; display: block !important; color: var(--gold);
        }

        /* ПРОСТРАНСТВО ОФИСА (СТРОГО В ЭКРАНЕ) */
        #block-office {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
            padding-bottom: 4vh;
            overflow: hidden;
        }

        /* ПАНЕЛЬ ПЕРЕКЛЮЧЕНИЯ СТРАНИЦ (ТАБЫ 1-6) */
        .office-tabs-panel { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px; 
            z-index: 100; 
        }
        
        .tab-num {
            width: 42px; 
            height: 42px; 
            border: 2px solid var(--gold); 
            background: #000; 
            color: var(--gold);
            font-family: 'Share Tech Mono', monospace; 
            font-size: 18px; 
            font-weight: 900; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease;
            text-shadow: 0 0 2px rgba(214, 175, 55, 0.3);
        }
        
        /* Фирменное неоновое свечение букв без изменения черного фона */
        .tab-num:hover, .tab-num.active {
            background: #000 !important; 
            color: var(--gold) !important; 
            border-color: var(--gold) !important;
            text-shadow: 0 0 8px var(--gold), 0 0 15px var(--gold) !important; 
            box-shadow: 0 0 12px rgba(214, 175, 55, 0.5);
        }

        /* КОНТЕЙНЕР ДЛЯ АКТИВНОГО ЧАТА */
        .office-chats-container { 
            width: 90vw; 
            max-width: 500px; 
            height: 55vh; 
            border: 2px solid var(--gold); 
            background: rgba(0, 0, 0, 0.9); 
            position: relative; 
            box-shadow: 0 0 20px rgba(214, 175, 55, 0.15); 
        }
        
        .office-chat-page { 
            position: absolute; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            padding: 15px; 
        }
        .office-chat-page.active { 
            display: flex !important; 
        }
        
        /* ИНТЕРФЕЙС СТРАНИЦЫ ЧАТА */
        .chat-history { 
            flex-grow: 1; 
            overflow-y: auto; 
            border: 1px solid rgba(214, 175, 55, 0.3); 
            padding: 10px; 
            margin-bottom: 12px; 
            font-size: 14px; 
            text-align: left; 
            background: #000;
        }
        
        .chat-input-zone { 
            display: flex; 
            gap: 8px; 
        }
        
        .chat-input-zone input { 
            flex-grow: 1; 
            background: #000; 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            padding: 10px 12px; 
            font-family: 'Share Tech Mono', monospace; 
            outline: none; 
            font-size: 14px;
        }
        
        /* КНОПКА ОТПРАВКИ (БЕЗ ЖЕЛТОЙ ЗАЛИВКИ ФОНА) */
        .btn-send { 
            padding: 0 20px; 
            background: #000; 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            font-family: 'Share Tech Mono', monospace; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: all 0.3s; 
        }
        .btn-send:hover { 
            background: #000 !important;
            color: var(--gold) !important;
            text-shadow: 0 0 8px var(--gold); 
            box-shadow: 0 0 10px rgba(214, 175, 55, 0.4); 
        }

        /* Изоляция от переводчика Google */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
    </style>
</head>
<body>

    <div class="ui-back-btn" onclick="goBack()">&lt; BACK</div>
    <div class="ui-header-right">GY-GY</div>

    <div id="block-office">
        <div class="quote-text">OFFICE CHANNELS</div>

        <div class="office-tabs-panel">
            <div class="tab-num active" onclick="switchOfficePage(1)">1</div>
            <div class="tab-num" onclick="switchOfficePage(2)">2</div>
            <div class="tab-num" onclick="switchOfficePage(3)">3</div>
            <div class="tab-num" onclick="switchOfficePage(4)">4</div>
            <div class="tab-num" onclick="switchOfficePage(5)">5</div>
            <div class="tab-num" onclick="switchOfficePage(6)">6</div>
        </div>

        <div class="office-chats-container">
            
            <div id="office-page-1" class="office-chat-page active">
                <div class="chat-history">--- CHANNEL 01 SYSTEM ONLINE ---</div>
                <div class="chat-input-zone">
                    <input type="text" placeholder="Type message to channel 1...">
                    <button class="btn-send">SEND</button>
                </div>
            </div>

            <div id="office-page-2" class="office-chat-page">
                <div class="chat-history">--- CHANNEL 02 SYSTEM ONLINE ---</div>
                <div class="chat-input-zone">
                    <input type="text" placeholder="Type message to channel 2...">
                    <button class="btn-send">SEND</button>
                </div>
            </div>

            <div id="office-page-3" class="office-chat-page">
                <div class="chat-history">--- CHANNEL 03 SYSTEM ONLINE ---</div>
                <div class="chat-input-zone">
                    <input type="text" placeholder="Type message to channel 3...">
                    <button class="btn-send">SEND</button>
                </div>
            </div>

            <div id="office-page-4" class="office-chat-page">
                <div class="chat-history">--- CHANNEL 04 SYSTEM ONLINE ---</div>
                <div class="chat-input-zone">
                    <input type="text" placeholder="Type message to channel 4...">
                    <button class="btn-send">SEND</button>
                </div>
            </div>

            <div id="office-page-5" class="office-chat-page">
                <div class="chat-history">--- CHANNEL 05 SYSTEM ONLINE ---</div>
                <div class="chat-input-zone">
                    <input type="text" placeholder="Type message to channel 5...">
                    <button class="btn-send">SEND</button>
                </div>
            </div>

            <div id="office-page-6" class="office-chat-page">
                <div class="chat-history">--- CHANNEL 06 SYSTEM ONLINE ---</div>
                <div class="chat-input-zone">
                    <input type="text" placeholder="Type message to channel 6...">
                    <button class="btn-send">SEND</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Функция переключения активной страницы чата
        function switchOfficePage(pageNum) {
            // Снимаем подсветку со всех номеров панелей
            document.querySelectorAll('.tab-num').forEach(tab => tab.classList.remove('active'));
            // Скрываем все страницы чатов
            document.querySelectorAll('.office-chat-page').forEach(page => page.classList.remove('active'));

            // Включаем нужный номер
            const tabs = document.querySelectorAll('.tab-num');
            if(tabs[pageNum - 1]) tabs[pageNum - 1].classList.add('active');

            // Отображаем нужный чат
            const activePage = document.getElementById(`office-page-${pageNum}`);
            if(activePage) activePage.classList.add('active');
        }

        // Функция возврата на предыдущий уровень (в Холл)
        function goBack() {
            window.location.href = 'index.html'; // Или пропиши нужный переход, например 'hall.html'
        }
    </script>
</body>
</html>
