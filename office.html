<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY Club - Office v8.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
        }
        body, button, input, div, span { pointer-events: auto !important; }

        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* ==================================================== */
        /* STANDARD TOP BAR WITH CORRECT ARROWS & VERSION       */
        /* ==================================================== */
        .office-top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: #000; z-index: 1000000;
        }

        /* Single Arrow < then Double Arrow << */
        .ui-nav-arrows {
            display: flex; gap: 20px; font-size: 26px; font-weight: 900; cursor: pointer; user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.7; text-shadow: 0 0 8px var(--gold); }

        /* Premium Registration Avatar */
        .ui-user-badge {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 48px; height: 48px; border-radius: 50%;
            border: 2px solid var(--gold); background: #111;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.35); cursor: pointer;
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .ui-user-badge:hover { transform: left: 50% scale(1.05); box-shadow: 0 0 20px var(--gold); }
        
        .avatar-svg { width: 100%; height: 100%; display: block; }

        /* Avatar Pop-up Selector */
        .top-avatar-selector {
            display: none; position: absolute; top: 65px; left: 50%; transform: translateX(-50%);
            background: #000; border: 2px solid var(--gold); padding: 8px; gap: 8px;
            grid-template-columns: repeat(4, 40px); z-index: 2000000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .top-avatar-selector.active { display: grid; }
        
        .popup-avatar-option { 
            width: 40px; height: 40px; border: 1px solid rgba(214, 175, 55, 0.4); 
            border-radius: 50%; cursor: pointer; background: #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .popup-avatar-option:hover { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

        /* GY-GY Logo with Version System */
        .ui-header-right { 
            display: flex; flex-direction: column; align-items: flex-end; user-select: none;
        }
        .logo-text { font-size: 24px; letter-spacing: 3px; font-weight: bold; line-height: 1; }
        .version-text { font-size: 10px; color: rgba(214, 175, 55, 0.5); letter-spacing: 1px; margin-top: 2px; }

        /* ==================================================== */
        /* MAIN WORKSPACE                                       */
        /* ==================================================== */
        .office-chats-container { 
            width: 90vw; max-width: 500px; height: 82vh; 
            border: 2px solid var(--gold); background: rgba(0, 0, 0, 0.9); 
            margin: 90px auto 0 auto; position: relative; box-shadow: 0 0 20px rgba(214, 175, 55, 0.15); 
            display: flex; flex-direction: column; padding: 15px;
        }

        /* 1-6 Dial Inside the Box */
        .office-internal-tabs {
            display: flex; justify-content: space-between; gap: 6px; margin-bottom: 15px; border-bottom: 1px solid rgba(214, 175, 55, 0.3); padding-bottom: 12px;
        }
        .tab-num {
            flex-grow: 1; height: 36px; border: 1px solid var(--gold); background: #000; color: var(--gold);
            font-family: 'Share Tech Mono', monospace; font-size: 16px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        .tab-num:hover, .tab-num.active {
            background: #000 !important; color: var(--gold) !important; border-color: var(--gold) !important;
            text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold) !important; 
            box-shadow: 0 0 12px rgba(214, 175, 55, 0.6) !important;
        }
        
        /* ROOM CONTENT */
        .office-chat-page { display: none; flex-direction: column; flex-grow: 1; }
        .office-chat-page.active { display: flex !important; }

        /* EDITABLE TITLE */
        .room-title-container { margin-bottom: 10px; min-height: 28px; display: flex; align-items: center; }
        .room-title { font-size: 18px; font-weight: bold; cursor: pointer; border-bottom: 1px dashed transparent; transition: all 0.2s; }
        .room-title:hover { border-color: var(--gold); text-shadow: 0 0 5px var(--gold); }
        .room-title-input { background: #000; border: 1px solid var(--gold); color: var(--gold); font-family: 'Share Tech Mono'; font-size: 16px; padding: 2px 6px; width: 100%; outline: none; }

        /* CHAT LAYOUT */
        .chat-history { flex-grow: 1; overflow-y: auto; border: 1px solid rgba(214, 175, 55, 0.3); padding: 10px; margin-bottom: 12px; background: #000; }
        
        .chat-message { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
        .msg-avatar-holder { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-username { font-size: 11px; color: rgba(214, 175, 55, 0.6); margin-bottom: 2px; font-weight: bold; }
        .msg-text { font-size: 14px; color: #fff; word-break: break-all; }

        /* INPUT AREA */
        .chat-input-zone { display: flex; gap: 6px; position: relative; }
        .chat-input-zone input { flex-grow: 1; background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 0 12px; font-family: 'Share Tech Mono'; outline: none; font-size: 14px; height: 40px; }
        
        .btn-action { height: 40px; padding: 0 12px; background: #000; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; font-weight: 900; font-size: 12px; transition: all 0.3s; text-transform: uppercase; }
        .btn-action:hover { background: #000 !important; color: var(--gold) !important; text-shadow: 0 0 8px var(--gold); box-shadow: 0 0 10px rgba(214, 175, 55, 0.4); }

        /* STRICT ANTI-TRANSLATE SHIELD */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        body { top: 0px !important; }
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
    </style>
</head>
