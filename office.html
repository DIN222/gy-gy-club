<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY Club - Office 006 </title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
        }
        body, button, input, div, img, span { pointer-events: auto !important; }

        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            position: fixed; 
            margin: 0; 
        }

        /* ==================================================== */
        /* СТАНДАРТНАЯ ВЕРХНЯЯ ПАНЕЛЬ С КОРРЕКТНЫМИ СТРЕЛКАМИ   */
        /* ==================================================== */
        .office-top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: #000; z-index: 1000000;
        }

        /* Порядок: Одинарная, затем Двойная */
        .ui-nav-arrows {
            display: flex; gap: 20px; font-size: 26px; font-weight: 900; cursor: pointer; user-select: none;
        }
        .arrow-item { transition: opacity 0.2s; }
        .arrow-item:hover { opacity: 0.7; text-shadow: 0 0 8px var(--gold); }

        /* Центр: Премиальный аватар из регистрации */
        .ui-user-badge {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 48px; height: 48px; border-radius: 50%;
            border: 2px solid var(--gold); background: transparent;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.35); cursor: pointer;
        }
        .ui-user-badge .badge-img { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; 
        }
        .ui-user-badge .badge-flag {
            position: absolute; bottom: -2px; right: -2px;
            width: 18px; height: 13px; object-fit: cover;
            border: 1px solid var(--gold); border-radius: 2px; background: #000;
        }

        .ui-header-right { 
            font-size: 24px; letter-spacing: 3px; font-weight: bold; user-select: none;
        }

        /* ==================================================== */
        /* РАБОЧАЯ ЗОНА ОФИСА                                   */
        /* ==================================================== */
        .office-chats-container { 
            width: 90vw; max-width: 500px; height: 82vh; 
            border: 2px solid var(--gold); background: rgba(0, 0, 0, 0.9); 
            margin: 90px auto 0 auto; position: relative; box-shadow: 0 0 20px rgba(214, 175, 55, 0.15); 
            display: flex; flex-direction: column; padding: 15px;
        }

        /* ЧИСТАЯ ИНТЕРНАЛЬНАЯ ПАНЕЛЬ НОМЕРОВ */
        .office-internal-tabs {
            display: flex; justify-content: space-between; gap: 6px; margin-bottom: 15px; border-bottom: 1px solid rgba(214, 175, 55, 0.3); padding-bottom: 12px;
        }
        .tab-num {
            flex-grow: 1; height: 36px; border: 1px solid var(--gold); background: #000; color: var(--gold);
            font-family: 'Share Tech Mono', monospace; font-size: 16px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        /* При клике цвет меняется на сверхинтенсивный */
        .tab-num:hover, .tab-num.active {
            background: #000 !important; color: var(--gold) !important; border-color: var(--gold) !important;
            text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold) !important; 
            box-shadow: 0 0 12px rgba(214, 175, 55, 0.6) !important;
        }
        
        /* КОНТЕНТ СТРАНИЦ ЧАТА */
        .office-chat-page { display: none; flex-direction: column; flex-grow: 1; }
        .office-chat-page.active { display: flex !important; }

        /* РЕДАКТИРУЕМОЕ НАЗВАНИЕ */
        .room-title-container { margin-bottom: 10px; min-height: 28px; display: flex; align-items: center; }
        .room-title { font-size: 18px; font-weight: bold; cursor: pointer; border-bottom: 1px dashed transparent; transition: all 0.2s; }
        .room-title:hover { border-color: var(--gold); text-shadow: 0 0 5px var(--gold); }
        .room-title-input { background: #000; border: 1px solid var(--gold); color: var(--gold); font-family: 'Share Tech Mono'; font-size: 16px; padding: 2px 6px; width: 100%; outline: none; }

        /* СТАНДАРТНЫЙ ЧАТ */
        .chat-history { flex-grow: 1; overflow-y: auto; border: 1px solid rgba(214, 175, 55, 0.3); padding: 10px; margin-bottom: 12px; background: #000; }
        
        .chat-message { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; background: #222; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-username { font-size: 11px; color: rgba(214, 175, 55, 0.6); margin-bottom: 2px; font-weight: bold; }
        .msg-text { font-size: 14px; color: #fff; word-break: break-all; }

        /* ЗОНА ВВОДА И КНОПКИ ДЕЙСТВИЙ */
        .chat-input-zone { display: flex; gap: 6px; position: relative; }
        .chat-input-zone input { flex-grow: 1; background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 0 12px; font-family: 'Share Tech Mono'; outline: none; font-size: 14px; height: 40px; }
        
        .btn-action { height: 40px; padding: 0 12px; background: #000; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; font-weight: 900; font-size: 12px; transition: all 0.3s; text-transform: uppercase; }
        .btn-action:hover { background: #000 !important; color: var(--gold) !important; text-shadow: 0 0 8px var(--gold); box-shadow: 0 0 10px rgba(214, 175, 55, 0.4); }

        /* Индивидуальный акцент для кнопки консультации сотрудника */
        .btn-consult { border-color: var(--gold); opacity: 0.9; }

        /* Изоляция от переводчика Google */
        .goog-te-banner-frame, .skiptranslate, iframe.goog-te-menu-frame { display: none !important; }
        font { background-color: transparent !important; background: transparent !important; color: inherit !important; box-shadow: none !important; text-shadow: none !important; }
    </style>
</head>
<body>

    <!-- СТАНДАРТНАЯ ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="office-top-bar">
        <!-- Слева: Сначала одинарная, потом двойная -->
        <div class="ui-nav-arrows">
            <span class="arrow-item" onclick="goBack()">&lt;</span>
            <span class="arrow-item" onclick="goToStart()">&lt;&lt;</span>
        </div>
        
        <!-- Посредине: Круглый аватар из регистрации -->
        <div class="ui-user-badge">
            <img src="avatar_placeholder.jpg" class="badge-img" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=MainUser'">
            <img src="flag_placeholder.png" class="badge-flag" onerror="this.style.display='none'">
        </div>

        <!-- Справа: Логотип -->
        <div class="ui-header-right">GY-GY</div>
    </div>

    <!-- КОНТЕЙНЕР ОФИСА -->
    <div class="office-chats-container">
        
        <!-- Внутренние Номера Комнат (Всегда на виду вверху рамки) -->
        <div class="office-internal-tabs">
            <div class="tab-num active" id="tab-btn-1" onclick="switchOfficePage(1)">1</div>
            <div class="tab-num" id="tab-btn-2" onclick="switchOfficePage(2)">2</div>
            <div class="tab-num" id="tab-btn-3" onclick="switchOfficePage(3)">3</div>
            <div class="tab-num" id="tab-btn-4" onclick="switchOfficePage(4)">4</div>
            <div class="tab-num" id="tab-btn-5" onclick="switchOfficePage(5)">5</div>
            <div class="tab-num" id="tab-btn-6" onclick="switchOfficePage(6)">6</div>
        </div>

        <!-- Контент изолированных каналов (подгружается динамически по клику на табы) -->
        <script>
            for (let i = 1; i <= 6; i++) {
                document.write(`
                    <div id="office-page-${i}" class="office-chat-page ${i === 1 ? 'active' : ''}">
                        
                        <!-- Редактируемое название под табами -->
                        <div class="room-title-container">
                            <div class="room-title" id="title-text-${i}" onclick="editRoomTitle(${i})">ROOM 0${i}</div>
                        </div>

                        <!-- Стандартный чат -->
                        <div class="chat-history" id="chat-history-${i}">
                            <div class="chat-message">
                                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=staff${i}" class="msg-avatar">
                                <div class="msg-content">
                                    <span class="msg-username">OFFICE ASSISTANT</span>
                                    <span class="msg-text">Channel ${i} secure link online. How can I help you today?</span>
                                </div>
                            </div>
                        </div>

                        <!-- Инпуты, Отправка и кнопка Консультации с сотрудником -->
                        <div class="chat-input-zone">
                            <input type="text" id="chat-input-${i}" placeholder="Type question..." onkeydown="if(event.key==='Enter') sendMessage(${i})">
                            <button class="btn-action btn-consult" onclick="consultStaff(${i})">CONSULT</button>
                            <button class="btn-action" onclick="sendMessage(${i})">SEND</button>
                        </div>
                    </div>
                `);
            }
        </script>

    </div>

    <script>
        // Переключение комнат
        function switchOfficePage(pageNum) {
            // Гасим все табы и скрываем страницы
            document.querySelectorAll('.tab-num').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.office-chat-page').forEach(page => page.classList.remove('active'));

            // Зажигаем выбранный таб интенсивным неоном и открываем чат
            document.getElementById(`tab-btn-${pageNum}`).classList.add('active');
            document.getElementById(`office-page-${pageNum}`).classList.add('active');
        }

        // Редактирование названий комнат
        function editRoomTitle(roomNum) {
            const titleText = document.getElementById(`title-text-${roomNum}`);
            const currentName = titleText.innerText;
            const container = titleText.parentElement;

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'room-title-input';
            input.value = currentName;

            container.innerHTML = '';
            container.appendChild(input);
            input.focus();

            function saveTitle() {
                const newName = input.value.trim() || `ROOM 0${roomNum}`;
                container.innerHTML = `<div class="room-title" id="title-text-${roomNum}" onclick="editRoomTitle(${roomNum})">${newName}</div>`;
            }

            input.addEventListener('blur', saveTitle);
            input.addEventListener('keydown', (e) => { if(e.key === 'Enter') saveTitle(); });
        }

        // Отправка сообщений
        function sendMessage(roomNum) {
            const input = document.getElementById(`chat-input-${roomNum}`);
            const text = input.value.trim();
            if (!text) return;

            const history = document.getElementById(`chat-history-${roomNum}`);

            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            messageDiv.innerHTML = `
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=MainUser" class="msg-avatar">
                <div class="msg-content">
                    <span class="msg-username">You</span>
                    <span class="msg-text">${text}</span>
                </div>
            `;

            history.appendChild(messageDiv);
            input.value = '';
            history.scrollTop = history.scrollHeight;
        }

        // Кнопка CONSULT (Обсуждение с конкретным сотрудником)
        function consultStaff(roomNum) {
            const history = document.getElementById(`chat-history-${roomNum}`);
            const currentRoomName = document.getElementById(`title-text-${roomNum}`).innerText;
            
            const notifyDiv = document.createElement('div');
            notifyDiv.className = 'chat-message';
            notifyDiv.innerHTML = `
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=staff${roomNum}" class="msg-avatar">
                <div class="msg-content">
                    <span class="msg-username" style="color:var(--violet);">SYSTEM NOTICE</span>
                    <span class="msg-text" style="color:var(--gold); font-style:italic;">
                        Connecting dedicated specialist to discuss your specific question regarding "${currentRoomName}"...
                    </span>
                </div>
            `;
            history.appendChild(notifyDiv);
            history.scrollTop = history.scrollHeight;
        }

        function goBack() {
            window.location.href = 'index.html'; // Шаг назад (в Холл)
        }

        function goToStart() {
            window.location.href = 'index.html'; // В самое начало
        }
    </script>
</body>
</html>
