<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY | Регистрация 231</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #000; }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; outline: none !important; -webkit-user-select: none; user-select: none; }
        body { 
            width: 100%; height: 100vh; background: #000; color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; 
            overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.8s ease; 
        }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-gateway { position: fixed; top: 65px; left: 15px; z-index: 10000; width: 170px; }
        .btn-main-lang { width: 100%; padding: 10px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }
        .lang-panel { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #000; border: 1.5px solid var(--gold); border-top: none; max-height: 50vh; overflow-y: auto; z-index: 10001; }
        .lang-btn { width: 100%; padding: 12px; background: none; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.1); color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; font-family: inherit; text-align: left; }
        .flag-icon { width: 20px; border: 0.5px solid var(--gold); }

        .back-nav { position: fixed; top: 15px; left: 15px; z-index: 10002; cursor: pointer; color: var(--gold); font-size: 45px; font-weight: 900; line-height: 0.6; }
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000; font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; text-align: center; max-width: 85%; line-height: 1.2; margin-bottom: 35px; }

        .reg-grid { display: flex; gap: 10px; margin-bottom: 35px; }
        .box-final { 
            width: 85px; height: 85px; border: 1px solid var(--gold); background: #FFF; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative; cursor: pointer;
            color: rgba(0, 0, 0, 0.4); font-size: 10px; font-weight: 900; text-align: center;
        }
        .box-final img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none; }
        #id-label { color: #000; font-size: 11px; z-index: 1; }

        .btn-gy { min-width: 275px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: inherit; transition: 0.3s; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div class="back-nav" onclick="fadeOutAndLink('index.html')">«</div>

    <div class="lang-gateway" id="gy-lang-root">
        <button class="btn-main-lang" onclick="toggleMenu()">
            <img id="current-lang-flag" src="https://flagcdn.com/w20/ru.png" class="flag-icon">
            <span id="current-lang-label">RU</span>
        </button>
        <div id="lang-list-12" class="lang-panel"></div>
    </div>

    <div class="ui-header-right">GY-GY</div>

    <div class="quote-text" data-t="q_champ">«Шампанского много не бывает»</div>

    <div class="reg-grid">
        <div class="box-final" id="id-label">#ID</div>
        <div class="box-final" id="qr-box-reg"></div>
        <div class="box-final" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" onchange="preview(this)" style="display:none;">
            <img id="pp">
            <span data-t="label_photo">ФОТО</span>
        </div>
        <div class="box-final" onclick="generateAvatar()">
            <img id="avatar-img">
            <span data-t="label_avatar">АВАТАР</span>
        </div>
    </div>

    <button id="btn-save" class="btn-gy" onclick="handleSave()" data-t="btn_save">СОХРАНИТЬ</button>
    <button id="btn-pass" class="btn-gy btn-sleep" onclick="fadeOutAndLink('hall.html')" data-t="btn_to_hall">ПРОЙТИ В ХОЛЛ</button>

    <script src="shared-logic.js"></script>
    <script>
        let currentID = localStorage.getItem('gy_trace');

        window.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = "1";
            
            // Пытаемся запустить звук (браузеры могут блокировать до клика)
            const ambient = document.getElementById('snd-ambient');
            ambient.play().catch(() => {
                // Если заблокировано, включаем по первому клику на странице
                window.addEventListener('click', () => ambient.play(), { once: true });
            });

            if (!currentID) {
                currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
                localStorage.setItem('gy_trace', currentID);
            }
            document.getElementById('id-label').innerText = currentID;
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
        });

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    const img = document.getElementById('pp');
                    img.src = e.target.result; img.style.display = "block";
                    localStorage.setItem('gy_user_img', e.target.result);
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function generateAvatar() {
            const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
            const img = document.getElementById('avatar-img');
            img.src = url; img.style.display = "block";
            localStorage.setItem('gy_user_img', url);
        }

        function handleSave() {
            document.getElementById('btn-save').classList.add('btn-sleep');
            document.getElementById('btn-pass').classList.remove('btn-sleep');
        }

        function fadeOutAndLink(url) {
            document.body.style.opacity = "0";
            setTimeout(() => { window.location.href = url; }, 800);
        }

        function toggleMenu() {
            const list = document.getElementById('lang-list-12');
            list.style.display = (list.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
