<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY | Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --black: #000; --white: #fff; }
        * { -webkit-tap-highlight-color: transparent !important; box-sizing: border-box; outline: none !important; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; background: var(--black); color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin: 0; }

        /* UI HEADER */
        .logo-right { position: fixed; top: 25px; right: 25px; font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold); z-index: 10000; }
        .nav-back-top { position: fixed; top: 25px; left: 25px; z-index: 10001; }
        .lang-gateway { position: fixed; top: 80px; left: 25px; width: 170px; z-index: 10000; }
        
        .btn-main-lang { width: 100%; padding: 8px; background: var(--black); border: 1.5px solid var(--gold); color: var(--gold); font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }
        .lang-dropdown { display: none; flex-direction: column; background: var(--black); border: 1.5px solid var(--gold); position: absolute; width: 170px; max-height: 45vh; overflow-y: auto; z-index: 10001; }
        .lang-dropdown.open { display: flex; }
        .btn-sub-lang { background: none; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.1); color: var(--gold); padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; font-family: inherit; width: 100%; text-align: left; }
        .flag-icon { width: 20px; border: 0.5px solid var(--gold); }

        /* REGISTRATION ZONE */
        .reg-zone { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 24px; max-width: 85%; line-height: 1.2; margin-bottom: 30px; }

        /* 4 IDENTITY BOXES */
        .grid-identity { display: flex; gap: 10px; margin-bottom: 30px; }
        .box-frame { width: 85px; height: 85px; border: 1.5px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .box-frame img { width: 100%; height: 100%; object-fit: cover; }
        .label-mini { font-size: 9px; font-weight: 900; text-align: center; line-height: 1.1; color: var(--black); }

        /* NICKNAME INPUT */
        .nickname-input { background: transparent; border: none; color: var(--gold); text-align: center; font-size: 22px; width: 280px; margin-bottom: 25px; font-family: inherit; padding: 5px; }

        /* BUTTONS - СТРОГО ЗОЛОТО НА ЧЕРНОМ, БЕЗ ПОДСВЕТКИ */
        .action-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
        
        .btn-gy { 
            background: transparent; 
            border: 2px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 900; 
            font-family: inherit; 
            transition: none; /* Убрали все анимации */
        }

        /* Уменьшенные кнопки в ряд (-15% длины) */
        .btn-small { min-width: 140px; padding: 12px 5px; font-size: 11px; }
        
        /* Кнопка Назад */
        .btn-back { min-width: auto; padding: 10px 20px; font-size: 13px; }

        /* Состояния - НИКАКИХ ИЗМЕНЕНИЙ ЦВЕТА ФОНА */
        .btn-gy:hover, .btn-gy:active { background: transparent; color: var(--gold); }
        .btn-sleep { opacity: 0.1 !important; pointer-events: none !important; }

        .rtl { direction: rtl; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nav-back-top">
        <button class="btn-gy btn-back" onclick="location.href='welcome.html'" data-key="btn_back">← НАЗАД</button>
    </div>

    <div class="lang-gateway">
        <button class="btn-main-lang" onclick="document.getElementById('lang-list').classList.toggle('open')">
            <img id="cur-flag" src="https://flagcdn.com/w20/ru.png" class="flag-icon">
            <span id="cur-name">РУССКИЙ</span>
        </button>
        <div id="lang-list" class="lang-dropdown"></div>
    </div>

    <div class="logo-right">GY-GY</div>

    <main class="reg-zone">
        <div class="quote-text" data-key="q_champ">«Шампанского много не бывает»</div>

        <div class="grid-identity">
            <div class="box-frame" id="id-label" style="background: var(--black); font-size: 10px;">#ID</div>
            <div class="box-frame" id="qr-box-reg" style="background: var(--black); padding: 6px;"></div>
            
            <div class="box-frame" style="cursor:pointer; background: var(--white);" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" onchange="usePhoto(this)" style="display:none;" accept="image/*">
                <img id="pp-img" style="display:none;">
                <span id="pp-txt" class="label-mini" data-key="label_photo">ИЛИ<br>ФОТО</span>
            </div>
            
            <div class="box-frame" style="cursor:pointer; background: var(--white);" onclick="useAvatar()">
                <img id="av-img" style="display:none;">
                <span id="av-txt" class="label-mini" data-key="label_avatar">ИЛИ<br>АВАТАР</span>
            </div>
        </div>

        <input type="text" id="nick-in" class="nickname-input"autocomplete="off">

        <div class="action-row">
            <button id="btn-save" class="btn-gy btn-small" onclick="saveProfile()" data-key="btn_save">СОХРАНИТЬ</button>
            <button id="btn-final" class="btn-gy btn-small btn-sleep" onclick="finalizeReg()" data-key="btn_enter">ПРОЙТИ В ХОЛЛ</button>
        </div>
    </main>

<script>
    const langData = {
        en: { q_champ: "«No such thing as too much champagne»", btn_save: "SAVE", btn_enter: "HALL", label_photo: "OR<br>PHOTO", label_avatar: "OR<br>AVATAR", btn_back: "← BACK" },
        ru: { q_champ: "«Шампанского много не бывает»", btn_save: "СОХРАНИТЬ", btn_enter: "В ХОЛЛ", label_photo: "ИЛИ<br>ФОТО", label_avatar: "ИЛИ<br>АВАТАР", btn_back: "← НАЗАД" },
        uk: { q_champ: "«Шампанського багато не буває»", btn_save: "ЗБЕРЕГТИ", btn_enter: "ДО ХОЛУ", label_photo: "АБО<br>ФОТО", label_avatar: "АБО<br>АВАТАР", btn_back: "← НАЗАД" },
        pl: { q_champ: "«Szampana nigdy za wiele»", btn_save: "ZAPISZ", btn_enter: "DO HOLU", label_photo: "ALBO<br>FOTO", label_avatar: "ALBO<br>AWATAR", btn_back: "← WSTECZ" },
        de: { q_champ: "«Champagner geht immer»", btn_save: "SPEICHERN", btn_enter: "ZUR HALLE", label_photo: "ODER<br>FOTO", label_avatar: "ODER<br>AVATAR", btn_back: "← ZURÜCK" },
        fr: { q_champ: "«Jamais trop de champagne»", btn_save: "SAUVER", btn_enter: "VERS LE HALL", label_photo: "OU<br>PHOTO", label_avatar: "OU<br>AVATAR", btn_back: "← RETOUR" },
        it: { q_champ: "«Mai troppo champagne»", btn_save: "SALVA", btn_enter: "AL SALONE", label_photo: "O<br>FOTO", label_avatar: "O<br>AVATAR", btn_back: "← INDIETRO" },
        es: { q_champ: "«Nunca es suficiente champán»", btn_save: "GUARDAR", btn_enter: "AL VESTÍBULO", label_photo: "O<br>FOTO", label_avatar: "O<br>AVATAR", btn_back: "← ATRÁS" },
        cn: { q_champ: "«香槟永远不嫌多»", btn_save: "保存", btn_enter: "大厅", label_photo: "或<br>照片", label_avatar: "或<br>头像", btn_back: "← 返回" },
        ja: { q_champ: "«シャンパンはいくらあっても足りない»", btn_save: "保存", btn_enter: "ホールへ", label_photo: "または<br>写真", label_avatar: "または<br>アバター", btn_back: "← 戻る" },
        ar: { q_champ: "«الشمبانيا لا تكفي أبدا»", btn_save: "حفظ", btn_enter: "القاعة", label_photo: "أو<br>صورة", label_avatar: "أو<br>رمز", btn_back: "← عودة" },
        pt: { q_champ: "«Champanhe nunca é demais»", btn_save: "SALVAR", btn_enter: "SALÃO", label_photo: "OU<br>FOTO", label_avatar: "OU<br>AVATAR", btn_back: "← VOLTAR" }
    };

    const langs = [
        {c:'ru', n:'РУССКИЙ', f:'ru'}, 
            {c:'en', n:'ENGLISH', f:'gb'},
            {c:'uk', n:'УКРАЇНСЬКА', f:'ua'}, 
            {c:'pl', n:'POLSKI', f:'pl'},
            {c:'de', n:'DEUTSCH', f:'de'}, 
            {c:'fr', n:'FRANÇAIS', f:'fr'},
            {c:'it', n:'ITALIANO', f:'it'}, 
            {c:'es', n:'ESPAÑOL', f:'es'},
            {c:'cn', n:'中文', f:'cn'}, 
            {c:'ja', n:'日本語', f:'jp'},
            {c:'ar', n:'العربية', f:'ae'}, 
            {c:'pt', n:'PORTUGUÊS', f:'br'}
    ];

    function pickL(l, f, n) {
        document.getElementById('cur-flag').src = `https://flagcdn.com/w20/${f}.png`;
        document.getElementById('cur-name').innerText = n;
        document.body.classList.toggle('rtl', l === 'ar');
        document.querySelectorAll('[data-key]').forEach(el => {
            const k = el.getAttribute('data-key');
            el.innerHTML = langData[l] ? (langData[l][k] || langData['en'][k]) : langData['en'][k];
        });
        document.getElementById('lang-list').classList.remove('open');
        localStorage.setItem('gy_lang', l);
    }

    function usePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('pp-img').src = e.target.result;
                document.getElementById('pp-img').style.display = "block";
                document.getElementById('pp-txt').style.display = "none";
                document.getElementById('av-img').style.display = "none";
                document.getElementById('av-txt').style.display = "block";
                localStorage.setItem('gy_img', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function useAvatar() {
        const url = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${Math.random()}`;
        document.getElementById('av-img').src = url;
        document.getElementById('av-img').style.display = "block";
        document.getElementById('av-txt').style.display = "none";
        document.getElementById('pp-img').style.display = "none";
        document.getElementById('pp-txt').style.display = "block";
        localStorage.setItem('gy_img', url);
    }

    function saveProfile() {
        const nick = document.getElementById('nick-in').value.trim();
        if(!nick) return;
        localStorage.setItem('gy_nick', nick);
        document.getElementById('btn-save').classList.add('btn-sleep');
        document.getElementById('btn-final').classList.remove('btn-sleep');
    }

    function finalizeReg() { location.href = 'hall.html'; }

    window.onload = () => {
        let currentID = localStorage.getItem('gy_trace');
        if (!currentID) {
            currentID = `GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            localStorage.setItem('gy_trace', currentID);
        }
        document.getElementById('id-label').innerText = currentID;
        
        new QRCode(document.getElementById("qr-box-reg"), { 
            text: currentID, 
            width: 73, height: 73, 
            colorDark: "#ffffff", 
            colorLight: "#000000",
            correctLevel: QRCode.CorrectLevel.H
        });

        document.getElementById('lang-list').innerHTML = langs.map(l => `
            <button class="btn-sub-lang" onclick="pickL('${l.c}','${l.f}','${l.n}')">
                <img src="https://flagcdn.com/w20/${l.f}.png" class="flag-icon"> ${l.n}
            </button>
        `).join('');
        
        const savedL = localStorage.getItem('gy_lang') || 'ru';
        const initial = langs.find(x => x.c === savedL) || langs[0];
        pickL(initial.c, initial.f, initial.n);
    };
</script>
</body>
</html>
